        - shoulder_neck_arms_pose_preservation
        - shoulder_torso_non_target_body_preservation
        - shoulder_subject_identity_face_hair_preservation
        - shoulder_clothing_accessory_detail_preservation
        - shoulder_scene_camera_framing_preservation
        - shoulder_artifact_background_stability
      substitute_posture_body_scale_camera_or_clothing_pad:
        detect_when: The result achieves the shoulder effect through posture/head/neck/arm movement, torso/body scaling, camera/crop
          change, clothing shoulder-pad geometry, deltoid exaggeration, or generic body reshaping rather than local shoulder
          contour editing.
        severity_guidance: Minor clothing/pose cue with genuine local shoulder refinement may be severity 1-2. If posture,
          body/camera/crop, clothing pad, hair/clothing rearrangement, neck/torso change, or perspective trick is a major
          part of the effect, severity 3. If it is the main visible edit or changes source pose/identity/camera, severity
          4-5.
        affected_l3:
        - shoulder_primary_right_angle_outcome_match
        - shoulder_line_horizontality_slope_match
        - shoulder_width_frame_style_match
        - shoulder_edit_localized_to_target_region
        - shoulder_neck_arms_pose_preservation
        - shoulder_torso_non_target_body_preservation
        - shoulder_subject_identity_face_hair_preservation
        - shoulder_scene_camera_framing_preservation
        - shoulder_neck_transition_angle_match
        - shoulder_trapezius_heaviness_reduction_match
        - shoulder_tip_definition_softness_match
        - shoulder_open_balance_impression_match
        - shoulder_requested_style_intensity_match
        - shoulder_neck_clavicle_transition_quality
        - shoulder_clothing_accessory_detail_preservation
        - shoulder_artifact_background_stability
      over_sharp_boxy_padded_or_anatomically_impossible:
        detect_when: Shoulders become literal sharp corners, boxy, padded, overly wide, rigid, asymmetric, exaggerated, or
          anatomically impossible for the source body and pose.
        severity_guidance: Slight over-defined shoulder tip may be severity 1-2. Clear boxy, padded, bulky, masculine, or
          too-straight shoulder geometry should be severity 3. Literal sharp corners, impossible clavicle/shoulder-girdle
          anatomy, or severe style change must be severity 4-5.
        affected_l3:
        - shoulder_line_horizontality_slope_match
        - shoulder_neck_transition_angle_match
        - shoulder_width_frame_style_match
        - shoulder_tip_definition_softness_match
        - shoulder_open_balance_impression_match
        - shoulder_girdle_anatomy_perspective_consistency
        - shoulder_skin_fabric_surface_realism
        - shoulder_artifact_background_stability
        - shoulder_primary_right_angle_outcome_match
        - shoulder_trapezius_heaviness_reduction_match
        - shoulder_requested_style_intensity_match
