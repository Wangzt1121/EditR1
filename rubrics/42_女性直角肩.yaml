aggregation:
  prompt_compliance: Masked weighted arithmetic mean over the 8 Prompt Compliance facets; only mask=1 facets enter numerator
    and denominator.
  other_l1_blocks: Use the listed within-L1 weights for the remaining three blocks.
  base_formula: base_reward = 0.55 * P_masked + 0.22 * L + 0.16 * S + 0.07 * Q
  anatomy_score: A = score(shoulder_girdle_anatomy_perspective_consistency) / 9.0
  preservation_score: N = score(shoulder_neck_arms_pose_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.25) * (N ** 0.18)
taxonomy:
  Prompt Compliance:
    Requested Right-Angle Shoulder:
      shoulder_primary_right_angle_outcome_match:
        title: Primary right-angle-shoulder outcome
        definition: Whether the visible shoulders become naturally straighter, cleaner, and more right-angle-like in the Pilates-style
          sense requested by the prompt, without posture, camera, neck, face, or whole-body changes. Do not give credit for
          simply making shoulders wider, adding shoulder-pad geometry, changing pose, or globally reshaping the upper body.
        anchors:
          0: No visible right-angle shoulder edit, opposite edit, or a different task such as pose/body/clothing change.
          3: Very weak or doubtful shoulder refinement; the source shoulder shape mostly remains.
          5: Visible partial right-angle effect, but incomplete, asymmetric, overdone, or mixed with non-target changes.
          7: Clear natural right-angle shoulder improvement with one visible issue.
          9: Complete, natural, prompt-faithful Pilates-style right-angle shoulder result with face, neck, pose, clothing,
            and scene preserved.
        rubric: Whether the visible shoulders become naturally straighter, cleaner, and more right-angle-like in the Pilates-style
          sense requested by the prompt, without posture, camera, neck, face, or whole-body changes. Do not give credit for
          simply making shoulders wider, adding shoulder-pad geometry, changing pose, or globally reshaping the upper body.
          Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      shoulder_line_horizontality_slope_match:
        title: Shoulder-line horizontality and slope
        definition: Whether excessive downward slope or roundedness is reduced to the requested gently horizontal or balanced
          shoulder line without creating a rigid shelf, pointed corner, shoulder-pad shape, or anatomically impossible silhouette.
        anchors:
          0: Slope is unchanged, worse, reversed, or achieved through destructive body/camera distortion.
          3: Minimal, highly uneven, or visibly artificial slope improvement.
          5: General improvement with clear residual slope, overcorrection, or asymmetry.
          7: Appropriate shoulder line with one minor inconsistency.
          9: Shoulder-line direction precisely matches the request and remains anatomically natural.
        rubric: Whether excessive downward slope or roundedness is reduced to the requested gently horizontal or balanced
          shoulder line without creating a rigid shelf, pointed corner, shoulder-pad shape, or anatomically impossible silhouette.
          Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      shoulder_neck_transition_angle_match:
        title: Shoulder-neck transition
        definition: Whether the neck-to-shoulder junction becomes cleaner and more defined while retaining soft human anatomy,
          source neck length, clavicle relation, and natural trapezius continuity.
        anchors:
          0: Unchanged, broken, detached, falsely angular, or created by changing neck length/head position.
          3: Weak or visibly unnatural transition with clear anatomy concerns.
          5: Recognizable improvement but with clear contour, clavicle, neck, or trapezius errors.
          7: Clean natural transition with one minor issue.
          9: Clearly defined, soft, source-compatible, and anatomically exact transition.
        rubric: Whether the neck-to-shoulder junction becomes cleaner and more defined while retaining soft human anatomy,
          source neck length, clavicle relation, and natural trapezius continuity. Apply this facet's 0-9 anchors directly.
          If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated preservation,
          attractiveness, or realism compensate for this facet.
      shoulder_trapezius_heaviness_reduction_match:
        title: Upper-trapezius refinement
        definition: Requested reduction of trapezius heaviness or rounded-shoulder appearance without changing neck length
          or pose.
        anchors:
          0: Opposite change, no requested reduction, or destructive removal.
