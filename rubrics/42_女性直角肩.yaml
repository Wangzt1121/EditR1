prompt_applicability:
  purpose: Keep the fixed 22-score output while preventing unrequested shoulder styles from contributing easy high scores.
  always_applicable:
  - shoulder_primary_right_angle_outcome_match
  - shoulder_line_horizontality_slope_match
  - shoulder_neck_transition_angle_match
  - shoulder_open_balance_impression_match
  activation_rules:
    shoulder_trapezius_heaviness_reduction_match:
    - activate for trapezius, reduced slope, rounded shoulder, lightweight upper shoulder, or less bulky requests
    shoulder_width_frame_style_match:
    - activate for narrow-frame, broad, width, lightweight, structured, or shoulder-width requests
    - otherwise judge preservation of original shoulder width
    shoulder_tip_definition_softness_match:
    - activate for shoulder tip, defined edge, crisp line, clean edge, collarbone-enhancing, or non-pointed-corner requests
    shoulder_requested_style_intensity_match:
    - activate when the prompt names a specific aesthetic, age style, athletic style, garment context, cultural style, portrait
      style, or intensity
  mask_values:
    applicable: 1
    not_applicable: 0
  aggregation_rule: P = sum_i(weight_i * mask_i * normalized_score_i) / sum_i(weight_i * mask_i)
