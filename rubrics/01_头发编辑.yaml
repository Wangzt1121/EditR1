  raw_prompt_usage: The raw prompt may be used by the visual judge for preservation and quality evaluation, but it must not
    be scanned directly to activate the first 12 Prompt Compliance facets.
  mask_length: 12
  mask_values:
    '1': Explicitly requested or semantically required by the extracted target specification.
    '0': Not requested by the target specification; excluded from Prompt Compliance aggregation.
  prompt_facet_order:
  - hair_requested_style_family_match
  - hair_requested_structure_arrangement_match
  - hair_requested_length_endpoint_match
  - hair_requested_cut_layers_hemline_match
  - hair_requested_silhouette_volume_density_match
  - hair_requested_texture_curl_pattern_match
  - hair_requested_strand_flow_direction_match
  - hair_requested_bangs_parting_front_match
  - hair_requested_hairline_sideburn_faceframing_match
  - hair_requested_color_hue_tone_match
  - hair_requested_color_pattern_placement_match
  - hair_requested_secondary_details_and_completeness_match
  always_applicable:
  - hair_requested_style_family_match
  - hair_requested_secondary_details_and_completeness_match
  activation_rules:
    hair_requested_style_family_match:
      activate_when:
      - Any concrete named or described target hairstyle is present.
      - Any explicit feminine, masculine, elegant, polished, casual, retro, or other requested overall style character is
        present.
      do_not_activate_from:
      - generic statements that the edit should be human-centric, obvious, realistic, or photorealistic
    hair_requested_structure_arrangement_match:
      activate_when:
      - ponytail, pigtail, bun, updo, braid, braided, half-up, tied, loose-versus-tied organization
      - slick-back, mohawk, mullet, undercut, shaved side, dreadlocks, box braids, crown braid, fishtail braid
      - explicit component count, connection, side, height, routing, or asymmetrical organization
      semantic_implications:
      - ponytail, bun, braid, updo, half-up, mohawk, mullet, undercut, and dreadlocks imply a structural arrangement requirement
      do_not_activate_from:
      - generic scalp coverage or generic hair reconstruction language
    hair_requested_length_endpoint_match:
      activate_when:
      - ultra-short, short, ear-length, chin-length, jaw-length, shoulder-length, collarbone-length
      - long, very long, chest-length, waist-length, past the shoulders, below the shoulders
      - any explicit endpoint relative to ears, jaw, neck, shoulders, chest, or waist
      semantic_implications:
      - buzz cut, pixie cut, and bob imply a characteristic length category
      - long straight hair and long wavy hair explicitly imply long length
      do_not_activate_from:
      - the words 'hair length' appearing only in the generic reconstruction clause
      - generic occlusion over ears or shoulders
    hair_requested_cut_layers_hemline_match:
      activate_when:
      - layer, layered, one-length, blunt, choppy, feathered, tapered, trimmed ends
      - U-shaped, V-shaped, rounded, straight, or asymmetrical hemline
      - inward-curled ends, outward-flipped ends, specific end treatment
      semantic_implications:
      - bob, blunt bob, pixie, wolf cut, mullet, princess cut, and layered cut imply haircut or hemline structure
      do_not_activate_from:
      - generic clean boundaries or artifact-free language
    hair_requested_silhouette_volume_density_match:
      activate_when:
      - voluminous, high-volume, fluffy, airy, lifted roots, crown volume, fuller sides
      - flat, compact, sleek, dense, sparse, thick, thin, wide, narrow, rounded silhouette
      - explicit regional fullness or crown-height requirement
      semantic_implications:
      - afro, pompadour, quiff, rounded buzz, and explicitly fluffy or high-crown styles imply silhouette requirements
      do_not_activate_from:
      - the exact generic phrase 'natural hair volume'
      - generic realism or integration language
    hair_requested_texture_curl_pattern_match:
      activate_when:
      - straight, smooth straight, wavy, wave, curly, curl, coily, perm, woolly
      - S-wave, water wave, egg-roll wave, French curl, vintage curl, wet-look
      - explicit curl diameter, curl density, texture regularity, or full-head texture
      semantic_implications:
      - long straight hair implies straight texture
      - long wavy hair implies wavy texture
      - curly bob and woolly curls imply the corresponding curl family
      do_not_activate_from:
      - the exact generic phrase 'realistic strand texture'
      - generic photorealism language
    hair_requested_strand_flow_direction_match:
      activate_when:
      - falling naturally, flowing downward, side-swept, swept backward, slicked back
      - outward, inward, root-to-tip direction, face-framing direction, curl direction
      - explicit strand movement, gravity direction, or flow continuity
      do_not_activate_from:
      - the words 'strand flow' appearing only in the generic reconstruction clause
    hair_requested_bangs_parting_front_match:
      activate_when:
      - bangs, fringe, curtain bangs, blunt bangs, airy bangs, baby bangs, side-swept bangs
      - center part, middle part, side part, 7:3 part, explicit forehead exposure
      - front hair partially covering the eyes, front hair covering the forehead, explicit front-hair design
      do_not_activate_from:
      - the word 'bangs' appearing only in the generic reconstruction clause
      - generic instruction to rebuild front boundaries
    hair_requested_hairline_sideburn_faceframing_match:
      activate_when:
      - lower, raise, round, straighten, densify, or otherwise explicitly change the hairline
      - baby hairs, sideburn length or thickness, temple hair, face-framing strands
      - princess-cut side locks, ear-side strands, explicit temple coverage or sideburn connection
      do_not_activate_from:
      - the exact generic phrase 'clean hairline detail'
      - hairline, sideburn, or face-framing words appearing only in the generic reconstruction clause
      - front hair partially covering the eyes unless face-framing or hairline details are separately requested
    hair_requested_color_hue_tone_match:
      activate_when:
      - a named target hair color or color family
      - black, brown, chocolate brown, chestnut, blond, blonde, red, copper, gray, silver, white
      - blue, green, purple, pink, warm, cool, ash, golden, dark, light, vivid, muted, pastel
      do_not_activate_from:
      - generic lighting, highlights, shadows, white balance, or photorealism clauses
    hair_requested_color_pattern_placement_match:
      activate_when:
      - hair highlights, colored highlights, streaks, ombre, gradient, balayage, split dye, two-tone
      - underlayer dye, root dye, colored tips, dip dye, face-framing color, ear-side dye, rainbow
      - explicit color-placement region, density, width, count, or transition
      disambiguation:
      - The phrase 'highlights and shadows' in a rendering or reconstruction clause is lighting and must produce mask=0.
      - The word 'highlights' activates this facet only when it clearly describes dyed hair sections, a color, or a placement
        pattern.
      do_not_activate_from:
      - generic image highlights and shadows
      - strand highlights caused by illumination
    hair_requested_secondary_details_and_completeness_match:
      activate_when:
      - Always active.
      - Evaluate completion of all target-spec attributes that are not already fully represented by another applicable facet.
      - Include explicit small braids, shaved patches, hair-attached ornaments, counts, asymmetries, or special local details.
      do_not_activate_from:
      - generic preservation, realism, lighting, reconstruction, or artifact-control clauses
  named_style_semantic_mapping:
    bob:
    - hair_requested_style_family_match
    - hair_requested_length_endpoint_match
    - hair_requested_cut_layers_hemline_match
    pixie cut:
    - hair_requested_style_family_match
    - hair_requested_length_endpoint_match
    - hair_requested_cut_layers_hemline_match
    buzz cut:
    - hair_requested_style_family_match
    - hair_requested_length_endpoint_match
    - hair_requested_cut_layers_hemline_match
    wolf cut:
    - hair_requested_style_family_match
    - hair_requested_cut_layers_hemline_match
    - hair_requested_silhouette_volume_density_match
    mullet:
    - hair_requested_style_family_match
    - hair_requested_structure_arrangement_match
    - hair_requested_cut_layers_hemline_match
    ponytail:
    - hair_requested_style_family_match
    - hair_requested_structure_arrangement_match
    bun:
    - hair_requested_style_family_match
    - hair_requested_structure_arrangement_match
    braid:
    - hair_requested_style_family_match
    - hair_requested_structure_arrangement_match
    long straight hair:
    - hair_requested_style_family_match
    - hair_requested_length_endpoint_match
    - hair_requested_texture_curl_pattern_match
    long wavy hair:
    - hair_requested_style_family_match
    - hair_requested_length_endpoint_match
    - hair_requested_texture_curl_pattern_match
  mask_generation_procedure:
  - Initialize a 12-value zero mask in prompt_facet_order.
  - Set the two always-applicable facets to 1.
  - Scan target_spec only for explicit activation rules.
  - Apply named-style semantic mapping.
  - Resolve ambiguous words using the do_not_activate_from and disambiguation rules.
  - Do not scan preservation or generic reconstruction text.
  - Return exactly 12 binary values without changing the 22-score output contract.
  example_raw_prompt: 'Please perform a strong human-centric hair edit on the main character: change the hairstyle into a
    feminine long wavy hairstyle in chocolate brown, featuring long waves falling naturally past the shoulders and front hair
    partially covering the eyes, realistic strand texture, natural hair volume, and clean hairline detail. Keep the character
    identity, face shape, facial features, expression, body pose, clothing, accessories, background, lighting, camera angle,
    and all non-hair regions unchanged. Rebuild the bangs, hairline, sideburn or face-framing strands, hair length, strand
    flow, scalp coverage, occlusion over the ears or shoulders, highlights, shadows, and clean hair boundaries so the hair
    edit is obvious, photorealistic, naturally integrated, and artifact-free.'
  example_extracted_target_spec: feminine long wavy hairstyle in chocolate brown, featuring long waves falling naturally past
    the shoulders and front hair partially covering the eyes
  example_mask:
  - 1
  - 0
  - 1
  - 0
  - 0
  - 1
  - 1
  - 1
  - 0
  - 1
  - 0
  - 1
  aggregation_rule: P = sum_i(base_weight_i * mask_i * normalized_score_i) / sum_i(base_weight_i * mask_i), over the 12 Prompt
    Compliance facets.
  fallback_rule: If no external parser mask is supplied, first extract target_spec using target_spec_extraction, then apply
    the rules above. Never infer the mask from the complete raw prompt.
target_spec_extraction:
  purpose: Separate the actual requested hairstyle attributes from template boilerplate before mask generation.
  input: raw user editing prompt
  output: target_spec
  procedure:
  - Normalize whitespace but preserve the original wording.
  - Locate the hairstyle-change request, normally beginning with phrases such as 'change the hairstyle into', 'change only
    the hairstyle to', 'transform the hair into', or 'make the hair'.
  - Keep the actual target style, color, feature, placement, and explicitly requested secondary-detail clauses.
  - Stop before the first preservation or non-target clause.
  - Remove generic quality clauses and the generic reconstruction sentence listed below.
  - Generate the 12-value applicability mask only from target_spec.
  preferred_start_markers:
  - change the hairstyle into
  - change only the hairstyle to
  - change the hairstyle to
  - transform the hairstyle into
  - transform the hair into
  - make the hair
  - edit the hair into
  stop_markers:
  - Keep the character identity
  - Keep the same person
  - Keep identity
  - Preserve the character identity
  - Preserve identity
  - Do not alter any non-hair region
  - Do not change any non-hair region
  - Keep all non-hair regions unchanged
  - Rebuild the bangs, hairline, sideburn or face-framing strands
  remove_exact_or_semantically_equivalent_generic_clauses:
  - realistic strand texture
  - natural hair volume
  - clean hairline detail
  - the hair edit is obvious
  - the hair edit is photorealistic
  - the hair edit is naturally integrated
  - the hair edit is artifact-free
  - preserve identity
  - preserve face shape
  - preserve facial features
  - preserve expression
  - preserve body pose
  - preserve clothing
  - preserve accessories
  - preserve background
  - preserve lighting
  - preserve camera angle
  - preserve all non-hair regions
  ignore_entire_generic_reconstruction_clause: 'Ignore template clauses equivalent to: ''Rebuild the bangs, hairline, sideburn
    or face-framing strands, hair length, strand flow, scalp coverage, occlusion over the ears or shoulders, highlights, shadows,
    and clean hair boundaries so the hair edit is obvious, photorealistic, naturally integrated, and artifact-free.'''
  regex_reference:
    remove_preservation_tail: (?is)\b(?:keep|preserve|do not alter|do not change)\b.*$
    remove_generic_rebuild_tail: (?is)\brebuild the bangs,\s*hairline,\s*sideburn or face-framing strands\b.*$
    remove_generic_quality_phrases:
    - (?i),?\s*realistic strand texture
    - (?i),?\s*natural hair volume
    - (?i),?\s*(?:and\s+)?clean hairline detail
    - (?i),?\s*(?:obvious|photorealistic|naturally integrated|artifact-free)\b
  fallback: When no standard marker exists, retain only clauses that positively describe the desired final hair. Discard clauses
    about preserving non-target regions, realism, artifacts, lighting, camera, identity, or generic reconstruction.
reporting_policy:
  weakest_facet_candidates: Applicable Prompt Compliance facets (mask=1) plus all Localization, Subject Preservation, and
    Quality facets.
  excluded_from_weakest_reporting: Prompt Compliance facets with mask=0, even if their diagnostic integer score is numerically
    low.
  reason_limit: 3
  ranking_rule: Rank weaknesses by effective weighted contribution after applicability masking. Do not report template-derived
    or inactive hair attributes as failure reasons.
  diagnostic_inactive_scores: Inactive Prompt Compliance scores may remain in the fixed 22-value vector for schema compatibility,
    but they are diagnostic-only and have zero reward weight.