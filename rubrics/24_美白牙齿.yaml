aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
    - 0.0
    - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Requested Whitening Operation:
      requested_teeth_whitening_operation_match:
        title: Requested natural teeth-whitening operation match
        definition: Judge whether visible enamel becomes naturally whiter without tooth replacement, reshaping, smile editing,
          gum modification, global exposure change, or other substitute operations.
        anchors:
          0: The requested whitening operation is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of visible enamel whitening is present.
          2: A small relevant attempt exists, but the result is dominated by a substitute operation.
          3: The teeth are weakly edited, but natural whitening is mostly wrong.
          4: A recognizable whitening attempt exists, yet a major part is missing or replaced by exposure, glow, or geometry
            change.
          5: The operation is partially correct, with several substantial method or completeness errors.
          6: Natural whitening is mostly correct, but one clear operation error remains.
          7: The requested whitening is clearly achieved, with only a minor visible mismatch.
          8: The operation is highly accurate, with only a tiny local imperfection.
          9: All visible enamel is naturally whitened with no substitute operation or non-target change.
        rubric: |-
          Judge whether visible enamel becomes naturally whiter without tooth replacement, reshaping, smile editing, gum modification, global exposure change, or other substitute operations. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_visible_teeth_coverage_match:
        title: Requested visible-teeth coverage match
        definition: Judge whether all assessable visible tooth surfaces receive coherent whitening, including partially visible
          side teeth, while hidden teeth are ignored.
        anchors:
          0: Visible-tooth coverage is absent, reversed, unrelated, or unusable.
          1: Only a negligible visible enamel region is treated.
          2: A small tooth region changes, but most visible teeth remain untreated.
          3: Coverage is weak and major visible teeth or tooth surfaces are missed.
          4: The target is recognizable, but one major tooth group or side remains untreated or incorrectly included.
          5: Coverage is partial, with several visible omissions or spills.
          6: Coverage is mostly complete, but one clear visible tooth or region remains inconsistent.
          7: All visible teeth are well covered, with only a minor local miss.
          8: Coverage is highly complete and precise, with only a tiny imperfection.
          9: Every assessable visible enamel surface is whitened precisely and consistently.
        rubric: |-
          Judge whether all assessable visible tooth surfaces receive coherent whitening, including partially visible side teeth, while hidden teeth are ignored. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_whitening_magnitude_match:
        title: Requested whitening-magnitude match
        definition: Judge whether subtle premium, noticeable, moderate-to-strong, dramatic, maximum-realistic, app-style,
          studio, commercial, or social-media intensity is visible without exceeding realism.
        anchors:
          0: The requested magnitude is absent, destructive, reversed, or unusable.
          1: Only a negligible brightness change is visible.
          2: The amount is severely too weak, too strong, or inconsistent.
          3: The intensity is weakly attempted but clearly mismatched.
          4: The effect is recognizable, but the amount has a major mismatch.
          5: The magnitude is partially appropriate, with several visible intensity problems.
          6: The amount is mostly correct, but one clear under- or over-whitening issue remains.
          7: The requested strength is clearly achieved, with only a minor mismatch.
          8: The intensity is highly accurate, with only a tiny excess or residual.
          9: The whitening strength is exactly visible enough, source-appropriate, and believable.
        rubric: |-
          Judge whether subtle premium, noticeable, moderate-to-strong, dramatic, maximum-realistic, app-style, studio, commercial, or social-media intensity is visible without exceeding realism. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_yellow_stain_reduction_match:
        title: Requested yellow-cast and visible-stain reduction match
        definition: Judge reduction of yellow, brownish, gray, or dull discoloration on visible enamel while preserving natural
          regional and tooth-to-tooth variation.
        anchors:
          0: Discoloration is unchanged, worse, reversed, unrelated, or unusable.
          1: Only a negligible reduction of yellow or dull cast is visible.
          2: A small relevant reduction exists, but discoloration remains dominant.
          3: Stain reduction is weak and largely ineffective.
          4: The teeth look somewhat cleaner, but a major yellow, gray, brown, or uneven cast remains.
          5: Reduction is partial, with several substantial residual or over-removal problems.
          6: Discoloration is mostly reduced, but one clear residual or uneven area remains.
          7: Yellow and dull casts are clearly improved, with only a minor mismatch.
          8: Reduction is highly accurate, with only a tiny local residual.
          9: Visible discoloration is fully and naturally reduced without flattening enamel variation.
        rubric: |-
          Judge reduction of yellow, brownish, gray, or dull discoloration on visible enamel while preserving natural regional and tooth-to-tooth variation. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_enamel_hue_neutrality_match:
        title: Requested natural enamel-hue neutrality match
        definition: Judge whether whitened teeth retain a believable warm-neutral enamel hue without blue, cyan, gray, purple,
          fluorescent, or globally desaturated color.
        anchors:
          0: Enamel hue is severely false, reversed, unrelated, or unusable.
          1: Only a negligible trace of believable enamel color remains.
          2: The teeth have a severe blue, cyan, gray, purple, fluorescent, or dead-white cast.
          3: Hue is weakly corrected and remains clearly unnatural.
          4: The result is recognizable, but a major color-temperature or saturation mismatch remains.
          5: Hue matching is partial, with several visible color inconsistencies.
          6: Enamel hue is mostly natural, but one clear tint or desaturation issue remains.
          7: The hue is strong and believable, with only a minor mismatch.
          8: Enamel color is highly accurate, with only a tiny local difference.
          9: The whitened teeth have perfectly natural, warm-neutral, source-compatible enamel color.
        rubric: |-
          Judge whether whitened teeth retain a believable warm-neutral enamel hue without blue, cyan, gray, purple, fluorescent, or globally desaturated color. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_brightness_ceiling_no_glow_match:
        title: Requested brightness ceiling and no-glow match
        definition: Judge whether enamel brightness remains below clipping and compatible with scene illumination, without
          halos, self-emission, fluorescent glow, or brighter-than-light-source appearance.
        anchors:
          0: Teeth are severely glowing, clipped, reversed, unrelated, or unusable.
          1: Only a negligible amount of realistic tonal information remains.
