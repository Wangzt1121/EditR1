identity_preservation_protocol:
  purpose: Prevent successful teeth whitening from hiding smile, dental-geometry, facial-identity, expression, camera, or
    background drift. Identity is judged by source-to-result correspondence, not by tooth brightness.
  comparison_checklist:
    - mouth width, mouth corners, lip shape, lip thickness, and mouth opening
    - visible tooth count, size, shape, spacing, alignment, rotation, bite, and incisal edges
    - gumline, gum display, tongue position, oral cavity, and smile asymmetry
    - nose-to-mouth, mouth-to-chin, cheek, and jaw relationships
    - eye shape, gaze, brows, expression, and head pose
    - age impression, skin tone, stable marks, makeup, facial hair, and facial texture
    - hair, hairstyle, clothing, accessories, and body pose
    - background hue, texture, brightness, contrast, white balance, and composition
    - camera angle, crop, framing, lighting, aspect ratio, and resolution
    - overall same-person and same-smile impression at normal viewing size
  strict_rules:
    - Do not increase identity because the teeth are attractive, bright, symmetrical, or prompt-compliant.
    - Do not treat a photorealistic but different-looking smile or person as identity-preserved.
    - A score of 7 still requires a strong same-person and same-smile match with only minor drift.
    - A changed-person or changed-smile impression must score 4 or below on the dedicated identity facet.
    - Only visible enamel color and brightness may change; dental and facial geometry remain constrained.
    - Whitening correctness, dental geometry, smile, identity, expression, oral color, background, camera state, and rendering
      quality are independent.
  task_specific_exception: only visible enamel hue, discoloration, brightness, and the minimum anti-aliased enamel-boundary
    blending needed for natural whitening
