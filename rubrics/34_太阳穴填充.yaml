compact_output_contract:
  format:
    scores: array of exactly 22 integers in active_l3 order
  requirements:
  - minItems = 22
  - maxItems = 22
  - minimum score = 0
  - maximum score = 9
  - Do not output names, evidence, explanations, summaries, or failure tags in the training path.
  no_example_reason: Fixed example vectors are intentionally omitted to avoid template copying and high-score saturation.
l1_weights:
  Prompt Compliance: 0.60
  Localization and Anatomical Integration: 0.25
  Subject Preservation: 0.11
  Task Realism and Image Quality: 0.04
facet_weights_within_l1:
  Prompt Compliance:
    temple_fill_primary_outcome_match: 0.2
    temple_fill_hollow_reduction_match: 0.16
    temple_fill_fullness_magnitude_match: 0.15
    temple_fill_volume_placement_distribution_match: 0.14
    temple_fill_bilateral_completeness_balance_match: 0.11
    temple_fill_overfill_head_width_control_match: 0.11
    temple_fill_normal_view_visibility_match: 0.07
    temple_fill_requested_finish_match: 0.06
  Localization and Anatomical Integration:
    temple_fill_edit_localized_to_temporal_hollows: 0.21
    temple_fill_forehead_hairline_transition_quality: 0.2
    temple_fill_outer_eye_brow_tail_transition_quality: 0.18
    temple_fill_cheekbone_preauricular_transition_quality: 0.17
    temple_fill_temporal_curvature_perspective_consistency: 0.15
    temple_fill_skin_hair_occlusion_integration: 0.09
  Subject Preservation:
    temple_fill_identity_face_shape_preservation: 0.27
    temple_fill_eyes_gaze_brows_lashes_preservation: 0.21
    temple_fill_forehead_cheekbone_jaw_ear_preservation: 0.2
    temple_fill_expression_head_pose_preservation: 0.17
    temple_fill_hair_clothing_scene_camera_preservation: 0.15
  Task Realism and Image Quality:
    temple_fill_skin_surface_detail_realism: 0.3
    temple_fill_local_lighting_shadow_color_consistency: 0.3
    temple_fill_edge_blending_artifact_stability: 0.4
aggregation:
  prompt_compliance: Weighted arithmetic mean over all 8 Prompt Compliance facets. All eight facets are applicable to every
    valid prompt.
  other_l1_blocks: Use the listed within-L1 weights for the remaining three blocks.
  base_formula: base_reward = 0.60 * P + 0.25 * L + 0.11 * S + 0.04 * Q
  anatomy_score: A = score(temple_fill_temporal_curvature_perspective_consistency) / 9.0
  identity_score: I = score(temple_fill_identity_face_shape_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.24) * (I ** 0.18)
taxonomy:
  Prompt Compliance:
    Requested Temple Filling:
      temple_fill_primary_outcome_match:
        title: Primary temple-filling outcome
        definition: Whether both assessable temple hollows gain natural localized volume.
        anchors:
          0: No target edit, deeper hollowing, or a different task.
          3: Tiny, uncertain, mostly unchanged, or inconsistent filling.
          5: Visible partial temple filling with major incompleteness or one-side weakness.
          7: Clear localized bilateral temple filling with one material issue; not a default score.
          9: Temple filling is complete, visible, localized, natural, and source-preserving.
        rubric: Whether both assessable temple hollows gain natural localized volume. Apply this facet's 0-9 anchors directly.
          If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated preservation,
          attractiveness, or realism compensate for this facet.
      temple_fill_hollow_reduction_match:
        title: Temple-hollow reduction
        definition: Whether visible concavity is reduced without erasing normal temporal anatomy.
        anchors:
          0: Hollows remain unchanged, deepen, or become distorted.
          3: Minimal, hard-to-see, or highly artificial hollow correction.
          5: Partial reduction with clear residual concavity, unevenness, or mild overfill.
          7: Effective visible hollow reduction with one minor issue and no substitute widening.
          9: Hollowing is naturally and fully improved while normal temporal anatomy remains.
        rubric: Whether visible concavity is reduced without erasing normal temporal anatomy. Apply this facet's 0-9 anchors
          directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated
          preservation, attractiveness, or realism compensate for this facet.
      temple_fill_fullness_magnitude_match:
        title: Fullness magnitude
        definition: Whether the added volume is visible and prompt-appropriate without excess.
        anchors:
          0: No filling or destructive overexpansion.
          3: Severely too weak, too strong, uneven, or barely visible.
          5: Recognizable but clearly inaccurate magnitude.
          7: Prompt-appropriate temple fullness with one minor issue and no swollen look.
          9: Magnitude precisely matches the prompt and source anatomy.
        rubric: Whether the added volume is visible and prompt-appropriate without excess. Apply this facet's 0-9 anchors
          directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated
          preservation, attractiveness, or realism compensate for this facet.
      temple_fill_volume_placement_distribution_match:
        title: Volume placement and distribution
        definition: Whether volume occupies the true temporal hollows and tapers naturally around them.
        anchors:
          0: Volume is misplaced or forms an impossible lump.
          3: Major concentration, wrong vertical level, cheek/forehead placement, or anatomical mismatch.
          5: General temple filling exists with one clear distribution error.
          7: Volume is naturally distributed inside the temple hollows with one minor issue.
          9: Volume is precisely placed in the true temporal hollows and smoothly tapered.
        rubric: Whether volume occupies the true temporal hollows and tapers naturally around them. Apply this facet's 0-9
          anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not
          let unrelated preservation, attractiveness, or realism compensate for this facet.
      temple_fill_bilateral_completeness_balance_match:
        title: Bilateral completeness and balance
        definition: Whether visible left and right temples are treated completely with perspective-aware balance.
        anchors:
          0: One visible side is missed or severe imbalance is introduced.
          3: Major left-right mismatch, mostly one-sided change, or incomplete editing.
          5: Both sides are attempted but visibly inconsistent or weak on one side.
          7: Assessable sides are treated with perspective-aware balance and one minor difference.
          9: All assessable temple regions are complete and naturally balanced.
        rubric: Whether visible left and right temples are treated completely with perspective-aware balance. Apply this facet's
          0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do
          not let unrelated preservation, attractiveness, or realism compensate for this facet.
      temple_fill_overfill_head_width_control_match:
        title: Overfill and upper-face width control
        definition: Whether filling avoids bulging temples, widened forehead, boxy skull, or swollen upper-face appearance.
        anchors:
          0: Severe overfill or broad upper-face deformation.
          3: Major temple bulge, forehead widening, or filler-like swelling.
          5: Target filling exists but noticeable overexpansion remains.
          7: Well controlled with one minor contour excess and no visible head-width drift.
          9: Fullness is localized with no overfill, puffy filler effect, or head-width drift.
        rubric: Whether filling avoids bulging temples, widened forehead, boxy skull, or swollen upper-face appearance. Apply
          this facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      temple_fill_normal_view_visibility_match:
        title: Normal-view improvement visibility
        definition: Whether the smoother temporal contour is noticeable at ordinary portrait viewing size.
        anchors:
          0: No visible improvement or severe overfilling dominates.
          3: Improvement is difficult to see, mostly unchanged, or highly distracting.
          5: Visible but clearly incomplete, weak, or artificial.
          7: Clear normal-view temple-contour improvement with one minor issue.
          9: The temple-hollow improvement is easy to perceive and fully believable.
        rubric: Whether the smoother temporal contour is noticeable at ordinary portrait viewing size. Apply this facet's
          0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do
          not let unrelated preservation, attractiveness, or realism compensate for this facet.
