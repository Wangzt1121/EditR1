prompt_applicability:
  purpose: All prompts share one bilateral temple-filling target. All eight Prompt Compliance facets are always applicable.
  always_applicable:
  - temple_fill_primary_outcome_match
  - temple_fill_hollow_reduction_match
  - temple_fill_fullness_magnitude_match
  - temple_fill_volume_placement_distribution_match
  - temple_fill_bilateral_completeness_balance_match
  - temple_fill_overfill_head_width_control_match
  - temple_fill_normal_view_visibility_match
  - temple_fill_requested_finish_match
  mask:
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  aggregation_rule: P = sum_i(weight_i * normalized_score_i) over all 8 Prompt Compliance facets.
judge_role: You are a strict expert evaluator for temple-hollow filling, upper-face soft-tissue anatomy, identity preservation,
  and source-state consistency.
judge_instructions: |-
  Judge SOURCE, EDIT PROMPT, and EDITED IMAGE in this order.

  1) Source audit. Compare the original bilateral temple hollows, forehead-to-temple-to-cheekbone contour, hairline, outer eyes,
  brow tails, cheekbones, ears, jawline, skin texture, identity, expression, head pose, lighting, clothing, background, and camera state.

  2) Actual-edit classification. Before scoring, decide which case best describes the edited image:
  correct_local_temple_fill; weak_or_near_no_op; cheek_forehead_or_head_widening_substitute; overfilled_swollen_temple; source_state_or_identity_drift;
  or artifact/lighting/beauty_filter_substitute. Do not reward a generally prettier, smoother, brighter, wider, or more symmetric face
  unless the temple hollows themselves are visibly and locally filled.

  3) Positive versus negative sample meaning. A positive training sample should show visible localized temple-hollow reduction with
  natural fullness and preserved source identity. A negative sample includes no visible temple change, only generic beautification,
  whole-face or upper-face widening, cheek/forehead plumping, moved hairline/eyes/brows, puffy filler-like temples, or source-state drift.

  4) Failure propagation. Treat absent/weak filling, wrong-region/substitute widening, overfill/swelling, broken temporal anatomy,
  hairline/eye/brow/identity drift, and local skin/lighting artifacts as failures. Estimate severity 0-5 and apply
  global_scoring_policy.failure_propagation caps before final output.

  5) Score calibration. 9 is rare. 8 is near-perfect. 7 requires concrete facet-specific evidence; for core temple-filling facets,
  7 requires clear localized temple-hollow improvement on assessable sides. 6 means mostly correct with one clear issue. 4-5 means
  partial, weak, substituted, or visibly flawed. 0-3 means absent, wrong, severe, or source-breaking.

  6) Anti-template review. If your provisional vector is all 7s, mostly 7s, all 8-9s, or copied across many facets, re-audit the
  image. Lower every facet that lacks exact visual evidence. Preservation and quality can be moderate-to-good when the source is
  not damaged, but they must not turn a failed or substituted primary edit into a high reward.

  Return only JSON:
  {"score_vector":[22 integers from 0 to 9],"failure_tags":[]}
