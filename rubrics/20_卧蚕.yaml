identity_preservation_protocol:
  purpose: Prevent task success from hiding identity, expression, gaze, eye geometry, camera, lighting, or scene drift.
  comparison_checklist:
  - eye shape, aperture, spacing, canthi, iris and pupil position, and gaze
  - lower-eyelid margin, lash line, tear trough, dark circles, and upper-cheek contour
  - brows, nose, cheeks, mouth, expression, age impression, and characteristic asymmetry
  - skin tone, makeup, pores, fine lines, stable marks, and facial texture
  - hair, glasses, accessories, clothing, background, camera, lighting, crop, and resolution
  - overall same-person impression at normal viewing size
  strict_rules:
  - Do not increase identity because the requested local edit is attractive or realistic.
  - Do not treat a photorealistic but different-looking person as identity-preserved.
  - A score of 7 requires a strong same-person match with only a genuine minor defect.
  - A changed-person impression must score 4 or below on the dedicated identity facet.
  - Prompt compliance, identity, expression, eye geometry, background, and rendering quality are independent.
  task_specific_exception: only prompt-requested bilateral aegyo-sal geometry, volume, extent, highlight-shadow relief,
    and minimum adjacent under-eye blending skin