    face_length_direction_match: 0.11
    face_vertical_proportion_natural: 0.09
    ear_size_shape_direction_match: 0.09
    ear_attachment_and_symmetry_natural: 0.07
    facial_features_scale_preserved_length_ear: 0.07
  Localization and Anatomical Integration:
    edit_confined_to_target_region: 0.28
    boundary_blends_naturally: 0.28
    occlusion_and_shadow_natural: 0.22
    bilateral_balance_when_expected: 0.22
  Subject Preservation:
    same_person_identity: 0.8
