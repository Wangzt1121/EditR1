  Prompt Compliance:
    target_edit_applied: 0.08
    primary_instruction_fulfilled: 0.12
    target_region_correct: 0.08
    all_requested_attributes_covered: 0.08
    edit_strength_appropriate: 0.08
    no_wrong_edit_type: 0.08
