aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Color, Finish, and Application:
      requested_lipstick_operation_style_match:
        title: Requested lipstick operation and overall style match
        definition: Judge add, replace, recolor, remove, or restyle lipstick together with the requested natural, everyday,
          romantic, bold, evening, editorial, or other explicit appearance.
        anchors:
          0: the requested lipstick operation and overall style is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested lipstick operation and overall style is visible; the central lipstick
            operation or style is essentially unmet.
          2: A small relevant attempt is present, but the requested lipstick operation and overall style is severely incorrect
            or incomplete.
          3: the requested lipstick operation and overall style is weakly attempted; one or more primary requirements are
            missing or contradictory.
          4: the requested lipstick operation and overall style is recognizable, but a major mismatch, omission, or excessive
            change remains.
          5: the requested lipstick operation and overall style is moderately achieved, with several substantial visible problems.
          6: the requested lipstick operation and overall style is mostly correct, but one clear and important issue remains.
          7: the requested lipstick operation and overall style is clearly successful, with only a minor visible mismatch.
          8: the requested lipstick operation and overall style is highly accurate and complete, with only a tiny local imperfection.
          9: The exact lipstick operation and intended overall appearance are fully achieved.
      requested_lipstick_color_family_match:
        title: Requested lipstick color family match
        definition: Judge the exact requested lipstick color family and visible hue category, such as red, rose, pink, coral,
          orange, nude, beige, brown, berry, plum, purple, black, gray, or natural tint. A realistic but wrong color family
          is a failure on this facet.
        anchors:
          0: the requested lipstick color family is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested lipstick color family is visible; the dominant lipstick family is wrong.
          2: A small relevant attempt is present, but the requested lipstick color family is severely incorrect or incomplete.
          3: the requested lipstick color family is weakly attempted; one or more primary requirements are missing or contradictory.
          4: the requested lipstick color family is recognizable, but a major mismatch, omission, or excessive change remains.
          5: the requested lipstick color family is moderately achieved, with several substantial visible problems.
          6: the requested lipstick color family is mostly correct, but one clear and important issue remains.
          7: Strong result, but still visibly imperfect; only minor local deviations are allowed. Do not use 7 as a default
            score.
          8: Near-perfect match with only a tiny local issue and no visible non-target drift.
          9: 'Essentially exact and rare: fully satisfies this facet with no visible defect.'
      requested_lipstick_undertone_depth_saturation_match:
        title: Requested undertone, depth, brightness, and saturation match
        definition: Judge undertone, depth, darkness/lightness, saturation, warmth/coolness, brightness, and vividness independently
          from generic color plausibility. A similar but visibly different undertone or intensity must be penalized.
        anchors:
          0: the requested lipstick undertone and tonal depth is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested lipstick undertone and tonal depth is visible; the shade nuance is substantially
            wrong.
          2: A small relevant attempt is present, but the requested lipstick undertone and tonal depth is severely incorrect
            or incomplete.
          3: the requested lipstick undertone and tonal depth is weakly attempted; one or more primary requirements are missing
            or contradictory.
          4: the requested lipstick undertone and tonal depth is recognizable, but a major mismatch, omission, or excessive
            change remains.
          5: the requested lipstick undertone and tonal depth is moderately achieved, with several substantial visible problems.
          6: the requested lipstick undertone and tonal depth is mostly correct, but one clear and important issue remains.
          7: the requested lipstick undertone and tonal depth is clearly successful, with only a minor visible mismatch.
          8: the requested lipstick undertone and tonal depth is highly accurate and complete, with only a tiny local imperfection.
          9: Undertone, depth, brightness, and saturation exactly match the requested shade semantics.
      requested_lipstick_finish_material_match:
        title: Requested lipstick finish and material match
        definition: 'Judge the exact requested lipstick material and finish: matte, satin, creamy, velvet, glossy, wet gloss,
          metallic, pearl, glitter, sheer tint, or liner effect. A realistic substitute finish must not receive high credit.'
        anchors:
          0: the requested lipstick finish and material is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested lipstick finish and material is visible; the dominant finish is wrong
            or opposite.
          2: A small relevant attempt is present, but the requested lipstick finish and material is severely incorrect or
            incomplete.
          3: the requested lipstick finish and material is weakly attempted; one or more primary requirements are missing
            or contradictory.
          4: the requested lipstick finish and material is recognizable, but a major mismatch, omission, or excessive change
            remains.
          5: the requested lipstick finish and material is moderately achieved, with several substantial visible problems.
          6: the requested lipstick finish and material is mostly correct, but one clear and important issue remains.
          7: Strong result, but still visibly imperfect; only minor local deviations are allowed. Do not use 7 as a default
            score.
          8: Near-perfect match with only a tiny local issue and no visible non-target drift.
          9: 'Essentially exact and rare: fully satisfies this facet with no visible defect.'
      requested_lipstick_application_pattern_match:
        title: Requested lipstick application pattern match
        definition: Judge full-lip, gradient, ombre, lip-liner, blurred edge, center-focused tint, upper-only, lower-only,
          two-tone, or other requested application pattern. Extra unrequested makeup patterns must lower the score.
        anchors:
          0: the requested lipstick application pattern is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested lipstick application pattern is visible; the defining application pattern
            is mostly wrong.
          2: A small relevant attempt is present, but the requested lipstick application pattern is severely incorrect or
            incomplete.
          3: the requested lipstick application pattern is weakly attempted; one or more primary requirements are missing
            or contradictory.
          4: the requested lipstick application pattern is recognizable, but a major mismatch, omission, or excessive change
            remains.
          5: the requested lipstick application pattern is moderately achieved, with several substantial visible problems.
          6: the requested lipstick application pattern is mostly correct, but one clear and important issue remains.
          7: the requested lipstick application pattern is clearly successful, with only a minor visible mismatch.
          8: the requested lipstick application pattern is highly accurate and complete, with only a tiny local imperfection.
          9: The application pattern, direction, and transition exactly match the prompt.
      requested_upper_lower_lip_distribution_match:
        title: Requested upper/lower lip distribution match
        definition: Judge upper-versus-lower color depth, coverage, highlight balance, relative strength, and any explicitly
          different treatment between the two lips.
        anchors:
          0: the requested upper/lower lip distribution is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested upper/lower lip distribution is visible; upper/lower distribution is
            materially wrong.
          2: A small relevant attempt is present, but the requested upper/lower lip distribution is severely incorrect or
            incomplete.
          3: the requested upper/lower lip distribution is weakly attempted; one or more primary requirements are missing
            or contradictory.
          4: the requested upper/lower lip distribution is recognizable, but a major mismatch, omission, or excessive change
            remains.
          5: the requested upper/lower lip distribution is moderately achieved, with several substantial visible problems.
          6: the requested upper/lower lip distribution is mostly correct, but one clear and important issue remains.
          7: the requested upper/lower lip distribution is clearly successful, with only a minor visible mismatch.
          8: the requested upper/lower lip distribution is highly accurate and complete, with only a tiny local imperfection.
          9: Upper and lower lip color, coverage, and optical balance exactly match the instruction.
    Coverage and Edge Details:
      requested_lipstick_opacity_intensity_match:
        title: Requested lipstick opacity and intensity match
        definition: Judge sheer, translucent, lightweight, richly pigmented, opaque, thin everyday, clear, bold, or intense
          evening strength.
        anchors:
          0: the requested lipstick opacity and intensity is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested lipstick opacity and intensity is visible; the lipstick is far too weak,
            opaque, sheer, or intense.
          2: A small relevant attempt is present, but the requested lipstick opacity and intensity is severely incorrect or
            incomplete.
          3: the requested lipstick opacity and intensity is weakly attempted; one or more primary requirements are missing
            or contradictory.
          4: the requested lipstick opacity and intensity is recognizable, but a major mismatch, omission, or excessive change
            remains.
          5: the requested lipstick opacity and intensity is moderately achieved, with several substantial visible problems.
