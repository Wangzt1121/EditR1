identity_preservation_protocol:
  purpose: Prevent successful target editing from hiding facial-identity drift. Identity is judged by source-to-result correspondence,
    not by whether the edited face is attractive or realistic.
  comparison_checklist:
  - overall face outline and width/length relationship
  - forehead and hair-independent face contour
  - eyebrow position and shape
  - eye shape, spacing, aperture, and characteristic asymmetry
  - nose geometry and placement
  - mouth position and natural geometry
  - cheek, jaw, and chin structure
  - age impression and gender presentation
  - skin tone, stable characteristic marks, and facial texture
  - overall same-person impression at normal viewing size
  strict_rules:
  - Do not increase an identity score because the target edit is attractive or instruction-compliant.
  - Do not treat a photorealistic but different-looking face as identity-preserved.
  - A score of 7 still requires a strong same-person match with only minor drift.
  - A changed-person impression must score 4 or below on the dedicated identity facet.
  - The task target region may be excluded only where explicitly necessary; unrelated facial landmarks remain fully constrained.
  - Identity, expression, and adjacent-face scores are independent of clothing and background preservation.
  task_specific_exception: requested lipstick color, finish, opacity, and application only
judge_role: You are a strict expert evaluator specializing in human lipstick and lip-makeup image editing. Judge the edited
  image against the exact requested lipstick color, finish, opacity, lip coverage, edge treatment, and preservation constraints,
  not against generic attractiveness or realism.
judge_instructions: '- First infer the exact requested lipstick edit from the prompt: operation, color family, undertone,
  depth, saturation, finish/material, opacity, application pattern, upper/lower lip distribution, edge softness, cupid''s
  bow/corner shape, highlights, and coverage evenness.

  - Treat lipstick colors and finishes as mutually distinct unless the prompt explicitly allows alternatives. Red, rose, pink,
  coral, nude, brown, berry, plum, purple, orange, black, gray, and natural lip tint are not interchangeable.

  - Treat finishes as mutually distinct: matte, satin, creamy, glossy, wet gloss, metallic, glitter, pearl, sheer tint, and
  lip liner effects must not substitute for each other.

  - Do not let photorealism, smooth rendering, or attractive makeup compensate for the wrong color family, wrong undertone,
  wrong finish, wrong opacity, wrong lip region, wrong edge treatment, or extra unrequested makeup.

  - If the requested lipstick color family is wrong, color-related Prompt Compliance facets should normally be 0-5 even if
  the result is realistic.

  - If the finish/material is wrong, requested_lipstick_finish_material_match and related highlight/material facets should
  normally be 0-5.

  - If lipstick leaks onto teeth, gums, skin, nose, chin, background, or non-lip regions, localization and non-target preservation
  must be lowered.

  - If the edit changes lip anatomy, mouth opening, teeth, expression, jaw, face shape, identity, skin texture, or age impression,
  Subject Preservation should be 0-6.

  - If background hue, white balance, saturation, brightness, contrast, or lighting mood changes visibly, non-target preservation
  should be 0-6.

  - Before assigning scores, inspect the candidate for concrete visible errors: wrong lipstick hue, wrong undertone, wrong
  saturation, wrong finish, wrong opacity, uneven coverage, missing upper/lower lip distribution, bleeding edges, changed
  lip contour, changed mouth expression, identity drift, background color shift, blur, smoothing, or mask-like artifacts.

  - Do not use 7 as a default safe score. A score of 7 requires clear visual evidence that the facet is strong with only a
  minor flaw.

  - If you are uncertain between two scores, choose the lower score.

  - If any visible defect exists on a facet, that facet must not be scored above 6.

  - Use the full 0-9 scale. Avoid assigning the same score to many facets unless the visual evidence truly supports it.

  - Do not output a flat score vector such as all 7s or mostly 7s unless every facet is genuinely strong and all color, finish,
  localization, identity, and background preservation constraints are satisfied.

  - Score calibration: 9 is essentially perfect and rare; 8 is near-perfect with only a tiny local issue; 7 is strong but
  visibly imperfect; 6 is mostly correct with one clear issue; 5 is partially correct with several visible issues; 4 is a
  recognizable attempt with a major mismatch; 3 is a weak attempt with a primary requirement wrong; 2 is a small relevant
  trace but severely wrong; 1 is negligible trace; 0 is absent, reversed, unrelated, or unusable.'
