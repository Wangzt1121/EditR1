aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Operation, Strength, and Coverage:
      requested_fine_control_and_direction_match:
        title: Requested fine control and edit direction match
        definition: 'Judge whether the output performs the exact requested control and direction: full-nose enlargement, full-nose
          reduction, bridge elevation, nasal-wing narrowing, or tip refinement. A different nose operation must not receive
          credit merely because the nose changed.'
        anchors:
          0: the requested nose fine control and direction is absent, reversed, unrelated, or completely unusable.
          1: Only a negligible trace of the requested nose fine control and direction is visible; the central operation is
            essentially unmet.
          2: A small relevant attempt is present, but the requested nose fine control and direction is severely incorrect
            or incomplete.
          3: the requested nose fine control and direction is weakly attempted; one or more primary requirements are missing
            or contradictory.
          4: the requested nose fine control and direction is recognizable, but a major mismatch, omission, or excessive change
            remains.
          5: the requested nose fine control and direction is moderately achieved, with several substantial visible problems.
          6: the requested nose fine control and direction is mostly correct, but one clear and important issue remains.
          7: the requested nose fine control and direction is clearly successful, with only a minor visible mismatch.
          8: the requested nose fine control and direction is highly accurate and complete, with only a tiny local imperfection.
          9: The exact requested fine control and geometric direction are executed completely, with no competing or opposite
            nose operation.
      requested_edit_strength_match:
        title: Requested nose-edit strength is matched
        definition: Judge whether the change has the requested subtle, medium, strong, dramatic, or editorial magnitude. The
          change must be visible at normal viewing size without becoming swollen, pinched, or caricatured.
        anchors:
          0: the requested edit strength is absent, reversed, unrelated, or completely unusable.
          1: Only a negligible trace of the requested edit strength is visible; the change is far too weak, excessive, or
            destructive.
          2: A small relevant attempt is present, but the requested edit strength is severely incorrect or incomplete.
          3: the requested edit strength is weakly attempted; one or more primary requirements are missing or contradictory.
          4: the requested edit strength is recognizable, but a major mismatch, omission, or excessive change remains.
          5: the requested edit strength is moderately achieved, with several substantial visible problems.
          6: the requested edit strength is mostly correct, but one clear and important issue remains.
          7: the requested edit strength is clearly successful, with only a minor visible mismatch.
          8: the requested edit strength is highly accurate and complete, with only a tiny local imperfection.
          9: The change has exactly the requested visibility and magnitude while remaining natural and controlled.
      requested_target_subregion_match:
        title: The correct nose subregion is edited
        definition: Judge whether the requested complete nose, bridge, tip, alar wings, nasal base, nostrils, or other specified
          region is the actual focus of the transformation.
        anchors:
          0: the requested nose subregion targeting is absent, reversed, unrelated, or completely unusable.
          1: Only a negligible trace of the requested nose subregion targeting is visible; the edit is focused on the wrong
            nose region.
          2: A small relevant attempt is present, but the requested nose subregion targeting is severely incorrect or incomplete.
          3: the requested nose subregion targeting is weakly attempted; one or more primary requirements are missing or contradictory.
          4: the requested nose subregion targeting is recognizable, but a major mismatch, omission, or excessive change remains.
          5: the requested nose subregion targeting is moderately achieved, with several substantial visible problems.
          6: the requested nose subregion targeting is mostly correct, but one clear and important issue remains.
          7: the requested nose subregion targeting is clearly successful, with only a minor visible mismatch.
          8: the requested nose subregion targeting is highly accurate and complete, with only a tiny local imperfection.
          9: Every requested nose subregion is edited precisely, and no incorrect subregion substitutes for the target.
      requested_components_complete:
        title: All required nose components are completed
        definition: Judge whether every explicitly requested component is present. A full-nose size edit may require bridge,
          sidewalls, tip, wings, base, and nostril relationships to change together; a compound prompt must not omit a primary
          component.
        anchors:
          0: the completeness of requested nose components is absent, reversed, unrelated, or completely unusable.
          1: Only a negligible trace of the completeness of requested nose components is visible; most required components
            are missing.
          2: A small relevant attempt is present, but the completeness of requested nose components is severely incorrect
            or incomplete.
          3: the completeness of requested nose components is weakly attempted; one or more primary requirements are missing
            or contradictory.
          4: the completeness of requested nose components is recognizable, but a major mismatch, omission, or excessive change
            remains.
          5: the completeness of requested nose components is moderately achieved, with several substantial visible problems.
          6: the completeness of requested nose components is mostly correct, but one clear and important issue remains.
          7: the completeness of requested nose components is clearly successful, with only a minor visible mismatch.
          8: the completeness of requested nose components is highly accurate and complete, with only a tiny local imperfection.
          9: All explicitly requested components are fully and visibly completed with no important omission.
      requested_change_distribution_match:
        title: The requested change is distributed correctly
        definition: Judge whether enlargement, reduction, elevation, narrowing, or refinement is allocated across the intended
          regions rather than concentrated unnaturally in one point.
        anchors:
          0: the spatial distribution of the requested nose change is absent, reversed, unrelated, or completely unusable.
          1: Only a negligible trace of the spatial distribution of the requested nose change is visible; the change is concentrated
            in incorrect regions.
          2: A small relevant attempt is present, but the spatial distribution of the requested nose change is severely incorrect
            or incomplete.
          3: the spatial distribution of the requested nose change is weakly attempted; one or more primary requirements are
            missing or contradictory.
          4: the spatial distribution of the requested nose change is recognizable, but a major mismatch, omission, or excessive
            change remains.
          5: the spatial distribution of the requested nose change is moderately achieved, with several substantial visible
            problems.
          6: the spatial distribution of the requested nose change is mostly correct, but one clear and important issue remains.
          7: the spatial distribution of the requested nose change is clearly successful, with only a minor visible mismatch.
          8: the spatial distribution of the requested nose change is highly accurate and complete, with only a tiny local
            imperfection.
          9: The change is distributed exactly as requested across the intended nose structure.
    Nose Geometry:
      requested_full_nose_scale_match:
        title: Requested full-nose scale, width, and projection match
        definition: For full-size prompts, judge overall three-dimensional scale, width, prominence, projection, and volume
          as one coherent change. For local prompts, judge that the complete nose is not unintentionally enlarged or reduced.
        anchors:
          0: the requested complete-nose scale, width, and projection is absent, reversed, unrelated, or completely unusable.
          1: Only a negligible trace of the requested complete-nose scale, width, and projection is visible; the overall nose
            size is wrong or incoherent.
          2: A small relevant attempt is present, but the requested complete-nose scale, width, and projection is severely
            incorrect or incomplete.
          3: the requested complete-nose scale, width, and projection is weakly attempted; one or more primary requirements
            are missing or contradictory.
          4: the requested complete-nose scale, width, and projection is recognizable, but a major mismatch, omission, or
            excessive change remains.
          5: the requested complete-nose scale, width, and projection is moderately achieved, with several substantial visible
            problems.
          6: the requested complete-nose scale, width, and projection is mostly correct, but one clear and important issue
            remains.
          7: the requested complete-nose scale, width, and projection is clearly successful, with only a minor visible mismatch.
          8: the requested complete-nose scale, width, and projection is highly accurate and complete, with only a tiny local
            imperfection.
          9: The complete nose has the exact requested scale and three-dimensional prominence, with no unintended global size
            drift.
      requested_bridge_geometry_match:
        title: Requested bridge height, width, and definition match
        definition: Judge radix, bridge height, bridge width, sidewalls, contour continuity, and bridge-to-tip transition.
          Bridge elevation must reflect plausible structure rather than only painted highlights.
        anchors:
          0: the requested nasal-bridge geometry is absent, reversed, unrelated, or completely unusable.
          1: Only a negligible trace of the requested nasal-bridge geometry is visible; the bridge is unchanged, directionally
            wrong, or structurally implausible.
          2: A small relevant attempt is present, but the requested nasal-bridge geometry is severely incorrect or incomplete.
          3: the requested nasal-bridge geometry is weakly attempted; one or more primary requirements are missing or contradictory.
          4: the requested nasal-bridge geometry is recognizable, but a major mismatch, omission, or excessive change remains.
          5: the requested nasal-bridge geometry is moderately achieved, with several substantial visible problems.
          6: the requested nasal-bridge geometry is mostly correct, but one clear and important issue remains.
          7: the requested nasal-bridge geometry is clearly successful, with only a minor visible mismatch.
          8: the requested nasal-bridge geometry is highly accurate and complete, with only a tiny local imperfection.
          9: Bridge height, width, sidewalls, root, definition, and tip transition match the instruction exactly.
      requested_tip_geometry_match:
        title: Requested nasal-tip size, shape, and projection match
        definition: Judge tip size, fullness, delicacy, definition, width, roundness, projection, rotation, and bridge-to-tip
          transition according to the prompt.
        anchors:
          0: the requested nasal-tip geometry is absent, reversed, unrelated, or completely unusable.
          1: Only a negligible trace of the requested nasal-tip geometry is visible; the tip is unchanged, directionally wrong,
            or distorted.
