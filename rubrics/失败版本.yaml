  Prompt Compliance:
    requested_lipstick_operation_style_match: 0.08
    requested_lipstick_color_family_match: 0.13
    requested_lipstick_undertone_depth_saturation_match: 0.1
    requested_lipstick_finish_material_match: 0.12
    requested_lipstick_application_pattern_match: 0.11
    requested_upper_lower_lip_distribution_match: 0.07
    requested_lipstick_opacity_intensity_match: 0.09
    requested_lipstick_edge_definition_softness_match: 0.08
    requested_cupid_bow_corner_detail_match: 0.06
    requested_lipstick_highlight_gloss_particle_match: 0.06
    requested_lipstick_coverage_evenness_match: 0.06
