  Subject Preservation:
    Facial Identity and Mouth Preservation:
      lipstick_facial_identity_landmark_consistency:
        title: Facial identity and defining landmark geometry are preserved
        definition: Compare the complete source and edited face as the same individual. Judge face outline, eyes and spacing,
          brows, nose, cheeks, mouth position, jaw, chin, age impression, gender presentation, skin tone, and characteristic
          details. Lipstick color or finish may change, but the face and underlying lip geometry must not acquire a different-person
          impression.
        anchors:
          0: The edited face is effectively a different person, severely distorted, or no longer identity-consistent with
            the source.
          1: Identity correspondence is extremely weak; multiple defining facial landmarks and the overall person impression
            are replaced.
          2: Major identity drift affects several defining regions such as face outline, eyes, nose, mouth, jaw, or feature
            spacing.
          3: Substantial facial-identity drift is visible; the person remains only loosely related to the source.
          4: The same general subject is suggested, but the face gives a clear changed-person impression at normal viewing
            size.
          5: The person remains recognizable, but multiple facial landmarks, proportions, age cues, or characteristic details
            visibly drift.
          6: The same person is mostly preserved, but one clear identity-affecting geometric or appearance change remains.
          7: Identity preservation is strong, with only a minor visible drift in one facial landmark or characteristic detail.
          8: The face is nearly source-identical outside the allowed target change, with only a tiny local discrepancy.
          9: The same person's facial identity, landmark geometry, feature spacing, age impression, and characteristic details
            are source-identical except for the requested lipstick appearance on the natural lip surface.
      lipstick_mouth_expression_teeth_adjacent_face_preserved:
        title: Natural lip geometry, expression, teeth, and adjacent face are preserved
        definition: Preserve lip shape, lip size, cupid's bow geometry, mouth opening, smile intensity, teeth, gums, philtrum,
          nose base, chin, nearby skin, and all non-target makeup. Optical fullness from color or gloss must not become actual
          lip enlargement unless explicitly requested.
        anchors:
          0: lip geometry, expression, teeth, and adjacent facial details is severely changed, replaced, or unusable.
          1: Most of lip geometry, expression, teeth, and adjacent facial details is clearly inconsistent with the source.
          2: Several major changes substantially alter lip geometry, expression, teeth, and adjacent facial details.
          3: One major or multiple obvious changes affect lip geometry, expression, teeth, and adjacent facial details.
          4: lip geometry, expression, teeth, and adjacent facial details remains recognizable but contains a clear important
            mismatch.
          5: lip geometry, expression, teeth, and adjacent facial details is only moderately preserved, with several visible
            differences.
          6: Most of lip geometry, expression, teeth, and adjacent facial details is preserved, but one clear difference remains.
          7: lip geometry, expression, teeth, and adjacent facial details is strongly preserved, with only a minor discrepancy.
          8: lip geometry, expression, teeth, and adjacent facial details is nearly source-identical, with only a tiny local
            discrepancy.
          9: Natural lip geometry, expression, teeth, gums, philtrum, chin, nearby skin, and non-target makeup remain source-consistent.
  Task Realism and Image Quality:
    Lipstick Rendering:
      lipstick_lip_texture_wrinkles_preserved:
        title: Natural lip texture and wrinkles are preserved
        definition: Judge fine vertical lip lines, natural micro-relief, dryness/hydration cues, and absence of waxy smoothing.
        anchors:
          0: natural lip texture preservation is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of natural lip texture preservation is visible; lips are excessively smoothed, waxy,
            or textureless.
          2: A small relevant attempt is present, but natural lip texture preservation is severely incorrect or incomplete.
          3: natural lip texture preservation is weakly attempted; one or more primary requirements are missing or contradictory.
          4: natural lip texture preservation is recognizable, but a major mismatch, omission, or excessive change remains.
          5: natural lip texture preservation is moderately achieved, with several substantial visible problems.
          6: natural lip texture preservation is mostly correct, but one clear and important issue remains.
          7: natural lip texture preservation is clearly successful, with only a minor visible mismatch.
          8: natural lip texture preservation is highly accurate and complete, with only a tiny local imperfection.
          9: Fine lip texture remains fully realistic and appropriately visible beneath the product.
      lipstick_product_material_light_response:
        title: Product material and light response are realistic
        definition: Judge product thickness, matte diffusion, satin sheen, gloss curvature, specular shape, shimmer response,
          and source illumination.
        anchors:
          0: lipstick material and light response is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of lipstick material and light response is visible; material or reflectivity is physically
            inconsistent.
          2: A small relevant attempt is present, but lipstick material and light response is severely incorrect or incomplete.
          3: lipstick material and light response is weakly attempted; one or more primary requirements are missing or contradictory.
          4: lipstick material and light response is recognizable, but a major mismatch, omission, or excessive change remains.
          5: lipstick material and light response is moderately achieved, with several substantial visible problems.
          6: lipstick material and light response is mostly correct, but one clear and important issue remains.
          7: lipstick material and light response is clearly successful, with only a minor visible mismatch.
          8: lipstick material and light response is highly accurate and complete, with only a tiny local imperfection.
          9: The lipstick material responds perfectly to lip curvature and source lighting.
      lipstick_color_layer_depth_realistic:
        title: Color layering and optical depth are realistic
        definition: Judge translucent versus opaque layering, local tonal variation, gradient depth, upper/lower dimensionality,
          and non-flat color deposition.
        anchors:
          0: lipstick color-layer depth realism is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of lipstick color-layer depth realism is visible; the lipstick looks like flat paint
            or artificial overlay.
          2: A small relevant attempt is present, but lipstick color-layer depth realism is severely incorrect or incomplete.
          3: lipstick color-layer depth realism is weakly attempted; one or more primary requirements are missing or contradictory.
          4: lipstick color-layer depth realism is recognizable, but a major mismatch, omission, or excessive change remains.
          5: lipstick color-layer depth realism is moderately achieved, with several substantial visible problems.
          6: lipstick color-layer depth realism is mostly correct, but one clear and important issue remains.
          7: lipstick color-layer depth realism is clearly successful, with only a minor visible mismatch.
          8: lipstick color-layer depth realism is highly accurate and complete, with only a tiny local imperfection.
          9: Color layers, tonal variation, and optical depth are fully natural and product-consistent.
      lipstick_artifact_sharpness_no_bleeding:
        title: Artifacts, blur, bleeding, and masking errors are controlled
        definition: Judge smearing, halos, jagged masks, posterization, duplicated highlights, noisy shimmer, blur, broken
          teeth edges, and unintended bleeding.
        anchors:
          0: lipstick artifact control and sharpness is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of lipstick artifact control and sharpness is visible; strong artifacts, blur, or color
            bleeding dominate.
          2: A small relevant attempt is present, but lipstick artifact control and sharpness is severely incorrect or incomplete.
          3: lipstick artifact control and sharpness is weakly attempted; one or more primary requirements are missing or
            contradictory.
          4: lipstick artifact control and sharpness is recognizable, but a major mismatch, omission, or excessive change
            remains.
          5: lipstick artifact control and sharpness is moderately achieved, with several substantial visible problems.
          6: lipstick artifact control and sharpness is mostly correct, but one clear and important issue remains.
          7: lipstick artifact control and sharpness is clearly successful, with only a minor visible mismatch.
          8: lipstick artifact control and sharpness is highly accurate and complete, with only a tiny local imperfection.
          9: The edit is clean, sharply resolved, artifact-free, and contains no unintended bleeding.
identity_preservation_protocol:
  purpose: Prevent successful target editing from hiding facial-identity drift. Identity is judged by source-to-result correspondence,
    not by whether the edited face is attractive or realistic.
  comparison_checklist:
  - overall face outline and width/length relationship
  - forehead and hair-independent face contour
  - eyebrow position and shape
  - eye shape, spacing, aperture, and characteristic asymmetry
  - nose geometry and placement
  - mouth position and natural geometry
  - cheek, jaw, and chin structure
  - age impression and gender presentation
  - skin tone, stable characteristic marks, and facial texture
  - overall same-person impression at normal viewing size
  strict_rules:
  - Do not increase an identity score because the target edit is attractive or instruction-compliant.
  - Do not treat a photorealistic but different-looking face as identity-preserved.
  - A score of 7 still requires a strong same-person match with only minor drift.
  - A changed-person impression must score 4 or below on the dedicated identity facet.
  - The task target region may be excluded only where explicitly necessary; unrelated facial landmarks remain fully constrained.
  - Identity, expression, and adjacent-face scores are independent of clothing and background preservation.
  task_specific_exception: requested lipstick color, finish, opacity, and application only