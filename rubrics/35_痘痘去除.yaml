        - acne_removal_artifact_repetition_background_stability
      local_reconstruction_texture_tone_or_patch_artifact:
        detect_when: Edited lesion areas show patch edges, blur, cloned/repeated texture, smeared pores, color mismatch, tone-gradient
          break, halo, mask seam, or unnatural local lighting.
        severity_guidance: Tiny blend irregularity may be severity 1. Clear pore mismatch, repeated texture, halo, seam, local
