aggregation:
  prompt_compliance: Weighted arithmetic mean over all 8 Prompt Compliance facets. All eight facets are applicable to every
    valid prompt.
  other_l1_blocks: Use the listed within-L1 weights for the remaining three blocks.
  base_formula: base_reward = 0.50 * P + 0.24 * L + 0.16 * S + 0.10 * Q
  outcome_score: O = score(acne_removal_primary_outcome_match) / 9.0
  texture_score: T = score(acne_removal_local_pore_texture_reconstruction) / 9.0
  identity_score: I = score(acne_removal_identity_face_geometry_preservation) / 9.0
  final_formula: reward = base_reward * (O ** 0.26) * (T ** 0.20) * (I ** 0.14)
taxonomy:
  Prompt Compliance:
    Requested Acne and Blemish Removal:
      acne_removal_primary_outcome_match:
        title: Primary acne-removal outcome
        definition: Whether visible acne and unwanted blemishes are removed while the face remains natural.
        anchors:
          0: No removal, worse acne, or a different task.
          3: Only a weak or inconsistent attempt.
          5: Partial removal with major residual lesions.
          7: Clear successful removal with one material issue.
          9: Visible acne and blemishes are comprehensively and naturally removed.
        rubric: Whether visible acne and unwanted blemishes are removed while the face remains natural. Apply this facet's
          0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do
          not let unrelated preservation, attractiveness, or realism compensate for this facet.
      acne_removal_target_lesion_coverage_match:
        title: Target-lesion coverage
        definition: Whether all clearly assessable acne lesions and unwanted blemishes are addressed.
        anchors:
          0: Most target lesions remain or new lesions appear.
          3: Large portions of visible acne remain untreated.
          5: Several lesions are removed but important targets remain.
          7: Nearly complete coverage with one minor miss.
          9: All assessable target lesions are correctly treated.
        rubric: Whether all clearly assessable acne lesions and unwanted blemishes are addressed. Apply this facet's 0-9 anchors
          directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated
          preservation, attractiveness, or realism compensate for this facet.
      acne_removal_residual_redness_discoloration_match:
        title: Residual redness and discoloration
        definition: Whether lesion-associated redness or transient discoloration is reduced without flattening normal skin
          variation.
        anchors:
          0: Redness remains unchanged, worsens, or becomes artificial.
          3: Strong residual or broad color replacement.
          5: Partial correction with clear patchiness or residual marks.
          7: Natural correction with one minor residual.
          9: Target-related redness is cleanly corrected while normal variation remains.
        rubric: Whether lesion-associated redness or transient discoloration is reduced without flattening normal skin variation.
          Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      acne_removal_no_over_removal_natural_marks_match:
        title: No over-removal of natural marks
        definition: Whether pores, freckles, moles, scars, fine lines, and stable identity marks remain unless clearly targeted.
        anchors:
          0: Natural marks or broad skin detail are extensively erased.
          3: Major over-removal of identity-bearing skin features.
          5: Mostly preserved but one clear natural mark is lost or altered.
          7: Preserved with one minor questionable change.
          9: All non-target natural marks and skin detail remain intact.
        rubric: Whether pores, freckles, moles, scars, fine lines, and stable identity marks remain unless clearly targeted.
          Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      acne_removal_clean_natural_finish_match:
        title: Clean but natural finish
        definition: Whether the skin looks cleaner without becoming waxy, airbrushed, uniform, or excessively perfect.
        anchors:
          0: Result is dirty, untreated, waxy, or fully synthetic.
          3: Strong smoothing, plasticity, or unfinished appearance.
          5: Cleaner skin is visible but the finish remains noticeably processed.
          7: Natural finish with one minor issue.
          9: The result is clean, believable, and retains real skin character.
        rubric: Whether the skin looks cleaner without becoming waxy, airbrushed, uniform, or excessively perfect. Apply this
          facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      acne_removal_multi_region_completeness_match:
        title: Multi-region completeness
        definition: Whether visible lesions across forehead, cheeks, nose, chin, and jaw areas are treated consistently.
        anchors:
          0: Only one small area is edited while major visible regions are ignored.
          3: Strong inconsistency across facial regions.
          5: Multiple areas are treated but one clear region is missed.
          7: Complete with one minor regional inconsistency.
          9: All assessable facial regions are treated consistently.
