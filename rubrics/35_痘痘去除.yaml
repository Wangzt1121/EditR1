prompt_applicability:
  purpose: All prompts share one fixed acne-and-blemish removal request. All eight Prompt Compliance facets are always applicable.
  always_applicable:
  - acne_removal_primary_outcome_match
  - acne_removal_target_lesion_coverage_match
  - acne_removal_residual_redness_discoloration_match
  - acne_removal_no_over_removal_natural_marks_match
  - acne_removal_clean_natural_finish_match
  - acne_removal_multi_region_completeness_match
  - acne_removal_normal_view_visibility_match
  - acne_removal_requested_scope_precision_match
  mask:
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  aggregation_rule: P = sum_i(weight_i * normalized_score_i) over all 8 Prompt Compliance facets.
judge_role: You are a strict expert evaluator for acne/blemish removal, local skin reconstruction, identity-mark preservation,
  and source-state consistency.
judge_instructions: 'Judge SOURCE, EDIT PROMPT, and EDITED IMAGE in this order.


  1) Source audit. Compare visible acne, pimples, redness, small breakouts, local pores, skin tone gradients, moles/freckles/stable
  marks, makeup, facial features, expression, hair, clothing, lighting, background, focus, grain, and camera state.


  2) Task target. A successful edit removes unwanted acne/blemishes and reconstructs realistic local skin while preserving
  natural pores, stable identity marks, original skin tone, shadows, facial anatomy, makeup, expression, camera conditions,
  and the full scene. It is not full-face whitening, global smoothing, plastic beauty filtering, or removal of source-specific
  marks.


  3) Task-specific failures. Treat residual target lesions, over-removal of natural marks, global smoothing/whitening substitute,
  local reconstruction artifacts, wrong-region/scope errors, and non-target source drift as failures. Apply global_scoring_policy.failure_propagation
  before final output.


  4) Calibration. 9 is rare. 7 requires clear lesion-specific removal with natural reconstruction. If acne remains or the
  image is globally beautified, preservation/quality must not lift affected facets.


  Hybrid scoring safeguards.

  - Treat success_gate_conditions as eligibility checks for scores 7-9, not as examples or automatic high-score templates.

  - If the primary requested edit is absent, wrong-direction, mostly unchanged, or mainly a substitute operation, apply failure_propagation
  before considering any 7-9.

  - Do not let preserved background, photorealism, clean texture, or attractiveness lift a failed or substituted primary edit
  into a high reward.

  - When the primary edit fails, unchanged non-target regions can receive moderate-to-good preservation scores, but should
  not automatically become all 9s.

  - Avoid mechanical split vectors such as many core facets at 1 and many preservation/quality facets at 9. Use 2-4 for weak,
  partial, mostly unchanged, or wrong-substitute attempts; use 5-6 for mixed but recognizable attempts; reserve 0-1 and 8-9
  for truly extreme evidence.

  - Use the full 0-9 scale by facet-level visual evidence, not by a copied pattern.


  Return only JSON:

  {"score_vector":[22 integers from 0 to 9],"failure_tags":[]}

  '
