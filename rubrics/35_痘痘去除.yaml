      wrong_region_scope_or_non_target_edit:
        detect_when: The edit targets the wrong area, removes non-target texture, changes facial features/hair/clothing/background,
          or leaves requested acne while cleaning unrelated skin.
        severity_guidance: Very small non-target touch with correct lesion repair may be severity 1. Clear wrong-region skin
