aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Style, Path, and Geometry:
      requested_eyeliner_style_match:
        title: Requested eyeliner style match
        definition: Judge natural, tightline, innocent drooping, Western lifted, cat-eye, half-length, straight extended,
          inner-corner, thin elongated, bold, soft brown, smoky, double, lower-lash-line, thickened outer-tail, segmented,
          or colored style.
        anchors:
          0: the requested eyeliner style is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested eyeliner style is visible; the central eyeliner style is wrong or missing.
          2: A small relevant attempt is present, but the requested eyeliner style is severely incorrect or incomplete.
          3: the requested eyeliner style is weakly attempted; one or more primary requirements are missing or contradictory.
          4: the requested eyeliner style is recognizable, but a major mismatch, omission, or excessive change remains.
          5: the requested eyeliner style is moderately achieved, with several substantial visible problems.
          6: the requested eyeliner style is mostly correct, but one clear and important issue remains.
          7: the requested eyeliner style is clearly successful, with only a minor visible mismatch.
          8: the requested eyeliner style is highly accurate and complete, with only a tiny local imperfection.
          9: The exact eyeliner style and defining line topology are fully realized.
      requested_eyeliner_upper_lower_region_match:
        title: Requested upper/lower lash-line region match
        definition: Judge upper line, lower line, both lines, inner lash base, outer half, outer third, or other specified
          lash-line region.
        anchors:
          0: the requested upper/lower eyeliner region is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested upper/lower eyeliner region is visible; major requested regions are
            missing or misplaced.
          2: A small relevant attempt is present, but the requested upper/lower eyeliner region is severely incorrect or incomplete.
          3: the requested upper/lower eyeliner region is weakly attempted; one or more primary requirements are missing or
            contradictory.
          4: the requested upper/lower eyeliner region is recognizable, but a major mismatch, omission, or excessive change
            remains.
          5: the requested upper/lower eyeliner region is moderately achieved, with several substantial visible problems.
          6: the requested upper/lower eyeliner region is mostly correct, but one clear and important issue remains.
          7: the requested upper/lower eyeliner region is clearly successful, with only a minor visible mismatch.
          8: the requested upper/lower eyeliner region is highly accurate and complete, with only a tiny local imperfection.
          9: Every requested lash-line region is covered exactly, with no incorrect regional substitution.
      requested_eyeliner_start_end_path_match:
        title: Requested line start, end, and path match
        definition: Judge line start point, endpoint, distance from lash roots, half-length start, outer-third emphasis, complete
          path, and route along the eye.
