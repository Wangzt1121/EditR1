        - mole_artifact_duplication_global_stability
      wrong_location_or_laterality:
        detect_when: The mole is placed on the wrong facial region, wrong subject-side, wrong relation to the nose wing/cheek
          landmark, wrong vertical/horizontal position, or impossible relation under head pose.
        severity_guidance: Slight landmark imprecision with correct side/region may be severity 1-2. Clear offset from requested
          cheek/nose relation should be severity 3. Wrong facial region, wrong subject-side, impossible pose relation, or
