  Subject Preservation:
    mole_subject_identity_face_geometry_preservation: 0.27
    mole_facial_features_expression_gaze_preservation: 0.25
    mole_existing_skin_marks_makeup_preservation: 0.2
    mole_hair_clothing_body_preservation: 0.14
    mole_scene_camera_composition_preservation: 0.14
  Task Realism and Image Quality:
    mole_photorealistic_surface_detail_realism: 0.3
    mole_local_color_lighting_consistency: 0.25
    mole_edge_blending_sharpness_quality: 0.25
    mole_artifact_duplication_global_stability: 0.2
aggregation:
  prompt_compliance: Weighted arithmetic mean over all 8 Prompt Compliance facets. All eight facets are applicable to every
    valid prompt.
  other_l1_blocks: Use the listed within-L1 weights for the remaining three blocks.
  base_formula: base_reward = 0.65 * P + 0.17 * L + 0.12 * S + 0.06 * Q
  outcome_score: O = score(mole_primary_addition_outcome_match) / 9.0
  location_score: R = score(mole_requested_anatomical_location_match) / 9.0
  final_formula: reward = base_reward * (O ** 0.28) * (R ** 0.24)
taxonomy:
  Prompt Compliance:
    Requested Mole Addition:
      mole_primary_addition_outcome_match:
        title: Primary mole-addition outcome
        definition: Whether exactly one new natural mole is visibly added to the main subject. Do not give credit for freckles,
          acne, scars, tattoos, makeup dots, skin smoothing, or unrelated facial edits.
        anchors:
          0: No mole, removed mole, wrong edit type, multiple freckles/marks, or unrelated skin-editing task.
          3: Ambiguous, barely recognizable, or very weak mole-like addition.
          5: A mole-like mark exists but is materially incomplete, artificial, or wrong in a major detail.
          7: Clear single mole addition with one notable issue.
          9: Exactly one clear, balanced, natural mole is successfully added.
        rubric: Whether exactly one new natural mole is visibly added to the main subject. Do not give credit for freckles,
          acne, scars, tattoos, makeup dots, skin smoothing, or unrelated facial edits. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      mole_requested_anatomical_location_match:
        title: Requested anatomical location
        definition: 'Whether the mole is placed at the exact requested anatomical region: the right cheek beside the nose
          wing, judged relative to the subject''s anatomy and head pose.

          '
        anchors:
          0: Wrong facial region, wrong cheek, non-facial placement, or location absent/unverifiable.
          3: Large displacement from the right-cheek beside-nose-wing region.
          5: Correct broad cheek region but clearly wrong subregion or distance from nose wing.
          7: Correct requested area with a minor offset.
          9: Placement precisely matches the right cheek beside the nose wing.
        rubric: 'Whether the mole is placed at the exact requested anatomical region: the right cheek beside the nose wing,
          judged relative to the subject''s anatomy and head pose. Apply this facet''s 0-9 anchors directly. If a task-specific
          failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.'
      mole_requested_laterality_centerline_match:
        title: Laterality and centerline
        definition: Whether left, right, or center placement matches the subject's anatomy and head pose.
        anchors:
          0: Wrong side or opposite centerline relation.
          3: Strong lateral or midline error.
          5: Correct general side with clear positional ambiguity.
          7: Correct side with one minor offset.
          9: Laterality or centerline placement is exact.
        rubric: Whether left, right, or center placement matches the subject's anatomy and head pose. Apply this facet's 0-9
          anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated
          preservation, realism, or attractiveness compensate for this facet.
      mole_single_count_uniqueness_match:
        title: Single count and uniqueness
        definition: Whether exactly one new mole is added without duplicated or extra marks.
        anchors:
          0: No mole, several obvious new marks, freckles, duplicated moles, or texture noise mistaken as moles.
          3: Multiple or duplicated marks dominate, or count is very unclear.
          5: One intended mole plus a clear extra mark, residue, or ambiguous spot.
          7: Exactly one mole with a minor ambiguous artifact.
          9: Exactly one unique new mole and no extras.
        rubric: Whether exactly one new mole is added without duplicated or extra marks. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      mole_balanced_size_scale_match:
        title: Balanced size and scale
        definition: Whether the mole is medium-balanced relative to the face and local landmark.
        anchors:
          0: Microscopic, dominant, lesion-like, or physically implausible size.
          3: Severely too small or too large.
          5: Readable but clearly inaccurate scale.
          7: Appropriate size with one minor issue.
          9: Size is visible, restrained, and perfectly balanced.
        rubric: Whether the mole is medium-balanced relative to the face and local landmark. Apply this facet's 0-9 anchors
          directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      mole_natural_shape_boundary_match:
        title: Natural shape and boundary
        definition: Whether the mark has a plausible compact mole shape rather than a perfect sticker dot or irregular smear.
        anchors:
          0: Clearly artificial shape, smear, hole, or unrelated mark.
          3: Strong geometric, jagged, or deformed appearance.
          5: Mole-like but visibly synthetic or poorly bounded.
          7: Natural with one minor shape issue.
          9: Shape and boundary are fully natural and skin-compatible.
        rubric: Whether the mark has a plausible compact mole shape rather than a perfect sticker dot or irregular smear.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      mole_pigment_tone_contrast_match:
        title: Pigment tone and contrast
        definition: Whether the mole has plausible pigmentation and readable but non-clipped contrast.
        anchors:
          0: Wrong bright color, pure-white mark, or severe black clipping.
          3: Strong hue or contrast mismatch.
          5: Plausible general tone with clear tonal problems.
          7: Natural tone with one minor difference.
          9: Pigment color and contrast are fully convincing.
        rubric: Whether the mole has plausible pigmentation and readable but non-clipped contrast. Apply this facet's 0-9
          anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated
          preservation, realism, or attractiveness compensate for this facet.
      mole_normal_view_visibility_match:
        title: Normal-view visibility
        definition: Whether the mole is identifiable at ordinary portrait viewing size without becoming dominant.
        anchors:
          0: Invisible or overwhelmingly prominent.
          3: Very difficult to see or excessively attention-grabbing.
          5: Visible but clearly too weak or too dominant.
          7: Readable with one minor visibility issue.
          9: Clearly readable and naturally understated.
        rubric: Whether the mole is identifiable at ordinary portrait viewing size without becoming dominant. Apply this facet's
          0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let
          unrelated preservation, realism, or attractiveness compensate for this facet.
  Localization and Skin Integration:
    Placement and Local Surface Integration:
      mole_edit_localized_to_target_skin_area:
        title: Edit localization
        definition: Whether changes are confined to the mole and minimum blending area.
        anchors:
          0: Broad skin, face, hair, or scene editing.
          3: Significant non-target changes around the face.
          5: Mostly localized with one clear extra alteration.
          7: Localized with one minor spill.
          9: Precisely confined to the requested skin point.
        rubric: Whether changes are confined to the mole and minimum blending area. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      mole_landmark_relative_position_precision:
        title: Landmark-relative position
        definition: Whether above, below, beside, near, between, inner, outer, upper, or lower relations to named landmarks
          are accurate.
        anchors:
          0: Relationship to the landmark is opposite or impossible.
          3: Major relative-position error.
          5: Correct landmark but clearly inaccurate relation.
          7: Accurate relation with one minor offset.
          9: Relative placement is precise and unambiguous.
        rubric: Whether above, below, beside, near, between, inner, outer, upper, or lower relations to named landmarks are
          accurate. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      mole_face_surface_curvature_perspective_alignment:
        title: Surface curvature and perspective
        definition: Whether the mole follows facial curvature, foreshortening, head rotation, and visible surface orientation.
        anchors:
          0: Mole floats, faces the camera incorrectly, or contradicts the facial surface.
          3: Major curvature, scale, or perspective mismatch.
          5: Generally attached with one clear spatial inconsistency.
          7: Coherent with one minor issue.
          9: Fully aligned with the local three-dimensional facial surface.
        rubric: Whether the mole follows facial curvature, foreshortening, head rotation, and visible surface orientation.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      mole_skin_texture_pore_continuity:
        title: Skin texture and pore continuity
        definition: Whether pores and fine skin detail continue naturally through and around the mole.
        anchors:
          0: Skin is erased, blurred, repeated, or replaced around the mark.
          3: Major plasticity, texture loss, or cloned pattern.
          5: Generally integrated with one clear texture problem.
          7: Natural with one minor texture issue.
          9: Pores and fine detail remain fully continuous.
        rubric: Whether pores and fine skin detail continue naturally through and around the mole. Apply this facet's 0-9
          anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated
          preservation, realism, or attractiveness compensate for this facet.
      mole_hair_brow_feature_occlusion_consistency:
        title: Hair, brow, and feature-boundary consistency
        definition: Whether nearby hair, brow strands, eyelids, lips, nostrils, and facial edges retain correct boundaries
          and occlusion.
        anchors:
          0: Mole wrongly covers or deforms a protected feature.
          3: Major boundary, penetration, or occlusion error.
          5: Mostly correct with one clear interaction issue.
          7: Correct with one minor issue.
          9: All nearby landmark and occlusion relationships remain exact.
        rubric: Whether nearby hair, brow strands, eyelids, lips, nostrils, and facial edges retain correct boundaries and
          occlusion. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
  Subject Preservation:
    Identity and Non-target Preservation:
      mole_subject_identity_face_geometry_preservation:
        title: Identity and face-geometry preservation
        definition: Whether the same person, head size, face shape, age impression, and facial proportions remain unchanged.
        anchors:
          0: Different person or major facial redesign.
          3: Strong identity, face-shape, or head-size drift.
          5: Same person remains recognizable with one clear change.
          7: Preserved with one minor difference.
          9: Identity and facial geometry remain unchanged.
        rubric: Whether the same person, head size, face shape, age impression, and facial proportions remain unchanged. Apply
          this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps.
          Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      mole_facial_features_expression_gaze_preservation:
        title: Facial features, expression, and gaze preservation
        definition: Whether eyes, brows, nose, lips, ears, jaw, expression, and gaze remain stable.
        anchors:
          0: Major feature, expression, or gaze change.
          3: Strong drift in one or more facial features.
          5: Mostly preserved with one clear alteration.
          7: Preserved with one minor difference.
          9: All facial features, expression, and gaze remain unchanged.
        rubric: Whether eyes, brows, nose, lips, ears, jaw, expression, and gaze remain stable. Apply this facet's 0-9 anchors
          directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      mole_existing_skin_marks_makeup_preservation:
        title: Existing skin marks and makeup preservation
        definition: Whether existing moles, freckles, scars, pores, makeup, skin tone, and natural shadows remain unchanged
          outside the target point.
        anchors:
          0: Existing marks are removed, duplicated, or broad skin appearance changes.
          3: Strong makeup, color, texture, or mark alteration.
          5: Mostly preserved with one obvious change.
          7: Preserved with one minor difference.
          9: All original skin details and makeup remain unchanged.
        rubric: Whether existing moles, freckles, scars, pores, makeup, skin tone, and natural shadows remain unchanged outside
          the target point. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply
          failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      mole_hair_clothing_body_preservation:
        title: Hair, clothing, and body preservation
        definition: Whether hairstyle, hair color, facial hair, clothing, accessories, body, and pose remain unchanged.
        anchors:
          0: Major hair, clothing, body, or pose replacement.
          3: Strong non-target appearance drift.
          5: Mostly preserved with one clear change.
          7: Preserved with one minor difference.
          9: Hair, clothing, body, and pose remain unchanged.
        rubric: Whether hairstyle, hair color, facial hair, clothing, accessories, body, and pose remain unchanged. Apply
          this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps.
          Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      mole_scene_camera_composition_preservation:
        title: Scene, camera, and composition preservation
        definition: Whether background, lighting, crop, camera angle, composition, aspect ratio, and resolution remain stable.
        anchors:
          0: Major scene, framing, or camera replacement.
          3: Strong background, crop, lighting, or scale drift.
          5: Mostly stable with one clear change.
          7: Preserved with one minor difference.
          9: Scene and image geometry remain unchanged.
        rubric: Whether background, lighting, crop, camera angle, composition, aspect ratio, and resolution remain stable.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
  Task Realism and Image Quality:
    Rendering and Artifact Control:
      mole_photorealistic_surface_detail_realism:
        title: Photorealistic surface detail
        definition: Whether the mole has natural pigmentation, microtexture, and skin-level depth without looking painted,
          raised, or pasted.
        anchors:
          0: Clearly synthetic, sticker-like, glowing, or physically impossible.
          3: Strong flatness, bead-like depth, or texture artifact.
          5: Mole-like but visibly generated or processed.
          7: Realistic with one minor surface issue.
          9: Fully photorealistic and naturally embedded in the skin.
        rubric: Whether the mole has natural pigmentation, microtexture, and skin-level depth without looking painted, raised,
          or pasted. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      mole_local_color_lighting_consistency:
        title: Local color and lighting consistency
        definition: Whether mole tone and nearby skin shading remain compatible with source white balance and illumination.
        anchors:
          0: Color or lighting strongly contradicts the face.
          3: Major halo, glow, cast, or shadow mismatch.
          5: Generally plausible with one obvious tonal inconsistency.
          7: Consistent with one minor issue.
          9: Color, contrast, and lighting integrate perfectly.
        rubric: Whether mole tone and nearby skin shading remain compatible with source white balance and illumination. Apply
          this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps.
          Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      mole_edge_blending_sharpness_quality:
        title: Edge blending and sharpness
        definition: Whether the mole edge is softly skin-integrated but remains appropriately detailed at source focus.
        anchors:
          0: Severe cutout, halo, blur patch, or over-sharpened ring.
          3: Strong edge seam, ringing, or focus mismatch.
          5: Mostly blended with one clear boundary issue.
          7: Clean with one minor issue.
          9: Edge softness and sharpness perfectly match the source.
        rubric: Whether the mole edge is softly skin-integrated but remains appropriately detailed at source focus. Apply
          this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps.
          Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      mole_artifact_duplication_global_stability:
        title: Artifact and global stability
        definition: Whether duplicate dots, stains, smears, warped features, compression artifacts, and background changes
          are absent.
        anchors:
          0: Severe artifacts, duplicated marks, or image instability.
          3: Multiple obvious distortions or residues.
          5: One clear artifact or moderate local instability.
          7: Stable with one minor artifact.
          9: No visible artifacts; the entire image remains stable.
        rubric: Whether duplicate dots, stains, smears, warped features, compression artifacts, and background changes are
          absent. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
prompt_applicability:
  purpose: All valid prompts share the same mole attributes and differ only in location, so every Prompt Compliance facet
    is always applicable.
  always_applicable:
  - mole_primary_addition_outcome_match
  - mole_requested_anatomical_location_match
  - mole_requested_laterality_centerline_match
  - mole_single_count_uniqueness_match
  - mole_balanced_size_scale_match
  - mole_natural_shape_boundary_match
  - mole_pigment_tone_contrast_match
  - mole_normal_view_visibility_match
  mask:
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  aggregation_rule: P = sum_i(weight_i * normalized_score_i) over all 8 Prompt Compliance facets.
