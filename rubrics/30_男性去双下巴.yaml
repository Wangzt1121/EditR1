identity_preservation_protocol:
  purpose: Prevent under-chin improvement from hiding male identity or source-state drift.
  checklist:
  - same male individual at normal viewing size
  - stable face outline, eyes, nose, mouth, chin length/projection, jaw width/angle, neck width, age impression, and male
    presentation
  - stable beard/stubble pattern, skin tone/texture, expression, clothing, lighting, background color, crop, and camera state
  strict_rules:
  - Do not raise identity because the result is more attractive, sharper-jawed, more masculine, or more realistic.
  - A photorealistic but different-looking man is not identity-preserved.
  - Only the visible secondary submental fold/bulge and minimum chin-neck blending region may change.
