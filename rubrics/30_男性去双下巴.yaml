  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Operation and Target Geometry:
      requested_double_chin_reduction_operation_match:
        title: Requested double-chin reduction operation match
        definition: Judge whether the visible secondary under-chin fold or bulge is actually reduced and the primary chin
          contour becomes cleaner. Do not credit generic jaw sharpening, face slimming, neck thinning, pose change, or painted
          shadow as the requested operation.
        anchors:
          0: The requested reduction is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of double-chin reduction is visible.
          2: A small relevant attempt exists, but the secondary fold remains essentially unchanged.
          3: The under-chin area is edited, but the primary operation is weak or mostly wrong.
          4: A recognizable attempt is present, yet a major part of the double chin remains or the result relies on a substitute
            operation.
          5: The double chin is partially reduced, but several substantial residual or substitution errors remain.
          6: The requested operation is mostly correct, but one clear fold, bulge, or method error remains.
          7: The double chin is clearly reduced, with only a minor visible residual or local mismatch.
          8: The requested reduction is highly accurate, with only a tiny local imperfection.
          9: The visible double chin is naturally reduced and the under-chin contour is fully cleaned without substitute operations.
        rubric: Judge whether the visible secondary under-chin fold or bulge is actually reduced and the primary chin contour
          becomes cleaner. Do not credit generic jaw sharpening, face slimming, neck thinning, pose change, or painted shadow
          as the requested operation. Apply this facet's 0-9 anchors directly. If any global failure affecting this facet
          is detected, apply failure_propagation caps. Do not let unrelated preservation, attractiveness, or realism compensate
          for this facet.
      requested_double_chin_edit_strength_match:
        title: Requested double-chin edit strength match
        definition: Judge whether strong, visible, editorial, app-style, studio, commercial, or premium retouching intensity
          is achieved without excessive hollowing or anatomy loss.
        anchors:
          0: The requested strength is absent, reversed, destructive, or unusable.
          1: Only a negligible strength change is visible.
          2: The adjustment is severely too weak, too strong, or inconsistent.
          3: The requested intensity is weakly attempted but clearly mismatched.
          4: The effect is recognizable, but the intensity has a major mismatch.
          5: The strength is partially appropriate, with several visible intensity problems.
          6: The strength is mostly correct, but one clear under- or over-editing issue remains.
          7: The requested intensity is clearly achieved, with only a minor mismatch.
          8: The intensity is highly accurate, with only a tiny local excess or residual.
          9: The requested visibility and retouching strength are exact, strong, and believable.
        rubric: Judge whether strong, visible, editorial, app-style, studio, commercial, or premium retouching intensity is
          achieved without excessive hollowing or anatomy loss. Apply this facet's 0-9 anchors directly. If any global failure
          affecting this facet is detected, apply failure_propagation caps. Do not let unrelated preservation, attractiveness,
          or realism compensate for this facet.
      requested_submental_target_region_coverage_match:
        title: Requested submental target-region coverage match
        definition: Judge central and lateral coverage of the visible secondary fold or bulge beneath the chin. Missed side
          pockets, untreated fold segments, or edits outside the true submental target reduce this score.
        anchors:
          0: Target-region coverage is absent, reversed, unrelated, or unusable.
          1: Only a negligible part of the correct submental region is treated.
          2: A small target area is edited, but most visible fold or bulge regions are missed.
          3: Coverage is weak and leaves major central or lateral target regions untreated.
          4: The target map is recognizable, but one major region is missed or a wrong region is edited.
          5: Coverage is partial, with several visible untreated or overextended regions.
          6: Coverage is mostly correct, but one clear central, lateral, or boundary issue remains.
          7: The correct target region is well covered, with only a minor local miss or spill.
          8: Coverage is highly accurate and complete, with only a tiny local imperfection.
          9: Every assessable central and lateral double-chin region is treated precisely and completely.
        rubric: Judge central and lateral coverage of the visible secondary fold or bulge beneath the chin. Missed side pockets,
          untreated fold segments, or edits outside the true submental target reduce this score. Apply this facet's 0-9 anchors
          directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated
          preservation, attractiveness, or realism compensate for this facet.
      requested_submental_bulge_fold_reduction_match:
        title: Requested submental bulge and fold reduction match
        definition: Judge reduction of the secondary soft-tissue bulge, duplicated contour, fold depth, and visible fullness
          while preserving plausible natural submental tissue.
        anchors:
          0: The bulge or fold is unchanged, deeper, unrelated, or unusable.
          1: Only a negligible reduction is visible.
          2: A small attempt is present, but the secondary contour remains dominant.
          3: The fold is weakly reduced and still clearly incorrect.
          4: A recognizable reduction exists, but a major bulge, duplicated contour, or fold-depth mismatch remains.
          5: The fold is partly reduced, with several substantial residual or over-removal problems.
          6: Reduction is mostly correct, but one clear residual fold or excessive hollow remains.
