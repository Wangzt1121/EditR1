prompt_applicability:
  purpose: The dataset contains one identical prompt template, so all Prompt Compliance facets are fixed as applicable.
  always_applicable:
  - eye_brightening_primary_outcome_match
  - eye_brightening_magnitude_match
  - eye_brightening_lively_expressive_effect_match
  - eye_brightening_iris_luminance_detail_match
  - eye_brightening_sclera_natural_brightness_match
  - eye_brightening_catchlight_reflection_enhancement_match
  - eye_brightening_bilateral_balance_completeness_match
  - eye_brightening_original_eye_color_tonality_match
  mask:
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  aggregation_rule: P = sum_i(weight_i * normalized_score_i) over all 8 Prompt Compliance facets.
