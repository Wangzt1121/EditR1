aggregation:
  prompt_compliance: Weighted arithmetic mean over all 8 Prompt Compliance facets. All eight facets are applicable to every
    valid prompt in this dataset.
  other_l1_blocks: Use the listed within-L1 weights for Localization and Anatomical Integration, Subject Preservation, and
    Task Realism and Image Quality.
  base_formula: base_reward = 0.58 * P + 0.20 * L + 0.17 * S + 0.05 * Q
  anatomy_score: A = score(eye_brightening_eye_geometry_gaze_anatomy_consistency) / 9.0
  identity_score: I = score(eye_brightening_gaze_expression_identity_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.20) * (I ** 0.18)
taxonomy:
  Prompt Compliance:
    Requested Eye Brightening:
      eye_brightening_primary_outcome_match:
        title: Primary eye-brightening outcome
        definition: Whether both assessable eyes themselves become visibly brighter, livelier, and clearer than the source
          without another eye-editing task. Do not give credit for global exposure increase, face whitening, skin beautification,
          eye enlargement, eye recoloring, or makeup changes.
        anchors:
          0: No local eye brightening, darker eyes, wrong edit type, or only global face/image brightening.
          3: Very weak or inconsistent eye brightening; the source eye appearance mostly dominates.
          5: Visible partial eye brightening, but incomplete, unnatural, or partly caused by global changes.
          7: Clear localized eye brightening with one visible issue and no visible face/background color drift.
          9: Both assessable eyes are cleanly, naturally, and selectively brightened with no material non-target change.
        rubric: Whether both assessable eyes themselves become visibly brighter, livelier, and clearer than the source without
          another eye-editing task. Do not give credit for global exposure increase, face whitening, skin beautification,
          eye enlargement, eye recoloring, or makeup changes. Apply this facet's 0-9 anchors directly. If any global failure
          affecting this facet is detected, apply failure_propagation caps. Do not let unrelated preservation, attractiveness,
          or realism compensate for this facet.
      eye_brightening_magnitude_match:
        title: Brightening magnitude
        definition: Whether the luminance increase is clearly visible but photorealistic. Avoid overexposed sclera, glowing
          pupils, clipped iris detail, harsh whitening, or imperceptible change.
        anchors:
          0: No useful increase, darker eyes, destructive clipping, or glowing artificial eyes.
          3: Barely visible, highly uneven, or clearly excessive brightening.
          5: Noticeable but insufficient, overdone, locally unnatural, or partly driven by global exposure/color shift.
          7: Appropriate visible eye-local magnitude with one minor issue and stable non-target lighting.
          9: Natural, clearly visible, and prompt-matched brightening magnitude.
        rubric: Whether the luminance increase is clearly visible but photorealistic. Avoid overexposed sclera, glowing pupils,
          clipped iris detail, harsh whitening, or imperceptible change. Apply this facet's 0-9 anchors directly. If any global
          failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated preservation, attractiveness,
          or realism compensate for this facet.
      eye_brightening_lively_expressive_effect_match:
        title: Lively and expressive effect
        definition: Whether the eyes gain alertness and vitality through brightness and reflection while the original expression
          remains unchanged.
        anchors:
          0: Eyes look duller, expression changes, or the effect is absent.
          3: Weak, artificial, or inconsistent vitality.
          5: Some liveliness is present but incomplete, unnatural, or supported by face relighting/filtering.
          7: Clear eye-local lively effect with one minor issue and unchanged expression/skin tone.
          9: Eyes look naturally vivid and expressive without expression drift.
        rubric: Whether the eyes gain alertness and vitality through brightness and reflection while the original expression
          remains unchanged. Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected,
          apply failure_propagation caps. Do not let unrelated preservation, attractiveness, or realism compensate for this
          facet.
      eye_brightening_iris_luminance_detail_match:
        title: Iris luminance and detail
        definition: Whether iris detail becomes more readable without flattening texture, changing hue, or washing out the
          pupil.
        anchors:
          0: Iris detail is destroyed, recolored, or unchanged when hidden.
          3: Major washout, blur, or weak recovery.
          5: Partial detail recovery with clear tonal problems or global white-balance contamination.
          7: Clear iris detail with one minor issue and source-consistent iris hue.
          9: Iris luminance and fine structure are fully natural and readable.
        rubric: Whether iris detail becomes more readable without flattening texture, changing hue, or washing out the pupil.
          Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      eye_brightening_sclera_natural_brightness_match:
        title: Natural sclera brightness
        definition: Whether sclera becomes cleaner and brighter while remaining naturally off-white with retained shading
          and detail.
        anchors:
          0: Sclera is unchanged, discolored, clipped white, or glowing.
          3: Strong whitening artifacts or uneven discoloration.
          5: Brighter but visibly flat, gray, blue, yellow, or overprocessed.
          7: Natural brightness with one minor issue and no global face-color shift.
          9: Sclera brightness is clean, subtle, and optically natural.
        rubric: Whether sclera becomes cleaner and brighter while remaining naturally off-white with retained shading and
          detail. Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      eye_brightening_catchlight_reflection_enhancement_match:
        title: Catchlight and reflection enhancement
        definition: Whether existing highlights and reflections become clearer and more effective without invented or duplicated
          light sources.
        anchors:
          0: Reflections are removed, contradictory, or obviously synthetic.
          3: Weak, misplaced, duplicated, or mismatched highlights.
          5: Recognizable enhancement with clear optical errors or global contrast/exposure dependence.
          7: Natural eye-local enhancement with one minor inconsistency.
          9: Highlights and reflections are precisely enhanced and source-consistent.
        rubric: Whether existing highlights and reflections become clearer and more effective without invented or duplicated
          light sources. Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected,
          apply failure_propagation caps. Do not let unrelated preservation, attractiveness, or realism compensate for this
          facet.
      eye_brightening_bilateral_balance_completeness_match:
        title: Bilateral completeness and balance
        definition: Whether all visible requested eye regions are edited with pose-, lighting-, and occlusion-aware balance.
        anchors:
          0: Wrong eye, one visible eye missed, or severe imbalance.
          3: Major left-right inconsistency or incomplete editing.
          5: Both eyes attempted but visibly mismatched.
          7: Complete and balanced with one minor difference.
          9: All assessable eye regions are complete and naturally balanced.
        rubric: Whether all visible requested eye regions are edited with pose-, lighting-, and occlusion-aware balance. Apply
          this facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      eye_brightening_original_eye_color_tonality_match:
        title: Original eye color and tonality
        definition: Whether iris hue, pupil darkness, scleral tint, and overall eye color remain source-consistent after brightening.
          Brightening should not recolor the iris, make pupils glow, flatten the eye, or add contact-lens/makeup-like effects
          unless explicitly requested.
        anchors:
          0: Major eye-color replacement, impossible pupil tonality, glowing pupil, or contact-lens-like change.
          3: Strong hue, saturation, sclera tint, or white-balance drift.
          5: Original color remains recognizable but visibly altered or flattened.
          7: Eye color and tonality are mostly preserved with one minor difference.
          9: Iris hue, pupil darkness, sclera tone, and eye tonal relationships remain fully source-consistent.
        rubric: Whether iris hue, pupil darkness, scleral tint, and overall eye color remain source-consistent after brightening.
          Brightening should not recolor the iris, make pupils glow, flatten the eye, or add contact-lens/makeup-like effects
          unless explicitly requested. Apply this facet's 0-9 anchors directly. If any global failure affecting this facet
          is detected, apply failure_propagation caps. Do not let unrelated preservation, attractiveness, or realism compensate
          for this facet.
  Localization and Anatomical Integration:
