          3: Significant spill into eyelids, under-eye skin, brows, or nearby face.
          5: Mostly localized with one clear non-target alteration, skin-tone shift, or background color drift.
          7: Localized with one minor spill and no visible global color/lighting shift.
          9: Precisely confined to the permitted eye region.
