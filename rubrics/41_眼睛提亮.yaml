      identity_expression_non_target_or_scene_drift:
        detect_when: Gaze, expression, identity, eye shape, surrounding features, skin tone, makeup, hair, clothing, background
          color, global lighting, white balance, framing, or camera state changes beyond eye brightening.
        severity_guidance: Minor local skin/lighting drift may be severity 1. Clear expression/eye-shape/makeup/skin-tone/background-color/focus
          drift should be severity 2-3. Identity, gaze, global lighting, white balance, framing, camera, or broad non-target
          change must be severity 4-5.
        affected_l3:
        - eye_brightening_eye_shape_eyelid_lash_brow_preservation
        - eye_brightening_gaze_expression_identity_preservation
