  high_score_evidence_check_rule: Before assigning 7, 8, or 9, identify concrete visual evidence for that exact L3 and check
    success_gate_conditions. For Prompt Compliance facets, 7+ requires local eye brightening rather than global relighting.
    For preservation and lighting facets, 7+ requires visibly stable face skin tone, background color, and white balance. If
    any task-specific failure affects that L3, apply the severity cap first; if evidence is generic, ambiguous, or borrowed
    from another facet, choose the lower score.
  anti_template_rule: >-
    Do not output all 7s, mostly 7s, all 8-9s, all 9s, or a copied score pattern. A vector with many 7s is suspicious when
    the image shows visible face-skin, background-color, white-balance, lighting, or filter drift. Re-audit those non-target
    changes and lower every affected facet without exact evidence. Also avoid a mechanical many-1s/many-9s split unless the
    visual evidence truly supports both extremes. Scores should reflect facet-level differences.
  task_disambiguation_rule: Eye brightening means localized optical enhancement of iris/sclera/catchlight liveliness while
    preserving eye color, structure, gaze, identity, and global scene lighting. It is not global exposure, relighting, filter,
    skin brightening, color change, or beauty retouching.
  no_compensation_rule: If local eye brightening is absent or achieved by global lighting/filter substitute, preservation/background/photorealism
    must not raise edit-dependent facets. A prettier/brighter face must not compensate for wrong eye color, overexposure,
    synthetic highlights, or source-state drift.
  mandatory_failure_propagation_rule: Before outputting final score_vector, detect failures in global_scoring_policy.failure_propagation,
    estimate severity 0-5, apply cap_by_severity to affected_l3, and output the adjusted vector. Severity 5 is reserved for
    completely absent, reversed, unusable, or clearly source-breaking target editing.
  no_high_score_example_rule: Do not use positive examples, ideal score vectors, or high-score templates. Scores 8-9 are allowed
    only when the exact L3 facet has concrete visible evidence and no applicable failure cap; no fixed high-score vector is
    provided to imitate.
  success_gate_definition: A positive sample makes the eyes visibly brighter and livelier through source-consistent iris luminance,
    scleral clarity, catchlights, and reflections while preserving eye color, gaze, identity, global lighting, and non-target
    regions.
  success_gate_conditions:
  - Eyes are locally brighter/livelier at normal viewing size through iris detail, natural sclera clarity, and plausible catchlights/reflections.
  - Eye color, pupil structure, iris/pupil boundaries, gaze, eye shape, eyelids/lashes, and expression remain source-consistent.
  - The result is not global exposure, face relighting, skin brightening, full-image filtering, eye enlargement, recoloring,
    or makeup change.
  - Highlights and reflections follow the source lighting direction and do not look pasted, glowing, overexposed, or synthetic.
  - Skin tone, face color temperature, makeup, hair, clothing, background color, framing, camera state, global white balance,
    and global lighting remain stable.
  success_gate_usage_rule: The success gate is only an eligibility check for scores 7-9. It is not a positive example and
    does not imply automatic high scores. If any condition is uncertain, contradicted, missing, or replaced by a substitute
    edit, choose the lower score and apply failure_propagation.
  score_7_9_eligibility_rule: A facet may receive 7, 8, or 9 only when the visual evidence for that exact L3 is strong, source-preserving,
    and not contradicted by any detected failure affecting that facet. If the face skin tone or background color visibly shifts,
    skin-tone/global-lighting/local-color facets cannot receive 7+, and core eye-brightening facets should not exceed 6 unless
    the ocular improvement is clearly local and dominant.
  primary_failure_preservation_ceiling_rule: When the primary requested edit is absent, wrong-direction, mostly unchanged,
    or mainly a substitute operation, apply failure_propagation before assigning preservation/quality highs. Unchanged non-target
    regions may receive moderate preservation scores, but failed editing must not become high reward through unrelated 8-9
    scores.
  anti_extreme_split_rule: Avoid mechanical split vectors such as many affected core facets at 1 and many unaffected facets
    at 9. Use 2-4 for weak/partial/mostly unchanged or wrong-substitute attempts, 5-6 for mixed recognizable attempts, and
    reserve 0-1 or 8-9 for truly extreme visual evidence.
normalization:
  formula: normalized_l3_i = integer_l3_i / 9.0
  training_reward_range:
  - 0.0
  - 1.0
  rounding: Keep full precision internally; public values use at most 3 decimals.
