aggregation:
  prompt_compliance: Weighted arithmetic mean over all 8 Prompt Compliance facets. All eight facets are applicable to every
    valid prompt.
  other_l1_blocks: Use the listed within-L1 weights for the remaining three blocks.
  base_formula: base_reward = 0.50 * P + 0.22 * L + 0.18 * S + 0.10 * Q
  direction_score: D = score(eye_size_direction_match) / 9.0
  anatomy_score: A = score(eye_size_orbital_perspective_surrounding_feature_integration) / 9.0
  identity_score: I = score(eye_size_subject_identity_facial_character_preservation) / 9.0
  final_formula: reward = base_reward * (D ** 0.30) * (A ** 0.20) * (I ** 0.15)
taxonomy:
  Prompt Compliance:
    Requested Eye Size:
      eye_size_primary_requested_outcome_match:
        title: Primary eye-size outcome
        definition: Whether both assessable eyes receive the requested overall size change.
        anchors:
          0: No target edit, opposite task, or unrelated eye edit.
          3: Weak or inconsistent size adjustment.
          5: Visible partial result with major incompleteness.
          7: Clear successful adjustment with one material issue.
          9: Overall eye size precisely matches the requested outcome.
        rubric: Whether both assessable eyes receive the requested overall size change. Apply this facet's 0-9 anchors directly.
          If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated preservation,
          attractiveness, or realism compensate for this facet.
      eye_size_direction_match:
        title: Requested size direction
        definition: Whether eye size increases for enlargement prompts and decreases for reduction prompts.
        anchors:
          0: Size changes clearly in the opposite direction.
          3: Direction is inconsistent, ambiguous, or mostly absent.
          5: General direction is correct but weak or uneven.
          7: Correct direction with one minor inconsistency.
          9: Direction is unmistakably correct for both eyes.
        rubric: Whether eye size increases for enlargement prompts and decreases for reduction prompts. Apply this facet's
          0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do
          not let unrelated preservation, attractiveness, or realism compensate for this facet.
      eye_size_magnitude_intensity_match:
        title: Magnitude and intensity
        definition: Whether the amount matches strong enlargement templates or subtle reduction templates without exaggeration.
        anchors:
          0: No change or destructive over-adjustment.
          3: Severely too weak, too strong, or inconsistent.
          5: Recognizable but clearly inaccurate magnitude.
          7: Appropriate magnitude with one minor issue.
          9: Magnitude exactly matches the prompt and remains believable.
        rubric: Whether the amount matches strong enlargement templates or subtle reduction templates without exaggeration.
          Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      eye_size_horizontal_vertical_scale_balance_match:
        title: Horizontal-vertical scaling balance
        definition: Whether width and height change coherently rather than producing only widening, only opening, or squeezed
          geometry.
        anchors:
          0: Only one axis changes or the eye is severely distorted.
          3: Major aspect-ratio or directional scaling error.
          5: Overall size changes with one clear axis imbalance.
