        - eye_size_skin_tone_texture_makeup_preservation
        - eye_size_hair_clothing_scene_camera_preservation
        - eye_size_artifact_background_stability
      over_enlarged_doll_eye_or_face_proportion_broken:
        detect_when: Eyes become cartoonish, doll-like, bug-eyed, too large/small, asymmetric, or incompatible with natural
          face-relative proportion.
        severity_guidance: Slight over-enlargement may be severity 1-2. Clear doll-like, bug-eyed, asymmetric, or proportion-breaking
          enlargement should be severity 3. Identity-changing, anime-like, pasted, or severely disproportionate eyes must
          be severity 4-5.
        affected_l3:
        - eye_size_magnitude_intensity_match
        - eye_size_face_relative_proportion_match
        - eye_size_bilateral_completeness_balance_match
        - eye_size_subject_identity_facial_character_preservation
        - eye_size_expression_gaze_head_pose_preservation
        - eye_size_artifact_background_stability
        - eye_size_primary_requested_outcome_match
        - eye_size_direction_match
        - eye_size_horizontal_vertical_scale_balance_match
        - eye_size_iris_pupil_sclera_proportion_match
        - eye_size_requested_finish_visibility_match
        - eye_size_edit_localized_to_target_eye_region
        - eye_size_eye_center_spacing_position_preservation
        - eye_size_eyelid_canthus_contour_integrity
