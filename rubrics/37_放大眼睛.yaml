        detect_when: Eyelids, canthi, iris/pupil/sclera relation, gaze alignment, orbital perspective, surrounding features,
          contour edges, lighting, or local texture become warped, pasted, haloed, misaligned, or anatomically implausible.
        severity_guidance: Tiny contour/blend defect may be severity 1. Clear eyelid/canthus/iris/sclera/gaze/orbital integration
          issue should be severity 2-3. Misaligned gaze, broken anatomy, pasted eyes, or impossible ocular geometry must be
          severity 4-5.
        affected_l3:
        - eye_size_iris_pupil_sclera_proportion_match
        - eye_size_eyelid_canthus_contour_integrity
