  high_score_evidence_check_rule: Before assigning 7, 8, or 9, identify concrete visual evidence for that exact L3 and check
    success_gate_conditions. If any task-specific failure affects that L3, apply the severity cap first; if evidence is generic,
    ambiguous, or borrowed from another facet, choose the lower score.
  anti_template_rule: Do not output all 7s, mostly 7s, all 8-9s, all 9s, or a copied score pattern. Also avoid a mechanical
    many-1s/many-9s split unless the visual evidence truly supports both extremes. Scores should reflect facet-level differences.
  task_disambiguation_rule: Eye-size enlargement means coherent enlargement of the complete visible eye units, not iris-only
    scaling, makeup change, eye translation, eye-spacing change, aperture-only opening, face/camera scaling, or generic beauty
    retouching.
  no_compensation_rule: If eye-size enlargement is absent or only a substitute edit, preservation/background/photorealism
    must not raise edit-dependent facets. If eyes look prettier but centers, spacing, gaze, anatomy, identity, or scene drift,
    high scores must be capped.
  mandatory_failure_propagation_rule: Before outputting final score_vector, detect failures in global_scoring_policy.failure_propagation,
    estimate severity 0-5, apply cap_by_severity to affected_l3, and output the adjusted vector. Severity 5 is reserved for
    completely absent, reversed, unusable, or clearly source-breaking target editing.
  no_high_score_example_rule: Do not use positive examples, ideal score vectors, or high-score templates. Scores 8-9 are allowed
    only when the exact L3 facet has concrete visible evidence and no applicable failure cap; no fixed high-score vector is
    provided to imitate.
  success_gate_definition: A positive sample follows the prompt direction by coherently scaling both complete visible eye
    units while preserving eye centers, spacing, gaze, iris/pupil relation, expression, identity, and scene.
  success_gate_conditions:
  - For 放大眼睛, both visible eye units are clearly larger with coherent horizontal and vertical scaling.
  - Eye centers, spacing, position, gaze, iris/pupil/sclera proportions, eyelids/canthi, and orbital perspective remain plausible.
  - The result is not vertical aperture-only, iris-only enlargement, eye translation, eye-spacing change, face scaling, makeup
    change, or generic beauty retouching.
  - Eyes remain natural for the face, not doll-like, bug-eyed, cartoonish, asymmetric, or identity-changing.
  - Brows, nose, skin/makeup, expression, hair, clothing, lighting, background, and camera state remain source-consistent.
  success_gate_usage_rule: The success gate is only an eligibility check for scores 7-9. It is not a positive example and
    does not imply automatic high scores. If any condition is uncertain, contradicted, missing, or replaced by a substitute
    edit, choose the lower score and apply failure_propagation.
  score_7_9_eligibility_rule: A facet may receive 7, 8, or 9 only when the visual evidence for that exact L3 is strong, source-preserving,
    and not contradicted by any detected failure affecting that facet.
  primary_failure_preservation_ceiling_rule: When the primary requested edit is absent, wrong-direction, mostly unchanged,
    or mainly a substitute operation, apply failure_propagation before assigning preservation/quality highs. Unchanged non-target
    regions may receive moderate preservation scores, but failed editing must not become high reward through unrelated 8-9
    scores.
  anti_extreme_split_rule: Avoid mechanical split vectors such as many affected core facets at 1 and many unaffected facets
    at 9. Use 2-4 for weak/partial/mostly unchanged or wrong-substitute attempts, 5-6 for mixed recognizable attempts, and
    reserve 0-1 or 8-9 for truly extreme visual evidence.
