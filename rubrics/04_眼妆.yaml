          - eye_makeup_artifact_sharpness_no_muddy_blur
      identity_expression_pose_scene_or_non_target_drift:
        detect_when: |-
          The candidate changes identity, expression, gaze, pose, face/body geometry, non-target attributes, clothing, accessories,
          background, camera/framing, global color, exposure, saturation, white balance, or any source-state element not requested
          by the prompt.
        severity_guidance: |-
          Minor non-target drift may be severity 1. Clear identity, expression, pose, lighting, background, or scene drift should
          be severity at least 2. Changed-person impression, broad source-state change, or camera/pose substitution should be
          severity 3-5.
          Instruction-only success is not enough: if the target edit is correct but any non-target/source-state region visibly
          changes, keep severity at least 2. If the candidate changes identity, expression, pose, camera/framing, background,
          clothing, global color/lighting, or broad non-target geometry, use severity 3-5 even when prompt compliance is strong.
        affected_l3:
          - requested_eye_makeup_style_match
          - requested_eye_makeup_visual_effect_match
          - requested_eye_makeup_palette_match
          - requested_eyeshadow_region_layout_match
          - requested_eyeshadow_layer_gradient_depth_match
          - requested_eyeshadow_blending_edge_match
          - requested_eye_makeup_eyeliner_component_match
          - requested_eye_makeup_lash_mascara_match
          - requested_eye_makeup_shimmer_highlight_match
