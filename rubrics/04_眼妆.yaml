identity_preservation_protocol:
  purpose: Prevent successful target editing from hiding facial-identity drift. Identity is judged by source-to-result correspondence,
    not by whether the edited face is attractive or realistic.
  comparison_checklist:
  - overall face outline and width/length relationship
  - forehead and hair-independent face contour
  - eyebrow position and shape
  - eye shape, spacing, aperture, and characteristic asymmetry
  - nose geometry and placement
  - mouth position and natural geometry
  - cheek, jaw, and chin structure
  - age impression and gender presentation
  - skin tone, stable characteristic marks, and facial texture
  - overall same-person impression at normal viewing size
  strict_rules:
  - Do not increase an identity score because the target edit is attractive or instruction-compliant.
  - Do not treat a photorealistic but different-looking face as identity-preserved.
  - A score of 7 still requires a strong same-person match with only minor drift.
  - A changed-person impression must score 4 or below on the dedicated identity facet.
  - The task target region may be excluded only where explicitly necessary; unrelated facial landmarks remain fully constrained.
  - Identity, expression, and adjacent-face scores are independent of clothing and background preservation.
  task_specific_exception: requested eye-makeup pigment, eyeliner, lash, shimmer, and decoration only
