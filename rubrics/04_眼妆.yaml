          - requested_eye_makeup_finish_intensity_adaptation_match
          - unrequested_eye_makeup_properties_preserved
          - eye_makeup_edit_localized_to_eye_regions
          - eye_makeup_eyelid_crease_lashline_integration
          - eye_makeup_pose_aware_bilateral_correspondence
          - eye_makeup_skin_boundary_clean
          - eye_makeup_facial_identity_landmark_consistency
          - eye_makeup_eye_anatomy_gaze_brows_adjacent_face_preserved
          - eye_makeup_material_particles_realistic
          - eye_makeup_skin_texture_lighting_preserved
          - eye_makeup_lashes_liner_structure_coherent
          - eye_makeup_artifact_sharpness_no_muddy_blur
      artifact_texture_blur_or_rendering_failure:
        detect_when: |-
          The result contains visible blur, waxy smoothing, jagged or painted edges, mask seams, duplicated structures, warped
          geometry, broken texture, inconsistent material response, lighting mismatch, shadow/color integration errors, or other
          rendering artifacts that make the edit unreliable for reward training.
        severity_guidance: |-
          Tiny local artifacts may be severity 1. Clear blur, texture loss, boundary artifacts, or lighting/material mismatch
          should be severity 2-3. Severe artifacts, broken anatomy/material, or unusable image quality should be severity 4-5.
        affected_l3:
          - eye_makeup_edit_localized_to_eye_regions
