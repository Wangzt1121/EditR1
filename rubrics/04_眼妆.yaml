aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Style, Color, and Layout:
      requested_eye_makeup_style_match:
        title: Requested eye-makeup style match
        definition: Judge exact named look or style family, such as natural, nude, smoky, cut crease, cat-eye, fox-eye, bridal,
          retro, Y2K, gothic, cyber, mermaid, or editorial.
        anchors:
          0: the requested eye-makeup style is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested eye-makeup style is visible; the central eye-makeup style is wrong or
            missing.
          2: A small relevant attempt is present, but the requested eye-makeup style is severely incorrect or incomplete.
          3: the requested eye-makeup style is weakly attempted; one or more primary requirements are missing or contradictory.
          4: the requested eye-makeup style is recognizable, but a major mismatch, omission, or excessive change remains.
          5: the requested eye-makeup style is moderately achieved, with several substantial visible problems.
          6: the requested eye-makeup style is mostly correct, but one clear and important issue remains.
          7: the requested eye-makeup style is clearly successful, with only a minor visible mismatch.
          8: the requested eye-makeup style is highly accurate and complete, with only a tiny local imperfection.
          9: The exact requested eye-makeup style and defining identity are fully realized.
      requested_eye_makeup_visual_effect_match:
        title: Requested optical eye effect match
        definition: Judge makeup-created lifted, lowered, elongated, rounded, enlarged, de-puffed, deepened, or softened visual
          effect without anatomical eye reshaping.
        anchors:
          0: the requested makeup-created optical effect is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested makeup-created optical effect is visible; the intended optical effect
            is missing or achieved by changing anatomy.
          2: A small relevant attempt is present, but the requested makeup-created optical effect is severely incorrect or
            incomplete.
          3: the requested makeup-created optical effect is weakly attempted; one or more primary requirements are missing
            or contradictory.
          4: the requested makeup-created optical effect is recognizable, but a major mismatch, omission, or excessive change
            remains.
          5: the requested makeup-created optical effect is moderately achieved, with several substantial visible problems.
          6: the requested makeup-created optical effect is mostly correct, but one clear and important issue remains.
          7: the requested makeup-created optical effect is clearly successful, with only a minor visible mismatch.
          8: the requested makeup-created optical effect is highly accurate and complete, with only a tiny local imperfection.
