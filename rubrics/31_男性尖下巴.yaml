prompt_applicability:
  purpose: All prompts share one localized pointed-chin target. All eight Prompt Compliance facets are always applicable.
  always_applicable:
  - male_pointed_chin_primary_outcome_match
  - male_pointed_chin_pointedness_direction_match
  - male_pointed_chin_magnitude_intensity_match
  - male_pointed_chin_taper_profile_match
  - male_pointed_chin_tip_radius_delicacy_match
  - male_pointed_chin_length_width_projection_control_match
  - male_pointed_chin_centerline_bilateral_balance_match
  - male_pointed_chin_requested_finish_visibility_match
  mask:
  - 1
  - 1
