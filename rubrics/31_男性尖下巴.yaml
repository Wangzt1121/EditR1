aggregation:
  prompt_compliance: Weighted arithmetic mean over all 8 Prompt Compliance facets. All eight facets are applicable to every
    valid prompt.
  other_l1_blocks: Use the listed within-L1 weights for the remaining three blocks.
  base_formula: base_reward = 0.50 * P + 0.24 * L + 0.16 * S + 0.10 * Q
  pointedness_score: D = score(male_pointed_chin_pointedness_direction_match) / 9.0
  anatomy_score: A = score(male_pointed_chin_tip_axis_perspective_consistency) / 9.0
  identity_score: I = score(male_pointed_chin_identity_masculine_character_preservation) / 9.0
  final_formula: reward = base_reward * (D ** 0.28) * (A ** 0.20) * (I ** 0.18)
taxonomy:
  Prompt Compliance:
    Requested Pointed Chin:
      male_pointed_chin_primary_outcome_match:
        title: Primary pointed-chin outcome
        definition: Whether the chin tip becomes visibly more delicate and slightly pointed.
        anchors:
          0: No target edit, rounder chin, or a different task.
          3: Weak or inconsistent pointedness change.
          5: Partial result with major incompleteness.
          7: Clear successful refinement with one material issue.
          9: The chin tip is clearly, naturally, and precisely more pointed.
        rubric: Whether the chin tip becomes visibly more delicate and slightly pointed. Apply this facet's 0-9 anchors directly.
          If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated preservation,
          attractiveness, or realism compensate for this facet.
      male_pointed_chin_pointedness_direction_match:
        title: Pointedness direction
        definition: Whether chin-tip roundness decreases in the requested direction.
        anchors:
          0: Chin becomes rounder, flatter, or broader.
          3: Direction is largely absent or inconsistent.
          5: General pointedness increase exists but remains weak or uneven.
          7: Correct direction with one minor issue.
          9: Pointedness direction is unmistakably correct.
        rubric: Whether chin-tip roundness decreases in the requested direction. Apply this facet's 0-9 anchors directly.
          If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated preservation,
          attractiveness, or realism compensate for this facet.
      male_pointed_chin_magnitude_intensity_match:
        title: Magnitude and intensity
        definition: Whether the amount is visible and prompt-appropriate without becoming extreme.
        anchors:
          0: No visible change or destructive over-sharpening.
          3: Severely too weak, too strong, or uneven.
          5: Recognizable but clearly inaccurate magnitude.
          7: Appropriate magnitude with one minor issue.
          9: Magnitude exactly matches the prompt and remains believable.
        rubric: Whether the amount is visible and prompt-appropriate without becoming extreme. Apply this facet's 0-9 anchors
          directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated
          preservation, attractiveness, or realism compensate for this facet.
      male_pointed_chin_taper_profile_match:
        title: Chin taper profile
        definition: Whether both chin sides narrow gradually toward the tip rather than forming an abrupt triangle.
        anchors:
          0: No taper, reversed taper, or impossible triangular cutout.
          3: Major abruptness, pinching, or asymmetric taper.
          5: General taper exists with one clear profile error.
          7: Natural taper with one minor issue.
          9: Both sides converge smoothly and anatomically.
        rubric: Whether both chin sides narrow gradually toward the tip rather than forming an abrupt triangle. Apply this
          facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      male_pointed_chin_tip_radius_delicacy_match:
        title: Tip radius and delicacy
        definition: Whether the final tip is refined and compact without becoming needle-like.
        anchors:
          0: Tip is blunt, broken, hooked, or needle-like.
          3: Strong mismatch in sharpness or tip radius.
          5: More delicate but clearly too round or too sharp.
          7: Appropriate with one minor issue.
          9: Tip radius is precise, refined, and natural.
        rubric: Whether the final tip is refined and compact without becoming needle-like. Apply this facet's 0-9 anchors
          directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated
          preservation, attractiveness, or realism compensate for this facet.
      male_pointed_chin_length_width_projection_control_match:
        title: Length, width, and projection control
        definition: Whether pointedness is achieved without materially changing chin length, base width, or forward projection.
        anchors:
          0: Major lengthening, shortening, narrowing, widening, or projection shift.
          3: Strong non-target chin geometry change.
          5: Mostly controlled with one clear extra change.
          7: Controlled with one minor difference.
          9: Only tip pointedness changes; other chin dimensions remain source-consistent.
        rubric: Whether pointedness is achieved without materially changing chin length, base width, or forward projection.
          Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      male_pointed_chin_centerline_bilateral_balance_match:
        title: Centerline and bilateral balance
        definition: Whether the tip remains aligned with the lower-face axis and source asymmetry.
        anchors:
          0: Severe off-center tip or unilateral deformation.
          3: Major centerline or left-right imbalance.
          5: Generally centered with one clear asymmetry error.
          7: Balanced with one minor issue.
          9: Tip alignment and bilateral contour are fully natural.
        rubric: Whether the tip remains aligned with the lower-face axis and source asymmetry. Apply this facet's 0-9 anchors
          directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated
          preservation, attractiveness, or realism compensate for this facet.
      male_pointed_chin_requested_finish_visibility_match:
        title: Requested finish and visibility
        definition: Whether studio, editorial, app-style, commercial, premium, or high-fashion finish is visible at normal
          size.
        anchors:
          0: Finish is absent, opposite, or destructive.
          3: Strong style, visibility, or realism mismatch.
          5: Requested finish is recognizable but inaccurate.
          7: Appropriate finish with one minor mismatch.
