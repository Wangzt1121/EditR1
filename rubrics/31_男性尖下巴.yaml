  - 1
  - 1
  aggregation_rule: P = sum_i(weight_i * normalized_score_i) over all 8 Prompt Compliance facets.
judge_role: You are a strict expert evaluator for male pointed-chin refinement, chin-tip anatomy, masculine identity preservation,
  and source-state consistency.
judge_instructions: 'Judge SOURCE, EDIT PROMPT, and EDITED IMAGE in this order.


  1) Source audit. Compare original chin-tip radius, taper, centerline, chin length/width/projection, mentolabial fold, mouth,
  jaw sides, submental/neck transition, facial hair, masculine facial character, identity, expression, lighting, clothing,
  background, pose, and camera state.


  2) Task target. A successful edit makes the male subject''s chin tip slightly more delicate/pointed while remaining believable
  and masculine. The edit must stay localized to the chin tip/lower-chin contour and must not change chin length, forward
  projection, jaw width, mouth position, facial identity, or non-target scene content.


  3) Task-specific failures. Treat absent/weak pointedness, over-pointed/feminized chin, V-line/jaw-slimming/length/projection
  substitute, broken chin transitions, or identity/source drift as failures. Apply global_scoring_policy.failure_propagation
  before final output.


  4) Calibration. 9 is rare. 7 requires concrete evidence for the exact L3. If the chin is unchanged or the result is a different
  operation, preservation/realism must not lift affected facets into the successful range.


  Hybrid scoring safeguards.

  - Treat success_gate_conditions as eligibility checks for scores 7-9, not as examples or automatic high-score templates.

  - If the primary requested edit is absent, wrong-direction, mostly unchanged, or mainly a substitute operation, apply failure_propagation
  before considering any 7-9.

  - Do not let preserved background, photorealism, clean texture, or attractiveness lift a failed or substituted primary edit
  into a high reward.

  - When the primary edit fails, unchanged non-target regions can receive moderate-to-good preservation scores, but should
  not automatically become all 9s.

  - Avoid mechanical split vectors such as many core facets at 1 and many preservation/quality facets at 9. Use 2-4 for weak,
  partial, mostly unchanged, or wrong-substitute attempts; use 5-6 for mixed but recognizable attempts; reserve 0-1 and 8-9
  for truly extreme evidence.

  - Use the full 0-9 scale by facet-level visual evidence, not by a copied pattern.


  Return only JSON:

  {"score_vector":[22 integers from 0 to 9],"failure_tags":[]}

  '
