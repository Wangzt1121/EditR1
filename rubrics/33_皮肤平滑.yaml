aggregation:
  prompt_compliance: Weighted arithmetic mean over all 8 Prompt Compliance facets. All eight facets are applicable to every
    valid prompt.
  other_l1_blocks: Use the listed within-L1 weights for the remaining three blocks.
  base_formula: base_reward = 0.50 * P + 0.22 * L + 0.18 * S + 0.10 * Q
  pore_score: T = score(skin_smoothing_pore_retention_match) / 9.0
  identity_score: I = score(skin_smoothing_identity_face_geometry_preservation) / 9.0
  final_formula: reward = base_reward * (T ** 0.24) * (I ** 0.17)
taxonomy:
  Prompt Compliance:
    Requested Skin Smoothing:
      skin_smoothing_primary_outcome_match:
        title: Primary skin-smoothing outcome
        definition: Whether visible facial skin becomes cleaner and smoother while retaining realistic detail.
        anchors:
          0: No smoothing, worse texture, or a different task.
          3: Weak, inconsistent, or highly artificial smoothing.
          5: Partial improvement with major residual or over-smoothing.
          7: Clear successful smoothing with one material issue.
          9: Skin is consistently smoother, clean, detailed, and natural.
        rubric: Whether visible facial skin becomes cleaner and smoother while retaining realistic detail. Apply this facet's
          0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do
          not let unrelated preservation, attractiveness, or realism compensate for this facet.
      skin_smoothing_minor_imperfection_reduction_match:
        title: Minor-imperfection reduction
        definition: Whether small transient imperfections and mild roughness are reduced without broad lesion removal.
        anchors:
          0: Minor imperfections remain unchanged or worsen.
          3: Only isolated or inconsistent correction.
          5: Some correction exists but clear targets remain.
          7: Nearly complete with one minor residual.
          9: Minor imperfections are naturally and comprehensively reduced.
        rubric: Whether small transient imperfections and mild roughness are reduced without broad lesion removal. Apply this
          facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      skin_smoothing_magnitude_restraint_match:
        title: Smoothing magnitude and restraint
        definition: Whether smoothing is visible but controlled, avoiding heavy blur or artificial perfection.
        anchors:
          0: No visible effect or destructive airbrushing.
          3: Severely too weak, too strong, or uneven.
          5: Recognizable smoothing with clear intensity mismatch.
          7: Appropriate intensity with one minor issue.
          9: Smoothing strength is exactly appropriate and realistic.
        rubric: Whether smoothing is visible but controlled, avoiding heavy blur or artificial perfection. Apply this facet's
          0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do
          not let unrelated preservation, attractiveness, or realism compensate for this facet.
      skin_smoothing_pore_retention_match:
        title: Realistic pore retention
        definition: Whether pores remain visibly plausible rather than being erased or uniformly regenerated.
        anchors:
          0: Pores are fully erased, painted, or replaced by artificial texture.
          3: Major pore loss, repetition, or density mismatch.
          5: Pores remain but one clear realism problem exists.
          7: Natural pores with one minor issue.
          9: Pore density, scale, and visibility remain fully realistic.
        rubric: Whether pores remain visibly plausible rather than being erased or uniformly regenerated. Apply this facet's
          0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do
          not let unrelated preservation, attractiveness, or realism compensate for this facet.
      skin_smoothing_natural_texture_variation_match:
        title: Natural texture variation
        definition: Whether normal regional differences across forehead, nose, cheeks, and chin remain.
        anchors:
          0: Skin becomes uniformly flat or synthetic.
          3: Strong loss of natural regional variation.
          5: Some variation remains but clear uniformity is visible.
          7: Natural variation with one minor issue.
          9: Regional skin character remains fully natural.
        rubric: Whether normal regional differences across forehead, nose, cheeks, and chin remain. Apply this facet's 0-9
          anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not
          let unrelated preservation, attractiveness, or realism compensate for this facet.
      skin_smoothing_original_skin_tone_match:
        title: Original skin tone
        definition: Whether hue, undertone, brightness, saturation, and local color variation remain unchanged.
        anchors:
          0: Major whitening, recoloring, tanning, or exposure shift.
          3: Strong global or regional skin-tone drift.
          5: Mostly preserved with one obvious tonal change.
          7: Preserved with one minor difference.
          9: Original skin tone and color variation remain unchanged.
        rubric: Whether hue, undertone, brightness, saturation, and local color variation remain unchanged. Apply this facet's
          0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do
          not let unrelated preservation, attractiveness, or realism compensate for this facet.
      skin_smoothing_visible_region_consistency_match:
        title: Visible-region consistency
        definition: Whether all assessable facial skin regions receive consistent, proportionate treatment.
        anchors:
          0: Large visible areas are missed or edited in opposite ways.
          3: Strong regional inconsistency or patchiness.
          5: Most areas are treated but one clear region differs.
          7: Consistent with one minor regional difference.
          9: All assessable skin regions are treated coherently.
        rubric: Whether all assessable facial skin regions receive consistent, proportionate treatment. Apply this facet's
          0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do
          not let unrelated preservation, attractiveness, or realism compensate for this facet.
      skin_smoothing_photorealistic_hd_finish_match:
        title: Photorealistic high-definition finish
        definition: Whether the final skin remains detailed, source-sharp, and believable at normal and close viewing.
        anchors:
          0: Low-detail, blurred, synthetic, or visibly damaged finish.
          3: Strong loss of resolution or photorealism.
          5: Generally usable but visibly processed.
          7: High-quality with one minor issue.
          9: The finish is clean, detailed, photorealistic, and high-definition.
        rubric: Whether the final skin remains detailed, source-sharp, and believable at normal and close viewing. Apply this
          facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
  Localization and Skin Integration:
    Localized Surface Processing:
      skin_smoothing_edit_localized_to_skin_surface:
        title: Edit localization
        definition: Whether changes are confined to visible facial skin and minimum blending areas.
        anchors:
          0: Broad facial-feature, hair, clothing, or scene editing.
          3: Significant spill into non-skin regions.
          5: Mostly localized with one clear extra alteration.
          7: Localized with one minor spill.
          9: Precisely confined to intended facial skin.
        rubric: Whether changes are confined to visible facial skin and minimum blending areas. Apply this facet's 0-9 anchors
          directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated
          preservation, attractiveness, or realism compensate for this facet.
      skin_smoothing_facial_landmark_boundary_integrity:
        title: Facial-landmark boundary integrity
        definition: Whether eyes, brows, lashes, nostrils, lips, teeth, hairline, ears, and facial hair retain clean boundaries.
