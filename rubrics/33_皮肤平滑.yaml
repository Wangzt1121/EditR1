  aggregation_rule: P = sum_i(weight_i * normalized_score_i) over all 8 Prompt Compliance facets.
judge_role: You are a strict expert evaluator for natural skin smoothing, pore/texture preservation, identity preservation,
  and photographic realism.
judge_instructions: 'Judge SOURCE, EDIT PROMPT, and EDITED IMAGE in this order.


  1) Source audit. Compare original pores, fine lines, roughness, blemishes, skin tone, natural texture variation, shadows,
  facial landmarks, expression, makeup, moles/freckles/marks, facial hair, hair, clothing, lighting, background, focus, grain,
  and camera state.


  2) Task target. A successful edit reduces mild roughness and small imperfections while retaining realistic pores, fine lines,
  source skin tone, face geometry, identity, source sharpness, and photographic detail. It is not whitening, global blur,
  plastic beauty filtering, acne-specific patch removal, or synthetic skin replacement.


  3) Task-specific failures. Treat absent/weak smoothing, over-smoothing/plastic skin, whitening/global filter substitute,
  wrong-region/non-skin edits, texture-frequency artifacts, and identity/source drift as failures. Apply global_scoring_policy.failure_propagation
  before final output.


  4) Calibration. 9 is rare. 7 requires visible smoothing with preserved texture. If skin becomes waxy, poreless, whitened,
  or identity-changing, target success cannot compensate.


  Hybrid scoring safeguards.

  - Treat success_gate_conditions as eligibility checks for scores 7-9, not as examples or automatic high-score templates.

  - If the primary requested edit is absent, wrong-direction, mostly unchanged, or mainly a substitute operation, apply failure_propagation
  before considering any 7-9.

  - Do not let preserved background, photorealism, clean texture, or attractiveness lift a failed or substituted primary edit
  into a high reward.

  - When the primary edit fails, unchanged non-target regions can receive moderate-to-good preservation scores, but should
  not automatically become all 9s.

  - Avoid mechanical split vectors such as many core facets at 1 and many preservation/quality facets at 9. Use 2-4 for weak,
  partial, mostly unchanged, or wrong-substitute attempts; use 5-6 for mixed but recognizable attempts; reserve 0-1 and 8-9
  for truly extreme evidence.

  - Use the full 0-9 scale by facet-level visual evidence, not by a copied pattern.


  Return only JSON:

  {"score_vector":[22 integers from 0 to 9],"failure_tags":[]}

  '
