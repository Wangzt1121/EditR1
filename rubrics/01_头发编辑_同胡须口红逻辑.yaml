- hair_requested_bangs_parting_front_match
- hair_requested_hairline_sideburn_faceframing_match
- hair_requested_color_hue_tone_match
- hair_requested_color_pattern_placement_match
- hair_requested_secondary_details_and_completeness_match
- hair_edit_localized_to_hair_region
- hair_scalp_root_hairline_attachment
- hair_face_ear_neck_shoulder_occlusion
- hair_head_proportion_pose_balance
- hair_facial_identity_landmark_consistency
- hair_expression_gaze_body_scene_non_target_preservation
- hair_strand_material_texture_realism
- hair_structural_coherence_gravity
- hair_lighting_color_shadow_consistency
- hair_artifact_sharpness_background_stability
compact_output_contract:
  format:
    scores: array of exactly 22 integers in active_l3 order
  requirements:
  - minItems = 22
  - maxItems = 22
  - minimum score = 0
  - maximum score = 9
  - Do not output facet names, evidence, explanations, summaries, or failure tags in the training path.
  example:
    scores:
    - 8
    - 7
    - 8
    - 7
    - 7
    - 8
    - 8
    - 7
    - 8
    - 8
    - 7
    - 8
    - 9
    - 8
    - 7
    - 8
    - 9
    - 8
    - 8
    - 7
    - 8
    - 8
l1_weights:
  Prompt Compliance: 0.58
  Localization and Anatomical Integration: 0.11
  Subject Preservation: 0.25
  Task Realism and Image Quality: 0.06
facet_weights_within_l1:
  Prompt Compliance:
    hair_requested_style_family_match: 0.14
    hair_requested_structure_arrangement_match: 0.1
    hair_requested_length_endpoint_match: 0.08
    hair_requested_cut_layers_hemline_match: 0.07
    hair_requested_silhouette_volume_density_match: 0.08
    hair_requested_texture_curl_pattern_match: 0.08
    hair_requested_strand_flow_direction_match: 0.07
    hair_requested_bangs_parting_front_match: 0.08
    hair_requested_hairline_sideburn_faceframing_match: 0.07
    hair_requested_color_hue_tone_match: 0.08
    hair_requested_color_pattern_placement_match: 0.07
    hair_requested_secondary_details_and_completeness_match: 0.08
  Localization and Anatomical Integration:
    hair_edit_localized_to_hair_region: 0.27
    hair_scalp_root_hairline_attachment: 0.28
    hair_face_ear_neck_shoulder_occlusion: 0.25
    hair_head_proportion_pose_balance: 0.2
  Subject Preservation:
    hair_facial_identity_landmark_consistency: 0.72
    hair_expression_gaze_body_scene_non_target_preservation: 0.28
  Task Realism and Image Quality:
    hair_strand_material_texture_realism: 0.3
    hair_structural_coherence_gravity: 0.26
    hair_lighting_color_shadow_consistency: 0.24
    hair_artifact_sharpness_background_stability: 0.2
aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  prompt_compliance: Weighted arithmetic mean over all 12 Prompt Compliance L3 facets.
  other_l1_blocks: Weighted arithmetic means for Localization, Subject Preservation, and Quality.
  final: weighted_arithmetic_mean_of_l1
  formula: reward = 0.58 * P + 0.11 * L + 0.25 * S + 0.06 * Q
  properties:
  - Fixed 22-score output.
  - Same aggregation structure and L1 weights as beard and lipstick.
  - Every active L3 facet contributes through its L1 block.
  - Identity and non-target preservation are part of Subject Preservation and cannot be replaced by target success.
  - No hard cap, rank bonus, external metric, or discrete failure deduction.
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Keep full precision internally; return public values with at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Hairstyle Structure and Geometry:
      hair_requested_style_family_match:
        title: Requested hairstyle family and overall style identity match
        definition: Judge the exact named or described hairstyle family, such as long straight hair, long wavy hair, bob,
          pixie, buzz cut, ponytail, bun, braid, wolf cut, mullet, slick-back, pompadour, quiff, mohawk, dreadlocks, or another
          explicit style. Also judge explicitly requested feminine, masculine, elegant, casual, polished, or other overall
          styling character.
        anchors:
          0: 'requested hairstyle family and overall style identity match completely fails: the requested hairstyle family
            is absent, opposite, or replaced by an unrelated hairstyle'
          1: Only a negligible trace of requested hairstyle family and overall style identity match is visible; the central
            requirement is essentially unmet.
          2: A weak related attempt is present, but requested hairstyle family and overall style identity match is severely
            incorrect, incomplete, or directionally wrong.
          3: requested hairstyle family and overall style identity match is partially attempted, but one or more primary requirements
            are missing or contradictory.
          4: requested hairstyle family and overall style identity match is recognizable, but a major mismatch, omission,
            excessive change, or wrong regional behavior remains.
          5: requested hairstyle family and overall style identity match is moderately achieved, with several substantial
            visible problems.
          6: requested hairstyle family and overall style identity match is mostly correct, but one clear and important issue
            remains.
          7: requested hairstyle family and overall style identity match is clearly successful, with only a minor visible
            mismatch.
          8: requested hairstyle family and overall style identity match is highly accurate and complete, with only a tiny
            local imperfection.
          9: The exact requested hairstyle family and complete overall styling identity are fully and unmistakably realized.
      hair_requested_structure_arrangement_match:
        title: Requested hairstyle structure and arrangement match
        definition: Judge loose versus tied organization, ponytail height and side, number of ponytails or buns, half-up organization,
          braid type and routing, shaved or undercut regions, component connections, symmetry, and the topology of the final
          hairstyle.
        anchors:
          0: 'requested hairstyle structure and arrangement match completely fails: the requested structural arrangement is
            absent or replaced by an incompatible organization'
          1: Only a negligible trace of requested hairstyle structure and arrangement match is visible; the central requirement
            is essentially unmet.
          2: A weak related attempt is present, but requested hairstyle structure and arrangement match is severely incorrect,
            incomplete, or directionally wrong.
          3: requested hairstyle structure and arrangement match is partially attempted, but one or more primary requirements
            are missing or contradictory.
          4: requested hairstyle structure and arrangement match is recognizable, but a major mismatch, omission, excessive
            change, or wrong regional behavior remains.
          5: requested hairstyle structure and arrangement match is moderately achieved, with several substantial visible
            problems.
          6: requested hairstyle structure and arrangement match is mostly correct, but one clear and important issue remains.
          7: requested hairstyle structure and arrangement match is clearly successful, with only a minor visible mismatch.
          8: requested hairstyle structure and arrangement match is highly accurate and complete, with only a tiny local imperfection.
          9: Every requested structural component, connection, count, position, and arrangement is exact and complete.
      hair_requested_length_endpoint_match:
        title: Requested hair length and visible endpoint match
        definition: Judge ultra-short, ear-, chin-, shoulder-, collarbone-, chest-, waist-, or other requested length; visible
          endpoints at the front, sides, and back; and whether hair falls past the ears, jaw, shoulders, or other specified
          landmark.
