identity_preservation_protocol:
  purpose: Prevent successful eyebrow editing from hiding facial-identity, eye, expression, skin, hair, camera, or background
    drift. Identity is judged by source-to-result correspondence, not eyebrow attractiveness.
  comparison_checklist:
  - overall face outline and proportions
  - forehead and hairline
  - eye shape, spacing, aperture, gaze, eyelids, and eyelashes
  - nose geometry and placement
  - mouth position, lip geometry, teeth visibility, and expression
  - cheek structure, chin, jaw, ears, and facial asymmetry
  - age impression and gender presentation
  - skin tone, stable marks, makeup outside the brows, and facial texture
  - hair, hairstyle, facial hair, clothing, and accessories
  - background hue, texture, brightness, contrast, white balance, and composition
  - camera angle, crop, framing, lighting, aspect ratio, and resolution
  - overall same-person impression at normal viewing size
  strict_rules:
  - Do not increase identity because the eyebrow result is attractive, fashionable, or prompt-compliant.
  - Do not treat a photorealistic but different-looking person as identity-preserved.
  - A score of 7 still requires a strong same-person match with only minor drift.
  - A changed-person impression must score 4 or below on the dedicated identity facet.
  - Only explicitly requested eyebrow attributes may change; all other facial and image properties remain constrained.
  - Eyebrow correctness, identity, expression, eye preservation, background, color, and rendering quality are independent.
  task_specific_exception: only the explicitly requested eyebrow geometry, position, spacing, thickness, density, length,
    color, texture, and the minimum surrounding skin needed for natural integration
