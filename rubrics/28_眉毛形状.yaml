aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Requested Brow Geometry:
      requested_eyebrow_edit_operation_match:
        title: Requested eyebrow-edit operation match
        definition: Judge whether the eyebrows themselves receive the prompt-specified edit. Do not credit changes to eyes,
          eyelids, forehead, face, camera, lighting, or skin as substitute eyebrow operations.
        anchors:
          0: The requested eyebrow operation is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested operation is visible.
          2: A small relevant attempt exists, but the result is dominated by a substitute operation.
          3: The brows are weakly edited, but the primary operation is mostly wrong.
          4: A recognizable brow edit exists, yet a major part of the requested operation is missing or substituted.
          5: The operation is partially correct, with several substantial mismatches.
          6: The requested operation is mostly correct, but one clear error remains.
          7: The operation is clearly achieved, with only a minor visible mismatch.
          8: The operation is highly accurate, with only a tiny local imperfection.
          9: The eyebrows receive exactly the requested operation with no substitute edits.
        rubric: Judge whether the eyebrows themselves receive the prompt-specified edit. Do not credit changes to eyes, eyelids,
          forehead, face, camera, lighting, or skin as substitute eyebrow operations. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      requested_eyebrow_shape_family_match:
        title: Requested eyebrow shape-family match
        definition: Judge the requested overall family, such as straight, arched, sword, drooping, hooked, crescent, willow-leaf,
          Korean straight, meteor, feathery, rugged, short, long, or balanced natural.
        anchors:
          0: The requested family is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested family is visible.
          2: A small relevant feature exists, but the overall family is severely wrong.
          3: The family is weakly attempted and remains largely incorrect.
          4: The style is recognizable, but a major defining geometric property is wrong.
          5: The family is partially matched, with several visible shape conflicts.
          6: The family is mostly correct, but one clear defining feature remains wrong.
          7: The requested family is strong, with only a minor shape mismatch.
          8: The family is highly accurate, with only a tiny local imperfection.
          9: The requested eyebrow family and defining geometry are exactly achieved.
        rubric: Judge the requested overall family, such as straight, arched, sword, drooping, hooked, crescent, willow-leaf,
          Korean straight, meteor, feathery, rugged, short, long, or balanced natural. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      requested_brow_height_eye_distance_match:
        title: Requested brow height and brow-to-eye distance match
        definition: When requested, judge raised, lowered, high-set, or low-set placement relative to the unchanged eyes.
          When not requested, judge preservation of source brow height.
        anchors:
          0: Height is opposite, absent, replaced by eye movement, or unusable.
          1: Only a negligible correct height relationship remains.
          2: A small attempt exists, but brow-to-eye distance is severely wrong.
          3: The requested placement is weakly attempted and largely incorrect.
          4: The direction is recognizable, but a major height or eye-distance mismatch remains.
          5: Height is partially correct, with several visible placement problems.
          6: Placement is mostly correct, but one clear height inconsistency remains.
          7: Brow height is strong and natural, with only a minor mismatch.
          8: Height and eye distance are highly accurate, with only a tiny discrepancy.
          9: The requested or preserved brow height and eye distance are exact and anatomically natural.
        rubric: When requested, judge raised, lowered, high-set, or low-set placement relative to the unchanged eyes. When
          not requested, judge preservation of source brow height. Apply this facet's 0-9 anchors directly. If a task-specific
          failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.
      requested_interbrow_spacing_match:
        title: Requested interbrow spacing match
        definition: When requested, judge the gap between the inner brow heads as closer, wider, or balanced without moving
          the eyes or nose. When not requested, judge preservation of source spacing.
        anchors:
          0: Spacing is opposite, absent, created by moving other features, or unusable.
          1: Only a negligible trace of correct spacing is visible.
          2: A small attempt exists, but the inner-brow gap is severely wrong.
          3: Spacing is weakly attempted and remains largely incorrect.
          4: The direction is recognizable, but a major gap or brow-head mismatch remains.
          5: Spacing is partially correct, with several visible placement problems.
          6: Spacing is mostly correct, but one clear inconsistency remains.
          7: Interbrow spacing is strong and natural, with only a minor mismatch.
          8: Spacing is highly accurate, with only a tiny discrepancy.
          9: The requested or preserved interbrow spacing is exact and face-appropriate.
        rubric: When requested, judge the gap between the inner brow heads as closer, wider, or balanced without moving the
          eyes or nose. When not requested, judge preservation of source spacing. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      requested_arch_slope_peak_match:
        title: Requested arch, slope, and peak match
        definition: Judge straightness, curvature, peak height and location, upward or downward slope, bend, and tail direction.
          When not requested, judge preservation of the source arch.
        anchors:
          0: Arch or slope is opposite, absent, unrelated, or unusable.
          1: Only a negligible trace of the correct curvature is visible.
          2: A small relevant feature exists, but arch, peak, or slope is severely wrong.
          3: The curve is weakly attempted and largely incorrect.
          4: The intended arch is recognizable, but a major peak, bend, or slope mismatch remains.
          5: Arch matching is partial, with several visible geometric conflicts.
          6: The arch is mostly correct, but one clear peak or slope issue remains.
          7: Arch, slope, and peak are strong, with only a minor mismatch.
          8: The geometry is highly accurate, with only a tiny local imperfection.
          9: The requested or preserved arch, peak, slope, and tail direction are exact.
        rubric: Judge straightness, curvature, peak height and location, upward or downward slope, bend, and tail direction.
          When not requested, judge preservation of the source arch. Apply this facet's 0-9 anchors directly. If a task-specific
          failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.
      requested_brow_thickness_width_match:
        title: Requested brow thickness and vertical-width match
