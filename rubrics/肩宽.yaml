    requested_shoulder_region_coverage_match: 0.11
    requested_shoulder_component_completeness: 0.09
    requested_shoulder_profile_topology_match: 0.11
    requested_shoulder_size_width_span_match: 0.1
    requested_shoulder_mass_thickness_match: 0.09
