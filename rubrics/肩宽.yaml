aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Operation and Spatial Design:
      requested_shoulder_operation_style_family_match:
        title: Requested shoulder-widening operation and style family match
        definition: 'Judge whether the result performs local male shoulder widening and realizes the exact requested shoulder
          family. Distinguish generic wide shoulders, flat or horizontal wide shoulders, sloped or descending wide shoulders,
          square or angular wide shoulders, rounded or full-cap wide shoulders, thin or lean wide shoulders, thick or massive
          wide shoulders, and high-set or elevated wide shoulders as different families. A photorealistic substitute family
          is still a failure on this facet. Before selecting the integer, silently inspect the bound state fields for requested_shoulder_operation_style_family_match,
          assign one severity label, and then use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4,
          SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: The requested shoulder-widening operation and style family are absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested widening and family is visible; the central shoulder operation is essentially
            unmet.
          2: A small relevant attempt exists, but the requested widening family is severely incorrect or incomplete.
          3: Widening is weakly attempted, but the primary shoulder family is wrong or one defining family property is missing.
          4: The result belongs to a related but clearly wrong family, such as flat becoming sloped, square becoming rounded,
            thin becoming thick, or high-set becoming ordinary-height.
          5: The requested family is partially recognizable, but the subtype is wrong or a defining profile, geometry, mass,
            or height property is visibly incorrect.
          6: The family is mostly correct, but one important subtype distinction remains wrong.
          7: The exact shoulder family is clearly successful, with only a minor visible subtype or local-contour mismatch.
          8: The requested family and widening operation are highly accurate, with only a tiny local imperfection.
          9: The exact requested shoulder-widening operation and shoulder family are fully realized with no substitute style
            or missing defining property.
      requested_shoulder_edit_strength_match:
        title: Requested shoulder-widening strength is matched
        definition: 'Judge whether wider, clearly wider, much wider, substantially wider, strongly wider, powerfully wider,
          or dramatically wider is visible at the requested magnitude without being too weak or excessive. Before selecting
          the integer, silently inspect the bound state fields for requested_shoulder_edit_strength_match, assign one severity
          label, and then use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1.
          A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: The requested shoulder-widening strength is absent, reversed, unrelated, or unusable.
          1: Only a negligible width change is visible, or the result is destructively excessive.
          2: A small relevant attempt exists, but the requested widening strength is severely incorrect.
          3: The strength is weakly attempted and remains clearly outside the requested range.
          4: The width change is recognizable, but a major under- or over-expansion remains.
          5: The requested strength is moderately achieved, with several substantial magnitude problems.
          6: The widening strength is mostly correct, but one clear and important magnitude issue remains.
          7: The requested widening strength is clearly successful, with only a minor visible mismatch.
          8: The widening amount is highly accurate, with only a tiny under- or over-extension.
          9: The final shoulder width has exactly the requested visible strength.
      requested_shoulder_region_coverage_match:
        title: Requested shoulder region and coverage match
        definition: 'Judge whether the intended edit covers the left and right shoulder girdles, outer shoulder contours,
          deltoid caps, shoulder seams, and sleeve-cap transition regions required by the prompt, without substituting torso,
          chest, broad upper-arm, or whole-body enlargement for shoulder widening. Before selecting the integer, silently
          inspect the bound state fields for requested_shoulder_region_coverage_match, assign one severity label, and then
          use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1.
          A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: The requested shoulder regions are not edited, are edited in the wrong place, or are unusable.
          1: Only a negligible portion of the required shoulder area is changed; unrelated regions dominate.
          2: A small relevant shoulder region is edited, but most required coverage is missing or misplaced.
          3: Coverage is weak and one shoulder or several defining shoulder regions remain unedited.
          4: The shoulder target is recognizable, but a major requested region is missing or a major non-target region substitutes
            for it.
          5: Coverage is moderately complete, with several visible omissions or excessive regional expansion.
          6: Most required shoulder regions are edited correctly, but one clear coverage problem remains.
          7: The requested shoulder coverage is clearly successful, with only a minor local omission or excess.
          8: Coverage is highly accurate and complete, with only a tiny local imperfection.
          9: Both shoulder regions and all necessary local transitions are fully covered, with no torso, chest, broad-arm,
            or global-scale substitution.
      requested_shoulder_component_completeness:
        title: All requested shoulder components are completed
        definition: 'Judge whether both shoulders and all explicitly requested components are present and complete: lateral
          extension, shoulder-line profile, outer corner or rounded cap, height placement, mass character, and local garment
          adaptation when required. Before selecting the integer, silently inspect the bound state fields for requested_shoulder_component_completeness,
          assign one severity label, and then use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4,
          SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: The requested shoulder components are absent, reversed, unrelated, or unusable.
          1: Only a negligible component is completed; most defining shoulder requirements are missing.
          2: A small relevant component is present, but the requested bilateral shoulder structure is severely incomplete.
          3: The edit is weakly completed; one side or multiple defining components are missing.
          4: The shoulder design is recognizable, but one major requested component or an entire side is incomplete.
          5: Several requested components are present, but substantial omissions remain.
          6: Most requested components are complete, but one clear and important component is missing or weak.
          7: All main shoulder components are completed, with only a minor local omission.
          8: The requested bilateral components are nearly complete, with only a tiny imperfection.
          9: Both shoulders and every explicitly requested profile, shape, height, mass, and local-transition component are
            fully completed.
      requested_shoulder_profile_topology_match:
        title: Requested shoulder-line profile and structural topology match
        definition: 'Judge the neck-to-shoulder-to-outer-end arrangement, including flat or horizontal lines, sloped or descending
          lines, high-set placement, shoulder endpoints, and the connection pattern between neck base, clavicles, trapezius,
          deltoids, sleeve caps, and upper arms. Before selecting the integer, silently inspect the bound state fields for
          requested_shoulder_profile_topology_match, assign one severity label, and then use the fixed mapping: EXACT=9, TINY=8,
          MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific
          minor visible mismatch exists.'
        anchors:
          0: The requested shoulder profile and structural topology are absent, opposite, or unusable.
          1: Only a negligible trace of the requested profile remains; the structural path is largely wrong.
          2: The result severely violates the requested flat, sloped, high-set, or preserved source topology.
          3: The profile is weakly recognizable, but a defining line or connection pattern is wrong.
          4: The result belongs to a related but clearly wrong topology, such as level becoming descending or high-set becoming
            a shrug.
          5: The intended topology is partially recognizable, but several defining line or connection errors remain.
          6: The profile and topology are mostly correct, but one important structural distinction remains wrong.
          7: The exact profile and connection structure are clearly successful, with only a minor local mismatch.
          8: The requested topology is highly accurate, with only a tiny local imperfection.
          9: The neck-to-shoulder structure exactly realizes the requested line profile, vertical placement, endpoints, and
            connection topology.
    Dimensions, Finish, and Color:
      requested_shoulder_size_width_span_match:
        title: Requested shoulder size and lateral span match
        definition: 'Judge total shoulder span, left and right endpoints, shoulder-to-head and shoulder-to-torso relationships,
          and pose-aware lateral extent. Do not reward whole-person scaling, changed crop, or torso widening. Before selecting
          the integer, silently inspect the bound state fields for requested_shoulder_size_width_span_match, assign one severity
          label, and then use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1.
          A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: The requested shoulder size and span are absent, reversed, unrelated, or unusable.
          1: Only a negligible relevant span change is visible; global scaling or torso change dominates.
          2: A small widening attempt exists, but the final shoulder span is severely incorrect.
          3: The intended span is weakly approached and remains clearly too narrow, too wide, or displaced.
          4: The target span is recognizable, but a major width, endpoint, or proportion mismatch remains.
          5: The size and span are moderately achieved, with several substantial visible problems.
          6: The shoulder span is mostly correct, but one clear width, endpoint, or proportion issue remains.
          7: The requested size and pose-aware span are clearly successful, with only a minor mismatch.
          8: The span is highly accurate, with only a tiny endpoint or proportion discrepancy.
          9: The total shoulder span, bilateral endpoints, and target shoulder-to-body relationship exactly match the request
            without global scaling.
      requested_shoulder_mass_thickness_match:
        title: Requested shoulder mass and thickness match
        definition: 'Judge thin, slim, lean, light, or non-bulky shoulders separately from thick, dense, heavy, muscular,
          full, or powerful shoulder mass. Width and thickness are independent properties. Before selecting the integer, silently
          inspect the bound state fields for requested_shoulder_mass_thickness_match, assign one severity label, and then
          use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1.
          A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: The requested shoulder mass and thickness are absent, opposite, unrelated, or unusable.
          1: Only a negligible trace of the requested thin or thick character is visible.
          2: The result is severely too thin, too bulky, or places mass mainly in the torso or upper arms.
          3: The intended mass character is weakly attempted and remains clearly wrong.
          4: The correct thin/thick tendency is recognizable, but a major mass or distribution mismatch remains.
          5: The shoulder mass is moderately achieved, with several substantial thickness problems.
          6: The requested mass is mostly correct, but one clear and important excess or deficiency remains.
          7: The requested thin or thick character is clearly successful, with only a minor local mismatch.
          8: Mass and thickness are highly accurate, with only a tiny local imperfection.
          9: The exact requested shoulder thickness and mass character are fully realized without torso or broad upper-arm
            substitution.
      requested_shoulder_shape_direction_match:
        title: Requested shoulder contour, geometry, and direction match
        definition: 'Judge square, angular, boxy, firm-cornered shoulders versus rounded, curved, full-cap shoulders, together
          with the requested outward extension direction and complete outer silhouette. Before selecting the integer, silently
          inspect the bound state fields for requested_shoulder_shape_direction_match, assign one severity label, and then
          use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1.
          A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: The requested shoulder shape and direction are absent, opposite, unrelated, or unusable.
          1: Only a negligible trace of the requested contour is visible; the outer shape is largely wrong.
          2: A small relevant attempt exists, but the requested geometry or widening direction is severely incorrect.
          3: The intended contour is weakly attempted, but a defining corner, cap, curve, or direction is wrong.
          4: The result belongs to a related but clearly wrong shape, such as rounded instead of square or angular instead
            of full-cap.
          5: The requested shape is partially recognizable, but several substantial contour or direction errors remain.
          6: The contour and direction are mostly correct, but one important geometry distinction remains wrong.
          7: The exact shape and direction are clearly successful, with only a minor local mismatch.
          8: The requested contour is highly accurate, with only a tiny local imperfection.
          9: The complete outer shoulder contour, corner or cap geometry, and lateral direction exactly match the requested
            design.
      requested_shoulder_edge_transition_tailoring_match:
        title: Requested shoulder edge, seam, and tailoring transitions match
        definition: 'Judge shoulder endpoints, neckline-to-shoulder transitions, shoulder seams, sleeve caps, fabric tension,
          and the cleanliness or structure implied by flat, square, rounded, thin, thick, or high shoulder requests. Before
          selecting the integer, silently inspect the bound state fields for requested_shoulder_edge_transition_tailoring_match,
          assign one severity label, and then use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4,
          SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: The requested shoulder edges and tailoring transitions are absent, broken, unrelated, or unusable.
          1: Only a negligible coherent transition remains; seams or sleeve caps are largely corrupted.
          2: A small relevant transition is present, but edges, seams, or sleeve caps are severely incorrect.
          3: The requested transition is weakly attempted and contains major abrupt, torn, or misplaced structures.
          4: The intended tailoring is recognizable, but one major edge, seam, sleeve-cap, or fabric-tension mismatch remains.
          5: Transitions are moderately achieved, with several substantial visible problems.
          6: Edges and tailoring are mostly correct, but one clear and important issue remains.
          7: The requested shoulder transitions are clearly successful, with only a minor local mismatch.
          8: Edges, seams, and sleeve caps are highly accurate, with only a tiny local imperfection.
          9: Shoulder endpoints, seams, sleeve caps, fabric tension, and all local transitions exactly support the requested
            shoulder design.
      requested_shoulder_surface_texture_finish_match:
        title: Requested shoulder surface texture and finish match
        definition: 'Judge whether skin, fabric weave, clothing pattern, folds, material finish, and local sharpness over
          the edited shoulders match the source and any explicit smooth, structured, athletic, tailored, or natural finish
          requested. Before selecting the integer, silently inspect the bound state fields for requested_shoulder_surface_texture_finish_match,
          assign one severity label, and then use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4,
          SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: The requested or source-consistent shoulder texture and finish are absent, unrelated, or unusable.
          1: Only a negligible amount of coherent skin or fabric texture remains.
          2: A small relevant texture attempt exists, but the shoulder surface is severely blurred, smeared, plastic, or inconsistent.
          3: The intended finish is weakly recognizable, but major texture or material errors remain.
          4: The target finish is recognizable, but one major texture, fold, pattern, or sharpness mismatch remains.
          5: The finish is moderately achieved, with several substantial visible texture problems.
          6: Surface texture is mostly correct, but one clear and important issue remains.
          7: The requested or source-preserved finish is clearly successful, with only a minor mismatch.
          8: Texture and finish are highly accurate, with only a tiny local imperfection.
          9: Skin or garment texture, weave, pattern, folds, material response, and sharpness exactly match the requested
            or source-preserved finish.
      requested_shoulder_color_lighting_pattern_match:
        title: Requested shoulder color, lighting, and garment pattern match
        definition: 'Follow any explicit color, brightness, shading, or pattern request in the shoulder region. When none
          is requested, preserve source garment color, skin tone, local illumination, contrast, and pattern continuity. Before
          selecting the integer, silently inspect the bound state fields for requested_shoulder_color_lighting_pattern_match,
          assign one severity label, and then use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4,
          SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: The requested or source-preserved shoulder color, lighting, and pattern are absent, opposite, or unusable.
          1: Only a negligible source-consistent color or pattern relationship remains.
          2: The shoulder region is severely recolored, relit, or patterned incorrectly.
          3: The intended or preserved color state is weakly maintained and contains major contradictions.
          4: The result is recognizable, but one major color, lighting, contrast, or pattern mismatch remains.
          5: Color and pattern are moderately preserved, with several substantial visible problems.
          6: Most shoulder color and lighting are correct, but one clear and important issue remains.
          7: The requested or source-preserved color state is clearly successful, with only a minor mismatch.
          8: Color, illumination, and pattern continuity are highly accurate, with only a tiny local imperfection.
          9: The shoulder region exactly follows any explicit color request or remains perfectly source-consistent in color,
            lighting, contrast, and garment pattern.
      unrequested_shoulder_properties_preserved:
        title: Unrequested shoulder properties are preserved
        definition: 'Preserve every shoulder property not explicitly requested: line slope, vertical position, corner or cap
          geometry, mass, thickness, posture, skin or garment color, fabric style, and source asymmetry. The intended widening
          and minimum necessary local transitions are the only allowed changes. Before selecting the integer, silently inspect
          the bound state fields for unrequested_shoulder_properties_preserved, assign one severity label, and then use the
          fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score
          of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: Unrequested shoulder properties are broadly replaced, reversed, unrelated, or unusable.
          1: Only a negligible amount of the original unrequested shoulder state remains.
          2: Several major unrequested shoulder properties are severely changed.
          3: One major or multiple obvious unrequested property changes remain.
          4: The source shoulder state is recognizable, but one important unrequested property is clearly altered.
          5: Unrequested-property preservation is moderate, with several visible differences.
          6: Most unrequested properties are preserved, but one clear difference remains.
          7: Unrequested shoulder properties are strongly preserved, with only a minor discrepancy.
          8: The source shoulder state is nearly identical outside the requested attributes, with only a tiny local discrepancy.
          9: Every unrequested shoulder property remains source-identical apart from unavoidable local transitions caused
            by the requested widening.
  Localization and Anatomical Integration:
    Shoulder Placement and Anatomy:
      shoulder_edit_localized_to_shoulder_regions:
        title: The shoulder edit is localized to shoulder regions
        definition: 'Keep changes within the shoulder girdles, outer shoulder contours, deltoid caps, upper trapezius, shoulder
          seams, sleeve caps, and minimum adjacent blending zones. Avoid broad changes to torso, chest, neck, upper arms,
          forearms, hands, face, lower body, background, framing, or global scale. Before selecting the integer, silently
          inspect the bound state fields for shoulder_edit_localized_to_shoulder_regions, assign one severity label, and then
          use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1.
          A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: Shoulder-edit localization is absent, reversed, unrelated, or unusable.
          1: Only a negligible localized edit is visible; large non-target body or scene regions are altered.
          2: A small relevant localized attempt exists, but spill into non-target regions is severe.
          3: Localization is weakly attempted; one or more major body, clothing, framing, or scene regions change.
          4: The edit is recognizably shoulder-focused, but a major localization or spill error remains.
          5: Localization is moderately achieved, with several substantial non-target changes.
          6: The edit is mostly localized, but one clear and important spill or overextended transition remains.
          7: Localization is clearly successful, with only a minor local mismatch.
          8: The edit is highly localized, with only a tiny transition excess.
          9: The edit is precisely confined to the requested shoulder regions and minimum anatomically necessary blending
            zones.
      shoulder_neck_clavicle_arm_attachment_natural:
        title: Shoulder attachment to neck, clavicles, torso, and arms is natural
        definition: 'Judge neck base, clavicles, trapezius, deltoid roots, armpits, upper-arm attachments, contact shadows,
          and continuous connection to the torso and garment. Before selecting the integer, silently inspect the bound state
          fields for shoulder_neck_clavicle_arm_attachment_natural, assign one severity label, and then use the fixed mapping:
          EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid
          unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: Shoulder attachment to the body is absent, detached, anatomically impossible, or unusable.
          1: Only a negligible natural attachment remains; shoulders appear pasted, floating, or disconnected.
          2: A small relevant attempt exists, but neck, clavicle, arm, or torso attachment is severely incorrect.
          3: Attachment is weakly attempted and contains major anatomical contradictions.
          4: The connection is recognizable, but one major neck, clavicle, armpit, arm, or torso mismatch remains.
          5: Attachment is moderately coherent, with several substantial visible problems.
          6: The shoulders are mostly attached naturally, but one clear and important issue remains.
          7: Anatomical attachment is clearly successful, with only a minor local mismatch.
          8: The attachment is highly natural, with only a tiny local imperfection.
          9: Neck, clavicles, trapezius, deltoids, armpits, torso, arms, and garment connect fully naturally across both shoulders.
      shoulder_anatomical_flow_continuity:
        title: Shoulder anatomical flow and structural continuity are coherent
        definition: 'Judge the flow of neck-to-trapezius-to-deltoid contours, clavicle direction, shoulder-line continuity,
          muscle and garment volume distribution, and transitions into the upper arms. Before selecting the integer, silently
          inspect the bound state fields for shoulder_anatomical_flow_continuity, assign one severity label, and then use
          the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A
          score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: Shoulder anatomical flow and continuity are absent, contradictory, or unusable.
          1: Only a negligible coherent flow remains; contours and volumes are largely broken.
          2: A small relevant attempt exists, but anatomical flow is severely incorrect.
          3: Flow is weakly attempted and contains major discontinuities, duplicated forms, or impossible directions.
          4: The structure is recognizable, but one major flow or continuity mismatch remains.
          5: Anatomical flow is moderately coherent, with several substantial visible problems.
          6: The flow is mostly correct, but one clear and important issue remains.
          7: The anatomical flow is clearly successful, with only a minor local mismatch.
          8: Structural continuity is highly accurate, with only a tiny local imperfection.
          9: Both shoulders exhibit fully coherent neck, clavicle, trapezius, deltoid, garment, and upper-arm flow.
      shoulder_pose_aware_bilateral_balance:
        title: Shoulder balance is correct for the body pose
        definition: 'Judge left-right height, span, mass, line angle, endpoints, arm relationship, occlusion, and perspective
          relative to the source pose rather than raw mirror symmetry. Before selecting the integer, silently inspect the
          bound state fields for shoulder_pose_aware_bilateral_balance, assign one severity label, and then use the fixed
          mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7
          is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: Pose-aware bilateral shoulder balance is absent, reversed, contradictory, or unusable.
          1: Only a negligible balanced structure remains; one side is severely displaced or distorted.
          2: A small relevant attempt exists, but left-right balance or perspective is severely incorrect.
          3: Balance is weakly attempted and contains major one-sided or pose-inconsistent errors.
          4: Both shoulders are recognizable, but one major balance, angle, mass, or perspective mismatch remains.
          5: Pose-aware balance is moderately achieved, with several substantial visible problems.
          6: The shoulders are mostly balanced for the pose, but one clear and important issue remains.
          7: Pose-aware bilateral balance is clearly successful, with only a minor mismatch.
          8: Balance is highly accurate, with only a tiny local discrepancy.
          9: Both shoulders have exactly the correct pose-aware height, span, mass, angle, endpoints, occlusion, and perspective.
  Subject Preservation:
    Identity and Non-target Preservation:
      shoulder_facial_identity_landmark_consistency:
        title: Facial identity and defining landmark geometry are preserved
        definition: 'Compare the source and edited person as the same individual, not merely a plausible similar person. Judge
          face outline, forehead, eyebrows, eyes, nose, mouth, jaw, chin, feature spacing, age impression, gender presentation,
          characteristic asymmetries, skin tone, facial texture, gaze, and expression. The shoulder edit must not reshape,
          beautify, age-shift, or replace the person. Before selecting the integer, silently inspect the bound state fields
          for shoulder_facial_identity_landmark_consistency, assign one severity label, and then use the fixed mapping: EXACT=9,
          TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless
          a facet-specific minor visible mismatch exists.'
        anchors:
          0: The edited face is effectively a different person, severely distorted, or no longer identity-consistent with
            the source.
          1: Identity correspondence is extremely weak; multiple defining facial landmarks and the overall person impression
            are replaced.
          2: Major identity drift affects several defining facial regions or the overall same-person impression.
          3: Substantial facial-identity drift is visible; the person remains only loosely related to the source.
          4: The same general subject is suggested, but the face gives a clear changed-person impression at normal viewing
            size.
          5: The person remains recognizable, but multiple landmarks, proportions, age cues, expression details, or characteristic
            features visibly drift.
          6: The same person is mostly preserved, but one clear identity-affecting change remains.
          7: Identity preservation is strong, with only a minor visible drift in one landmark, facial proportion, skin tone,
            or expression detail.
          8: The face is nearly source-identical, with only a tiny local discrepancy and no changed-person impression.
          9: The same person's facial identity, landmarks, feature spacing, age impression, skin tone, facial texture, gaze,
            and expression remain source-identical.
      shoulder_pose_body_scene_non_target_preserved:
        title: Pose, body geometry, cuffs, framing, background, color, and non-target details are preserved
        definition: 'Preserve neck orientation, torso width and length, chest, waist, arm length and volume outside minimum
          shoulder transitions, hands, stance, legs, shoes, cuffs, distal sleeves, clothing details, accessories, subject
          scale and placement, crop, shoes-to-bottom-edge distance, background geometry and color, global white balance, brightness,
          contrast, saturation, and lighting mood. Judge these together as non-target preservation. Before selecting the integer,
          silently inspect the bound state fields for shoulder_pose_body_scene_non_target_preserved, assign one severity label,
          and then use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1.
          A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: Pose, non-target body geometry, cuffs, framing, background, color state, or non-target details are severely changed,
            replaced, or unusable.
          1: Most pose, body, clothing, framing, background, or global-color content is clearly inconsistent with the source.
          2: Several major changes substantially alter torso or limb geometry, cuffs, stance, subject scale, crop, shoes-to-bottom
            distance, background, exposure, or color.
          3: One major or multiple obvious changes affect pose, body geometry, protected clothing, framing, spatial distances,
            background, or global image tone.
          4: The non-target image remains recognizable but contains one clear important mismatch in pose, body, cuffs, scale,
            framing, distance, background, color, or lighting.
          5: Non-target preservation is moderate, with several visible differences in body geometry, clothing, spatial layout,
            background, or global tone.
          6: Most non-target details are preserved, but one clear difference remains in pose, torso/limbs, cuffs, framing,
            distance, background, color, or lighting.
          7: Non-target preservation is strong, with only a minor discrepancy in body, clothing, framing, spatial distance,
            background, or global color.
          8: Pose, body geometry, cuffs, scale, framing, background, color, and non-target regions are nearly source-identical,
            with only a tiny discrepancy.
          9: Pose, all non-target body geometry, cuffs, clothing, subject scale, framing, shoes-to-bottom distance, background,
            global color, lighting, and all non-target details remain source-consistent.
  Task Realism and Image Quality:
    Shoulder Rendering:
      shoulder_anatomy_mass_distribution_realistic:
        title: Shoulder anatomy and mass distribution are realistic
        definition: 'Judge deltoid and trapezius form, clavicle relation, depth, gravity, anatomical asymmetry, muscle or
          garment volume, and natural mass distribution appropriate to the requested flat, sloped, square, rounded, thin,
          thick, high-set, or generic wide-shoulder family. Before selecting the integer, silently inspect the bound state
          fields for shoulder_anatomy_mass_distribution_realistic, assign one severity label, and then use the fixed mapping:
          EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid
          unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: Shoulder anatomy and mass realism are absent, unrelated, severely impossible, or unusable.
          1: Only a negligible plausible shoulder structure remains; the result looks inflated, cut out, hollow, or synthetic.
          2: A small relevant attempt exists, but shoulder anatomy and mass distribution are severely incorrect.
          3: Anatomical realism is weakly attempted and contains major contradictory forms.
          4: The shoulders are recognizable, but one major anatomy, mass, depth, gravity, or distribution mismatch remains.
          5: Shoulder realism is moderately achieved, with several substantial visible problems.
          6: The anatomy and mass distribution are mostly correct, but one clear and important issue remains.
          7: Shoulder anatomy is clearly realistic, with only a minor local mismatch.
          8: The anatomy and mass distribution are highly realistic, with only a tiny local imperfection.
          9: Deltoids, trapezius, clavicles, depth, gravity, asymmetry, and shoulder mass are fully photorealistic and naturally
            distributed.
      shoulder_shadow_lighting_color_integration:
        title: Shoulder color, shadows, and lighting integrate with the person and scene
        definition: 'Judge local highlights, occlusion shadows, contact shadows, garment or skin color response, source-consistent
          illumination, and continuity with the neck, torso, arms, and scene. Before selecting the integer, silently inspect
          the bound state fields for shoulder_shadow_lighting_color_integration, assign one severity label, and then use the
          fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score
          of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: Shoulder lighting and color integration are absent, reversed, unrelated, or unusable.
          1: Only a negligible source-consistent lighting relationship remains; edited shoulders look pasted or separately
            lit.
          2: A small relevant attempt exists, but lighting, color, or shadow integration is severely incorrect.
          3: Integration is weakly attempted and contains major illumination or color contradictions.
          4: The result is recognizable, but one major highlight, contact-shadow, color, or lighting mismatch remains.
          5: Lighting and color integration are moderately achieved, with several substantial visible problems.
          6: Integration is mostly correct, but one clear and important issue remains.
          7: Color, shadows, and lighting are clearly integrated, with only a minor local mismatch.
          8: Integration is highly accurate, with only a tiny local imperfection.
          9: Shoulder color, material response, highlights, occlusion shadows, contact shadows, and illumination perfectly
            match the source person and scene.
      shoulder_boundary_occlusion_garment_contact_consistent:
        title: Shoulder boundaries, occlusions, and garment contact are physically consistent
        definition: 'Judge outer silhouette boundaries, neck and arm overlaps, armpit placement, sleeve-cap occlusion, shoulder
          seams, fabric contact, nearby background edges, and foreground or object interactions. Before selecting the integer,
          silently inspect the bound state fields for shoulder_boundary_occlusion_garment_contact_consistent, assign one severity
          label, and then use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1.
          A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: Shoulder boundaries, occlusions, and garment contact are absent, contradictory, or unusable.
          1: Only a negligible physically coherent boundary remains; the shoulders appear cut out, floating, or badly pasted.
          2: A small relevant attempt exists, but boundaries, occlusions, or garment contact are severely incorrect.
          3: Physical contact is weakly attempted and contains major halos, overlaps, tears, or background warps.
          4: The result is recognizable, but one major boundary, sleeve, armpit, occlusion, or nearby-background mismatch
            remains.
          5: Boundary and contact consistency are moderately achieved, with several substantial visible problems.
          6: Most boundaries and contacts are correct, but one clear and important issue remains.
          7: Physical integration is clearly successful, with only a minor local mismatch.
          8: Boundaries and occlusions are highly accurate, with only a tiny local imperfection.
          9: Outer contours, neck/arm/armpit overlaps, sleeve caps, seams, fabric contact, and nearby background boundaries
            are fully physically consistent.
      shoulder_artifact_sharpness_no_warped_mask:
        title: Artifacts, blur, warping, and mask-like appearance are controlled
        definition: 'Judge blur, over-smoothing, duplicated shoulders, broken arms, malformed sleeves, jagged masks, halos,
          melted details, repeated folds, local resolution loss, background warping, and global overprocessing. Before selecting
          the integer, silently inspect the bound state fields for shoulder_artifact_sharpness_no_warped_mask, assign one
          severity label, and then use the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3,
          ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible mismatch exists.'
        anchors:
          0: Artifact control is absent; severe corruption, blur, warping, or mask-like editing makes the result unusable.
          1: Only a negligible clean region remains; artifacts dominate the edited or important non-target areas.
          2: A small relevant clean attempt exists, but multiple major broken, melted, duplicated, blurred, or warped structures
            remain.
          3: Artifact control is weak; one major or several obvious defects substantially reduce usability.
          4: The result remains recognizable, but one major artifact, sharpness, warping, or mask-like failure is present.
          5: Artifact control is moderate, with several visible defects or one substantial local deformation.
          6: The image is mostly clean, but one clear and important artifact or sharpness issue remains.
          7: The result is clean and natural, with only a minor local artifact.
          8: The image is nearly artifact-free, with only a tiny local imperfection.
          9: No meaningful blur, smoothing, duplication, deformation, halo, mask edge, garment artifact, background warp,
            or sharpness loss is visible.
identity_preservation_protocol:
  purpose: Prevent successful shoulder widening from hiding facial-identity, body-pose, or non-target scene drift. Identity
    is judged by source-to-result correspondence, not by whether the edited person is attractive or realistic.
  comparison_checklist:
  - overall face outline and width/length relationship
  - eyebrow position and shape
  - eye shape, spacing, aperture, gaze, and characteristic asymmetry
  - nose geometry and placement
  - mouth position, lip geometry, and expression
  - jaw, chin, cheek structure, age impression, and gender presentation
  - skin tone, stable characteristic marks, and facial texture
  - neck orientation, torso width and length, arm and hand geometry, stance, legs, and shoes
  - cuff shape, distal sleeves, clothing details, and accessories
  - subject scale, framing, crop, body placement, and shoes-to-bottom-edge distance
  - background geometry, hue, saturation, brightness, contrast, global white balance, and lighting mood
  - overall same-person and same-scene impression at normal viewing size
  strict_rules:
  - Do not increase an identity score because the target shoulder edit is attractive or instruction-compliant.
  - Do not treat a photorealistic but different-looking person as identity-preserved.
  - A score of 7 still requires a strong same-person match with only minor drift.
  - A changed-person impression must score 4 or below on the dedicated identity facet.
  - The shoulder target region may be excluded only where explicitly necessary; unrelated facial, body, clothing, framing,
    and scene details remain fully constrained.
  - Identity, pose, cuffs, body geometry, framing, background color, and non-target scores are independent of shoulder correctness
    and realism.
  task_specific_exception: requested bilateral shoulder widening and only the minimum anatomically necessary local shoulder,
    sleeve-cap, and adjacent upper-arm transition