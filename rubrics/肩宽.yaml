task_key: male_shoulder_width_edit
task_title: Male Shoulder Width Editing
task_title_zh: 男性肩宽编辑
version: v38_fixed_22_l3_shoulder_state_first_flash_antiflat_integer_0to9
target_region: left and right shoulder girdles, outer shoulder contours, deltoid caps, upper trapezius, clavicular shoulder
  transitions, shoulder seams, sleeve caps, and minimum adjacent blending zones
target_action_summary: Widen both male shoulders into the exact requested flat, sloped, square, rounded, thin, thick, high-set,
  or generic wide-shoulder family while preserving identity, pose, cuffs, body geometry, framing, spatial distances, background,
  color, lighting, and all non-target regions.
judge_role: You are a strict state-first comparative evaluator specializing in local male shoulder-width editing. Before assigning
  any integer score, you must silently classify the requested shoulder state, the observed shoulder state, all relevant preservation
  states, and the severity state for every L3 facet. Judge exact prompt compliance and source preservation rather than generic
  attractiveness, masculinity, muscularity, or photorealism.
judge_instructions: "MANDATORY EXECUTION ORDER\n\nA. Parse the prompt into the REQUESTED STATE.\nB. Compare source and edited\
  \ image and fill the OBSERVED STATE.\nC. For every active L3, read only its bound state fields from facet_state_bindings.\n\
  D. Assign one internal severity label:\n   EXACT, TINY_LOCAL_IMPERFECTION, MINOR_VISIBLE_MISMATCH, CLEAR_IMPORTANT_ISSUE,\n\
  \   PARTIAL_SUCCESS, MAJOR_MISMATCH, SEVERE_FAILURE, or ABSENT_OR_REVERSED.\nE. Convert the severity label to an integer\
  \ using state_to_score_consistency_table.\nF. Apply every applicable facet_consistency_rule.\nG. Run flat_vector_recheck_protocol.\n\
  H. Return only the 22 integers in active_l3 order.\n\nYou must complete the mandatory internal state card before assigning\
  \ scores. Do not output the card.\n\nREQUESTED SHOULDER FAMILY\n\nFirst distinguish:\n- generic wide shoulders;\n- flat\
  \ or horizontal wide shoulders;\n- sloped or descending wide shoulders;\n- square or angular wide shoulders;\n- rounded\
  \ or full-cap wide shoulders;\n- thin or lean wide shoulders;\n- thick or massive wide shoulders;\n- high-set or elevated\
  \ wide shoulders;\n- explicitly combined properties.\n\nThese are distinct target families. A photorealistic substitute\
  \ family is still wrong.\n\nSOURCE-PRESERVATION RULE\n\nIf the prompt does not explicitly request shoulder-line slope, shoulder\
  \ height, outer geometry,\nmass/thickness, color, or material finish, the requested state for that property is preserve_source.\n\
  Do not judge an unspecified property by attractiveness or a generic masculine ideal.\n\nSHOULDER-WIDENING RULE\n\nOnly local\
  \ bilateral shoulder widening and the minimum necessary shoulder, sleeve-cap, and adjacent\nupper-arm transition are intended\
  \ changes. Torso widening, chest inflation, broad upper-arm enlargement,\nwhole-person scaling, changed crop, or reframing\
  \ are not valid shoulder widening.\n\nSCORE-SELECTION RULE\n\nDo not choose an integer first. Choose the facet severity\
  \ label first, then convert it:\n\n9 = EXACT.\n8 = TINY_LOCAL_IMPERFECTION.\n7 = MINOR_VISIBLE_MISMATCH.\n6 = CLEAR_IMPORTANT_ISSUE.\n\
  5 = PARTIAL_SUCCESS.\n4 = MAJOR_MISMATCH with a recognizable target.\n2-3 = SEVERE_FAILURE or a weak relevant trace.\n0-1\
  \ = ABSENT_OR_REVERSED, unrelated, or unusable.\n\nA score of 7 is not a neutral or safe score.\nA 7 is allowed only when\
  \ one specific minor visible mismatch exists for that exact L3.\nIf the facet is exact, use 9.\nIf only a tiny imperfection\
  \ exists, use 8.\nIf a clear important issue exists, use 6 or below.\nIf the result is partial or the defining family/property\
  \ is wrong, use 5 or below.\nIf uncertain between two severity labels, choose the worse label and lower score.\n\nNO CROSS-COMPENSATION\n\
  \nDo not raise Prompt Compliance because anatomy is realistic.\nDo not raise identity, pose, cuffs, framing, background,\
  \ color, or artifact scores because shoulders look good.\nDo not raise shoulder-family scores because the result is attractive,\
  \ masculine, muscular, or photorealistic.\n\nMANDATORY CONTRADICTION CHECKS\n\n- Flat and sloped shoulder families cannot\
  \ substitute for each other.\n- Square/angular and rounded/full-cap shoulders cannot substitute for each other.\n- Thin/lean\
  \ and thick/massive shoulders cannot substitute for each other.\n- High-set shoulders cannot be produced by an unintended\
  \ shrug, shortened neck, lifted arms, or global pose change.\n- Generic widening must preserve all unspecified source shoulder\
  \ properties.\n- Whole-person scale, torso width, broad upper-arm volume, pose, cuffs, framing, shoes-to-bottom distance,\n\
  \  background, global color, and facial identity must be checked independently.\n\nMANDATORY ANTI-FLAT-VECTOR REVIEW\n\n\
  Before returning, check whether:\n- all scores are 7;\n- all scores are identical;\n- 18 or more scores use the same integer;\n\
  - many scores of 7 lack a specific facet-level minor mismatch;\n- many scores are 8 or 9 despite visible contradictions.\n\
  \nWhen triggered, re-open the state card and reassign every affected score from its actual severity label.\nDo not invent\
  \ artificial differences, but do not preserve a template tie when the bound visual states differ.\n\nReturn only:\n{\"scores\"\
  :[22 integers in exact active_l3 order]}"
mandatory_internal_state_card:
  required: true
  output: internal_only
  instruction: Silently complete every applicable field before assigning any of the 22 scores. Do not output this card; the
    external response remains exactly 22 integers.
  requested_state:
    shoulder_family:
    - generic_wide
    - flat_horizontal_wide
    - sloped_descending_wide
    - square_angular_wide
    - rounded_full_cap_wide
    - thin_lean_wide
    - thick_massive_wide
    - high_set_elevated_wide
    - combined_explicit_properties
    widening_strength_level:
      0: no widening
      1: small
      2: clear
      3: strong or substantial
      4: dramatic or very strong
    line_profile:
    - preserve_source
    - flat_horizontal
    - sloped_descending
    - other_explicit
    vertical_position:
    - preserve_source
    - high_elevated
    - low_relaxed
    - other_explicit
    outer_geometry:
    - preserve_source
    - square_angular
    - rounded_full_cap
    - other_explicit
    mass_thickness:
    - preserve_source
    - thin_lean
    - ordinary_source_mass
    - thick_massive
    local_only_required: true
    protected_constraints:
    - facial identity and expression
    - torso width and body proportions outside shoulders
    - arm length, hands, stance, legs, and shoes
    - cuffs and distal sleeves
    - subject scale, placement, crop, and framing
    - shoes-to-bottom-edge distance when visible
    - background geometry and color
    - global white balance, exposure, contrast, saturation, and lighting
  observed_state:
    observed_shoulder_family:
    - generic_wide
    - flat_horizontal_wide
    - sloped_descending_wide
    - square_angular_wide
    - rounded_full_cap_wide
    - thin_lean_wide
    - thick_massive_wide
    - high_set_elevated_wide
    - mixed_or_unclear
    - not_widened
    observed_widening_strength_level: integer 0-4
    bilateral_completion:
    - none
    - weak
    - partial
    - mostly_complete
    - complete
    observed_line_profile:
    - source_consistent
    - flat_horizontal
    - sloped_descending
    - mixed_or_wrong
    observed_vertical_position:
    - source_consistent
    - high_elevated
    - low_relaxed
    - shrug_or_wrong
    observed_outer_geometry:
    - source_consistent
    - square_angular
    - rounded_full_cap
    - mixed_or_wrong
    observed_mass_thickness:
    - source_consistent
    - thin_lean
    - ordinary
    - thick_massive
    - torso_or_arm_substitution
    torso_width_change:
