aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Requested Head-Scale Operation:
      requested_head_size_adjustment_operation_match:
        title: Requested complete-head size-adjustment operation match
        definition: Judge whether the complete visible head unit is genuinely scaled relative to the unchanged body and frame.
          Do not credit face slimming, feature resizing, hair-only scaling, body enlargement, camera zoom, crop change, or
          subject-distance change as the requested operation.
        anchors:
          0: The requested head-size operation is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of complete-head scaling is visible.
          2: A small relevant attempt exists, but the result is dominated by a substitute operation.
          3: The head is weakly edited, but complete-head scaling is mostly wrong.
          4: A recognizable size edit exists, yet a major part of the operation is replaced by face, body, crop, or camera
            change.
          5: The operation is partially correct, with several substantial substitution or completeness errors.
          6: Complete-head scaling is mostly correct, but one clear operation error remains.
          7: The requested operation is clearly achieved, with only a minor visible mismatch.
          8: The operation is highly accurate, with only a tiny local imperfection.
          9: The complete head unit is precisely scaled relative to an unchanged body, camera, and frame.
        rubric: Judge whether the complete visible head unit is genuinely scaled relative to the unchanged body and frame.
          Do not credit face slimming, feature resizing, hair-only scaling, body enlargement, camera zoom, crop change, or
          subject-distance change as the requested operation. Apply this facet's 0-9 anchors directly. If a task-specific
          failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.
      requested_head_scale_direction_match:
        title: Requested head-scale direction match
        definition: Judge whether the complete head becomes smaller for reduction prompts and larger for enlargement prompts.
          The direction must be determined from the current prompt.
        anchors:
          0: The head changes clearly in the opposite direction, is unrelated, or unusable.
          1: Only a negligible trace of the correct direction is visible.
          2: A small relevant change exists, but the net direction is severely wrong or ambiguous.
          3: The direction is weakly attempted and remains largely incorrect.
          4: The correct direction is recognizable, but a major contradictory or inconsistent change remains.
          5: The direction is partially correct, with several visible inconsistencies.
          6: The net direction is mostly correct, but one clear regional or proportional contradiction remains.
          7: The complete head changes clearly in the correct direction, with only a minor inconsistency.
          8: The direction is highly accurate and uniform, with only a tiny local issue.
          9: The complete head changes unmistakably and coherently in the exact prompt-specified direction.
        rubric: Judge whether the complete head becomes smaller for reduction prompts and larger for enlargement prompts.
          The direction must be determined from the current prompt. Apply this facet's 0-9 anchors directly. If a task-specific
          failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.
      requested_head_scale_magnitude_match:
        title: Requested head-scale magnitude match
        definition: Judge whether the size change is clearly visible but remains believable and proportionate. Penalize negligible
          change, excessive shrinkage or enlargement, and cartoon-like proportions.
        anchors:
          0: The requested magnitude is absent, destructive, reversed, or unusable.
          1: Only a negligible size change is visible.
          2: The amount is severely too weak, too strong, or inconsistent.
          3: The magnitude is weakly attempted but clearly mismatched.
          4: The effect is recognizable, but the amount has a major mismatch.
          5: The magnitude is partially appropriate, with several visible intensity problems.
          6: The amount is mostly correct, but one clear under- or over-scaling issue remains.
          7: The requested magnitude is clearly achieved, with only a minor mismatch.
          8: The magnitude is highly accurate, with only a tiny excess or residual.
          9: The head-size change is exactly visible enough, believable, and source-appropriate.
        rubric: Judge whether the size change is clearly visible but remains believable and proportionate. Penalize negligible
          change, excessive shrinkage or enlargement, and cartoon-like proportions. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      requested_complete_head_unit_coverage_match:
        title: Requested complete-head unit coverage match
        definition: Judge whether face, skull contour, ears, hair, and hairstyle silhouette participate in one coherent scale
          change. Missed or independently scaled head components reduce this score.
        anchors:
          0: Complete-head coverage is absent, reversed, unrelated, or unusable.
