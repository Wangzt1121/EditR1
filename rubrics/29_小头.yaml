identity_preservation_protocol:
  purpose: Prevent successful head-size adjustment from hiding identity, internal landmark, body, camera, or background drift.
    Identity is judged after normalizing for the intended global head scale.
  comparison_checklist:
  - complete source head silhouette after scale normalization
  - forehead, hairline, and cranial shape
  - eyebrow position and shape
  - eye shape, spacing, aperture, gaze, and characteristic asymmetry
  - nose geometry and placement
  - mouth position, lip geometry, teeth visibility, and expression
  - cheek structure, chin, jaw, ears, and normalized face outline
  - hairstyle design, hair volume distribution, and hair-to-head attachment
  - head pose, rotation, tilt, and relation to the neck
  - age impression, gender presentation, skin tone, stable marks, and facial texture
  - neck width, shoulder width, body proportions, pose, and clothing
  - background hue, texture, brightness, contrast, white balance, and composition
  - overall same-person impression at normal viewing size
  strict_rules:
  - Do not increase identity because the result is attractive, proportionate, or instruction-compliant.
  - Do not treat a photorealistic but different-looking person as identity-preserved.
  - A score of 7 still requires a strong same-person match with only minor drift.
  - A changed-person impression must score 4 or below on the dedicated identity facet.
  - Absolute landmark pixel distances may change with global head scale; normalized landmark ratios must remain stable.
  - Head-size correctness, identity, expression, body, background, camera state, and boundary quality are independent.
  task_specific_exception: only global scaling of the complete visible head unit and the minimum head-neck and hair-background
    reconstruction zones
