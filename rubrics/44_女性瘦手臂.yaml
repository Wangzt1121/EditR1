aggregation:
  prompt_compliance: 'Masked weighted arithmetic mean over the 8 Prompt Compliance facets. Only facets with applicability
    mask=1 enter the numerator and denominator.

    '
  other_l1_blocks: 'Use the listed within-L1 weights for the remaining three blocks.

    '
  base_formula: base_reward = 0.58 * P_masked + 0.20 * L + 0.15 * S + 0.07 * Q
  anatomy_score: A = score(arm_anatomy_axis_joint_consistency) / 9.0
  hand_score: H = score(arm_hands_fingers_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.25) * (H ** 0.15)
taxonomy:
  Prompt Compliance:
    Requested Arm Slimming:
      arm_primary_slimming_outcome_match:
        title: Primary slimming outcome
        definition: 'Judge whether both upper arms specifically become visibly slimmer and cleaner without using global body
          scaling, pose change, shoulder movement, forearm/hand changes, or arm stretching.

          '
        anchors:
          0: No visible upper-arm slimming, opposite change, wrong segment, or a different task.
          3: Very weak, one-sided, or doubtful upper-arm slimming; source contour largely remains.
          5: Visible partial upper-arm slimming with major incompleteness, wrong-segment leakage, or asymmetry.
          7: Clear controlled upper-arm slimming with one visible issue.
          9: Both upper arms are cleanly, naturally, and visibly slimmed while all non-target regions remain source-like.
        rubric: Judge whether both upper arms specifically become visibly slimmer and cleaner without using global body scaling,
          pose change, shoulder movement, forearm/hand changes, or arm stretching. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      arm_requested_segment_scope_match:
        title: Requested arm-segment scope
        definition: 'Judge whether the edit affects exactly both upper arms between shoulder and elbow. Forearms, elbows,
          wrists, hands, fingers, shoulders, torso, legs, outfit, pose, and background should not be altered.

          '
        anchors:
          0: Wrong segment edited, forearms/hands/shoulders/body changed, or one requested upper arm missed.
          3: Upper-arm scope is weak, partial, one-sided, or heavily leaks into non-target regions.
          5: Main upper-arm scope is recognizable but includes a clear missed or extra region.
          7: Correct upper-arm scope with one minor boundary issue.
          9: Exact bilateral upper-arm coverage with no unnecessary extension.
        rubric: Judge whether the edit affects exactly both upper arms between shoulder and elbow. Forearms, elbows, wrists,
          hands, fingers, shoulders, torso, legs, outfit, pose, and background should not be altered. Apply this facet's 0-9
          anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated
          preservation, realism, or attractiveness compensate for this facet.
      arm_width_circumference_reduction_match:
        title: Width and circumference reduction
        definition: 'Judge whether visible upper-arm width or girth reduction is clear, controlled, and appropriate to the
          prompt, without creating stick-like, pinched, stretched, or anatomically broken arms.

          '
        anchors:
          0: No reduction, increased width, wrong segment reduction, or destructive thinning.
          3: Barely visible, uneven, one-sided, or severely excessive upper-arm reduction.
          5: Noticeable but clearly inaccurate magnitude or partially non-local reduction.
          7: Appropriate upper-arm reduction with one minor issue.
          9: Upper-arm width and circumference reduction are exact, balanced, and natural.
        rubric: Judge whether visible upper-arm width or girth reduction is clear, controlled, and appropriate to the prompt,
          without creating stick-like, pinched, stretched, or anatomically broken arms. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      arm_upper_forearm_distribution_match:
        title: Upper-arm and forearm distribution
        definition: 'Judge whether slimming is distributed across upper arms, elbows, and forearms as requested, without narrowing
          preserved segments.

          '
