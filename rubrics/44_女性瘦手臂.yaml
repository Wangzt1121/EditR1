prompt_applicability:
  purpose: 'Keep the fixed 22-score output while preventing unrequested arm properties from contributing easy high scores.

    '
  always_applicable:
  - arm_primary_slimming_outcome_match
  - arm_requested_segment_scope_match
  - arm_width_circumference_reduction_match
  - arm_bilateral_completeness_balance_match
  activation_rules:
    arm_upper_forearm_distribution_match:
    - activate for full-arm, shoulder-to-wrist, upper-arm-plus-forearm, or even whole-arm slimming
    - activate for upper-arm-only prompts to verify that forearms remain unchanged
    arm_requested_contour_style_match:
    - activate for straight, linear, clean, elegant, graceful, model-like, refined, compact, athletic, or slender contour
      requests
    arm_firmness_fullness_tone_match:
    - activate for firm, tight, toned, athletic, compact, triceps, underside, bulky, heavy, or fullness-reduction requests
    arm_visual_elongation_without_stretch_match:
    - activate only for long-looking, elongated, graceful-line, or visually longer requests
  mask_values:
    applicable: 1
    not_applicable: 0
  aggregation_rule: "P = sum_i(weight_i * mask_i * normalized_score_i) /\n    sum_i(weight_i * mask_i)\n"
