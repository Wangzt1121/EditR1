      clothing_occlusion_shadow_or_background_artifact:
        detect_when: Clothing hems, fabric patterns, occlusions, shoes, skin/fabric surface, shadows, ground contact, contour
          edges, background, or scene layout becomes warped, repeated, cut, haloed, smeared, or inconsistent.
        severity_guidance: Tiny local clothing/edge artifact may be severity 1. Clear fabric stretch, hem mismatch, shadow/ground
