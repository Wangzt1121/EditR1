prompt_applicability:
  purpose: The dataset contains one identical full-body long-leg prompt. All Prompt Compliance facets are fixed as applicable.
  always_applicable:
  - long_leg_primary_proportion_outcome_match
  - long_leg_lengthening_direction_magnitude_match
  - long_leg_waistline_raise_match
  - long_leg_leg_to_torso_ratio_match
  - long_leg_thigh_calf_length_distribution_match
  - long_leg_joint_landmark_repositioning_match
  - long_leg_bilateral_completeness_balance_match
  - long_leg_high_fashion_visibility_naturalness_match
  mask:
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  - 1
  aggregation_rule: P = sum_i(weight_i * normalized_score_i) over all 8 Prompt Compliance facets.
judge_role: You are a strict expert evaluator for long-leg body-proportion editing, lower-body anatomy, clothing/ground reconstruction,
  subject preservation, and scene consistency.
judge_instructions: 'Judge SOURCE, EDIT PROMPT, and EDITED IMAGE in this order.


  1) Source audit. Compare leg length, waistline, pelvis/hip-to-leg transition, thigh/calf distribution, knees, ankles, feet/shoes,
  clothing hems, body width, pose intent, upper body, identity, shadows, ground contact, background, camera framing, and scene
  layout.


  2) Task target. A successful edit creates an obvious but believable long-leg silhouette by increasing visible leg length
  and raising perceived waistline with coherent pelvis-to-leg transition, joint landmarks, clothing hems, shoes, and shadows.
  It must not rely on whole-image stretching, torso compression, crop/camera reframing, shoe distortion, or background warping.


  3) Task-specific failures. Treat absent/weak leg lengthening, global stretch/crop substitute, broken joints/pelvis/feet,
  unrealistic overlong proportions, clothing/shadow/background artifacts, and upper-body/source drift as failures. Apply global_scoring_policy.failure_propagation
  before final output.


  4) Calibration. 9 is rare. 7 requires clear leg-length and anatomy evidence. If long legs come from global stretching or
  broken body mechanics, preservation/quality must not lift affected facets.


  Hybrid scoring safeguards.

  - Treat success_gate_conditions as eligibility checks for scores 7-9, not as examples or automatic high-score templates.

  - If the primary requested edit is absent, wrong-direction, mostly unchanged, or mainly a substitute operation, apply failure_propagation
  before considering any 7-9.

  - Do not let preserved background, photorealism, clean texture, or attractiveness lift a failed or substituted primary edit
  into a high reward.

  - When the primary edit fails, unchanged non-target regions can receive moderate-to-good preservation scores, but should
  not automatically become all 9s.

  - Avoid mechanical split vectors such as many core facets at 1 and many preservation/quality facets at 9. Use 2-4 for weak,
  partial, mostly unchanged, or wrong-substitute attempts; use 5-6 for mixed but recognizable attempts; reserve 0-1 and 8-9
  for truly extreme evidence.

  - Use the full 0-9 scale by facet-level visual evidence, not by a copied pattern.


  Return only JSON:

  {"score_vector":[22 integers from 0 to 9],"failure_tags":[]}

  '
