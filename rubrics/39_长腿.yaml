        - long_leg_non_target_body_width_proportion_preservation
        - long_leg_scene_camera_framing_preservation
        - long_leg_artifact_background_stability
      substitute_global_stretch_torso_compression_crop_or_camera:
        detect_when: The longer-leg appearance comes from full-image vertical stretch, torso/upper-body compression, camera/crop/framing
          change, perspective shift, moving the person, or background stretching instead of lower-body proportion editing.
        severity_guidance: Minor crop/perspective cue with genuine anatomical leg improvement may be severity 1-2. If global
          stretch, crop/camera shift, torso compression, body scaling, or background scaling is a major part of the long-leg
          impression, severity 3. If it is the main visible edit or changes scene/body state, severity 4-5.
        affected_l3:
        - long_leg_primary_proportion_outcome_match
        - long_leg_lengthening_direction_magnitude_match
        - long_leg_waistline_raise_match
