          or ground contact becomes misplaced, stretched, bent, floating, duplicated, or anatomically implausible.
        severity_guidance: Small landmark/blend irregularity may be severity 1. Clear pelvis/knee/ankle/foot/shoe/leg-axis/ground-contact
          defect should be severity 2-3. Impossible joints, detached feet, warped shoes, broken gait/pose, or severe anatomy
          failure must be severity 4-5.
        affected_l3:
        - long_leg_thigh_calf_length_distribution_match
        - long_leg_joint_landmark_repositioning_match
        - long_leg_bilateral_completeness_balance_match
        - long_leg_waist_hip_pelvis_transition_quality
        - long_leg_knee_anatomy_position_consistency
        - long_leg_ankle_foot_shoe_transition_consistency
        - long_leg_leg_axis_pose_perspective_consistency
        - long_leg_lighting_shadow_ground_contact_consistency
        - long_leg_contour_edge_blending_quality
        - long_leg_primary_proportion_outcome_match
        - long_leg_lengthening_direction_magnitude_match
        - long_leg_waistline_raise_match
        - long_leg_leg_to_torso_ratio_match
        - long_leg_high_fashion_visibility_naturalness_match
        - long_leg_edit_localized_to_permitted_body_region
