      overlong_unrealistic_or_unbalanced_body_proportion:
        detect_when: Legs become cartoonishly long, overly thin, mannequin-like, asymmetric, incompatible with torso/body,
          or no longer believable for pose and camera perspective.
        severity_guidance: Slight over-lengthening may be severity 1-2. Clear imbalance, asymmetric leg length, model-like
          exaggeration, or unnatural thigh/calf distribution should be severity 3. Cartoonish, impossible, identity-changing,
          or severely unbalanced body proportion must be severity 4-5.
        affected_l3:
        - long_leg_lengthening_direction_magnitude_match
        - long_leg_leg_to_torso_ratio_match
        - long_leg_thigh_calf_length_distribution_match
        - long_leg_bilateral_completeness_balance_match
