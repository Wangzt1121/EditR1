aggregation:
  prompt_compliance: Weighted arithmetic mean over all 8 Prompt Compliance facets. All eight facets are applicable to every
    valid training prompt.
  other_l1_blocks: Use the listed within-L1 weights for Localization and Anatomical Integration, Subject Preservation, and
    Task Realism and Image Quality.
  base_formula: base_reward = 0.45 * P + 0.30 * L + 0.15 * S + 0.10 * Q
  anatomy_score: A = score(long_leg_leg_axis_pose_perspective_consistency) / 9.0
  identity_score: I = score(long_leg_subject_identity_upper_body_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.25) * (I ** 0.18)
taxonomy:
  Prompt Compliance:
    Requested Long-Leg Proportion:
      long_leg_primary_proportion_outcome_match:
        title: Primary long-leg proportion outcome
        definition: Whether the character gains a clearly longer-legged, higher-waisted full-body silhouette through genuine
          lower-body proportion editing.
        anchors:
          0: No target edit, opposite change, or a different task.
          3: Weak or inconsistent long-leg effect.
          5: Visible partial effect with major incompleteness.
          7: Clear successful proportion change with one material issue.
          9: The requested long-leg silhouette is complete, obvious, and believable.
        rubric: Whether the character gains a clearly longer-legged, higher-waisted full-body silhouette through genuine lower-body
          proportion editing. Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected,
          apply failure_propagation caps. Do not let unrelated preservation, attractiveness, or realism compensate for this
          facet.
      long_leg_lengthening_direction_magnitude_match:
        title: Leg-lengthening direction and magnitude
        definition: Whether both legs are lengthened by a strong but realistic amount rather than shortened, barely changed,
          or excessively stretched.
        anchors:
          0: Legs are unchanged, shortened, or destructively stretched.
          3: Barely visible, highly uneven, or severely excessive lengthening.
          5: Noticeable but clearly insufficient or overdone.
          7: Appropriate lengthening with one minor issue.
          9: Lengthening is obvious, balanced, and exactly appropriate.
        rubric: Whether both legs are lengthened by a strong but realistic amount rather than shortened, barely changed, or
          excessively stretched. Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected,
          apply failure_propagation caps. Do not let unrelated preservation, attractiveness, or realism compensate for this
          facet.
      long_leg_waistline_raise_match:
        title: Waistline elevation
        definition: Whether the perceived waistline is raised coherently with the pelvis and clothing rather than through
          torso cropping or compression.
        anchors:
          0: Waistline is unchanged, lowered, or falsely shifted through torso distortion.
          3: Weak, uneven, or anatomically implausible elevation.
          5: Visible elevation with clear pelvis or clothing inconsistency.
          7: Correct elevation with one minor issue.
          9: Waistline is clearly and naturally raised as requested.
        rubric: Whether the perceived waistline is raised coherently with the pelvis and clothing rather than through torso
          cropping or compression. Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is
          detected, apply failure_propagation caps. Do not let unrelated preservation, attractiveness, or realism compensate
          for this facet.
      long_leg_leg_to_torso_ratio_match:
        title: Leg-to-torso proportion
