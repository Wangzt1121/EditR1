identity_preservation_protocol:
  purpose: Prevent successful face narrowing from hiding identity, facial-feature geometry, head, neck, body, camera, or background
    drift. Identity is judged by source-to-result correspondence, not by attractiveness or slimness.
  comparison_checklist:
  - internal facial landmark size, shape, spacing, and position
  - eye shape, spacing, aperture, gaze, eyelids, and eyelashes
  - eyebrow position and shape
  - nose width, length, geometry, and placement
  - mouth width, lip geometry, teeth visibility, and expression
  - chin length and projection, jaw angle, cheek character, and source face-shape family
  - ear size and placement, hairline, hairstyle, and facial hair
  - facial height, forehead-to-chin distance, and vertical proportions
  - head size, head pose, neck width, shoulders, body proportions, and clothing
  - age impression, gender presentation, skin tone, stable marks, and facial texture
  - background hue, texture, brightness, contrast, white balance, and composition
  - camera angle, crop, framing, lighting, aspect ratio, and resolution
  - overall same-person impression at normal viewing size
  strict_rules:
  - Do not increase identity because the result is attractive, slimmer, symmetrical, or instruction-compliant.
  - Do not treat a photorealistic but different-looking person as identity-preserved.
  - A score of 7 still requires a strong same-person match with only minor drift.
  - A changed-person impression must score 4 or below on the dedicated identity facet.
  - Only the overall lateral face width may change; internal features and all other subject and image properties remain constrained.
  - Face-width correctness, identity, feature geometry, expression, neck, body, background, camera state, and rendering quality
    are independent.
  task_specific_exception: only the visible lateral facial contour and the minimum adjacent skin, hair, ear, and background
    reconstruction zones needed for a natural overall face-width reduction
