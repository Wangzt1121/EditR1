  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Requested Face-Width Operation:
      requested_face_narrowing_operation_match:
        title: Requested overall face-narrowing operation match
        definition: Judge whether the overall visible lateral facial contour genuinely becomes narrower while facial features,
          head, neck, body, camera, and frame remain stable. Do not credit substitute operations.
        anchors:
          0: The requested face-narrowing operation is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of overall face narrowing is visible.
          2: A small relevant attempt exists, but the result is dominated by a substitute operation.
          3: The face is weakly edited, but overall contour narrowing is mostly wrong.
          4: A recognizable narrowing attempt exists, yet a major part is replaced by jaw-only, feature, head, body, crop,
            or camera change.
          5: The operation is partially correct, with several substantial substitution or completeness errors.
          6: Overall face narrowing is mostly correct, but one clear operation error remains.
          7: The requested operation is clearly achieved, with only a minor visible mismatch.
          8: The operation is highly accurate, with only a tiny local imperfection.
          9: The complete visible facial contour is precisely narrowed with no substitute operations.
        rubric: Judge whether the overall visible lateral facial contour genuinely becomes narrower while facial features,
          head, neck, body, camera, and frame remain stable. Do not credit substitute operations. Apply this facet's 0-9 anchors
          directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      requested_face_width_direction_match:
        title: Requested face-width direction match
        definition: Judge whether the net visible face width decreases rather than remaining unchanged, widening, or appearing
          narrower only through lighting, pose, or camera changes.
        anchors:
          0: The face widens, the direction is reversed, unrelated, or unusable.
          1: Only a negligible trace of the correct inward direction is visible.
          2: A small inward change exists, but the net direction is severely wrong or ambiguous.
          3: The direction is weakly attempted and remains largely incorrect.
          4: The correct direction is recognizable, but a major contradictory regional or substitute change remains.
          5: The direction is partially correct, with several visible inconsistencies.
          6: The net face-width direction is mostly correct, but one clear contradiction remains.
          7: The face becomes clearly narrower, with only a minor directional inconsistency.
          8: The direction is highly accurate and coherent, with only a tiny local issue.
          9: The visible face width decreases unmistakably and coherently across all assessable regions.
        rubric: Judge whether the net visible face width decreases rather than remaining unchanged, widening, or appearing
          narrower only through lighting, pose, or camera changes. Apply this facet's 0-9 anchors directly. If a task-specific
          failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.
      requested_face_narrowing_magnitude_match:
        title: Requested face-narrowing magnitude match
        definition: Judge whether the amount is clearly visible at normal viewing size but remains believable, identity-preserving,
          and free of pinching or excessive slimming.
        anchors:
          0: The requested magnitude is absent, destructive, reversed, or unusable.
          1: Only a negligible width change is visible.
          2: The amount is severely too weak, too strong, or inconsistent.
          3: The magnitude is weakly attempted but clearly mismatched.
          4: The effect is recognizable, but the amount has a major mismatch.
          5: The magnitude is partially appropriate, with several visible intensity problems.
          6: The amount is mostly correct, but one clear under- or over-narrowing issue remains.
          7: The requested magnitude is clearly achieved, with only a minor mismatch.
          8: The magnitude is highly accurate, with only a tiny excess or residual.
          9: The face-width reduction is exactly visible enough, balanced, and believable.
        rubric: Judge whether the amount is clearly visible at normal viewing size but remains believable, identity-preserving,
          and free of pinching or excessive slimming. Apply this facet's 0-9 anchors directly. If a task-specific failure
          affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.
