        title: Requested upper-eyelid depuffing operation match
        definition: Judge whether excess fullness and swollen heaviness are reduced on both upper eyelids without
          eyebrow lifting, eye enlargement, crease redesign, or global face editing.
        anchors:
          0: Requested upper-eyelid depuffing operation match is absent, reversed, unrelated, or unusable; the requested
            reduction is absent, reversed, or achieved by changing brows, eye shape, folds, pose, or lighting.
          1: Only a negligible trace of requested upper-eyelid depuffing operation match is visible; the result remains
            effectively failed.
          2: A small relevant trace exists, but the requested reduction is absent, reversed, or achieved by changing
            brows, eye shape, folds, pose, or lighting remains severe and dominates the result.
          3: Requested upper-eyelid depuffing operation match is weakly attempted, but the primary requirement is
            still substantially wrong.
