aggregation:
  prompt_compliance: Masked weighted arithmetic mean over the 8 Prompt Compliance facets. Explicitly requested attributes
    receive mask=1; genuinely unspecified optional attributes may receive mask=0.
  other_l1_blocks: Use the listed within-L1 weights for the remaining three blocks.
  base_formula: base_reward = 0.62 * P_masked + 0.18 * L + 0.13 * S + 0.07 * Q
  attachment_score: A = score(accessory_attachment_fit_contact_consistency) / 9.0
  preservation_score: I = score(accessory_subject_identity_non_target_anatomy_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.20) * (I ** 0.16)
taxonomy:
  Prompt Compliance:
    Requested Accessory Attributes:
      accessory_primary_addition_outcome_match:
        title: Primary accessory-addition outcome
        definition: Whether the requested hair accessory is clearly present on the intended subject. Do not give credit for
          unrelated hairstyle changes, generic decoration, clothing change, or global style change.
        anchors:
          0: Accessory is absent, removed, wrong task, or only hairstyle/background changed.
          3: Very weak, incomplete, barely visible, or ambiguous accessory addition.
          5: Accessory is present but materially incomplete or not clearly the requested item.
          7: Clear accessory addition with one notable issue.
          9: The requested hair band is fully present, readable, and prompt-faithful.
        rubric: Whether the requested hair accessory is clearly present on the intended subject. Do not give credit for unrelated
          hairstyle changes, generic decoration, clothing change, or global style change. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      accessory_requested_type_design_match:
        title: Accessory type and design
        definition: Whether category, silhouette, construction, and named design match the prompt. The requested item is a
          hair band with ruffled edge that holds back bangs; a plain headband, bow, clip, scarf, hat, or generic ornament
          is not exact.
        anchors:
          0: Wrong accessory category or design.
          3: Only a vague resemblance to a hair accessory.
          5: General hair accessory is present but major requested design elements are missing.
          7: Correct hair-band design with one minor discrepancy.
          9: Hair band, ruffled edge, and bang-holding design match exactly.
        rubric: Whether category, silhouette, construction, and named design match the prompt. The requested item is a hair
          band with ruffled edge that holds back bangs; a plain headband, bow, clip, scarf, hat, or generic ornament is not
          exact. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      accessory_requested_color_finish_match:
        title: Color and finish
        definition: Whether hue, value, saturation, and surface finish match the requested chocolate brown accessory color
          while remaining integrated with source lighting.
        anchors:
          0: Wrong color, absent color, or color cannot be verified.
          3: Strong mismatch from chocolate brown or visibly inconsistent finish.
          5: Brown-ish target color is recognizable but clearly inaccurate.
          7: Mostly chocolate brown with one minor tonal or finish difference.
          9: Chocolate brown color and finish precisely match the request.
        rubric: Whether hue, value, saturation, and surface finish match the requested chocolate brown accessory color while
          remaining integrated with source lighting. Apply this facet's 0-9 anchors directly. If a task-specific failure affects
          this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate
          for this facet.
      accessory_requested_material_texture_match:
        title: Material and texture
        definition: Whether the requested denim material is visually identifiable. Do not reward plastic, metal, silk, velvet,
          leather, or plain painted cloth unless denim-like fabric cues are visible.
        anchors:
          0: Wrong material, unreadable material, or no material evidence.
          3: Material is very unclear or mostly wrong for denim.
          5: Some fabric cue exists but denim is not convincing.
          7: Mostly denim-like material with one minor issue.
          9: Denim material and texture are precise and physically convincing.
        rubric: Whether the requested denim material is visually identifiable. Do not reward plastic, metal, silk, velvet,
          leather, or plain painted cloth unless denim-like fabric cues are visible. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      accessory_requested_size_scale_match:
        title: Size and scale
        definition: Whether requested tiny, small, medium, large, wide, thin, or oversized scale is correct relative to the
          wearer.
        anchors:
          0: Scale is opposite or physically impossible.
          3: Severely too large, too small, or inconsistent.
          5: General size class is recognizable but inaccurate.
          7: Correct scale with one minor issue.
          9: Requested size and wearer-relative scale match exactly.
        rubric: Whether requested tiny, small, medium, large, wide, thin, or oversized scale is correct relative to the wearer.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      accessory_requested_placement_orientation_match:
        title: Placement and orientation
        definition: Whether body region, side, height, tilt, wrap direction, and wearing method match.
        anchors:
          0: Wrong region, side, or orientation.
          3: Major placement or wearing-method error.
          5: Generally placed correctly with one clear mismatch.
          7: Correct with one minor positional difference.
          9: Placement and orientation are exact and natural.
        rubric: Whether body region, side, height, tilt, wrap direction, and wearing method match. Apply this facet's 0-9
          anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated
          preservation, realism, or attractiveness compensate for this facet.
      accessory_count_component_set_completeness_match:
        title: Count, components, and set completeness
        definition: Whether requested strands, loops, lenses, earrings, pendants, straps, paired items, and coordinated sets
          are complete.
        anchors:
          0: Required items are missing, duplicated, or replaced.
          3: Major count or component failure.
          5: Core item exists but one important component is wrong.
          7: Complete with one minor component issue.
          9: All requested items and components are exactly complete.
        rubric: Whether requested strands, loops, lenses, earrings, pendants, straps, paired items, and coordinated sets are
