prompt_applicability:
  purpose: Keep the fixed 22-score output while allowing optional accessory attributes to be activated only when the prompt
    specifies them.
  always_applicable:
  - accessory_primary_addition_outcome_match
  - accessory_requested_type_design_match
  - accessory_requested_size_scale_match
  - accessory_requested_placement_orientation_match
  - accessory_count_component_set_completeness_match
  activation_rules:
    accessory_requested_color_finish_match:
    - activate when color, metallic tone, transparency, lens tint, gloss, matte, or finish is specified
    accessory_requested_material_texture_match:
    - activate when material, weave, metal, gem, glass, leather, fabric, or texture is specified
    accessory_requested_style_visibility_match:
    - activate when styling, aesthetic, prominence, delicacy, boldness, or visibility is specified
  mask_values:
    applicable: 1
    not_applicable: 0
  aggregation_rule: P = sum_i(weight_i * mask_i * normalized_score_i) / sum_i(weight_i * mask_i)
