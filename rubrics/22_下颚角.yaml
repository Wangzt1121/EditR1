aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
    - 0.0
    - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Requested Jaw-Angle Operation:
      requested_jaw_angle_reduction_operation_match:
        title: Requested bilateral jaw-angle reduction operation match
        definition: Judge whether both visible jaw angles are genuinely reduced and the connected jawline becomes smoother
          and narrower without substitute operations.
        anchors:
          0: The requested operation is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of jaw-angle reduction is visible.
          2: A small relevant attempt exists, but a substitute operation dominates.
          3: The jaw is weakly edited and the primary operation is mostly wrong.
          4: A recognizable attempt exists, but a major part is missing or substituted.
          5: The operation is partially correct with several substantial errors.
          6: Jaw-angle reduction is mostly correct, but one clear operation error remains.
          7: The requested operation is clear with only a minor mismatch.
          8: The operation is highly accurate with only a tiny local issue.
          9: Both jaw angles and connected jawline are precisely refined with no substitute operation.
        rubric: |-
          Judge whether both visible jaw angles are genuinely reduced and the connected jawline becomes smoother and narrower without substitute operations. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_bilateral_jaw_width_reduction_match:
        title: Requested bilateral jaw-width reduction match
        definition: Judge whether visible width across the mandibular-angle region decreases on both assessable sides while
          chin, neck, head, and internal features remain stable.
        anchors:
          0: Jaw width is unchanged, wider, reversed, unrelated, or unusable.
          1: Only a negligible inward change is visible.
          2: A small reduction exists, but the jaw remains essentially unchanged.
          3: The direction is weak and largely ineffective.
          4: Reduction is recognizable, but one major jaw-side region remains broad.
          5: Reduction is partial with several regional inconsistencies.
          6: Jaw width is mostly reduced, but one clear issue remains.
          7: Both jaw sides are clearly narrower with only a minor mismatch.
          8: Reduction is highly accurate with only a tiny local issue.
          9: Bilateral mandibular width is precisely and naturally reduced.
        rubric: |-
          Judge whether visible width across the mandibular-angle region decreases on both assessable sides while chin, neck, head, and internal features remain stable. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_jaw_angle_edit_magnitude_match:
        title: Requested jaw-angle edit magnitude match
        definition: Judge whether the reduction is visible and cosmetically meaningful without excessive narrowing, skeletal
          contour, or identity loss.
        anchors:
          0: Magnitude is absent, destructive, reversed, or unusable.
          1: Only a negligible change is visible.
          2: The amount is severely too weak, too strong, or inconsistent.
          3: The magnitude is weakly attempted but clearly mismatched.
          4: The effect is recognizable, but the amount has a major mismatch.
          5: Magnitude is partially appropriate with several visible issues.
          6: The amount is mostly correct, but one clear under- or over-edit remains.
          7: The magnitude is strong and believable with only a minor mismatch.
          8: The amount is highly accurate with only a tiny excess or residual.
          9: The reduction is exactly visible enough, balanced, and natural.
        rubric: |-
          Judge whether the reduction is visible and cosmetically meaningful without excessive narrowing, skeletal contour, or identity loss. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_bilateral_target_coverage_match:
        title: Requested bilateral target coverage match
        definition: Judge whether every assessable part of both jaw angles and immediate jawline connections is treated without
          missing a side or editing unrelated regions.
        anchors:
          0: Target coverage is absent, reversed, unrelated, or unusable.
          1: Only a negligible target segment is treated.
          2: A small region changes, but most jaw-angle targets are missed.
          3: Coverage is weak and one or both major regions remain untreated.
          4: The target is recognizable, but one major side or segment is missed.
          5: Coverage is partial with several omissions or unnecessary edits.
          6: Coverage is mostly complete, but one clear side or segment remains inconsistent.
          7: Both sides are well covered with only a minor local miss.
          8: Coverage is highly complete with only a tiny imperfection.
          9: Every assessable bilateral jaw-angle and connected jawline region is treated precisely.
        rubric: |-
          Judge whether every assessable part of both jaw angles and immediate jawline connections is treated without missing a side or editing unrelated regions. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_mandibular_corner_softening_match:
        title: Requested mandibular-corner softening match
        definition: Judge whether broad or angular mandibular corners become less prominent without being erased, rounded
          into a different face type, or cut inward abruptly.
        anchors:
          0: Corner softening is absent, reversed, unrelated, or unusable.
          1: Only a negligible refinement is visible.
          2: Corners remain dominant or become severely distorted.
          3: Softening is weak and largely ineffective.
          4: The change is recognizable, but a major residual corner, notch, or over-removal remains.
          5: Softening is partial with several corner-shape problems.
          6: The corners are mostly refined, but one clear issue remains.
          7: Both corners are naturally softened with only a minor mismatch.
          8: Refinement is highly accurate with only a tiny local issue.
          9: Both mandibular corners are precisely softened while retaining plausible anatomy.
        rubric: |-
          Judge whether broad or angular mandibular corners become less prominent without being erased, rounded into a different face type, or cut inward abruptly. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_jawline_refinement_match:
        title: Requested jawline refinement match
        definition: Judge whether the jawline becomes smoother, cleaner, and more continuous from lower cheek through jaw
          angle toward the unchanged chin-side contour.
        anchors:
          0: Jawline refinement is absent, reversed, unrelated, or unusable.
          1: Only a negligible contour improvement is visible.
          2: The jawline remains severely irregular, broken, or distorted.
          3: Refinement is weak and major contour problems remain.
          4: The jawline is recognizable, but a major dent, shelf, gap, or abrupt cut remains.
          5: Refinement is partial with several visible contour issues.
          6: The jawline is mostly smooth, but one clear transition error remains.
          7: The jawline is clean and natural with only a minor mismatch.
          8: Refinement is highly accurate with only a tiny local issue.
          9: Both jawlines are fully smooth, continuous, and anatomically natural.
        rubric: |-
          Judge whether the jawline becomes smoother, cleaner, and more continuous from lower cheek through jaw angle toward the unchanged chin-side contour. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
    Lower-Face Proportion and Preservation:
      requested_lower_face_narrowing_distribution_match:
        title: Requested lower-face narrowing distribution match
        definition: Judge whether reduction is concentrated around the jaw angles and tapers naturally into adjacent jawline
          regions without cheek collapse or chin pinching.
        anchors:
          0: Width distribution is absent, reversed, unrelated, or unusable.
          1: Only a negligible region shows appropriate reduction.
          2: Reduction is severely uneven or anatomically wrong.
