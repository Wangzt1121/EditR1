identity_preservation_protocol:
  purpose: Prevent successful jaw-angle reduction from hiding identity, chin, cheekbone, mouth, neck, camera, or background
    drift.
  comparison_checklist:
    - eyes, brows, nose, mouth, lips, teeth, and expression
    - cheekbone position, cheek volume, facial height, and upper-face width
    - chin-tip length, width, projection, centerline, and apex shape
    - ears, hairline, hairstyle, sideburns, facial hair, neck width, and head pose
    - age impression, gender presentation, skin tone, stable marks, and facial texture
    - clothing, accessories, body pose, and shoulder geometry
    - background hue, texture, brightness, contrast, white balance, and composition
    - camera angle, crop, framing, lighting, aspect ratio, and resolution
    - overall same-person impression at normal viewing size
  strict_rules:
    - Do not increase identity because the result is attractive, narrow-jawed, symmetrical, or prompt-compliant.
    - Do not treat a photorealistic but different-looking person as identity-preserved.
    - A score of 7 still requires a strong same-person match with only minor drift.
    - A changed-person impression must score 4 or below on the dedicated identity facet.
    - Only bilateral jaw angles and immediate jawline transitions may change.
    - Jaw-angle correctness, chin preservation, identity, expression, neck, background, camera state, and rendering quality
      are independent.
  task_specific_exception: only bilateral mandibular-angle reduction, immediate connected jawline refinement, and the minimum
    adjacent skin, facial-hair, ear, hair, neck, clothing, accessory, and background blending zones
