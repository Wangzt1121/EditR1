  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Requested Edit Execution:
      face_contour_style_target_match:
        title: Requested contour style is correct
        definition: Judge the exact requested style, including long-face, round-face, square-face, diamond-face, pear-face,
          inverted-triangle, cheekbone, jawline, temple, mid-face, double-chin, forehead, face-slimming, or everyday contour.
        anchors:
          0: 'requested contour style is correct completely fails: the contour style is absent or replaced by a different
            contour design'
          1: Only a negligible trace of requested contour style is correct is visible; the central requirement is essentially
            unmet.
          2: A weak related attempt is present, but requested contour style is correct is severely incorrect, incomplete,
            or directionally wrong.
          3: requested contour style is correct is partially attempted, but one or more primary requirements are missing or
            contradictory.
          4: requested contour style is correct is recognizable, but a major mismatch, omission, excessive change, or wrong
            regional behavior remains.
          5: requested contour style is correct is moderately achieved, with several substantial visible problems.
          6: requested contour style is correct is mostly correct, but one clear and important issue remains.
          7: requested contour style is correct is clearly successful, with only a minor visible mismatch.
          8: requested contour style is correct is highly accurate and complete, with only a tiny local imperfection.
          9: The exact requested contour style and its defining visual identity are fully realized.
