          - face_contour_expression_features_preserved
          - face_contour_skin_texture_realism
          - face_contour_lighting_form_consistency
          - face_contour_material_color_realism
          - face_contour_artifact_sharpness_control
      artifact_texture_blur_or_rendering_failure:
        detect_when: |-
          The result contains visible blur, waxy smoothing, jagged or painted edges, mask seams, duplicated structures, warped
          geometry, broken texture, inconsistent material response, lighting mismatch, shadow/color integration errors, or other
          rendering artifacts that make the edit unreliable for reward training.
        severity_guidance: |-
          Tiny local artifacts may be severity 1. Clear blur, texture loss, boundary artifacts, or lighting/material mismatch
          should be severity 2-3. Severe artifacts, broken anatomy/material, or unusable image quality should be severity 4-5.
        affected_l3:
