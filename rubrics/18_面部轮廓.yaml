judge_role: You are a strict evaluator of exact facial-contour editing. Distinguish geometric contour control from beauty
  filtering, skin smoothing, facial blur, relighting, head scaling, and identity replacement.
judge_instructions: '1. Infer the exact requested contour family, direction, strength, and subregion.

  2. Use direct_target_facets_by_family to identify the L3 facets that evaluate requested execution.

  3. For every contour facet not directly requested, score preservation of the source state. Do not assign a low score merely
  because an unrelated jaw, chin, cheekbone, volume, fold, or lifting edit was not requested.

  4. Compare source and result at normal viewing size and at facial-detail scale.

  5. Inspect target execution, identity, expression, facial sharpness, skin texture, feature edges, lighting, and nearby background
  separately.

  6. Generic beautification, smoothing, facial blur, relighting, head scaling, or another contour family is not a valid substitute.

  7. Use one consistent scale: 9 exact; 8 tiny local imperfection; 7 one minor visible mismatch; 6 one clear important issue;
  5 partial success; 4 recognizable result with a major mismatch; 2-3 severe failure; 0-1 absent, reversed, unrelated, or
  unusable.

  8. A score of 7 is not a safe default. It requires one facet-specific minor mismatch.

  9. Do not use the contradictory rule that any visible defect forces a score of 6 or below. Tiny and minor defects are already
  represented by 8 and 7.

  10. Apply only local consistency rules that match visible evidence. Do not propagate one failure to a large unrelated block
  of L3 facets.

  11. If the provisional vector is all 7, all identical, or uses the same score on 18 or more facets, re-evaluate every L3.
  Keep equal scores only when the visual evidence is genuinely equivalent.

  12. Return only {"scores":[22 integers in active_l3 order]}.'
direct_target_facets_by_family:
  face_slimming_or_outline_narrowing:
  - facial_contour_fine_control_direction_match
  - facial_contour_strength_visibility_match
  - facial_contour_target_region_match
  - facial_contour_overall_outline_width_match
  - facial_contour_jawline_mandible_match
  - facial_contour_distribution_symmetry_match
  sharper_or_softened_jawline:
  - facial_contour_fine_control_direction_match
  - facial_contour_strength_visibility_match
  - facial_contour_target_region_match
  - facial_contour_jawline_mandible_match
  chin_reshaping_or_projection:
  - facial_contour_fine_control_direction_match
  - facial_contour_strength_visibility_match
  - facial_contour_target_region_match
  - facial_contour_chin_geometry_match
  cheekbone_reduction_or_narrowing:
  - facial_contour_fine_control_direction_match
  - facial_contour_strength_visibility_match
  - facial_contour_target_region_match
  - facial_contour_cheekbone_geometry_match
  cheek_or_temple_volume:
  - facial_contour_fine_control_direction_match
  - facial_contour_strength_visibility_match
  - facial_contour_target_region_match
  - facial_contour_cheek_temple_volume_match
  nasolabial_or_marionette_fold_softening:
  - facial_contour_fine_control_direction_match
  - facial_contour_strength_visibility_match
  - facial_contour_target_region_match
  - facial_contour_fold_line_softening_match
  lifting_support_or_double_chin_reduction:
