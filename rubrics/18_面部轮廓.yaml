  - facial_contour_target_region_match
  - facial_contour_lifting_support_submental_match
  - facial_contour_jawline_mandible_match
facet_mode_rule: The universal direction, strength, and target-region facets always score requested execution. A region-specific
  facet scores target compliance only when directly requested; otherwise it scores preservation of the source state. All 22
  facets remain active, with no masks and no N/A.
critical_local_consistency_rules:
- condition: Facial blur, over-smoothing, waxiness, pore loss, or softened eye/brow/nose/mouth edges is clear.
  score_guidance:
    facial_contour_skin_boundary_texture_realism: 0-4
    facial_contour_artifact_background_stability: 0-4
    facial_contour_edit_facial_identity_landmark_consistency: 0-6
    facial_contour_expression_features_preserved: 0-6
    facial_contour_anatomical_continuity: 0-6
  scope: Do not lower unrelated target-family facets unless blur prevents reliable assessment of that facet.
- condition: Facial blur or over-smoothing is severe and important source landmarks or texture are substantially lost.
  score_guidance:
    facial_contour_skin_boundary_texture_realism: 0-2
    facial_contour_artifact_background_stability: 0-2
    facial_contour_edit_facial_identity_landmark_consistency: 0-5
    facial_contour_expression_features_preserved: 0-5
- condition: The requested contour change is absent or barely visible.
  score_guidance:
    facial_contour_fine_control_direction_match: 0-4
    facial_contour_strength_visibility_match: 0-4
    facial_contour_target_region_match: 0-4
  scope: Also lower only the one directly requested region-specific target facet; preserve unrelated facets if source-consistent.
- condition: The result substitutes generic beautification, smoothing, relighting, head scaling, or the wrong contour family.
  score_guidance:
    facial_contour_fine_control_direction_match: 0-4
    facial_contour_strength_visibility_match: 0-5
    facial_contour_target_region_match: 0-5
    facial_contour_localized_to_target: 0-5
  scope: Lower the directly requested regional facet, but do not create a large identical low-score block.
- condition: A changed-person impression or clear facial-identity drift is visible.
  score_guidance:
    facial_contour_edit_facial_identity_landmark_consistency: 0-4
- condition: Expression, gaze, mouth opening, eyes, nose, brows, lips, teeth, facial hair, or makeup change clearly.
  score_guidance:
    facial_contour_expression_features_preserved: 0-4
    facial_contour_edit_facial_identity_landmark_consistency: 0-6
- condition: Global color, lighting, exposure, background, hair, clothing, accessories, or nearby scene geometry changes clearly.
  score_guidance:
    facial_contour_artifact_background_stability: 0-5
    facial_contour_lighting_shadow_form_consistency: 0-6
- condition: Anatomy is visibly pinched, stepped, liquified, floating, skull-inconsistent, or neck-inconsistent.
  score_guidance:
    facial_contour_anatomical_continuity: 0-4
    facial_contour_face_neck_harmony: 0-4
    facial_contour_depth_projection_occlusion_realism: 0-5
flat_vector_recheck:
  triggers:
  - all 22 scores are 7
  - all 22 scores are identical
  - 18 or more facets use the same integer
  instructions:
  - For every score of 7, identify one minor mismatch belonging to that exact facet.
  - If the facet is exact, use 9; if only a tiny imperfection exists, use 8.
  - If a clear issue exists, use 6 or below; if partial or wrong-family, use 5 or below.
  - Do not invent differences, but do not copy one overall impression to all facets.