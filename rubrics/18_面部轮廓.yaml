aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Requested Operation and Primary Geometry:
      facial_contour_fine_control_direction_match:
        title: Requested facial-contour fine control and direction match
        definition: Judge the exact requested effect rather than merely whether the face changed. Distinguish slimming, sharper
          jawline, longer or shorter chin correction, pointed or rounder chin, recessed-chin improvement, softened jaw angles,
          cheekbone reduction, cheek or temple filling, fold softening, lifting, double-chin reduction, and support enhancement.
        anchors:
          0: 'requested facial-contour fine control and direction match completely fails: the requested fine control is absent,
            reversed, or replaced by another contour operation'
          1: Only a negligible trace of requested facial-contour fine control and direction match is visible; the central
            requirement is essentially unmet.
          2: A weak related attempt is present, but requested facial-contour fine control and direction match is severely
            incorrect, incomplete, or directionally wrong.
          3: requested facial-contour fine control and direction match is partially attempted, but one or more primary requirements
            are missing or contradictory.
          4: requested facial-contour fine control and direction match is recognizable, but a major mismatch, omission, excessive
            change, or wrong regional behavior remains.
          5: requested facial-contour fine control and direction match is moderately achieved, with several substantial visible
            problems.
          6: requested facial-contour fine control and direction match is mostly correct, but one clear and important issue
            remains.
          7: requested facial-contour fine control and direction match is clearly successful, with only a minor visible mismatch.
          8: requested facial-contour fine control and direction match is highly accurate and complete, with only a tiny local
            imperfection.
          9: The exact requested facial-contour control and geometric direction are fully executed.
      facial_contour_strength_visibility_match:
        title: Requested contour-edit strength and visibility match
        definition: Judge subtle, clear, natural, moderate, refined, or other requested magnitude at normal viewing size without
          surgical exaggeration.
        anchors:
          0: 'requested contour-edit strength and visibility match completely fails: the effect is absent, far too weak, or
            grossly excessive'
          1: Only a negligible trace of requested contour-edit strength and visibility match is visible; the central requirement
            is essentially unmet.
          2: A weak related attempt is present, but requested contour-edit strength and visibility match is severely incorrect,
            incomplete, or directionally wrong.
          3: requested contour-edit strength and visibility match is partially attempted, but one or more primary requirements
            are missing or contradictory.
          4: requested contour-edit strength and visibility match is recognizable, but a major mismatch, omission, excessive
            change, or wrong regional behavior remains.
          5: requested contour-edit strength and visibility match is moderately achieved, with several substantial visible
            problems.
          6: requested contour-edit strength and visibility match is mostly correct, but one clear and important issue remains.
          7: requested contour-edit strength and visibility match is clearly successful, with only a minor visible mismatch.
          8: requested contour-edit strength and visibility match is highly accurate and complete, with only a tiny local
            imperfection.
          9: The contour change has exactly the requested visible and realistic strength.
      facial_contour_target_region_match:
        title: The correct facial-contour subregions are edited
        definition: Check jawline, chin, cheekbones, temples, cheeks, lower face, nasolabial region, marionette region, submental
          area, or the complete outline as requested.
        anchors:
          0: 'the correct facial-contour subregions are edited completely fails: wrong facial regions change or required target
            regions are omitted'
          1: Only a negligible trace of the correct facial-contour subregions are edited is visible; the central requirement
            is essentially unmet.
          2: A weak related attempt is present, but the correct facial-contour subregions are edited is severely incorrect,
            incomplete, or directionally wrong.
          3: the correct facial-contour subregions are edited is partially attempted, but one or more primary requirements
            are missing or contradictory.
          4: the correct facial-contour subregions are edited is recognizable, but a major mismatch, omission, excessive change,
            or wrong regional behavior remains.
          5: the correct facial-contour subregions are edited is moderately achieved, with several substantial visible problems.
          6: the correct facial-contour subregions are edited is mostly correct, but one clear and important issue remains.
          7: the correct facial-contour subregions are edited is clearly successful, with only a minor visible mismatch.
          8: the correct facial-contour subregions are edited is highly accurate and complete, with only a tiny local imperfection.
          9: Every requested contour subregion is edited precisely and completely.
      facial_contour_overall_outline_width_match:
        title: Requested overall facial-outline and width change match
        definition: Judge side-face narrowing, facial-outline support, complete contour definition, and preservation of face
          length or width when not requested. When this property is not directly requested, score preservation of the source
          state rather than the absence of an edit.
        anchors:
          0: 'requested overall facial-outline and width change match completely fails: the overall outline changes in the
            wrong direction or remains substantially incorrect'
          1: Only a negligible trace of requested overall facial-outline and width change match is visible; the central requirement
            is essentially unmet.
          2: A weak related attempt is present, but requested overall facial-outline and width change match is severely incorrect,
            incomplete, or directionally wrong.
          3: requested overall facial-outline and width change match is partially attempted, but one or more primary requirements
            are missing or contradictory.
          4: requested overall facial-outline and width change match is recognizable, but a major mismatch, omission, excessive
            change, or wrong regional behavior remains.
          5: requested overall facial-outline and width change match is moderately achieved, with several substantial visible
            problems.
          6: requested overall facial-outline and width change match is mostly correct, but one clear and important issue
            remains.
          7: requested overall facial-outline and width change match is clearly successful, with only a minor visible mismatch.
          8: requested overall facial-outline and width change match is highly accurate and complete, with only a tiny local
            imperfection.
          9: The overall facial outline, width, and prominence exactly match the requested result.
      facial_contour_jawline_mandible_match:
        title: Requested jawline and mandibular geometry match
        definition: Judge jaw clarity, jaw-angle softness, mandibular width, lower-face transition, edge sharpness, and jaw-to-neck
          separation. When this property is not directly requested, score preservation of the source state rather than the
          absence of an edit.
        anchors:
          0: 'requested jawline and mandibular geometry match completely fails: jawline or mandibular change is absent, opposite,
            or anatomically implausible'
          1: Only a negligible trace of requested jawline and mandibular geometry match is visible; the central requirement
            is essentially unmet.
          2: A weak related attempt is present, but requested jawline and mandibular geometry match is severely incorrect,
            incomplete, or directionally wrong.
          3: requested jawline and mandibular geometry match is partially attempted, but one or more primary requirements
            are missing or contradictory.
          4: requested jawline and mandibular geometry match is recognizable, but a major mismatch, omission, excessive change,
            or wrong regional behavior remains.
          5: requested jawline and mandibular geometry match is moderately achieved, with several substantial visible problems.
