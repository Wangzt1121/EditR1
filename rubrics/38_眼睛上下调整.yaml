  Localization and Anatomical Integration: 0.2
  Subject Preservation: 0.11
  Task Realism and Image Quality: 0.05
facet_weights_within_l1:
  Prompt Compliance:
    eye_position_primary_upward_shift_match: 0.15
    eye_position_vertical_center_height_match: 0.11
    eye_position_requested_magnitude_match: 0.08
    eye_position_bilateral_completeness_balance_match: 0.09
    eye_position_gaze_direction_preservation_match: 0.08
    eye_position_eye_size_shape_preservation_match: 0.08
    eye_position_eyelid_surrounding_integration_match: 0.07
    eye_position_no_horizontal_spacing_or_nose_change_match: 0.09
    eye_position_pose_aware_symmetry_match: 0.06
    eye_position_normal_view_visibility_match: 0.07
