aggregation:
  prompt_compliance: 'Weighted arithmetic mean over all 8 Prompt Compliance facets.

    '
  other_l1_blocks: 'Use the listed within-L1 weights for the remaining three blocks.

    '
  base_formula: base_reward = 0.58 * P + 0.20 * L + 0.15 * S + 0.07 * Q
  anatomy_score: A = score(waist_torso_anatomy_axis_continuity) / 9.0
  preservation_score: N = score(waist_chest_hip_non_target_proportion_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.25) * (N ** 0.20)
taxonomy:
  Prompt Compliance:
    Requested Waist Shape:
      waist_primary_requested_outcome_match:
        title: Primary requested waist outcome
        definition: 'Judge whether the waist itself is clearly reshaped into the requested powerful hourglass contour without
          global body scaling, pose change, camera change, or non-target body reshaping.

          '
        anchors:
          0: No visible waist edit, opposite change, or a different task such as pose/camera/body-scale change.
          3: Very weak or doubtful waist change; source waist contour mostly remains.
          5: Visible partial hourglass effect, but incomplete, inaccurate, or mixed with non-target changes.
          7: Clear waist-only hourglass shaping with one visible issue.
          9: The waist is cleanly and powerfully shaped into an hourglass contour while all non-target regions remain source-like.
        rubric: Judge whether the waist itself is clearly reshaped into the requested powerful hourglass contour without global
          body scaling, pose change, camera change, or non-target body reshaping. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      waist_requested_shape_family_match:
        title: Requested shape-family match
        definition: 'Judge whether the result specifically matches the requested hourglass family: a narrowed central waist
          with smooth inward side curves. Do not reward generic torso slimming, straight-column shaping, A-shape, angular
          pinching, or random curve smoothing as a correct hourglass result.

          '
        anchors:
          0: Wrong or opposite shape family, no hourglass contour, or only global torso/body narrowing.
          3: Slight resemblance to hourglass without clear defining geometry.
          5: Recognizable hourglass tendency with major contour or proportion inaccuracies.
          7: Correct hourglass family with one visible inconsistency.
          9: Exact, unambiguous, and natural powerful hourglass waist contour.
        rubric: 'Judge whether the result specifically matches the requested hourglass family: a narrowed central waist with
          smooth inward side curves. Do not reward generic torso slimming, straight-column shaping, A-shape, angular pinching,
          or random curve smoothing as a correct hourglass result. Apply this facet''s 0-9 anchors directly. If a task-specific
          failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.'
      waist_width_direction_magnitude_match:
        title: Waist-width direction and magnitude
        definition: 'Judge whether the waist narrows in the requested direction and amount. The prompt asks for a powerful
          hourglass contour, so the change should be clearly visible but not anatomically extreme.

          '
        anchors:
          0: Opposite direction, no useful narrowing, or destructive non-local distortion.
          3: Barely visible, excessive, strongly uneven, or mostly caused by global scaling.
          5: Correct general narrowing direction but clearly inaccurate magnitude.
          7: Appropriate visible narrowing with one minor issue.
          9: Direction and magnitude exactly match the powerful hourglass prompt.
        rubric: Judge whether the waist narrows in the requested direction and amount. The prompt asks for a powerful hourglass
          contour, so the change should be clearly visible but not anatomically extreme. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      waist_side_curve_profile_match:
        title: Side-curve profile
        definition: 'Judge the requested taper, sharp corners, smooth hourglass curves, mirrored C curves, or vertical straight
          sides.

          '
        anchors:
          0: Side profile contradicts the prompt.
          3: Weak, lumpy, or unstable profile.
          5: Requested profile is recognizable but materially inaccurate.
          7: Correct profile with one minor contour issue.
          9: Side contours precisely express the requested geometry.
        rubric: Judge the requested taper, sharp corners, smooth hourglass curves, mirrored C curves, or vertical straight
          sides. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      waist_ribcage_waist_hip_relation_match:
        title: Ribcage-waist-hip relation
        definition: 'Judge whether the waist relates correctly to the unchanged chest and hips, including taper, central narrowing,
          or column alignment.

          '
        anchors:
          0: Width hierarchy is wrong or chest or hips are used to fake the result.
          3: Relation is weak or strongly inconsistent.
          5: General relation is present with clear proportion errors.
          7: Correct relation with one minor issue.
