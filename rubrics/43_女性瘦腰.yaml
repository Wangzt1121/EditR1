        - waist_chest_hip_non_target_proportion_preservation
        - waist_local_lighting_shadow_consistency
        - waist_contour_edge_blending_quality
      clothing_occlusion_contour_or_background_artifact:
        detect_when: Clothing contours, fabric patterns, occlusions, local shadows, body edges, background, or scene near
          the waist become warped, repeated, smeared, cut, haloed, or inconsistent.
        severity_guidance: Clear clothing/edge/background artifact must be at least severity 2. Severe pattern warp, mask
