prompt_applicability:
  purpose: 'Keep the fixed 22-score output and interpret each shape family correctly.

    '
  valid_prompt_rule: 'All 8 Prompt Compliance facets are applicable to every valid prompt.

    '
  family_terms:
    A_shaped:
    - A-shaped
    - tapered waist
    angular:
    - angular
    - cornered
    - crisp inward bends
    hourglass:
    - hourglass
    - smooth inward curves
    - cinched center
    double_C:
    - double-C
    - mirrored C curves
    straight:
    - straight waist
    - column waist
    - vertical side lines
    - reduced inward curve
  aggregation_rule: 'P = sum_i(weight_i * normalized_score_i) over all 8 Prompt Compliance facets.

    '
