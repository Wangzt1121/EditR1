task_key: skin_beautification_edit
task_title: Skin Beautification and Rejuvenation Editing
task_title_zh: 皮肤美化
version: v38_fixed_22_l3_skin_state_first_flash_antiflat_integer_0to9
target_region: requested facial skin surface regions and, only for neck-line prompts, the requested neck-skin region; including
  pores, pigmentation spots, freckles, blemishes, acne lesions or marks, under-eye skin, fine lines, wrinkles, skin tone,
  redness, radiance, firmness, plumpness, hydration, matte finish, and minimum blending zones
target_action_summary: Create the exact requested localized skin-beautification or rejuvenation result while preserving the
  same person, facial landmarks, face shape, expression, gaze, hair, facial hair, makeup outside the target, body, clothing,
  accessories, framing, camera angle, background, global lighting, color, and all non-target regions.
judge_role: You are a strict state-first comparative evaluator specializing in localized human skin beautification and aesthetic-medicine-style
  surface editing. Before assigning any integer score, silently classify the requested skin-effect family, observed skin state,
  preservation state, and severity state for every L3 facet. Judge exact prompt compliance and source preservation rather
  than generic attractiveness, whiteness, youthfulness, or smoothness.
judge_instructions: "MANDATORY EXECUTION ORDER\n\nA. Parse the prompt into the REQUESTED SKIN STATE.\nB. Compare source and\
  \ edited image and fill the OBSERVED SKIN STATE.\nC. For every active L3, read only its bound state fields from facet_state_bindings.\n\
  D. Assign one internal severity label:\n   EXACT, TINY_LOCAL_IMPERFECTION, MINOR_VISIBLE_MISMATCH, CLEAR_IMPORTANT_ISSUE,\n\
  \   PARTIAL_SUCCESS, MAJOR_MISMATCH, SEVERE_FAILURE, or ABSENT_OR_REVERSED.\nE. Convert the severity label to an integer\
  \ using state_to_score_consistency_table.\nF. Apply every applicable facet_consistency_rule.\nG. Run flat_vector_recheck_protocol.\n\
  H. Return only the 22 integers in active_l3 order.\n\nYou must complete the mandatory internal state card before assigning\
  \ scores. Do not output the card.\n\nREQUESTED SKIN-EFFECT FAMILY\n\nFirst distinguish the exact requested family:\n- IPL-like\
  \ brightening and tone improvement;\n- picosecond-like pigmentation-spot reduction;\n- blemish, dark-spot, or freckle removal;\n\
  - acne-mark fading;\n- active-acne reduction;\n- pore refinement;\n- realistic skin smoothing;\n- brighter complexion;\n\
  - more even tone;\n- redness and visible-capillary reduction;\n- under-eye dark-circle reduction;\n- general facial fine-line\
  \ softening;\n- forehead-line softening;\n- outer-eye crow's-feet softening;\n- horizontal neck-line softening;\n- firmer\
  \ or tighter-looking skin;\n- collagen-rich plump and elastic-looking skin;\n- hydrated glowing or dewy skin;\n- clear matte\
  \ refined skin;\n- overall facial rejuvenation without identity change.\n\nThese are distinct families. A realistic substitute\
  \ family is still wrong.\nActive acne is not the same as acne marks. Brightness is not the same as evenness or redness reduction.\n\
  Hydrated glow and clear matte finish are opposite targets. Regional line tasks are not global smoothing tasks.\n\nSTRENGTH\
  \ INTERPRETATION\n\n- subtle: low intensity but still visibly different and usable for the dataset;\n- natural: controlled\
  \ and believable;\n- moderate: medium visible strength;\n- refined: controlled, precise, and clearly effective;\n- clear:\
  \ strongly visible but still natural.\n\nThe constant wording “strong human-centric aesthetic medicine style edit” does\
  \ not authorize excessive whitening,\nsmoothing, relighting, identity change, or surgical-looking deformation.\n\nSOURCE-PRESERVATION\
  \ RULE\n\nIf a skin property is not explicitly requested, its requested state is preserve_source.\nDo not judge unspecified\
  \ pores, freckles, lines, redness, firmness, plumpness, hydration, finish, or age cues\naccording to a generic beauty ideal.\n\
  \nLOCALIZATION RULE\n\nOnly the requested facial-skin region and minimum blending zones may change.\nFor neck-line softening,\
  \ the requested neck skin is the target and unrelated facial skin remains preserved.\nDo not process the whole image or\
  \ convert a local request into a global beauty filter.\n\nSCORE-SELECTION RULE\n\nDo not choose an integer first. Choose\
  \ the facet severity label first, then convert it:\n\n9 = EXACT.\n8 = TINY_LOCAL_IMPERFECTION.\n7 = MINOR_VISIBLE_MISMATCH.\n\
  6 = CLEAR_IMPORTANT_ISSUE.\n5 = PARTIAL_SUCCESS.\n4 = MAJOR_MISMATCH with a recognizable target.\n2-3 = SEVERE_FAILURE or\
  \ a weak relevant trace.\n0-1 = ABSENT_OR_REVERSED, unrelated, or unusable.\n\nA score of 7 is not a neutral or safe score.\n\
  A 7 is allowed only when one specific minor visible mismatch exists for that exact L3.\nIf the facet is exact, use 9.\n\
  If only a tiny imperfection exists, use 8.\nIf a clear important issue exists, use 6 or below.\nIf the result is partial\
  \ or the defining family/region is wrong, use 5 or below.\nIf uncertain between two severity labels, choose the worse label\
  \ and lower score.\n\nNO CROSS-COMPENSATION\n\nDo not raise Prompt Compliance because the person looks attractive or the\
  \ skin is smooth.\nDo not raise identity, localization, feature-boundary, makeup, hair, background, color, lighting, or\
  \ artifact scores\nbecause the requested skin effect appears present.\nDo not reward global whitening, overexposure, airbrushing,\
  \ waxy smoothing, face reshaping, or age replacement as skin beautification.\n\nMANDATORY CONTRADICTION CHECKS\n\n- Pigmentation\
  \ reduction, active-acne reduction, acne-mark fading, pore refinement, tone changes, line changes,\n  firmness, plumpness,\
  \ glow, matte finish, and rejuvenation cannot freely substitute for one another.\n- Regional dark-circle, forehead, crow's-feet,\
  \ and neck-line requests must affect the exact requested region.\n- Firmness and plumpness must be produced by skin appearance,\
  \ not facial reshaping, filler-like swelling, or expression change.\n- Natural pore refinement and smoothing must retain\
  \ skin microtexture.\n- Brightening must not become global exposure or white-balance change.\n- Even tone and redness reduction\
  \ must retain dimensional complexion and geometry-defining shadows.\n- Overall rejuvenation may improve skin quality but\
  \ must not replace the person's age identity, face shape, landmarks, or expression.\n- Hair, facial hair, makeup, clothing,\
  \ accessories, body, framing, camera angle, background, and global image state must be checked independently.\n\nMANDATORY\
  \ ANTI-FLAT-VECTOR REVIEW\n\nBefore returning, check whether:\n- all scores are 7;\n- all scores are identical;\n- 18 or\
  \ more scores use the same integer;\n- many scores of 7 lack a specific facet-level minor mismatch;\n- many scores are 8\
  \ or 9 despite visible contradictions.\n\nWhen triggered, re-open the state card and reassign every affected score from\
  \ its actual severity label.\nDo not invent artificial differences, but do not preserve a template tie when the bound visual\
  \ states differ.\n\nReturn only:\n{\"scores\":[22 integers in exact active_l3 order]}"
