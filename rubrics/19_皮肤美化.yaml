          is invalid unless a facet-specific minor visible mismatch has been identified.'
        anchors:
          0: Protected facial-feature boundaries are broadly erased, contaminated, distorted, or unusable.
          1: Only a negligible amount of correct boundary protection remains.
          2: Multiple major protected structures are blurred, recolored, reshaped, or contaminated.
          3: One major or several obvious feature-boundary errors remain.
          4: The face is recognizable, but one important eye, brow, lip, hairline, facial-hair, or makeup boundary is clearly
            altered.
          5: Boundary protection is moderate, with several visible differences.
          6: Most protected boundaries are correct, but one clear and important issue remains.
          7: Protected feature boundaries are strongly preserved, with only a minor local mismatch.
          8: Feature boundaries are nearly source-identical, with only a tiny local discrepancy.
          9: Eyes, brows, lips, nostrils, teeth, hairline, ears, facial hair, and makeup boundaries remain perfectly protected
            and source-consistent.
      skin_tone_texture_transition_continuity:
        title: Edited and unedited skin transition continuously in tone and texture
        definition: 'Judge transitions across forehead, temples, cheeks, nose, under-eye, mouth area, jaw, ears, hairline,
          beard line, and neck. Tone, pore scale, texture, highlights, and shadows should change smoothly without hard masks,
          halos, patch boundaries, repeated textures, or pasted retouching. Before selecting the integer for skin_tone_texture_transition_continuity,
          silently inspect its bound requested and observed state fields, assign one severity label, and convert it with the
          fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score
          of 7 is invalid unless a facet-specific minor visible mismatch has been identified.'
        anchors:
          0: Skin transition continuity is absent, severely masked, contradictory, or unusable.
          1: Only a negligible natural transition remains; hard retouching boundaries dominate.
          2: A small relevant transition exists, but tone or texture discontinuity is severe.
          3: Continuity is weakly attempted and contains major patch, halo, mask, or repeated-texture errors.
          4: The result is recognizable, but one major tone or texture transition mismatch remains.
          5: Transition continuity is moderate, with several substantial visible problems.
          6: The transition is mostly natural, but one clear and important issue remains.
          7: Tone and texture continuity are clearly successful, with only a minor local mismatch.
          8: The transition is highly seamless, with only a tiny local imperfection.
          9: All edited-to-unedited skin transitions are seamless in tone, pores, texture, highlights, shadows, and local
            detail.
      skin_pose_aware_regional_balance_and_shadow_preservation:
        title: Regional balance, facial geometry, and source shadow structure are preserved
        definition: 'Judge left-right regional balance according to pose, perspective, expression, and source asymmetry. Preserve
          nose-side shadows, eye-socket depth, cheek contours, nasolabial shading, jaw shadows, neck shadows, and other geometry-defining
          luminance. Do not flatten the face or force mirror symmetry. Before selecting the integer for skin_pose_aware_regional_balance_and_shadow_preservation,
          silently inspect its bound requested and observed state fields, assign one severity label, and convert it with the
          fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score
          of 7 is invalid unless a facet-specific minor visible mismatch has been identified.'
        anchors:
          0: Regional balance or facial shadow structure is absent, severely contradictory, or unusable.
          1: Only a negligible amount of source geometry and pose-aware balance remains.
          2: Major unintended asymmetry, face flattening, or shadow loss dominates.
          3: Balance is weakly attempted and contains major pose, perspective, or geometry contradictions.
          4: The skin edit is recognizable, but one major regional-balance or geometry-defining shadow mismatch remains.
          5: Pose-aware balance is moderate, with several substantial visible problems.
          6: Regional balance and shadows are mostly correct, but one clear and important issue remains.
          7: Pose-aware balance and geometry-defining shadows are strongly preserved, with only a minor mismatch.
          8: The regional treatment is highly accurate, with only a tiny local discrepancy.
          9: The skin treatment exactly follows source pose and asymmetry while preserving all geometry-defining facial and
            neck shadows.
  Subject Preservation:
    Identity and Non-target Preservation:
      skin_facial_identity_landmark_expression_consistency:
        title: Facial identity, landmarks, gaze, expression, and stable age cues are preserved
        definition: 'Compare the source and edited person as the same individual. Judge face outline, forehead, brows, eyes,
          nose, lips, teeth, cheeks, jaw, chin, feature spacing, gaze, expression, characteristic asymmetries, stable facial
          marks, gender presentation, and overall person impression. Intended skin-quality improvement is allowed, but face
          reshaping, feature regeneration, expression change, or changed-person appearance is not. Before selecting the integer
          for skin_facial_identity_landmark_expression_consistency, silently inspect its bound requested and observed state
          fields, assign one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5,
          MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible mismatch
          has been identified.'
        anchors:
          0: The edited face is effectively a different person, severely distorted, or no longer identity-consistent.
          1: Identity correspondence is extremely weak; multiple defining landmarks and the overall person impression are
            replaced.
          2: Major identity drift affects several defining facial regions or the overall same-person impression.
          3: Substantial facial-identity, landmark, gaze, expression, or age-character drift is visible.
          4: The same general subject is suggested, but the face gives a clear changed-person impression at normal viewing
            size.
          5: The person remains recognizable, but multiple landmarks, proportions, expression details, age cues, or characteristic
            features visibly drift.
          6: The same person is mostly preserved, but one clear identity-affecting change remains.
          7: Identity, landmarks, gaze, and expression are strongly preserved, with only a minor visible drift.
          8: The face is nearly source-identical outside the intended skin-quality change, with only a tiny discrepancy.
          9: The same person's facial identity, landmarks, feature spacing, gaze, expression, characteristic asymmetries,
            and stable age cues remain source-consistent.
      skin_non_target_face_hair_makeup_body_scene_preserved:
        title: Hair, facial hair, makeup, body, clothing, framing, background, and global image state are preserved
        definition: 'Preserve hairstyle, hair color, eyebrows, eyelashes, facial hair, makeup outside the target area, accessories,
          neck and body geometry, pose, clothing, subject scale and placement, camera angle, crop, background geometry and
