          the integer for skin_non_target_face_hair_makeup_body_scene_preserved, silently inspect its bound requested and
          observed state fields, assign one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7,
          CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific
          minor visible mismatch has been identified.'
        anchors:
          0: Non-target facial styling, body, clothing, framing, background, or global image state is severely changed, replaced,
            or unusable.
          1: Most non-target content is clearly inconsistent with the source.
          2: Several major changes substantially alter hair, facial hair, makeup, body, clothing, framing, background, or
            global color and lighting.
          3: One major or multiple obvious non-target changes remain.
          4: The source image is recognizable, but one clear important mismatch affects protected styling, body, clothing,
            camera, background, or global image state.
          5: Non-target preservation is moderate, with several visible differences.
          6: Most non-target content is preserved, but one clear and important difference remains.
          7: Non-target preservation is strong, with only a minor discrepancy.
          8: Hair, facial hair, makeup, body, clothing, framing, background, and global image state are nearly source-identical,
            with only a tiny discrepancy.
          9: All non-target facial styling, body geometry, clothing, accessories, camera/framing, background, global color,
            exposure, and lighting remain source-consistent.
  Task Realism and Image Quality:
