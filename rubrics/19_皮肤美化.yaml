      localization_boundary_or_integration_failure:
        detect_when: |-
          The edit spills outside the intended target area, misses important parts of requested facial skin surface regions and, only for neck-line prompts, the requested neck-skin region; including, damages adjacent structures,
          breaks occlusion/contact boundaries, or fails to blend with source lighting, texture, perspective, or depth.
        severity_guidance: |-
          Small boundary or blending issues may be severity 1. Clear spillover, missed target subregion, broken contact, or local
          integration failure should be severity 2-3. Large wrong-region edits or severe boundary damage should be severity 4-5.
        affected_l3:
          - requested_skin_region_coverage_match
          - requested_skin_component_completeness
          - requested_pigmentation_spot_freckle_match
          - requested_acne_lesion_mark_match
          - requested_pore_texture_refinement_match
          - requested_tone_brightness_evenness_redness_match
          - requested_dark_circle_line_wrinkle_region_match
          - requested_firmness_plumpness_elasticity_match
          - requested_radiance_hydration_matte_finish_match
          - unrequested_skin_properties_preserved
          - skin_edit_localized_to_requested_skin_regions
          - skin_feature_boundary_protection_natural
          - skin_tone_texture_transition_continuity
          - skin_pose_aware_regional_balance_and_shadow_preservation
          - skin_microtexture_pores_realistic_not_plastic
          - skin_lighting_shadow_specular_integration
