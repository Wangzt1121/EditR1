          minor visible mismatch has been identified.'
        anchors:
          0: Artifact control is absent; severe blur, mask-like retouching, corruption, or over-smoothing makes the result
            unusable.
          1: Only a negligible clean region remains; artifacts dominate the face or important non-target areas.
          2: Multiple major blurred, melted, repeated, patchy, haloed, or mask-like structures remain.
          3: Artifact control is weak; one major or several obvious defects substantially reduce usability.
          4: The result remains recognizable, but one major artifact, sharpness, waxiness, or mask-like failure is present.
          5: Artifact control is moderate, with several visible defects or one substantial local failure.
          6: The image is mostly clean, but one clear and important artifact or sharpness issue remains.
          7: The result is clean and natural, with only a minor local artifact.
          8: The image is nearly artifact-free, with only a tiny local imperfection.
          9: No meaningful blur, waxiness, hard mask, halo, repeated texture, color patch, deformation, contamination, or
            sharpness loss is visible.
identity_preservation_protocol:
  purpose: Prevent attractive skin enhancement from hiding facial-identity, geometry, expression, or non-target drift. Identity
    is judged by source-to-result correspondence, not by beauty, smoothness, brightness, or youthfulness.
  comparison_checklist:
  - overall face outline and width/length relationship
  - eyebrow position and shape
  - eye shape, spacing, aperture, gaze, and characteristic asymmetry
  - nose geometry and placement
  - mouth position, lip geometry, teeth, and expression
  - jaw, chin, cheek structure, stable age identity, and gender presentation
  - stable facial marks and characteristic asymmetries, excluding only explicitly targeted skin conditions
  - hairline, hairstyle, hair color, facial hair, and makeup outside target
  - body pose, clothing, accessories, subject scale, framing, camera angle, and placement
  - background geometry, hue, saturation, brightness, contrast, white balance, and lighting mood
  - overall same-person and same-scene impression at normal viewing size
  strict_rules:
  - Do not increase identity because the skin result is attractive, smooth, bright, or instruction-compliant.
  - Do not treat a photorealistic but different-looking person as identity-preserved.
  - A score of 7 still requires a strong same-person match with only minor drift.
  - A changed-person impression must score 4 or below on the dedicated identity facet.
  - Overall rejuvenation may improve skin quality but must not replace stable age identity or facial geometry.
  - Identity, geometry, expression, hair, facial hair, makeup, body, framing, background, and global image state are independent
    of skin-effect correctness.
  task_specific_exception: the exact requested facial or neck skin-surface condition and only the minimum necessary natural
    transition