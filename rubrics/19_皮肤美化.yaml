aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Requested Skin Effect and Surface State:
      requested_skin_operation_style_family_match:
        title: Requested skin-beautification operation and effect family match
        definition: 'Judge whether the edited result realizes the exact requested skin-beautification family rather than generic
          beautification. Distinguish IPL-like brightening, picosecond-like pigmentation reduction, blemish/freckle removal,
          acne-mark fading, active-acne reduction, pore refinement, realistic smoothing, brighter complexion, more even tone,
          redness/capillary reduction, dark-circle reduction, facial fine-line softening, forehead-line softening, crow''s-feet
          softening, neck-line softening, firmer skin, collagen-rich plump skin, hydrated glowing skin, clear matte skin,
          and overall facial rejuvenation. A photorealistic substitute family is still wrong. Before selecting the integer
          for requested_skin_operation_style_family_match, silently inspect its bound requested and observed state fields,
          assign one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5,
          MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible mismatch
          has been identified.'
        anchors:
          0: The requested skin operation and effect family are absent, reversed, unrelated, or unusable.
          1: Only a negligible relevant skin change is visible; the requested family is essentially unmet.
          2: A small related edit exists, but the requested skin family is severely incorrect or incomplete.
          3: The edit is weakly related, but a defining family property or target condition is wrong.
          4: The result belongs to a related but clearly wrong family, such as general brightening instead of spot reduction,
            smoothing instead of acne reduction, glow instead of matte, or global filtering instead of localized skin treatment.
          5: The requested family is partially recognizable, but one defining treatment target or finish is visibly wrong.
          6: The family is mostly correct, but one clear and important family-level distinction remains wrong.
          7: The exact requested family is clearly successful, with only a minor visible mismatch.
          8: The requested family is highly accurate, with only a tiny local imperfection.
          9: The exact requested skin-beautification operation and effect family are fully realized with no substitute treatment
            or missing defining property.
      requested_skin_edit_strength_match:
        title: Requested skin-edit strength and visibility match
        definition: 'Judge the requested descriptor and visible magnitude. Interpret subtle as low but still clearly visible
          for the dataset; natural as controlled and believable; moderate as medium strength; refined as controlled, precise,
          and clearly effective; and clear as a strong visible effect. The constant phrase strong human-centric edit does
          not authorize excessive whitening, smoothing, or face replacement. Before selecting the integer for requested_skin_edit_strength_match,
          silently inspect its bound requested and observed state fields, assign one severity label, and convert it with the
          fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score
          of 7 is invalid unless a facet-specific minor visible mismatch has been identified.'
        anchors:
          0: The requested effect strength is absent, reversed, destructive, or unusable.
          1: Only a negligible change is visible when a dataset-visible edit is required, or the effect is extremely excessive.
          2: The effect is severely too weak or too strong.
          3: The intended strength is weakly approached and remains clearly outside the requested range.
          4: The edit is recognizable, but a major under- or over-treatment remains.
          5: The strength is partially appropriate, with several substantial visibility or intensity problems.
          6: The strength is mostly correct, but one clear and important mismatch remains.
          7: The requested strength is clearly achieved, with only a minor visible mismatch.
          8: The magnitude is highly accurate, with only a tiny under- or over-treatment.
          9: The final skin change exactly matches the requested subtle, natural, moderate, refined, or clear visibility.
      requested_skin_region_coverage_match:
        title: Requested facial or neck skin-region coverage match
        definition: 'Judge whether the edit covers the exact requested region: full facial skin, pigmentation spots, freckles,
          acne marks, active acne lesions, pores across the face, under-eye skin, forehead lines, outer-eye crow''s-feet,
          horizontal neck lines, or whole-face rejuvenation. Do not reward whole-face processing for a localized request.
          Before selecting the integer for requested_skin_region_coverage_match, silently inspect its bound requested and
          observed state fields, assign one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7,
          CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific
          minor visible mismatch has been identified.'
        anchors:
          0: The requested skin region is not edited, is edited in the wrong place, or is unusable.
          1: Only a negligible part of the required region is changed; unrelated regions dominate.
          2: A small relevant region is edited, but most requested coverage is missing or misplaced.
          3: Coverage is weak and major requested areas remain untreated.
          4: The target region is recognizable, but one major area is missing or a major unrequested area is processed.
          5: Coverage is moderately complete, with several visible omissions or excessive regions.
          6: Most required skin regions are treated correctly, but one clear coverage problem remains.
          7: The requested region coverage is clearly successful, with only a minor local omission or excess.
          8: Coverage is highly accurate and complete, with only a tiny local imperfection.
          9: The edit covers exactly all requested facial or neck skin regions and excludes all unrequested regions.
      requested_skin_component_completeness:
        title: All defining requested skin-effect components are completed
        definition: 'Judge whether every defining component named or implied by the requested family is completed. Examples:
          IPL brightening requires brighter and more even skin; spot reduction requires visibly lighter target spots; acne
          reduction requires fewer inflamed lesions; pore refinement requires finer pores while preserving texture; rejuvenation
          requires a coordinated younger-looking skin-quality improvement without identity change. Before selecting the integer
          for requested_skin_component_completeness, silently inspect its bound requested and observed state fields, assign
          one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4,
          SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible mismatch has been
          identified.'
        anchors:
          0: The requested effect components are absent, reversed, unrelated, or unusable.
          1: Only a negligible component is completed; most defining requirements are missing.
          2: A small relevant component is present, but the requested effect is severely incomplete.
          3: The effect is weakly completed and multiple defining components are absent.
          4: The requested result is recognizable, but one major defining component is missing.
          5: Several components are present, but substantial omissions remain.
          6: Most requested components are complete, but one clear and important component is missing or weak.
          7: All main components are completed, with only a minor local omission.
          8: The requested components are nearly complete, with only a tiny imperfection.
          9: Every defining component of the requested skin effect is fully and simultaneously completed.
    Condition, Tone, Texture, and Finish:
      requested_pigmentation_spot_freckle_match:
        title: Requested pigmentation, dark-spot, blemish, and freckle change match
        definition: 'For IPL, picosecond-like treatment, blemish removal, or spot/freckle reduction, judge the requested change
          in pigmentation visibility, size, darkness, and distribution. For other prompts, preserve source pigmentation, freckles,
          moles, and characteristic marks unless their alteration is an unavoidable part of the stated effect. Before selecting
          the integer for requested_pigmentation_spot_freckle_match, silently inspect its bound requested and observed state
          fields, assign one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5,
          MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible mismatch
          has been identified.'
        anchors:
          0: The requested or source-preserved pigmentation state is absent, opposite, unrelated, or unusable.
          1: Only a negligible relevant change or preservation remains.
          2: Pigmentation or spots are severely under-treated, over-erased, recolored, or changed when not requested.
          3: The intended state is weakly achieved and major spot/freckle errors remain.
          4: The target is recognizable, but one major pigmentation, blemish, freckle, or mark-preservation mismatch remains.
          5: The result is partially correct, with several substantial visible spot or pigmentation problems.
          6: Pigmentation handling is mostly correct, but one clear and important issue remains.
          7: The requested reduction or source preservation is clearly successful, with only a minor mismatch.
          8: Pigmentation, spots, and freckles are highly accurate, with only a tiny local imperfection.
          9: Targeted spots and pigmentation change exactly as requested, while all unrequested freckles, moles, and identity
            marks remain source-consistent.
      requested_acne_lesion_mark_match:
        title: Requested active-acne and acne-mark change match
        definition: 'Distinguish active inflamed acne or pimples from residual red or brown acne marks. Active-acne reduction
          must reduce raised or inflamed lesions; acne-mark fading must reduce residual discoloration without pretending that
          smoothing or generic brightening is the requested treatment. Preserve acne state when not targeted. Before selecting
          the integer for requested_acne_lesion_mark_match, silently inspect its bound requested and observed state fields,
          assign one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5,
          MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible mismatch
          has been identified.'
        anchors:
          0: The requested acne or acne-mark change is absent, opposite, unrelated, or unusable.
          1: Only a negligible relevant acne change or preservation remains.
          2: Active lesions or marks are severely untreated, wrongly substituted, over-erased, or altered when not requested.
          3: The intended acne condition is weakly addressed and defining lesion-versus-mark errors remain.
          4: The correct condition is recognizable, but one major lesion, inflammation, mark, or preservation mismatch remains.
          5: The result is partially correct, with several substantial visible acne-condition problems.
          6: Acne handling is mostly correct, but one clear and important issue remains.
          7: The requested reduction or source preservation is clearly successful, with only a minor mismatch.
          8: The acne or mark state is highly accurate, with only a tiny local imperfection.
          9: Active lesions and residual marks change exactly according to the requested family, with no wrong-condition substitution
            or unrequested erasure.
      requested_pore_texture_refinement_match:
        title: Requested pore-size and skin-texture refinement match
        definition: 'Judge requested pore reduction and realistic smoothing separately from plastic blur. Smaller pores should
          remain visible at a finer scale; smoother skin should reduce roughness while retaining natural microtexture, pores,
          fine tonal variation, and facial character. For unrelated prompts, preserve source texture. Before selecting the
          integer for requested_pore_texture_refinement_match, silently inspect its bound requested and observed state fields,
          assign one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5,
          MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible mismatch
          has been identified.'
        anchors:
          0: The requested or source-preserved pore and texture state is absent, opposite, plastic, or unusable.
          1: Only a negligible relevant refinement or preservation remains.
          2: Pores or texture are severely wrong, erased, heavily blurred, sharpened unnaturally, or changed when not requested.
          3: The intended refinement is weakly recognizable, but major plasticity, blur, or texture errors remain.
          4: The target is recognizable, but one major pore-scale, roughness, microtexture, or preservation mismatch remains.
          5: The result is partially correct, with several substantial texture problems.
          6: Pore and texture refinement is mostly correct, but one clear and important issue remains.
          7: The requested refinement or source preservation is clearly successful, with only a minor mismatch.
          8: Pore scale and texture are highly accurate, with only a tiny local imperfection.
          9: Pores, microtexture, fine tonal variation, and surface smoothness exactly match the request while remaining natural
            and non-plastic.
      requested_tone_brightness_evenness_redness_match:
        title: Requested brightness, tone evenness, redness, and capillary change match
        definition: 'Distinguish brighter complexion from more even tone and from redness/capillary reduction. Brightening
          must not become global overexposure or skin whitening; even tone must reduce blotchiness without flattening all
          color; redness reduction must specifically reduce red flush or visible capillaries. Preserve untargeted tone properties.
          Before selecting the integer for requested_tone_brightness_evenness_redness_match, silently inspect its bound requested
          and observed state fields, assign one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7,
          CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific
          minor visible mismatch has been identified.'
        anchors:
          0: The requested or source-preserved skin-tone state is absent, opposite, globally filtered, or unusable.
          1: Only a negligible relevant tone change or preservation remains.
          2: Brightness, evenness, or redness is severely wrong, globally shifted, or changed when not requested.
          3: The intended tone effect is weakly recognizable, but major overexposure, whitening, blotchiness, redness, or
            color-loss errors remain.
          4: The target is recognizable, but one major brightness, evenness, redness, capillary, or preservation mismatch
            remains.
          5: The result is partially correct, with several substantial tone problems.
          6: Tone handling is mostly correct, but one clear and important issue remains.
          7: The requested tone effect or source preservation is clearly successful, with only a minor mismatch.
          8: Brightness, evenness, and redness are highly accurate, with only a tiny local imperfection.
          9: The exact requested brightness, evenness, or redness reduction is achieved while preserving natural complexion
            depth, local color variation, and source lighting.
      requested_dark_circle_line_wrinkle_region_match:
        title: Requested dark-circle, fine-line, and wrinkle-region change match
        definition: 'Distinguish under-eye dark-circle reduction, general facial fine-line softening, forehead-line softening,
          outer-eye crow''s-feet softening, and horizontal neck-line softening. Judge both the correct condition and the exact
          region. For unrelated prompts, preserve source lines and under-eye structure. Before selecting the integer for requested_dark_circle_line_wrinkle_region_match,
          silently inspect its bound requested and observed state fields, assign one severity label, and convert it with the
          fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score
          of 7 is invalid unless a facet-specific minor visible mismatch has been identified.'
        anchors:
          0: The requested or source-preserved under-eye or line state is absent, opposite, processed in the wrong region,
            or unusable.
          1: Only a negligible relevant regional change or preservation remains.
          2: The wrong line region is edited, or target dark circles/wrinkles are severely untreated or over-erased.
          3: The intended regional effect is weakly recognizable, but major location or severity errors remain.
          4: The target is recognizable, but one major under-eye, forehead, outer-eye, facial-line, neck-line, or preservation
            mismatch remains.
          5: The result is partially correct, with several substantial regional or line-condition problems.
          6: Regional line or dark-circle handling is mostly correct, but one clear and important issue remains.
          7: The requested regional softening or source preservation is clearly successful, with only a minor mismatch.
          8: The region and line/dark-circle state are highly accurate, with only a tiny local imperfection.
          9: The exact requested under-eye, facial fine-line, forehead, crow's-feet, or neck-line change is achieved without
            processing unrelated regions.
      requested_firmness_plumpness_elasticity_match:
        title: Requested firmness, plumpness, and elasticity appearance match
        definition: 'Distinguish firmer or tighter-looking skin from collagen-rich plump, elastic-looking skin. Firmness must
          not be produced by face slimming, lifting, jaw reshaping, or changed expression. Plumpness must not become swelling,
          filler-like distortion, enlarged lips, altered cheeks, or a different face. Preserve these properties when not requested.
          Before selecting the integer for requested_firmness_plumpness_elasticity_match, silently inspect its bound requested
          and observed state fields, assign one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7,
          CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific
          minor visible mismatch has been identified.'
        anchors:
          0: The requested or source-preserved firmness/plumpness state is absent, opposite, distorted, or unusable.
          1: Only a negligible relevant change or preservation remains.
          2: Firmness or plumpness is severely wrong, created through facial reshaping, swelling, or changed features.
          3: The intended effect is weakly recognizable, but major geometry or surface-tension errors remain.
          4: The target is recognizable, but one major firmness, plumpness, elasticity, or preservation mismatch remains.
          5: The result is partially correct, with several substantial visible problems.
          6: Firmness or plumpness is mostly correct, but one clear and important issue remains.
          7: The requested effect or source preservation is clearly successful, with only a minor mismatch.
          8: Firmness, plumpness, and elasticity appearance are highly accurate, with only a tiny local imperfection.
          9: The exact requested firm or plump elastic skin quality is achieved entirely through natural surface appearance
            without facial reshaping or swelling.
      requested_radiance_hydration_matte_finish_match:
        title: Requested radiance, hydration, glow, or matte finish match
        definition: 'Distinguish hydrated dewy glow from clear matte complexion. Glow requires moisturized radiance with controlled
          highlights rather than oily glare, overexposure, or global relighting. Matte requires reduced shine with dimensional
          skin rather than flat, powdery, gray, dry, or textureless skin. Preserve finish when not requested. Before selecting
          the integer for requested_radiance_hydration_matte_finish_match, silently inspect its bound requested and observed
          state fields, assign one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6,
          PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible
          mismatch has been identified.'
        anchors:
          0: The requested or source-preserved finish is absent, opposite, unrelated, or unusable.
          1: Only a negligible relevant finish change or preservation remains.
          2: The finish is severely wrong, such as glow instead of matte, matte instead of glow, oily glare, or flat gray
            skin.
          3: The intended finish is weakly recognizable, but major hydration, highlight, shine, or flatness errors remain.
          4: The target finish is recognizable, but one major radiance, hydration, matte, or preservation mismatch remains.
          5: The result is partially correct, with several substantial finish problems.
          6: The finish is mostly correct, but one clear and important issue remains.
          7: The requested finish or source preservation is clearly successful, with only a minor mismatch.
          8: Radiance or matte quality is highly accurate, with only a tiny local imperfection.
          9: The exact requested hydrated-glowing or clear-matte finish is achieved with natural dimensionality and source-consistent
            illumination.
      unrequested_skin_properties_preserved:
        title: Unrequested skin properties and characteristic marks are preserved
        definition: 'Preserve every skin property not explicitly requested: pigmentation, freckles, moles, acne state, pore
          scale, microtexture, brightness, evenness, redness, under-eye tone, lines, wrinkles, firmness, plumpness, hydration,
          finish, age cues, and characteristic facial marks. Only the exact requested family and necessary transitions may
          change. Before selecting the integer for unrequested_skin_properties_preserved, silently inspect its bound requested
          and observed state fields, assign one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7,
          CLEAR=6, PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific
          minor visible mismatch has been identified.'
        anchors:
          0: Unrequested skin properties are broadly replaced, erased, reversed, or unusable.
          1: Only a negligible amount of the original untargeted skin state remains.
          2: Several major unrequested skin properties or characteristic marks are severely changed.
          3: One major or multiple obvious unrequested-property changes remain.
          4: The source skin remains recognizable, but one important unrequested property is clearly altered.
          5: Unrequested-property preservation is moderate, with several visible differences.
          6: Most unrequested properties are preserved, but one clear difference remains.
          7: Unrequested skin properties are strongly preserved, with only a minor discrepancy.
          8: The source skin is nearly identical outside the requested attributes, with only a tiny local discrepancy.
          9: Every unrequested skin property, age cue, freckle, mole, characteristic mark, and surface condition remains source-consistent.
  Localization and Anatomical Integration:
    Skin Placement and Facial Integration:
      skin_edit_localized_to_requested_skin_regions:
        title: The skin edit is localized to requested facial or neck skin regions
        definition: 'Keep changes within the exact requested facial-skin or neck-skin regions and minimum blending zones.
          Do not process hair, eyebrows, eyelashes, eyes, lips, teeth, facial hair, makeup outside the target, ears, clothing,
          body, background, or the whole image. A localized request must not become a global beauty filter. Before selecting
          the integer for skin_edit_localized_to_requested_skin_regions, silently inspect its bound requested and observed
          state fields, assign one severity label, and convert it with the fixed mapping: EXACT=9, TINY=8, MINOR=7, CLEAR=6,
          PARTIAL=5, MAJOR=4, SEVERE=2-3, ABSENT_OR_REVERSED=0-1. A score of 7 is invalid unless a facet-specific minor visible
          mismatch has been identified.'
        anchors:
          0: Localization is absent, reversed, broadly global, or unusable.
          1: Only a negligible localized edit is visible; large non-target regions are processed.
          2: A small relevant localized attempt exists, but spill into non-target regions is severe.
          3: Localization is weakly attempted; one or more major facial-feature, hair, body, or scene regions change.
          4: The edit is recognizably skin-focused, but one major localization or global-filter error remains.
          5: Localization is moderately achieved, with several substantial non-target changes.
          6: The edit is mostly localized, but one clear and important spill or overextended region remains.
          7: Localization is clearly successful, with only a minor local mismatch.
          8: The edit is highly localized, with only a tiny transition excess.
          9: The edit is precisely confined to the requested facial or neck skin regions and minimum natural blending zones.
      skin_feature_boundary_protection_natural:
        title: Eyes, brows, lips, hairline, facial hair, and makeup boundaries are protected
        definition: 'Judge boundaries around eyelids, lashes, brows, nostrils, lips, teeth, hairline, ears, beard, moustache,
          sideburns, and makeup. Skin treatment must not blur, recolor, reshape, erase, sharpen unnaturally, or leak across
          these protected structures. Before selecting the integer for skin_feature_boundary_protection_natural, silently
          inspect its bound requested and observed state fields, assign one severity label, and convert it with the fixed
