          - skin_artifact_sharpness_no_waxy_mask
      overdone_or_anatomically_implausible_edit:
        detect_when: |-
          The target edit is excessive, unnatural, anatomically or materially implausible, changes the intended source character,
          or pushes the requested effect beyond the prompt so that it looks artificial rather than source-consistent.
        severity_guidance: |-
