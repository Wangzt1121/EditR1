          - skin_facial_identity_landmark_expression_consistency
          - skin_non_target_face_hair_makeup_body_scene_preserved
          - skin_microtexture_pores_realistic_not_plastic
          - skin_lighting_shadow_specular_integration
          - skin_boundary_hair_makeup_facial_hair_contact_consistent
          - skin_artifact_sharpness_no_waxy_mask
      wrong_operation_or_substitute_edit:
        detect_when: |-
          The result substitutes another edit family or generic beautification for the requested Skin Beautification and Rejuvenation Editing. This includes changing a
          related but non-requested attribute, using a global filter, shifting pose/crop/camera, or producing an attractive but
          semantically wrong edit instead of the requested operation on requested facial skin surface regions and, only for neck-line prompts, the requested neck-skin region; including.
        severity_guidance: |-
          Related but visibly wrong substitute edits should be severity at least 2. If the substitute is the dominant visible
          change, use severity 3-4. If it changes identity, pose, scene, or makes the requested edit absent, use severity 4-5.
        affected_l3:
          - requested_skin_operation_style_family_match
          - requested_skin_edit_strength_match
          - requested_skin_region_coverage_match
          - requested_skin_component_completeness
          - requested_pigmentation_spot_freckle_match
