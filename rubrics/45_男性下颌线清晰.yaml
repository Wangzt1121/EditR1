    ambiguous, or borrowed from another facet, choose the lower score.
  anti_template_rule: Do not output all 7s, mostly 7s, all 8-9s, all 9s, or a copied score pattern. Also avoid a mechanical
    many-1s/many-9s split unless the visual evidence truly supports both extremes. Also do not output all 1s or all 2s for
    a source-preserving no-op/weak jawline edit; that pattern is reserved for unrelated, unusable, different-person, or severely
    corrupted images. Scores should reflect facet-level differences.
  success_gate_definition: A positive sample clarifies the male mandibular border through localized contour and physically
    consistent shadow reconstruction while preserving lower-face identity, original face width, chin/mouth/cheek relations,
    chin/neck relations, facial hair, skin, expression, and scene.
  success_gate_conditions:
  - Mandibular border and jaw-angle/contour structure are visibly clearer at normal viewing size with appropriate retouching
    intensity.
  - Definition comes from localized contour clarification and natural shadow reconstruction, not global sharpening, contrast,
    face slimming, beauty filtering, skin smoothing, chin reshaping, or painted shadow.
  - Chin-side transition, ear-neck transition, mandibular continuity, face angle, and perspective remain anatomically coherent.
  - Facial hair/skin boundary, skin/facial-hair texture, local lighting, contour edges, and blending remain source-consistent.
  - Identity, lower-face character, non-target facial features, expression, head pose, skin tone/age, hair/clothing, scene,
    camera, and illumination remain stable.
  success_gate_usage_rule: The success gate is only an eligibility check for scores 7-9. It is not a positive example and
    does not imply automatic high scores. If any condition is uncertain, contradicted, missing, or replaced by a substitute
    edit, choose the lower score and apply failure_propagation.
  positive_negative_sample_rule: 'For training preference, a positive sample must be both correct and preserved: localized
    jawline definition is visible, natural, and source-consistent. A visually pleasing but wrong-task result is a negative
    sample. A clean no-op is low or low-mid, not positive. A face-shape-changing beautification is lower than a clean no-op
    because it teaches the wrong edit.

    '
  score_7_9_eligibility_rule: A facet may receive 7, 8, or 9 only when the visual evidence for that exact L3 is strong, source-preserving,
    and not contradicted by any detected failure affecting that facet.
  no_high_score_example_rule: Do not use positive examples, ideal score vectors, or high-score templates. Scores 8-9 are allowed
    only when the exact L3 facet has concrete visible evidence and no applicable failure cap; no fixed high-score vector is
    provided to imitate.
  primary_failure_preservation_ceiling_rule: When the primary requested edit is absent, wrong-direction, mostly unchanged,
    or mainly a substitute operation, apply failure_propagation before assigning preservation/quality highs. Unchanged non-target
    regions may receive moderate preservation scores, but failed editing must not become high reward through unrelated 8-9
    scores. If the image is otherwise source-preserving, do not reduce all preservation and quality facets to 1 solely because
    jawline definition is weak; use moderate preservation scores instead. If the failure changes lower-face silhouette, chin,
    mouth, cheek proportions, age impression, or beauty style, preservation and realism facets are affected and must not receive
    8-9.
  anti_extreme_split_rule: Avoid mechanical split vectors such as many affected core facets at 1 and many unaffected facets
    at 9. Use 2-4 for weak/partial/mostly unchanged or wrong-substitute attempts, 5-6 for mixed recognizable attempts, and
    reserve 0-1 or 8-9 for truly extreme visual evidence.
  mandatory_failure_propagation_rule: Before outputting final score_vector, detect failures in global_scoring_policy.failure_propagation,
    estimate severity 0-5, apply cap_by_severity to affected_l3, and output the adjusted vector. Severity 5 is reserved for
    unusable, unrelated, different-person, or clearly source-breaking results, not for a normal preserved image with weak
    jawline editing.
  no_compensation_rule: 'Stronger contrast cannot compensate for wrong anatomy, changed face shape, identity drift, damaged
    texture, or background warping.

    '
  task_disambiguation_rule: Increase visible jawline definition through localized contour clarification, clean boundary shaping,
    and physically consistent shadow reconstruction. Do not achieve the result by globally narrowing the face, changing chin
    shape, removing a double chin, widening the jaw, moving the ears, changing the neck, or applying whole-face sharpening.
