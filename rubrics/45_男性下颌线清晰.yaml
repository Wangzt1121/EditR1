    jawline_subject_identity_lower_face_preservation: 0.36
    jawline_non_target_facial_feature_preservation: 0.2
    jawline_expression_gaze_head_pose_preservation: 0.14
    jawline_skin_tone_age_asymmetry_preservation: 0.12
    jawline_hair_accessory_clothing_preservation: 0.08
    jawline_scene_camera_illumination_preservation: 0.1
  Task Realism and Image Quality:
    jawline_skin_facial_hair_texture_realism: 0.25
    jawline_local_lighting_shadow_consistency: 0.3
    jawline_contour_edge_blending_quality: 0.3
    jawline_artifact_background_stability: 0.15
aggregation:
  prompt_compliance: 'Weighted arithmetic mean over the 6 Prompt Compliance facets.

    '
  other_l1_blocks: 'Use the listed within-L1 weights for the remaining three blocks.

    '
  base_formula: base_reward = 0.65 * P + 0.22 * L + 0.10 * S + 0.03 * Q
  anatomy_score: A = score(jawline_mandibular_anatomy_continuity) / 9.0
  identity_score: I = score(jawline_subject_identity_lower_face_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.25) * (I ** 0.20)
taxonomy:
  Prompt Compliance:
    Requested Jawline Definition:
      jawline_primary_definition_outcome_match:
        title: Primary jawline-definition outcome
        definition: 'Judge whether the male jawline itself becomes clearly more defined, clean, and professionally retouched
          without becoming a different task such as generic face slimming, V-face editing, pointed-chin creation, double-chin
          removal, global sharpening, or identity-changing reshaping.

          '
        anchors:
          0: No visible jawline improvement, opposite change, wrong edit type, or identity-changing lower-face reshape.
          3: Weak/no-op attempt or wrong-task beautification; the original jawline remains dominant or the face shape changes
            more than the jaw boundary.
          5: Visible partial jawline improvement with major incompleteness, face-shape drift, or non-target change.
          7: Clear localized jawline definition with one visible issue.
          9: Jawline definition is complete, clean, prompt-faithful, professional, and identity-preserving.
        rubric: Judge whether the male jawline itself becomes clearly more defined, clean, and professionally retouched without
          becoming a different task such as generic face slimming, V-face editing, pointed-chin creation, double-chin removal,
          global sharpening, or identity-changing reshaping. Apply this facet's 0-9 anchors directly. If a task-specific failure
          affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet. A prettier or narrower face is not a successful jawline-definition outcome unless the
          localized mandibular border itself is correctly improved.
      jawline_definition_visibility_match:
        title: Normal-viewing-size visibility
        definition: 'Judge whether the improvement is noticeable at ordinary viewing size without relying on extreme zoom,
          global sharpening, artificial outline drawing, or full-face geometry change.

          '
        anchors:
          0: No visible improvement, only global sharpening, only beauty filtering, or only face-shape change.
          3: Improvement is barely detectable, mostly ambiguous, or caused mainly by face slimming rather than local jawline
            definition.
          5: Noticeable but weak, uneven, artificial, or partly non-local.
          7: Clearly visible with a minor inconsistency.
          9: Immediately visible, clean, localized, and natural at normal size.
        rubric: Judge whether the improvement is noticeable at ordinary viewing size without relying on extreme zoom, global
          sharpening, artificial outline drawing, or full-face geometry change. Apply this facet's 0-9 anchors directly. If
          a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism,
          or attractiveness compensate for this facet.
      jawline_requested_intensity_match:
        title: Requested retouching intensity
        definition: 'Judge whether the edit strength matches the prompt''s balanced professional intensity while remaining
          believable and non-exaggerated.

          '
        anchors:
          0: Opposite, absent, destructive, or identity-changing intensity.
          3: Severely weaker, stronger, harsher, more angular, more face-slimming, or more beauty-filter-like than requested.
          5: General level is recognizable but clearly inaccurate, too global, or too beauty-filter-like.
          7: Appropriate professional intensity with a minor mismatch.
          9: Intensity exactly matches the balanced professional request and remains realistic.
        rubric: Judge whether the edit strength matches the prompt's balanced professional intensity while remaining believable
          and non-exaggerated. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply
          failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
          A globally slimmer or beautified face is not the requested intensity even if it looks aesthetically pleasing.
      jawline_mandibular_border_clarity_match:
        title: Mandibular-border clarity
        definition: 'Judge clarity and cleanliness of the actual lower-jaw boundary rather than global contrast, skin smoothing,
          or face narrowing.

          '
        anchors:
          0: Border is unchanged, blurrier, or falsely drawn.
          3: Small fragmented areas improve but the border remains unclear.
          5: Border is partly clearer with visible gaps or unevenness.
          7: Consistently clear with one minor local issue.
          9: The visible mandibular border is fully clean and well defined.
        rubric: Judge clarity and cleanliness of the actual lower-jaw boundary rather than global contrast, skin smoothing,
          or face narrowing. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply
          failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      jawline_angle_and_contour_structure_match:
        title: Jaw-angle and contour structure
        definition: 'Judge whether the chin-side jaw, mandibular body, and jaw angle read as a coherent defined structure
          without changing jaw size or chin shape.

          '
        anchors:
          0: Structure is wrong, broken, or substantially reshaped.
          3: Weak or anatomically inconsistent structural definition.
          5: Recognizable improvement with clear structural errors.
          7: Coherent structure with one minor issue.
          9: Jaw contour and angle are precisely clarified and coherent.
        rubric: Judge whether the chin-side jaw, mandibular body, and jaw angle read as a coherent defined structure without
          changing jaw size or chin shape. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this
          facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate
          for this facet.
      jawline_bilateral_perspective_balance_match:
        title: Bilateral perspective-aware balance
        definition: 'Judge whether visible sides are balanced after accounting for face rotation, lighting, occlusion, and
          natural asymmetry.

          '
        anchors:
          0: Wrong side, one visible side missed, or severe imbalance.
          3: Strong edit-induced asymmetry.
          5: Both visible regions are attempted but noticeably inconsistent.
          7: Balanced with one minor perspective inconsistency.
          9: All visible sides are naturally and perspective-consistently balanced.
        rubric: Judge whether visible sides are balanced after accounting for face rotation, lighting, occlusion, and natural
          asymmetry. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
  Localization and Anatomical Integration:
    Mandibular Boundaries and Facial Anatomy:
      jawline_edit_localized_to_target_region:
        title: Edit localization
        definition: 'Judge whether changes remain within the mandibular border and minimum necessary submandibular transition.

          '
        anchors:
          0: Broad face, chin, mouth, cheek, neck, hair, or scene editing.
          3: Significant spill into cheeks, chin, mouth area, neck, ears, global face shape, or background.
          5: Mostly localized with one clear non-target alteration.
          7: Localized with a minor spill.
          9: Precisely confined to the permitted target region.
        rubric: Judge whether changes remain within the mandibular border and minimum necessary submandibular transition.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet. Whole lower-face
          beautification, face narrowing, or mouth/chin/cheek drift is a localization failure.
      jawline_chin_side_transition_quality:
        title: Chin-side transition
        definition: 'Judge continuity from the chin-side lower jaw into the mandibular body without changing chin length,
          point, width, or mouth region.

          '
        anchors:
          0: Broken transition or severe chin deformation.
          3: Major notch, pinch, seam, or chin drift.
          5: Connected but visibly unnatural.
          7: Natural with one minor contour issue.
          9: Seamless and anatomically correct transition.
        rubric: Judge continuity from the chin-side lower jaw into the mandibular body without changing chin length, point,
          width, or mouth region. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet,
          apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this
          facet.
      jawline_ear_neck_transition_quality:
        title: Jaw-angle, ear, and neck transition
        definition: 'Judge continuity around the jaw angle and its transition toward the ear and upper neck without detachment
          or neck reshaping.

          '
        anchors:
          0: Broken, detached, or anatomically impossible transition.
          3: Major gaps, shelves, or ear/neck distortion.
          5: Plausible but visibly irregular.
          7: Natural with one minor issue.
          9: Smooth, coherent, and anatomically correct transition.
        rubric: Judge continuity around the jaw angle and its transition toward the ear and upper neck without detachment
          or neck reshaping. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply
          failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      jawline_mandibular_anatomy_continuity:
        title: Mandibular anatomy and continuity
        definition: 'Judge whether the visible jaw remains structurally plausible, continuous, and consistent with the original
          bone proportions.

          '
        anchors:
          0: Collapsed, duplicated, detached, or impossible jaw anatomy.
          3: Major structural distortion.
          5: Broadly plausible with an obvious anatomical error.
          7: Coherent with one minor issue.
          9: Fully natural mandibular anatomy and continuity.
        rubric: Judge whether the visible jaw remains structurally plausible, continuous, and consistent with the original
          bone proportions. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply
          failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      jawline_face_angle_perspective_compatibility:
        title: Face-angle and perspective compatibility
        definition: 'Judge whether definition follows the original head rotation, camera angle, lens perspective, and expression.

          '
        anchors:
          0: Jawline geometry contradicts pose or perspective.
          3: Major directional or perspective mismatch.
          5: Generally compatible with a clear inconsistency.
          7: Compatible with one minor deviation.
          9: Fully consistent with original angle and perspective.
        rubric: Judge whether definition follows the original head rotation, camera angle, lens perspective, and expression.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      jawline_facial_hair_skin_boundary_integration:
        title: Facial-hair and skin-boundary integration
        definition: 'Judge preservation and natural reconstruction of beard, stubble, skin, and their boundary along the jawline.

          '
        anchors:
          0: Facial hair or skin is erased, detached, pasted, or duplicated.
          3: Major beard-direction, density, or skin-transition damage.
          5: Mostly integrated with obvious local inconsistency.
          7: Natural with one minor issue.
          9: Facial hair and skin integrate seamlessly with the new definition.
        rubric: Judge preservation and natural reconstruction of beard, stubble, skin, and their boundary along the jawline.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
  Subject Preservation:
    Identity and Non-target Preservation:
      jawline_subject_identity_lower_face_preservation:
        title: Subject identity and lower-face preservation
        definition: 'Judge preservation of the same person and original jaw width, chin identity, cheek proportions, mouth
          placement, and age impression.

          '
        anchors:
          0: Different person or major lower-face redesign.
          3: Strong identity, jaw-width, face-width, chin, cheek, mouth-placement, age, or beauty-style drift.
          5: Same person remains recognizable with a clear lower-face or beauty-filter change.
          7: Identity preserved with one minor difference.
          9: Identity and non-target lower-face geometry are fully preserved.
        rubric: Judge preservation of the same person and original jaw width, chin identity, cheek proportions, mouth placement,
          and age impression. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply
          failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
          Compare the full lower-face silhouette against the source; if the face looks narrowed, reshaped, younger, smoother,
          or generically beautified beyond local jawline definition, this facet must be reduced.
      jawline_non_target_facial_feature_preservation:
        title: Non-target facial-feature preservation
        definition: 'Judge preservation of eyes, eyelids, nose, lips, teeth, brows, ears, hairline, and all unrelated facial
          regions, including mouth position, cheek volume, and non-target face shape.

          '
        anchors:
          0: Multiple major non-target facial changes.
          3: Strong alteration of one or more facial features, mouth/cheek shape, or global face silhouette.
          5: Mostly preserved with one clear non-target or beauty-filter change.
          7: Preserved with one minor difference.
          9: All non-target facial features remain unchanged.
        rubric: Judge preservation of eyes, eyelids, nose, lips, teeth, brows, ears, hairline, and all unrelated facial regions.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet. A cleaner-looking
          or more attractive face is not preservation if non-target facial structure has changed.
      jawline_expression_gaze_head_pose_preservation:
        title: Expression, gaze, and head-pose preservation
        definition: 'Judge preservation of expression, eye direction, mouth state, head rotation, tilt, scale, and position.

          '
        anchors:
          0: Major expression, gaze, or head-pose change.
          3: Strong drift in one or more listed properties.
          5: Mostly preserved with one clear difference.
          7: Preserved with one minor shift.
          9: Expression, gaze, and head pose are unchanged.
        rubric: Judge preservation of expression, eye direction, mouth state, head rotation, tilt, scale, and position. Apply
          this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps.
          Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      jawline_skin_tone_age_asymmetry_preservation:
        title: Skin tone, age, and natural asymmetry
        definition: 'Judge preservation of skin color, age cues, characteristic marks, pores outside the target, and source-consistent
          asymmetry.

          '
        anchors:
          0: Major recoloring, age change, or artificial mirrored face.
          3: Strong loss of age cues, marks, natural asymmetry, or source skin character due to beautification/smoothing.
          5: Mostly preserved with one clear alteration or visible beauty-filter effect.
          7: Preserved with one minor difference.
          9: All listed appearance cues remain source-consistent.
        rubric: Judge preservation of skin color, age cues, characteristic marks, pores outside the target, and source-consistent
          asymmetry. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      jawline_hair_accessory_clothing_preservation:
        title: Hair, accessories, and clothing preservation
        definition: 'Judge preservation of hairstyle, facial-hair identity, earrings, necklaces, collars, clothing details,
          colors, and occlusion.

          '
        anchors:
          0: Major hair, accessory, or garment damage.
          3: Strong distortion or replacement.
          5: Mostly preserved with one obvious change.
          7: Preserved with one minor difference.
          9: Hair, accessories, and clothing remain unchanged.
        rubric: Judge preservation of hairstyle, facial-hair identity, earrings, necklaces, collars, clothing details, colors,
          and occlusion. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      jawline_scene_camera_illumination_preservation:
        title: Scene, camera, and global illumination preservation
        definition: 'Judge preservation of background, pose, crop, camera angle, composition, global lighting, shadows, aspect
          ratio, and resolution.

          '
        anchors:
          0: Major scene, camera, or lighting replacement.
          3: Strong background, framing, or illumination drift.
          5: Mostly stable with one clear change.
          7: Preserved with one minor difference.
          9: Scene and global image conditions remain unchanged.
        rubric: Judge preservation of background, pose, crop, camera angle, composition, global lighting, shadows, aspect
          ratio, and resolution. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply
          failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
  Task Realism and Image Quality:
    Rendering and Artifact Control:
      jawline_skin_facial_hair_texture_realism:
        title: Skin and facial-hair texture realism
        definition: 'Judge pores, fine skin texture, beard or stubble detail, and local sharpness without plastic skin, smearing,
          or repeated texture.

          '
        anchors:
          0: Severely synthetic, smeared, or destroyed texture.
          3: Strong plasticity, beauty-filter smoothing, or facial-hair artifacts.
          5: Usable but visibly processed, sharpened, or smoothed.
          7: Realistic with one minor texture issue.
          9: Fully photorealistic and source-consistent texture.
        rubric: Judge pores, fine skin texture, beard or stubble detail, and local sharpness without plastic skin, smearing,
          or repeated texture. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply
          failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      jawline_local_lighting_shadow_consistency:
        title: Local lighting and shadow consistency
        definition: 'Judge reconstructed jaw, under-jaw, cheek, ear, and neck shadows against the original light direction
          and intensity.

          '
        anchors:
          0: Shadows strongly contradict the image or resemble painted lines.
          3: Major missing, duplicated, or incorrect shadows.
          5: Generally plausible with obvious local errors.
          7: Consistent with one minor shadow issue.
          9: Lighting and shadows integrate perfectly.
        rubric: Judge reconstructed jaw, under-jaw, cheek, ear, and neck shadows against the original light direction and
          intensity. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      jawline_contour_edge_blending_quality:
        title: Contour and edge blending
        definition: 'Judge clean boundaries without halos, jagged edges, seams, black outlines, dents, over-sharpening, or
          local blur.

          '
        anchors:
          0: Severe compositing or edge failure.
          3: Strong halos, seams, outlines, or blur.
          5: Mostly blended with visible boundary artifacts.
          7: Clean with one minor edge issue.
          9: Seamless, detailed, and naturally bounded.
        rubric: Judge clean boundaries without halos, jagged edges, seams, black outlines, dents, over-sharpening, or local
          blur. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      jawline_artifact_background_stability:
        title: Artifact and background stability
        definition: 'Judge absence of warped hair, ears, neck, collars, accessories, duplicated anatomy, melted skin, and
          background deformation.

          '
        anchors:
          0: Severe structural artifacts or background warping.
          3: Multiple obvious distortions.
          5: One clear artifact or moderate instability.
          7: Stable with one minor artifact.
          9: No visible artifacts; all surrounding structures remain stable.
        rubric: Judge absence of warped hair, ears, neck, collars, accessories, duplicated anatomy, melted skin, and background
          deformation. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
prompt_applicability:
  purpose: 'Preserve the fixed 22-score output while interpreting template-specific intensity and emphasis.

    '
  valid_prompt_rule: 'All 6 Prompt Compliance facets are applicable to every valid training prompt.

    '
  emphasis_terms:
    symmetry:
    - balanced left-right symmetry
    - clean and symmetrical
    - symmetrical structure
    texture:
    - photorealistic skin texture
    - preserve pores
    - no plastic skin
    - natural texture continuity
    localization:
    - clean local boundaries
    - precise local mask edges
    - target-region editing only
    lighting:
    - natural shadow reconstruction
    - original lighting direction preserved
    - reconstruct tiny local shadows
    scene_stability:
    - no warping around hair or background
    - no distorted accessories or hair
    - background deformation
  aggregation_rule: 'P = sum_i(weight_i * normalized_score_i) over all 6 Prompt Compliance facets.

    '
