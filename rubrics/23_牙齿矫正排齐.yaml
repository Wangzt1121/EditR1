identity_preservation_protocol:
  purpose: Prevent successful dental alignment from hiding changed smile geometry, tooth identity, facial identity, expression,
    camera, or background drift. Identity is judged by source-to-result correspondence, not by dental perfection.
  comparison_checklist:
    - mouth width, mouth corners, lip shape, lip thickness, and mouth opening
    - visible tooth count, tooth identity, crown size, shape, type, color, and incisal character
    - tooth-row display, upper-lower bite, gumline, tongue position, and smile asymmetry
    - nose-to-mouth, mouth-to-chin, cheek, and jaw relationships
    - eye shape, gaze, brows, expression, and head pose
    - age impression, skin tone, stable marks, makeup, facial hair, and facial texture
    - hair, hairstyle, clothing, accessories, and body pose
    - background hue, texture, brightness, contrast, white balance, and composition
    - camera angle, crop, framing, lighting, aspect ratio, and resolution
    - overall same-person and same-smile impression at normal viewing size
  strict_rules:
    - Do not increase identity because the teeth are attractive, straight, symmetrical, or prompt-compliant.
    - Do not treat a photorealistic but different-looking smile or person as identity-preserved.
    - A score of 7 still requires a strong same-person and same-smile match with only minor drift.
    - A changed-person or replaced-smile impression must score 4 or below on the dedicated identity facet.
    - Only necessary visible tooth positions, orientations, contacts, and incisal-edge contours may change.
    - Alignment correctness, tooth identity, bite, smile, facial identity, expression, background, camera state, and rendering
      quality are independent.
  task_specific_exception: only visible tooth positioning, rotation, tilt, overlap, spacing, dental-row continuity, incisal-edge
    refinement, and the minimum gum, lip, tongue, and oral-cavity reconstruction zones required for natural alignment
