aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
    - 0.0
    - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Requested Alignment Operation:
      requested_teeth_alignment_operation_match:
        title: Requested natural teeth-alignment operation match
        definition: Judge whether the visible dentition is genuinely straightened and the tooth edges become more orderly
          without whitening, veneer replacement, smile enlargement, lip reshaping, or other substitute operations.
        anchors:
          0: The requested alignment operation is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of dental alignment is visible.
          2: A small relevant attempt exists, but the result is dominated by a substitute operation.
          3: The teeth are weakly edited, but natural alignment is mostly wrong.
          4: A recognizable attempt exists, yet a major alignment component is missing or substituted.
          5: The operation is partially correct, with several substantial method or completeness errors.
          6: Natural alignment is mostly correct, but one clear operation error remains.
          7: The requested alignment is clearly achieved, with only a minor visible mismatch.
          8: The operation is highly accurate, with only a tiny local imperfection.
          9: All visible dentition is naturally aligned and edge-refined with no substitute operation.
        rubric: |-
          Judge whether the visible dentition is genuinely straightened and the tooth edges become more orderly without whitening, veneer replacement, smile enlargement, lip reshaping, or other substitute operations. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_visible_teeth_coverage_match:
        title: Requested visible-teeth coverage match
        definition: Judge whether all assessable misaligned visible teeth and tooth-row segments receive coherent treatment.
          Hidden teeth are ignored, but visible untreated teeth reduce this score.
        anchors:
          0: Visible-tooth coverage is absent, reversed, unrelated, or unusable.
          1: Only a negligible visible tooth region is treated.
          2: A small region changes, but most visible alignment targets remain untreated.
          3: Coverage is weak and major visible teeth or row segments are missed.
          4: The target is recognizable, but one major tooth group or side remains untreated or wrongly edited.
          5: Coverage is partial, with several visible omissions or unnecessary edits.
          6: Coverage is mostly complete, but one clear visible tooth or row segment remains inconsistent.
          7: All visible alignment targets are well covered, with only a minor local miss.
          8: Coverage is highly complete and precise, with only a tiny imperfection.
          9: Every assessable visible alignment target is treated precisely and coherently.
        rubric: |-
          Judge whether all assessable misaligned visible teeth and tooth-row segments receive coherent treatment. Hidden teeth are ignored, but visible untreated teeth reduce this score. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_alignment_magnitude_match:
        title: Requested alignment-magnitude match
        definition: Judge whether subtle premium, noticeable, moderate-to-strong, dramatic, maximum-realistic, app-style,
          studio, commercial, or social-media correction strength is visible without over-regularizing the smile.
        anchors:
          0: The requested magnitude is absent, destructive, reversed, or unusable.
          1: Only a negligible alignment change is visible.
          2: The amount is severely too weak, too strong, or inconsistent.
          3: The intensity is weakly attempted but clearly mismatched.
          4: The correction is recognizable, but the amount has a major mismatch.
          5: The magnitude is partially appropriate, with several visible intensity problems.
          6: The amount is mostly correct, but one clear under- or over-correction remains.
          7: The requested strength is clearly achieved, with only a minor mismatch.
          8: The intensity is highly accurate, with only a tiny excess or residual.
          9: The alignment strength is exactly visible enough, source-appropriate, and believable.
        rubric: |-
          Judge whether subtle premium, noticeable, moderate-to-strong, dramatic, maximum-realistic, app-style, studio, commercial, or social-media correction strength is visible without over-regularizing the smile. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_dental_arch_row_continuity_match:
        title: Requested dental-arch and tooth-row continuity match
        definition: Judge whether visible tooth centers and contours follow a coherent dental-arch path without sudden steps,
          isolated offsets, flat pasted rows, or perspective-inconsistent placement.
        anchors:
          0: Dental-row continuity is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of a coherent row remains.
          2: The row is severely broken, stepped, flat, or anatomically implausible.
          3: Continuity is weakly improved and major row irregularities remain.
          4: The row is recognizable, but a major arch break, offset, or perspective mismatch remains.
          5: Continuity is partial, with several substantial row-placement problems.
          6: The dental row is mostly coherent, but one clear step or arch inconsistency remains.
          7: Row continuity is strong and natural, with only a minor mismatch.
          8: The dental arch is highly accurate, with only a tiny local imperfection.
          9: All visible teeth follow a smooth, anatomically plausible, pose-consistent dental arch.
        rubric: |-
          Judge whether visible tooth centers and contours follow a coherent dental-arch path without sudden steps, isolated offsets, flat pasted rows, or perspective-inconsistent placement. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_tooth_rotation_tilt_correction_match:
        title: Requested tooth rotation and tilt correction match
        definition: Judge correction of visible turned, angled, leaning, or twisted teeth while preserving plausible crown
          orientation and avoiding mechanically identical frontal-facing teeth.
        anchors:
          0: Rotations and tilts are unchanged, worse, reversed, unrelated, or unusable.
          1: Only a negligible correction of visible orientation is present.
          2: A small attempt exists, but dominant rotations or tilts remain.
          3: Orientation correction is weak and largely ineffective.
          4: The teeth look somewhat straighter, but a major rotated, tilted, or falsely reoriented tooth remains.
          5: Correction is partial, with several substantial orientation problems.
          6: Rotations and tilts are mostly corrected, but one clear issue remains.
          7: Tooth orientations are strong and natural, with only a minor mismatch.
          8: Correction is highly accurate, with only a tiny local imperfection.
          9: All assessable visible rotations and tilts are naturally corrected with tooth-specific orientation preserved.
        rubric: |-
          Judge correction of visible turned, angled, leaning, or twisted teeth while preserving plausible crown orientation and avoiding mechanically identical frontal-facing teeth. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      requested_crowding_overlap_reduction_match:
        title: Requested crowding and overlap reduction match
        definition: Judge reduction of visible tooth overlap, stacking, crowding, and irregular foreground-background ordering
          while maintaining plausible dental contacts and arch depth.
        anchors:
