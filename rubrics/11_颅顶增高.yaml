aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Instruction and Task-Specific Target Checks:
      requested_crown_operation_headshape_family_match:
        title: Requested crown operation and head-shape family match
        definition: Judge the exact local crown-height operation together with preservation of the source visible head-shape
          and hairstyle family. The correct family is same haircut, same front/side hair silhouette, same hairline, same
          hair color, and same visible head outline with only local upper-crown lift/refinement. A photorealistic substitute
          hairstyle, wider side hair, changed fringe, shifted hairline, recolored hair, wig-like fullness, or different
          visible head shape is still a family failure on this facet.
        anchors:
          0: The requested local crown-height operation and same-headshape/same-hairstyle family is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of local crown refinement is visible; the central family requirement is essentially unmet.
          2: A small relevant attempt is present, but the visible head shape or hairstyle family is severely wrong.
          3: The operation is weakly attempted, but a primary family feature is wrong, such as new haircut, changed head silhouette, changed hairline, or changed front/side hair.
          4: The result belongs to a related but clearly wrong family, such as global hairstyle restyling, broad volume increase, or hair recoloring instead of local crown lift.
          5: The local crown goal is partially recognizable, but the hairstyle/head-shape family or a defining preservation constraint is visibly incorrect.
          6: The family is mostly correct, but one important subtype distinction remains wrong, such as side width, front contour, or hairline consistency.
          7: The exact local crown family is clearly successful, with only a minor visible preservation flaw.
          8: The exact local crown operation and same-headshape family are highly accurate, with only a tiny local imperfection.
          9: The exact requested local crown-height operation is fully realized with no substitute hairstyle, no head-shape redesign, and no defining preservation error.
      requested_crown_edit_strength_match:
        title: Requested crown edit strength is matched
        definition: Judge whether the crown change is visible at the requested amount without being too weak, globally restyled,
          inflated, helmet-like, cone-like, or destructive to the original head/hair silhouette.
        anchors:
          0: The facet is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace is visible; the main requirement is essentially unmet.
          2: A small relevant attempt is present, but the facet is severely wrong or incomplete.
          3: The facet is weakly attempted, with a primary requirement wrong or missing.
          4: The facet is recognizable, but a major mismatch, omission, or excessive change remains.
          5: The facet is partially correct, but several visible issues remain.
          6: The facet is mostly correct, but one clear important issue remains.
          7: The facet is strong, with only a minor visible flaw.
          8: The facet is near-perfect, with only a tiny local imperfection.
          9: The facet is fully satisfied with concrete visual evidence and no visible defect.
      requested_crown_region_localization_match:
        title: Requested crown region localization match
        definition: Judge whether the change is localized to only the upper crown silhouette and immediately adjacent crown-root
          volume above the original hairline. A low score is required when the edit spreads into bangs/front hair, side hair,
