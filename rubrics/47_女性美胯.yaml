      female_hip_artifact_background_stability:
        title: Artifact and background stability
        definition: 'Judge absence of warped floors, walls, furniture, repeated patterns, duplicated body parts, melted clothing,
          holes, or geometry artifacts.

          '
        anchors:
          0: Severe structural artifacts or background warping.
          3: Multiple obvious distortions or duplicated structures.
          5: One clear artifact or moderate local instability.
          7: Stable image with one minor artifact.
          9: No visible artifact; body, clothing, and background remain stable.
        rubric: Judge absence of warped floors, walls, furniture, repeated patterns, duplicated body parts, melted clothing,
          holes, or geometry artifacts. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet,
