prompt_applicability:
  purpose: 'Prevent unrequested attributes from adding easy high scores while preserving the fixed 22-score output.

    '
  always_applicable:
  - female_hip_primary_edit_outcome_match
  - female_hip_bilateral_balance_completeness_match
  activation_rules:
    female_hip_requested_shape_family_match:
    - activate for A, H, O, V, peach, heart-like, round, straight, triangular, or named hip-shape requests
    female_hip_upper_lower_width_relation_match:
    - activate when the prompt specifies narrower above, wider below, equal width, wider above, or another vertical width
      relation
    female_hip_side_curve_geometry_match:
    - activate for flare, straight side, round curve, taper, circular, or smooth side-contour instructions
    female_hip_fullness_distribution_lift_match:
    - activate for fullness, volume placement, rounded buttocks, firmness, lift, or lower-buttock emphasis
    female_hip_widening_magnitude_match:
    - activate for widen, broaden, fuller hips, or increased hip width
    female_hip_waist_slimming_ratio_match:
    - activate for slim waist, narrow waist, smaller waist, or explicit waist-to-hip ratio changes
    female_hip_bilateral_balance_completeness_match:
    - always active for visible bilateral body-contour edits
  mask_values:
    applicable: 1
    not_applicable: 0
  aggregation_rule: "P = sum_i(weight_i * mask_i * normalized_score_i) /\n    sum_i(weight_i * mask_i)\n"
