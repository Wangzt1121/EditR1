          '
        anchors:
          0: Severe edge failure or obvious compositing seam.
          3: Strong halos, jaggedness, dents, or blur.
          5: Mostly blended but with visible boundary artifacts.
          7: Clean blending with one minor edge issue.
          9: Seamless, sharp, and natural contour integration.
        rubric: Judge smooth natural boundaries without halos, jagged edges, dents, cut-and-paste seams, over-sharpening,
