      return only the final adjusted vector.
    severity_scale:
      0: failure absent
      1: minor visible issue
      2: clear failure
      3: major failure
      4: severe failure
      5: primary requirement absent, reversed, wrong-region, or unusable
    cap_by_severity:
      0: 9
      1: 7
      2: 5
      3: 4
      4: 3
