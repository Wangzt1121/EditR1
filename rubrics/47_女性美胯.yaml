      female_hip_local_lighting_shadow_consistency:
        title: Local lighting and shadow consistency
        definition: 'Judge whether highlights, body shading, cast shadows, and clothing shadows follow the new contour and
          match the source illumination.

          '
        anchors:
          0: Lighting or shadows contradict the new shape or source.
          3: Major missing, duplicated, or inconsistent shadows.
          5: Generally plausible with obvious local lighting errors.
          7: Consistent with one minor shadow issue.
          9: Lighting and shadows integrate perfectly with the new contour.
        rubric: Judge whether highlights, body shading, cast shadows, and clothing shadows follow the new contour and match
          the source illumination. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet,
