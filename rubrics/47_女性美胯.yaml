aggregation:
  prompt_compliance: 'Masked weighted arithmetic mean over the 8 Prompt Compliance facets. Only facets with applicability
    mask=1 enter the numerator and denominator.

    '
  other_l1_blocks: 'Use weighted arithmetic means for Localization and Anatomical Integration, Subject Preservation, and Task
    Realism and Image Quality.

    '
  base_formula: base_reward = 0.60 * P_masked + 0.18 * L + 0.15 * S + 0.07 * Q
  anatomy_score: A = score(female_hip_pelvic_anatomy_body_axis_consistency) / 9.0
  preservation_score: N = score(female_hip_subject_identity_non_target_body_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.25) * (N ** 0.20)
  properties:
  - Fixed 22-score output
  - Shape-family-aware compliance
  - Continuous anatomy constraint
  - Continuous non-target preservation constraint
  - No cross-facet compensation
taxonomy:
  Prompt Compliance:
    Requested Hip and Buttock Shape:
      female_hip_primary_edit_outcome_match:
        title: Primary requested hip-edit outcome
        definition: 'Judge whether the requested V-shaped hip/buttock transformation is clearly achieved in the correct region
          and direction, including wider hips and a slimmer waist. Do not credit global scaling, camera changes, leg-pose
          changes, or generic curviness.

          '
        anchors:
          0: No visible hip/waist target edit, opposite edit, wrong shape family, or a different task.
          3: Weak or inconsistent V-shaped change; original silhouette largely remains.
          5: Visible partial edit, but V-shape, hip widening, or waist slimming is materially incomplete.
          7: Clear V-shaped hip/waist edit with one visible outcome issue.
          9: V-shaped hip/buttock outline, wider hips, and slimmer waist are fully and accurately achieved.
        rubric: Judge whether the requested V-shaped hip/buttock transformation is clearly achieved in the correct region
          and direction, including wider hips and a slimmer waist. Do not credit global scaling, camera changes, leg-pose
          changes, or generic curviness. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this
          facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate
          for this facet.
      female_hip_requested_shape_family_match:
        title: Requested shape-family match
        definition: 'Judge whether the result specifically matches the requested V-shaped family: wider upper hip/hip area
          with a controlled taper through the buttock outline, together with the requested waist slimming. Do not reward A-shape,
          O-shape, peach-shape, H-shape, or generic curviness.

          '
        anchors:
          0: Wrong or opposite shape family, no V-shape, or only generic body reshaping.
          3: Slight resemblance to V-shape, but defining geometry is absent.
          5: Recognizable V-shape tendency with major geometric inaccuracies.
          7: Correct V-shape family with one visible shape inconsistency.
          9: Exact, unambiguous, and natural V-shaped hip/buttock silhouette.
        rubric: 'Judge whether the result specifically matches the requested V-shaped family: wider upper hip/hip area with
          a controlled taper through the buttock outline, together with the requested waist slimming. Do not reward A-shape,
          O-shape, peach-shape, H-shape, or generic curviness. Apply this facet''s 0-9 anchors directly. If a task-specific
          failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.'
      female_hip_upper_lower_width_relation_match:
        title: Upper-to-lower hip width relation
        definition: 'Judge the requested V-shaped width hierarchy: hips/upper-hip region should become wider while the lower
          buttock outline tapers in a controlled way, and the waist should become slimmer as requested.

          '
        anchors:
          0: Width hierarchy is reversed, unrelated, or produced by pose/camera distortion.
          3: V-shaped width relation is weak, inconsistent, or mostly absent.
          5: General V relation is present but materially inaccurate or incomplete.
          7: V-shaped width relation is correct with a minor local inconsistency.
          9: Hip widening, lower taper, and waist-to-hip relation precisely express the requested V-shape.
        rubric: 'Judge the requested V-shaped width hierarchy: hips/upper-hip region should become wider while the lower buttock
          outline tapers in a controlled way, and the waist should become slimmer as requested. Apply this facet''s 0-9 anchors
          directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.'
      female_hip_side_curve_geometry_match:
        title: Side-contour geometry
        definition: 'Judge whether the side lines have the requested flare, straightness, roundness, taper, or smooth peach
          curvature.

          '
        anchors:
          0: Side geometry contradicts the prompt.
          3: Minimal or unstable geometric change.
          5: Requested geometry is recognizable but uneven or inaccurate.
          7: Correct geometry with one visible contour issue.
          9: Side contours cleanly and precisely match the requested geometry.
        rubric: Judge whether the side lines have the requested flare, straightness, roundness, taper, or smooth peach curvature.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_hip_fullness_distribution_lift_match:
        title: Fullness distribution and lift
        definition: 'Judge where volume is placed and whether requested roundness, lower fullness, firmness, or lift is present.
          Mask when the prompt specifies no fullness or lift property.

          '
        anchors:
          0: Fullness is placed incorrectly or lift is opposite to the request.
          3: Weak, lumpy, or poorly located fullness.
          5: Partial fullness or lift with clear placement errors.
          7: Correct distribution with one visible issue.
          9: Fullness and lift are exactly placed, smooth, and prompt-faithful.
        rubric: Judge where volume is placed and whether requested roundness, lower fullness, firmness, or lift is present.
          Mask when the prompt specifies no fullness or lift property. Apply this facet's 0-9 anchors directly. If a task-specific
          failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.
      female_hip_widening_magnitude_match:
        title: Hip-widening magnitude
        definition: 'Judge whether overall hip widening matches the requested degree. When no degree is stated, require a
          visible but natural cosmetic increase.

          '
        anchors:
          0: No widening, narrowing, or opposite-direction change.
          3: Barely visible or very uneven widening.
          5: Noticeable but clearly insufficient or excessive.
          7: Appropriate widening with a minor magnitude issue.
          9: Widening is clear, balanced, and exactly appropriate.
        rubric: Judge whether overall hip widening matches the requested degree. When no degree is stated, require a visible
          but natural cosmetic increase. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this
          facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate
          for this facet.
      female_hip_waist_slimming_ratio_match:
        title: Waist slimming and waist-to-hip ratio
        definition: 'Judge requested waist narrowing and the resulting waist-to-hip balance. Under the conflict rule, only
          waist width may change; waist position, length, texture, and pose must remain stable.

          '
        anchors:
          0: Waist is unchanged when slimming is required, widened, or severely distorted.
          3: Weak or asymmetric slimming with poor waist-to-hip balance.
          5: Partial slimming but visibly inaccurate or overdone.
          7: Correct slimming with a minor ratio or symmetry issue.
          9: Waist narrowing and waist-to-hip balance exactly match the request.
        rubric: Judge requested waist narrowing and the resulting waist-to-hip balance. Under the conflict rule, only waist
          width may change; waist position, length, texture, and pose must remain stable. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      female_hip_bilateral_balance_completeness_match:
        title: Bilateral balance and completeness
        definition: 'Judge whether all visible requested sides and details are completed, with perspective-aware left-right
          balance rather than forced symmetry.

          '
        anchors:
          0: Wrong side, one side missed, or major asymmetry.
          3: Incomplete bilateral edit with obvious imbalance.
          5: Both sides attempted but one remains materially inconsistent.
          7: Complete edit with a minor perspective or balance issue.
          9: All visible requested regions are complete and naturally balanced.
        rubric: Judge whether all visible requested sides and details are completed, with perspective-aware left-right balance
          rather than forced symmetry. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet,
          apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this
          facet.
  Localization and Anatomical Integration:
    Target Boundaries and Body Structure:
      female_hip_edit_localized_to_target_region:
        title: Edit localization
        definition: 'Judge whether changes remain within the waist, hip, buttock, and minimum necessary upper-thigh transition.

          '
        anchors:
          0: Broad non-target body or scene editing.
          3: Significant spill into thighs, torso, legs, or background.
          5: Mostly localized but with clear non-target contour changes.
          7: Localized with one minor spill.
          9: Precisely localized to the permitted target region.
        rubric: Judge whether changes remain within the waist, hip, buttock, and minimum necessary upper-thigh transition.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_hip_waist_pelvis_transition_quality:
        title: Waist-to-pelvis transition
        definition: 'Judge continuity from the waist into the upper hip, without dents, shelves, pinching, abrupt bends, or
          disconnected contours.

          '
        anchors:
          0: Broken or anatomically impossible upper transition.
          3: Strong pinching, dents, or discontinuity.
          5: Recognizable transition with obvious irregularity.
          7: Natural transition with one small contour issue.
          9: Smooth, continuous, and anatomically plausible transition.
        rubric: Judge continuity from the waist into the upper hip, without dents, shelves, pinching, abrupt bends, or disconnected
          contours. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_hip_buttock_upper_thigh_transition_quality:
        title: Buttock-to-upper-thigh transition
        definition: 'Judge continuity into the upper thigh and gluteal fold without lumps, cutouts, duplicated curves, or
          unintended thigh reshaping.

          '
        anchors:
          0: Broken anatomy or severe thigh distortion.
          3: Major lumps, cutouts, or disconnected lower boundary.
          5: Transition exists but is visibly unnatural.
          7: Natural transition with one minor issue.
          9: Clean, smooth, and anatomically coherent lower transition.
        rubric: Judge continuity into the upper thigh and gluteal fold without lumps, cutouts, duplicated curves, or unintended
          thigh reshaping. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_hip_pelvic_anatomy_body_axis_consistency:
        title: Pelvic anatomy and body-axis consistency
        definition: 'Judge whether pelvic placement, hip height, body axis, torso-leg connection, and perspective remain anatomically
          coherent.

          '
        anchors:
          0: Pelvis is displaced, collapsed, duplicated, or impossible.
          3: Major axis, attachment, or perspective distortion.
          5: Generally plausible with clear anatomical inconsistency.
          7: Coherent anatomy with one minor issue.
          9: Pelvic structure and body axis remain fully coherent.
        rubric: Judge whether pelvic placement, hip height, body axis, torso-leg connection, and perspective remain anatomically
          coherent. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_hip_leg_pose_stance_joint_preservation:
        title: Leg pose, stance, and joint preservation
        definition: 'Judge preservation of leg positions, stance width, weight bearing, knee and ankle placement, foot position,
          and leg length.

          '
        anchors:
          0: Pose, stance, joints, or leg length materially changed.
          3: Strong leg drift or altered weight-bearing geometry.
          5: Mostly preserved but with a clear pose or joint shift.
          7: Preserved with one minor alignment difference.
          9: Original leg pose and joint geometry are exactly preserved.
        rubric: Judge preservation of leg positions, stance width, weight bearing, knee and ankle placement, foot position,
          and leg length. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_hip_clothing_occlusion_contour_integration:
        title: Clothing and occlusion integration
        definition: 'Judge whether clothing follows the new contour naturally while seams, folds, texture, pattern, and front-back
          occlusion remain coherent.

          '
        anchors:
          0: Clothing is detached, melted, duplicated, or wrongly layered.
          3: Major texture, seam, fold, or occlusion damage.
          5: Clothing follows the body but with obvious inconsistencies.
          7: Natural integration with one minor fabric issue.
          9: Clothing and occlusion adapt cleanly with all details preserved.
        rubric: Judge whether clothing follows the new contour naturally while seams, folds, texture, pattern, and front-back
          occlusion remain coherent. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet,
          apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this
          facet.
  Subject Preservation:
    Identity, Body, and Scene Preservation:
      female_hip_non_target_body_proportion_preservation:
        title: Non-target body-proportion preservation
        definition: 'Judge preservation of torso, shoulders, arms, hands, thighs beyond the boundary, lower legs, feet, and
          all unrequested body proportions.

          '
        anchors:
          0: Major broad-body redesign or multiple altered regions.
          3: Significant non-target proportion changes.
          5: Mostly preserved with one clear body-region alteration.
          7: Preserved with a minor non-target difference.
          9: All non-target body proportions remain unchanged.
        rubric: Judge preservation of torso, shoulders, arms, hands, thighs beyond the boundary, lower legs, feet, and all
          unrequested body proportions. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet,
          apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this
          facet.
      female_hip_subject_identity_non_target_body_preservation:
        title: Subject identity and non-target appearance
        definition: 'Judge whether the same person, face, hair, skin tone, age impression, and characteristic appearance are
          preserved.

          '
        anchors:
          0: Different person or severe identity drift.
          3: Strong face, age, skin-tone, or appearance drift.
          5: Same person is recognizable but with clear identity changes.
          7: Identity is preserved with one minor difference.
          9: Subject identity and non-target appearance are fully preserved.
        rubric: Judge whether the same person, face, hair, skin tone, age impression, and characteristic appearance are preserved.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_hip_person_scale_camera_framing_preservation:
        title: Person scale, camera, and framing preservation
        definition: 'Judge preservation of person-to-camera distance, body scale, crop, camera angle, composition, image-edge
          distances, aspect ratio, and resolution.

          '
        anchors:
          0: Global scaling, crop, reframing, or camera change creates the result.
          3: Major scale, framing, or distance drift.
          5: Mostly stable with one clear composition change.
          7: Stable with a minor framing difference.
          9: Camera, scale, framing, and image geometry are unchanged.
        rubric: Judge preservation of person-to-camera distance, body scale, crop, camera angle, composition, image-edge distances,
          aspect ratio, and resolution. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet,
          apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this
          facet.
      female_hip_clothing_scene_illumination_preservation:
        title: Clothing, scene, and illumination preservation
        definition: 'Judge preservation of clothing design and color, shoes, background, objects, global lighting, and original
          scene structure.

          '
        anchors:
          0: Major clothing, background, or lighting replacement.
          3: Strong non-target scene or garment alteration.
          5: Mostly preserved with one obvious change.
          7: Preserved with one minor difference.
          9: All non-target clothing and scene content remain unchanged.
        rubric: Judge preservation of clothing design and color, shoes, background, objects, global lighting, and original
          scene structure. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
  Task Realism and Image Quality:
    Rendering and Artifact Control:
      female_hip_skin_clothing_surface_realism:
        title: Skin and clothing surface realism
        definition: 'Judge natural skin or fabric texture in the edited region, without waxiness, smearing, repeated texture,
          plastic surfaces, or lost detail.

          '
        anchors:
          0: Severely synthetic, smeared, or destroyed surface.
          3: Strong texture artifacts or plastic appearance.
          5: Usable but visibly processed or inconsistent.
          7: Realistic with one minor surface issue.
          9: Fully photorealistic and source-consistent surface detail.
        rubric: Judge natural skin or fabric texture in the edited region, without waxiness, smearing, repeated texture, plastic
          surfaces, or lost detail. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet,
