prompt_applicability:
  purpose: All prompts share the same localized cheek-plumping target. All eight Prompt Compliance facets are always applicable.
  always_applicable:
  - cheek_plumping_primary_outcome_match
  - cheek_plumping_fullness_magnitude_match
  - cheek_plumping_hollow_reduction_match
  - cheek_plumping_volume_distribution_match
  - cheek_plumping_contour_softness_match
  - cheek_plumping_bloat_face_width_control_match
  - cheek_plumping_bilateral_balance_match
  - cheek_plumping_requested_finish_visibility_match
  mask:
  - 1
  - 1
