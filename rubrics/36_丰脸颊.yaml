aggregation:
  prompt_compliance: Weighted arithmetic mean over all 8 Prompt Compliance facets. All eight facets are applicable to every
    valid prompt.
  other_l1_blocks: Use the listed within-L1 weights for the remaining three blocks.
  base_formula: base_reward = 0.50 * P + 0.24 * L + 0.16 * S + 0.10 * Q
  anatomy_score: A = score(cheek_plumping_face_angle_perspective_anatomy_consistency) / 9.0
  identity_score: I = score(cheek_plumping_identity_face_shape_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.23) * (I ** 0.19)
taxonomy:
  Prompt Compliance:
    Requested Cheek Fullness:
      cheek_plumping_primary_outcome_match:
        title: Primary cheek-plumping outcome
        definition: Whether both assessable cheeks gain natural localized fullness.
        anchors:
          0: No target edit, opposite change, or a different task.
          3: Weak or inconsistent fullness increase.
          5: Visible partial result with major incompleteness.
          7: Clear successful result with one material issue.
          9: Cheek fullness is complete, visible, and natural.
        rubric: Whether both assessable cheeks gain natural localized fullness. Apply this facet's 0-9 anchors directly. If
          any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated preservation,
          attractiveness, or realism compensate for this facet.
      cheek_plumping_fullness_magnitude_match:
        title: Fullness magnitude
        definition: Whether added volume is strong or noticeable as requested while remaining believable.
        anchors:
          0: No volume increase or destructive swelling.
          3: Severely too weak, too strong, or uneven.
          5: Recognizable but clearly inaccurate magnitude.
          7: Appropriate magnitude with one minor issue.
          9: Magnitude precisely matches the prompt and source face.
        rubric: Whether added volume is strong or noticeable as requested while remaining believable. Apply this facet's 0-9
          anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not
          let unrelated preservation, attractiveness, or realism compensate for this facet.
      cheek_plumping_hollow_reduction_match:
        title: Sunken-cheek reduction
        definition: Whether visible cheek hollows are reduced without erasing natural facial structure.
        anchors:
          0: Hollows remain unchanged, deepen, or are replaced by broad swelling.
          3: Minimal or highly artificial hollow correction.
          5: Partial reduction with clear residual or overfill.
          7: Effective reduction with one minor issue.
          9: Sunken appearance is naturally and completely improved.
        rubric: Whether visible cheek hollows are reduced without erasing natural facial structure. Apply this facet's 0-9
          anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not
          let unrelated preservation, attractiveness, or realism compensate for this facet.
      cheek_plumping_volume_distribution_match:
        title: Cheek-volume distribution
        definition: Whether volume is distributed across the true cheek soft tissue rather than concentrated in one artificial
          bulge.
        anchors:
          0: Volume is misplaced or forms an impossible lump.
          3: Major concentration, asymmetry, or anatomical mismatch.
          5: General fullness exists with one clear distribution error.
          7: Natural distribution with one minor issue.
          9: Volume is smoothly and anatomically distributed.
        rubric: Whether volume is distributed across the true cheek soft tissue rather than concentrated in one artificial
          bulge. Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
      cheek_plumping_contour_softness_match:
        title: Cheek-contour softness
        definition: Whether the cheek contour becomes softly rounded and healthy without losing definition.
        anchors:
          0: Contour becomes sharp, collapsed, or balloon-like.
          3: Strong rigidity, lumpiness, or over-rounding.
          5: General softening with one clear contour issue.
          7: Soft and natural with one minor issue.
          9: Contour is smoothly rounded and fully believable.
        rubric: Whether the cheek contour becomes softly rounded and healthy without losing definition. Apply this facet's
          0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do
          not let unrelated preservation, attractiveness, or realism compensate for this facet.
      cheek_plumping_bloat_face_width_control_match:
        title: Bloat and face-width control
        definition: Whether fullness is added without global puffiness, widened jaw, or swollen face shape.
        anchors:
          0: Severe facial bloating or broad face-shape expansion.
          3: Major non-target widening or edema-like appearance.
          5: Localized fullness exists but noticeable broad swelling remains.
          7: Well controlled with one minor width change.
          9: Fullness is localized with no bloating or face-width drift.
        rubric: Whether fullness is added without global puffiness, widened jaw, or swollen face shape. Apply this facet's
          0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do
          not let unrelated preservation, attractiveness, or realism compensate for this facet.
      cheek_plumping_bilateral_balance_match:
        title: Bilateral completeness and balance
        definition: Whether visible cheeks are treated completely with pose- and asymmetry-aware balance.
        anchors:
          0: One visible cheek is missed or severe imbalance is introduced.
          3: Major left-right mismatch or incomplete editing.
          5: Both cheeks are attempted but visibly inconsistent.
          7: Balanced with one minor difference.
          9: All assessable cheeks are complete and naturally balanced.
        rubric: Whether visible cheeks are treated completely with pose- and asymmetry-aware balance. Apply this facet's 0-9
          anchors directly. If any global failure affecting this facet is detected, apply failure_propagation caps. Do not
          let unrelated preservation, attractiveness, or realism compensate for this facet.
      cheek_plumping_requested_finish_visibility_match:
        title: Requested finish and visibility
        definition: Whether studio, editorial, app-style, commercial, premium, or high-fashion finish is visible at normal
          viewing size.
        anchors:
          0: Finish is absent, opposite, or destructive.
          3: Strong style, visibility, or realism mismatch.
          5: Requested finish is recognizable but inaccurate.
          7: Appropriate finish with one minor mismatch.
          9: Finish and normal-view visibility exactly match the prompt.
        rubric: Whether studio, editorial, app-style, commercial, premium, or high-fashion finish is visible at normal viewing
          size. Apply this facet's 0-9 anchors directly. If any global failure affecting this facet is detected, apply failure_propagation
          caps. Do not let unrelated preservation, attractiveness, or realism compensate for this facet.
  Localization and Anatomical Integration:
    Cheek Anatomy and Transitions:
      cheek_plumping_edit_localized_to_cheek_region:
        title: Edit localization
        definition: Whether changes remain within cheek soft tissue and minimum necessary transition areas.
        anchors:
          0: Broad whole-face, jaw, nose, mouth, hair, or scene editing.
          3: Significant spill into non-target facial regions.
          5: Mostly localized with one clear extra alteration.
          7: Localized with one minor spill.
          9: Precisely confined to the permitted cheek region.
