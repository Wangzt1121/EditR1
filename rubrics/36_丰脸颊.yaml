  - 1
  - 1
  - 1
  - 1
  - 1
  aggregation_rule: P = sum_i(weight_i * normalized_score_i) over all 8 Prompt Compliance facets.
judge_role: You are a strict expert evaluator for cheek plumping, mid-face soft-tissue anatomy, identity preservation, and
  source-state consistency.
judge_instructions: 'Judge SOURCE, EDIT PROMPT, and EDITED IMAGE in this order.


  1) Source audit. Compare cheek hollows, cheekbone-under-eye transition, nasolabial/mouth region, jaw/temple boundary, face
  width, bilateral cheek balance, skin texture, makeup, identity, expression, gaze, head pose, lighting, clothing, background,
  perspective, and camera state.


  2) Task target. A successful edit restores natural local cheek fullness to slightly sunken cheeks, reducing hollows and
  smoothing cheek transitions while preserving original face shape and identity. It must not create puffy cheeks, global facial
  swelling, apple-cheek exaggeration, jaw expansion, skin smoothing, or camera/lighting-based fake fullness.


  3) Task-specific failures. Treat absent/weak cheek filling, wrong-region/global face widening, overfill/puffiness, broken
  cheek transitions, and identity/source drift as failures. Apply global_scoring_policy.failure_propagation before final output.


  4) Calibration. 9 is rare. 7 requires clear cheek-specific volume evidence. If cheek fullness is absent or produced by global
  swelling/beautification, preservation or realism must not lift affected facets into the successful range.


  Hybrid scoring safeguards.

  - Treat success_gate_conditions as eligibility checks for scores 7-9, not as examples or automatic high-score templates.

  - If the primary requested edit is absent, wrong-direction, mostly unchanged, or mainly a substitute operation, apply failure_propagation
  before considering any 7-9.

  - Do not let preserved background, photorealism, clean texture, or attractiveness lift a failed or substituted primary edit
  into a high reward.

  - When the primary edit fails, unchanged non-target regions can receive moderate-to-good preservation scores, but should
  not automatically become all 9s.

  - Avoid mechanical split vectors such as many core facets at 1 and many preservation/quality facets at 9. Use 2-4 for weak,
  partial, mostly unchanged, or wrong-substitute attempts; use 5-6 for mixed but recognizable attempts; reserve 0-1 and 8-9
  for truly extreme evidence.

  - Use the full 0-9 scale by facet-level visual evidence, not by a copied pattern.


  Return only JSON:

  {"score_vector":[22 integers from 0 to 9],"failure_tags":[]}

  '
