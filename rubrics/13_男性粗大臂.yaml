          - no_obvious_artifacts
      wrong_operation_or_substitute_edit:
        detect_when: |-
          The result substitutes another edit family or generic beautification for the requested Male Arm Bulking. This includes changing a
          related but non-requested attribute, using a global filter, shifting pose/crop/camera, or producing an attractive but
          semantically wrong edit instead of the requested operation on male upper arms, biceps, triceps, forearms when visible, shoulders, sleeves, cuffs, torso contact, and arm-background.
        severity_guidance: |-
          Related but visibly wrong substitute edits should be severity at least 2. If the substitute is the dominant visible
          change, use severity 3-4. If it changes identity, pose, scene, or makes the requested edit absent, use severity 4-5.
        affected_l3:
          - target_edit_applied
          - primary_instruction_fulfilled
          - target_region_correct
