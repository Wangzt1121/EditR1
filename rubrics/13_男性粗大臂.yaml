          - no_obvious_artifacts
      overdone_or_anatomically_implausible_edit:
        detect_when: |-
          The target edit is excessive, unnatural, anatomically or materially implausible, changes the intended source character,
          or pushes the requested effect beyond the prompt so that it looks artificial rather than source-consistent.
        severity_guidance: |-
          Mild over-strength may be severity 1. Clear over-editing, unnatural geometry/material, or obvious imbalance should be
          severity 2-3. Severe deformation, plastic appearance, or unusable target structure should be severity 4-5.
        affected_l3:
