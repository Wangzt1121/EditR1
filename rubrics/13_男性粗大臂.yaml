          - target_region_correct
          - all_requested_attributes_covered
          - edit_strength_appropriate
          - no_wrong_edit_type
          - unrequested_target_attributes_preserved
          - arm_bulk_amount_match
          - sleeve_fill_and_arm_outline_match
          - arm_anatomy_pose_plausible
          - cuffs_sleeves_torso_preserved_armbulk
          - body_scale_distance_preserved_armbulk
          - edit_confined_to_target_region
          - boundary_blends_naturally
          - occlusion_and_shadow_natural
          - bilateral_balance_when_expected
          - target_texture_realistic
          - color_light_integration
          - no_obvious_artifacts
      localization_boundary_or_integration_failure:
        detect_when: |-
          The edit spills outside the intended target area, misses important parts of male upper arms, biceps, triceps, forearms when visible, shoulders, sleeves, cuffs, torso contact, and arm-background, damages adjacent structures,
          breaks occlusion/contact boundaries, or fails to blend with source lighting, texture, perspective, or depth.
        severity_guidance: |-
          Small boundary or blending issues may be severity 1. Clear spillover, missed target subregion, broken contact, or local
          integration failure should be severity 2-3. Large wrong-region edits or severe boundary damage should be severity 4-5.
        affected_l3:
          - target_region_correct
          - all_requested_attributes_covered
          - edit_strength_appropriate
          - no_wrong_edit_type
          - unrequested_target_attributes_preserved
          - arm_bulk_amount_match
          - sleeve_fill_and_arm_outline_match
          - arm_anatomy_pose_plausible
          - cuffs_sleeves_torso_preserved_armbulk
          - body_scale_distance_preserved_armbulk
          - edit_confined_to_target_region
          - boundary_blends_naturally
          - occlusion_and_shadow_natural
          - bilateral_balance_when_expected
          - target_texture_realistic
          - color_light_integration
          - no_obvious_artifacts
      identity_expression_pose_scene_or_non_target_drift:
        detect_when: |-
          The candidate changes identity, expression, gaze, pose, face/body geometry, non-target attributes, clothing, accessories,
          background, camera/framing, global color, exposure, saturation, white balance, or any source-state element not requested
          by the prompt.
        severity_guidance: |-
          Minor non-target drift may be severity 1. Clear identity, expression, pose, lighting, background, or scene drift should
          be severity at least 2. Changed-person impression, broad source-state change, or camera/pose substitution should be
          severity 3-5.
          Instruction-only success is not enough: if the target edit is correct but any non-target/source-state region visibly
          changes, keep severity at least 2. If the candidate changes identity, expression, pose, camera/framing, background,
          clothing, global color/lighting, or broad non-target geometry, use severity 3-5 even when prompt compliance is strong.
        affected_l3:
