          - no_wrong_edit_type
          - unrequested_target_attributes_preserved
          - arm_bulk_amount_match
          - sleeve_fill_and_arm_outline_match
          - arm_anatomy_pose_plausible
          - cuffs_sleeves_torso_preserved_armbulk
          - body_scale_distance_preserved_armbulk
          - edit_confined_to_target_region
          - boundary_blends_naturally
