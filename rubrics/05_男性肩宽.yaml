taxonomy:
  Prompt Compliance:
    Width, Profile, and Shape:
      requested_shoulder_widening_direction_match:
        title: Requested shoulder widening direction match
        definition: Judge whether the shoulders actually become wider through local outward shoulder expansion rather than
          narrowing, whole-person scaling, or torso inflation.
        anchors:
          0: the requested shoulder widening direction is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested shoulder widening direction is visible; the shoulders are not widened
            or the wrong body change is used.
          2: A small relevant attempt is present, but the requested shoulder widening direction is severely incorrect or incomplete.
          3: the requested shoulder widening direction is weakly attempted; one or more primary requirements are missing or
            contradictory.
          4: the requested shoulder widening direction is recognizable, but a major mismatch, omission, or excessive change
            remains.
          5: the requested shoulder widening direction is moderately achieved, with several substantial visible problems.
          6: the requested shoulder widening direction is mostly correct, but one clear and important issue remains.
          7: the requested shoulder widening direction is clearly successful, with only a minor visible mismatch.
          8: the requested shoulder widening direction is highly accurate and complete, with only a tiny local imperfection.
          9: Both shoulders are widened in the correct direction through a precise local edit.
      requested_shoulder_width_strength_match:
        title: Requested shoulder-width strength match
        definition: Judge visible amount for wider, much wider, substantially wider, dramatically wider, or generic broad-shoulder
