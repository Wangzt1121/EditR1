aggregation:
  prompt_compliance: Weighted arithmetic mean over all 8 Prompt Compliance facets. All eight facets are applicable to every
    valid prompt in this dataset.
  other_l1_blocks: Use the listed within-L1 weights for Localization and Anatomical Integration, Subject Preservation, and
    Task Realism and Image Quality.
  base_formula: base_reward = 0.55 * P + 0.20 * L + 0.18 * S + 0.07 * Q
  anatomy_score: A = score(eye_spacing_face_angle_perspective_anatomy_consistency) / 9.0
  identity_score: I = score(eye_spacing_subject_identity_facial_proportion_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.22) * (I ** 0.20)
taxonomy:
  Prompt Compliance:
    Requested Eye Spacing Adjustment:
      eye_spacing_primary_adjustment_outcome_match:
        title: Primary eye-spacing outcome
        definition: Whether both complete eye units are visibly moved closer together relative to the source, not merely made
          prettier, enlarged, or globally warped. Do not give credit for apparent closer spacing caused by camera angle, crop/zoom,
          face-width change, nose-bridge deformation, or eye-shape distortion.
        anchors:
          0: No visible inward eye-spacing edit, outward movement, unchanged spacing, or a different task.
          3: Very weak or doubtful inward movement; spacing remains substantially like the source.
          5: Visible partial inward movement, but balance, localization, or identity is materially imperfect.
          7: Clearly closer eye spacing with one visible issue in balance, localization, or naturalness.
          9: Both eyes are cleanly and noticeably closer together exactly as requested, with eye shape, gaze, nose bridge,
            identity, and camera angle preserved.
        rubric: Whether both complete eye units are visibly moved closer together relative to the source, not merely made
          prettier, enlarged, or globally warped. Do not give credit for apparent closer spacing caused by camera angle, crop/zoom,
          face-width change, nose-bridge deformation, or eye-shape distortion. Apply this facet's 0-9 anchors directly. If
          any global failure affecting this facet is detected, apply failure_propagation caps. Do not let unrelated preservation,
          attractiveness, or realism compensate for this facet.
      eye_spacing_source_adaptive_direction_match:
        title: Requested inward movement direction
        definition: Whether the eyes move inward/closer together as explicitly requested by the prompt. For this task item,
          outward movement, no movement, or a generic source-adaptive refinement is not the requested direction.
        anchors:
          0: Eyes move outward, do not move, or the apparent direction is created by global face/camera distortion.
          3: Inward direction is barely visible, ambiguous, or inconsistent across the two eyes.
          5: Mostly inward but weak, asymmetric, or partly produced by surrounding facial distortion.
          7: Correct inward direction with one minor visible inconsistency.
          9: Precise inward movement that makes the eyes closer together without non-target distortion.
        rubric: Whether the eyes move inward/closer together as explicitly requested by the prompt. For this task item, outward
          movement, no movement, or a generic source-adaptive refinement is not the requested direction. Apply this facet's
