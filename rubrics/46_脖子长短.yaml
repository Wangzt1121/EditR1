prompt_applicability:
  purpose: 'Keep the fixed 22-score output while ensuring the direction-specific target is interpreted correctly.

    '
  valid_prompt_rule: 'For the current training set, all 6 Prompt Compliance facets are applicable to every valid sample.

    '
  direction_activation:
    lengthen_terms:
    - increase visible neck length
    - lengthen the neck
    - make the neck longer
    shorten_terms:
    - reduce visible neck length
    - shorten the neck
    - make the neck shorter
  aggregation_rule: 'P = sum_i(weight_i * normalized_score_i) over all 6 Prompt Compliance facets.

    '
