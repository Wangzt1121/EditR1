        - neck_width_taper_preservation
        - neck_subject_identity_face_preservation
        - neck_expression_gaze_hair_ear_preservation
        - neck_torso_pose_non_target_body_preservation
        - neck_scene_camera_framing_preservation
        - neck_artifact_background_stability
      wrong_direction_or_wrong_operation:
        detect_when: The candidate shortens when the prompt asks to lengthen, lengthens when the prompt asks to shorten, changes
          neck width/thickness instead of length, slims the face/jaw, or performs an unrelated beauty/body edit.
        severity_guidance: Minor ambiguity with some correct neck-length change may be severity 2. Clear wrong operation such
          as neck-width change, face/jaw slimming, or unrelated beautification should be severity 3. Opposite length direction
          or unrelated operation replacing the target must be severity 4-5.
        affected_l3:
        - neck_primary_requested_outcome_match
        - neck_requested_direction_match
        - neck_requested_length_change_magnitude_match
        - neck_final_head_neck_shoulder_proportion_match
        - neck_width_taper_preservation
        - neck_visible_region_completeness_consistency
        - neck_edit_localized_to_visible_neck
        - neck_cervical_axis_head_alignment
        - neck_cervical_anatomy_soft_tissue_continuity
        - neck_jawline_upper_transition_quality
        - neck_subject_identity_face_preservation
        - neck_expression_gaze_hair_ear_preservation
