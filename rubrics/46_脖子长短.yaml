  anatomy_score: A = score(neck_cervical_anatomy_soft_tissue_continuity) / 9.0
  identity_score: I = score(neck_subject_identity_face_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.25) * (I ** 0.15)
taxonomy:
  Prompt Compliance:
    Requested Neck-Length Edit:
      neck_primary_requested_outcome_match:
        title: Primary requested outcome
        definition: 'Judge whether the visible neck itself becomes naturally longer through localized editing, without using
          head movement, head resizing, shoulder lowering, torso stretching, pose change, crop/zoom, or camera movement.

          '
        anchors:
          0: No visible neck lengthening, opposite shortening, wrong edit, or only camera/body/head/shoulder movement.
          3: Very weak or doubtful lengthening; source neck span mostly remains.
          5: Visible partial lengthening but incomplete, unnatural, or mixed with non-target movement.
          7: Clear natural neck lengthening with one visible issue.
          9: The visible neck is cleanly and naturally lengthened while head, shoulders, pose, and scene remain source-like.
        rubric: Judge whether the visible neck itself becomes naturally longer through localized editing, without using head
          movement, head resizing, shoulder lowering, torso stretching, pose change, crop/zoom, or camera movement. Apply
          this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps.
          Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      neck_requested_direction_match:
        title: Length-change direction
        definition: 'Judge whether the visible neck is lengthened in the exact requested direction. Shortening, unchanged
          length, or apparent lengthening caused by moving head/shoulders/camera is not the requested direction.

          '
        anchors:
          0: Opposite shortening, no change, or lengthening illusion from head/shoulder/camera movement.
          3: Lengthening direction is barely perceptible, ambiguous, or inconsistent.
          5: Correct direction is partly established but weak or mixed with non-target movement.
          7: Correct and clear lengthening direction with a minor inconsistency.
          9: Lengthening direction is exact, unambiguous, and localized to the neck.
        rubric: Judge whether the visible neck is lengthened in the exact requested direction. Shortening, unchanged length,
          or apparent lengthening caused by moving head/shoulders/camera is not the requested direction. Apply this facet's
          0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let
          unrelated preservation, realism, or attractiveness compensate for this facet.
      neck_requested_length_change_magnitude_match:
        title: Length-change magnitude
        definition: 'Judge whether the amount of visible neck lengthening is noticeable, natural, and appropriate to the request,
          without becoming stretched, tube-like, giraffe-like, or imperceptible.

          '
        anchors:
          0: No useful change, opposite change, or extreme destructive lengthening.
          3: Severely insufficient, excessive, uneven, or mostly caused by global distortion.
          5: Noticeable but clearly inaccurate, overdone, or underdone.
          7: Appropriate natural lengthening with a minor magnitude issue.
          9: Magnitude is clear, balanced, natural, and exactly prompt-matched.
        rubric: Judge whether the amount of visible neck lengthening is noticeable, natural, and appropriate to the request,
          without becoming stretched, tube-like, giraffe-like, or imperceptible. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      neck_final_head_neck_shoulder_proportion_match:
        title: Final head-neck-shoulder proportion
        definition: 'Judge whether the edited neck length forms a plausible proportion relative to the unchanged head and
          shoulders.

          '
        anchors:
          0: Grossly implausible or disconnected proportion.
          3: Strongly elongated, compressed, or unbalanced appearance.
          5: Generally plausible but visibly awkward.
          7: Natural proportion with one minor issue.
          9: Fully natural and well-balanced proportion.
        rubric: Judge whether the edited neck length forms a plausible proportion relative to the unchanged head and shoulders.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      neck_width_taper_preservation:
        title: Neck width and taper preservation
        definition: 'Judge whether original neck width, side contour, and taper are preserved while only length changes.

          '
        anchors:
          0: Neck is severely widened, narrowed, pinched, or tube-like.
          3: Major width or taper drift.
          5: Mostly preserved with an obvious contour change.
