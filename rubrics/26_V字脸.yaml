aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Requested V-Line Operation:
      requested_v_line_face_operation_match:
        title: Requested source-preserving V-shaped lower-face tightening match
        definition: Judge whether the lower half of the original face is tightened into a natural V-shaped tendency, where
          lower cheeks, mandibular corners, and jaw sides move inward while the original chin identity, beard/stubble, skin
          texture, age impression, eyes, nose, mouth, expression, and head pose remain source-like. Do not require a newly
          sharp chin. Do not credit generic beautification, younger-face replacement, skin smoothing, whole-face compression,
          jaw-only slimming, pointed-chin editing, chin lengthening, or image compression as successful V-shaped tightening.
        anchors:
          0: The requested V-line operation is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of a V-line operation is visible.
          2: A small relevant attempt exists, but the result is dominated by a substitute operation or identity-changing beauty
            filter.
          3: The lower face is weakly edited, but source-preserving lower-face tightening is mostly wrong.
          4: A recognizable attempt exists, yet a major lower-face tightening component is absent, substituted, or identity-damaging.
          5: The operation is partially correct, with several substantial tightening, preservation, or method errors.
          6: The lower-face tightening is mostly correct, but one clear operation or preservation error remains.
          7: Source-preserving lower-face tightening is clearly achieved, with only a minor visible mismatch.
          8: The operation is highly accurate and source-preserving, with only a tiny local imperfection.
          9: Both lower jaw sides and lower cheeks naturally tighten into a source-preserving V-shaped lower face with no
            substitute operations.
        rubric: Judge whether the lower half of the original face is tightened into a natural V-shaped tendency, where lower
          cheeks, mandibular corners, and jaw sides move inward while the original chin identity, beard/stubble, skin texture,
