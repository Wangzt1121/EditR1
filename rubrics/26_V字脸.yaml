        rubric: Judge pores, fine lines, makeup, beard or stubble, sideburns, scalp hair, hair strands, skin microtexture,
          and source-level sharpness after lower-face contour reconstruction. Apply this facet's 0-9 anchors directly. If
          a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism,
          or attractiveness compensate for this facet.
      v_line_lighting_shadow_color_integration:
        title: Lighting, shadows, and color integrate with the source
        definition: Judge lower-cheek and jaw shading, chin highlights, mentolabial and submental shadows, skin tone, facial
          depth, contact shadows, white balance, and global illumination without false contour painting.
        anchors:
          0: Lighting and color integration is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of correct illumination remains.
          2: A small relevant attempt exists, but shadows or color are severely false or inconsistent.
          3: Integration is weakly attempted and major lighting errors remain.
          4: The lighting is recognizable, but a major halo, false shadow, flat patch, or color mismatch remains.
          5: Integration is partial, with several substantial shadow or color problems.
          6: Lighting is mostly correct, but one clear local issue remains.
          7: Shadow, lighting, and color integration are strong, with only a minor mismatch.
          8: Integration is highly accurate, with only a tiny local imperfection.
          9: All lower-face, chin, neck, hair, skin, and background illumination perfectly match the source.
        rubric: Judge lower-cheek and jaw shading, chin highlights, mentolabial and submental shadows, skin tone, facial depth,
          contact shadows, white balance, and global illumination without false contour painting. Apply this facet's 0-9 anchors
          directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      v_line_boundary_background_reconstruction_consistent:
        title: V-line boundaries and background reconstruction are consistent
        definition: Judge lower-cheek, jaw, chin, hair, ear, accessory, collar, neck, and clothing boundaries together with
          newly exposed background for clean but natural physical relationships.
        anchors:
          0: Boundary and reconstruction consistency is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of correct contact or reconstruction remains.
          2: A small relevant attempt exists, but major leakage, gaps, repeated background, or impossible overlap is visible.
          3: Consistency is weakly attempted and major boundary errors remain.
          4: The relationships are recognizable, but a major seam, cutout, overlap, collar, neck, or reconstruction error
            remains.
          5: Consistency is partial, with several substantial visible problems.
          6: Boundaries are mostly correct, but one clear contact or reconstruction issue remains.
          7: Boundary and reconstruction consistency are strong, with only a minor mismatch.
          8: Consistency is highly accurate, with only a tiny local imperfection.
          9: All lower-face, hair, ear, accessory, collar, neck, clothing, and background boundaries are seamless and physically
            coherent.
        rubric: Judge lower-cheek, jaw, chin, hair, ear, accessory, collar, neck, and clothing boundaries together with newly
          exposed background for clean but natural physical relationships. Apply this facet's 0-9 anchors directly. If a task-specific
          failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.
      v_line_artifact_sharpness_no_warp_mask:
        title: Artifact control, source sharpness, and absence of warp or mask
        definition: Judge halos, jagged edges, blur, over-sharpening, duplicate contours, clone patterns, stretched hair,
          warped ears, bent background, thin neck, distorted collar, liquify waves, mask-like transitions, and source-resolution
          consistency.
        anchors:
          0: Artifact control is absent, reversed, unrelated, or unusable.
          1: Only a negligible artifact-free region remains.
          2: A small relevant attempt exists, but severe warping, masking, blur, duplication, or liquify distortion dominates.
          3: Artifact control is weakly achieved and major defects remain.
          4: The result is recognizable, but a major seam, warp, duplicate edge, mask, liquify wave, or sharpness mismatch
            remains.
          5: Quality is partial, with several substantial visible artifacts.
          6: The result is mostly clean, but one clear artifact or sharpness issue remains.
          7: Artifact control is strong, with only a minor visible defect.
          8: The result is nearly artifact-free, with only a tiny local imperfection.
          9: The edited image is fully stable, source-sharp, seamless, and free of warping, masking, duplication, or background
            deformation.
        rubric: Judge halos, jagged edges, blur, over-sharpening, duplicate contours, clone patterns, stretched hair, warped
          ears, bent background, thin neck, distorted collar, liquify waves, mask-like transitions, and source-resolution
          consistency. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
identity_preservation_protocol:
  purpose: Prevent successful V-line sculpting from hiding identity, internal facial geometry, upper-face, mouth, neck, camera,
    or background drift. Identity is judged by source-to-result correspondence, not by attractiveness or V-line strength.
  comparison_checklist:
  - eye shape, spacing, aperture, gaze, eyelids, and eyelashes
  - eyebrow position and shape
  - nose width, length, geometry, and placement
  - mouth width, lip geometry, mouth corners, teeth visibility, and expression
  - cheekbone position, upper-face width, forehead, and ears
  - facial height, mouth-to-chin distance, chin length and projection
  - source-specific jaw and chin character after accounting for the intended V-line
  - hairline, hairstyle, facial hair, neck width, head pose, and head-neck relation
  - age impression, gender presentation, skin tone, stable marks, and facial texture
  - clothing, accessories, background hue, texture, brightness, contrast, and white balance
  - camera angle, crop, framing, lighting, composition, aspect ratio, and resolution
  - overall same-person impression at normal viewing size
  strict_rules:
  - Do not increase identity because the result is attractive, slim, symmetrical, or prompt-compliant.
  - Do not treat a photorealistic but different-looking person as identity-preserved.
  - A score of 7 still requires a strong same-person match with only minor drift.
  - A changed-person impression must score 4 or below on the dedicated identity facet.
  - Only the lower-face V-line contour may change; internal features, upper face, mouth state, neck, and global image remain
    constrained.
  - V-line correctness, identity, expression, mouth, neck, background, camera state, and rendering quality are independent.
  task_specific_exception: only lower-cheek taper, mandibular-corner and jawline narrowing, jaw-to-chin convergence, chin-apex
    refinement, and the minimum adjacent skin, hair, ear, facial-hair, neck, clothing, accessory, and background reconstruction
    zones
