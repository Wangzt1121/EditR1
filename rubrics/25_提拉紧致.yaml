aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Requested Face-Firming Operation:
      requested_face_firming_operation_match:
        title: Requested realistic face-firming operation match
        definition: Judge whether the edited image genuinely adds a realistic face-firming/tightening effect, not jaw slimming,
          V-line sculpting, chin reshaping, smoothing, or global filtering.
        anchors:
          0: face-firming operation is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of correct face-firming operation is visible.
          2: A small relevant trace exists, but major requirements are wrong or dominated by a substitute operation.
          3: face-firming operation is weakly attempted and major visible errors remain.
          4: face-firming operation is recognizable, but one major requirement is missing, substituted, or source-damaging.
          5: face-firming operation is partially correct, with several substantial issues.
          6: face-firming operation is mostly correct, but one clear issue remains.
          7: face-firming operation is strong, with only a minor visible mismatch.
          8: face-firming operation is highly accurate, with only a tiny imperfection.
          9: The face shows a precise realistic firming effect with no substitute operation.
        rubric: Judge whether the edited image genuinely adds a realistic face-firming/tightening effect, not jaw slimming,
          V-line sculpting, chin reshaping, smoothing, or global filtering. Apply this facet's 0-9 anchors directly. If a
