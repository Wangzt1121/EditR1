taxonomy:
  Prompt Compliance:
    Requested Body / Full-Body Operation:
      body_fullbody_requested_operation_match:
        title: Requested operation match
        definition: The edited image performs the specific body, full-body, pose, clothing-structure, viewpoint, lighting,
          background, accessory, or localized body-region operation requested by the prompt.
      body_fullbody_target_region_match:
        title: Target region match
        definition: The edit affects the intended region, such as pose, torso, limbs, hands, feet, clothing, camera/viewpoint,
          lighting, background, accessory, or another body-related target named by the prompt.
      body_fullbody_requested_attribute_coverage:
        title: Requested attributes covered
        definition: The explicit prompt details such as direction, color, material, shape, pose, garment type, lighting
          style, camera angle, folds, contact, or strength are visibly represented.
      body_fullbody_strength_direction_match:
        title: Strength and direction match
        definition: The edit is strong enough to satisfy the prompt, follows the requested direction, and is not excessive,
          reversed, caricatured, or too weak.
      body_fullbody_no_wrong_substitute_edit:
        title: No wrong substitute edit
        definition: The visible result is not mainly a different operation such as generic beautification, face editing,
          hair editing, random clothing change, style transfer, or background change unless explicitly requested.
      body_fullbody_prompt_preservation_constraints_followed:
        title: Prompt preservation constraints followed
        definition: Regions and attributes that the prompt asks to preserve remain source-consistent while the requested
          body/full-body edit is applied.
  Anatomical and Physical Integration:
    Body Plausibility and Physical Coherence:
      body_fullbody_pose_limb_joint_plausibility:
        title: Pose, limb, and joint plausibility
        definition: Body pose, limbs, hands, fingers, torso, legs, feet, and visible joints remain anatomically plausible
          after the edit.
      body_fullbody_clothing_deformation_consistency:
        title: Clothing deformation consistency
        definition: Clothing, fabric folds, garment boundaries, and body-clothing interaction adapt naturally to the
          requested edit without broken seams or impossible fabric behavior.
      body_fullbody_viewpoint_perspective_consistency:
        title: Viewpoint and perspective consistency
        definition: Camera angle, body scale, perspective, foreshortening, and scene geometry are coherent with the source
          and with any explicitly requested viewpoint change.
      body_fullbody_occlusion_shadow_contact_realism:
        title: Occlusion, shadow, and contact realism
        definition: Contacts between body parts, clothing, accessories, ground, props, and background have plausible
          occlusion, shadows, highlights, and support.
      body_fullbody_scale_proportion_balance:
        title: Scale and proportion balance
        definition: Body proportions, head-to-body scale, limb length, shoulder/hip/torso relation, and subject framing
          remain natural unless the prompt explicitly requests a proportional change.
  Subject and Non-target Preservation:
    Identity and Non-target Stability:
      body_fullbody_identity_face_preserved:
        title: Identity and face preserved
        definition: The person remains the same individual; face shape, facial features, expression, gaze, and visible head
          identity do not drift unless explicitly requested.
      body_fullbody_unrequested_body_parts_preserved:
        title: Unrequested body parts preserved
        definition: Body parts, pose details, hands, limbs, skin, and silhouette not targeted by the prompt remain close to
          the source.
      body_fullbody_hair_makeup_accessories_preserved:
        title: Hair, makeup, and accessories preserved
        definition: Hair, hairline, makeup, facial hair, jewelry, glasses, and accessories remain unchanged unless they are
          the explicit target or must minimally adapt to contact.
      body_fullbody_clothing_identity_preserved_unless_target:
        title: Clothing identity preserved unless target
        definition: Clothing design, color, texture, patterns, logos, and garment identity remain source-consistent except
          for the explicitly requested clothing or body-contact edit.
      body_fullbody_background_scene_preserved_unless_target:
        title: Background and scene preserved unless target
        definition: Background structure, scene layout, lighting, camera angle, resolution, and global color remain
          unchanged unless the prompt explicitly requests a scene, lighting, or viewpoint change.
  Localization and Boundary Control:
    Target Localization and Clean Boundaries:
      body_fullbody_edit_localized_to_requested_scope:
        title: Edit localized to requested scope
        definition: The edit is confined to the intended body/full-body region or explicitly requested global style region
          and does not unnecessarily alter protected areas.
      body_fullbody_boundary_blending_clean:
        title: Boundary blending clean
        definition: Boundaries around limbs, clothing, hair, accessories, body contours, ground contact, and edited regions
          are clean, coherent, and naturally blended.
      body_fullbody_no_leakage_to_face_or_background:
        title: No leakage to face or background
        definition: The edit does not leak into face, skin, hair, background, clothing, or scene regions that should remain
          preserved.
  Task Realism and Image Quality:
    Rendering and Artifact Control:
      body_fullbody_texture_material_realism:
        title: Texture and material realism
        definition: Skin, fabric, hair, accessories, shadows, highlights, reflections, and scene materials remain realistic
          and compatible with the source.
      body_fullbody_lighting_color_consistency:
        title: Lighting and color consistency
        definition: Lighting, exposure, color temperature, contrast, saturation, and shadows are consistent with the source
          unless explicitly requested to change.
      body_fullbody_artifact_blur_distortion_control:
        title: Artifact, blur, and distortion control
        definition: The result avoids blur, over-smoothing, duplicated or broken structures, warped anatomy, jagged edges,
          melted textures, resolution loss, and obvious generation artifacts.
