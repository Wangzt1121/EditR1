compact_output_contract:
  format:
    scores: array of exactly 22 integers in active_l3 order
  requirements:
  - minItems = 22
  - maxItems = 22
  - minimum score = 0
  - maximum score = 9
  - Do not output facet names, evidence, explanations, summaries, or failure tags in the training path.
  high_score_note: Do not copy a fixed example vector. Give 8-9 only when the matching facet has visible positive evidence
    and no propagated failure cap.
  no_example_reason: Fixed example vectors are intentionally omitted to avoid template copying and high-score saturation.
