aggregation:
  prompt_compliance: 'Masked weighted arithmetic mean over the 8 Prompt Compliance L3 facets. Only facets with applicability
    mask=1 enter the numerator and denominator.

    '
  other_l1_blocks: 'Use weighted arithmetic means for Localization and Anatomical Integration, Subject Preservation, and Task
    Realism and Image Quality.

    '
  base_formula: base_reward = 0.67 * P_masked + 0.23 * L + 0.07 * S + 0.03 * Q
  anatomy_score: A = score(female_calf_knee_ankle_anatomical_continuity) / 9.0
  preservation_score: N = score(female_calf_subject_identity_non_target_scene_preservation) / 9.0
  final_formula: reward = base_reward * (A ** 0.25) * (N ** 0.20)
  properties:
  - Fixed 22-score output
  - Prompt-aware compliance
  - Continuous anatomy constraint
  - Continuous non-target preservation constraint
  - No cross-facet compensation
taxonomy:
  Prompt Compliance:
    Requested Calf Slimming:
      female_calf_primary_slimming_outcome_match:
        title: Primary calf-slimming outcome
        definition: 'Judge whether the requested calf or calves are visibly narrower and less bulky than in the source, in
          the correct direction and target area. Do not give credit for slimming produced by changing the whole leg, camera
          scale, crop, aspect ratio, leg length, or pose.

          '
        anchors:
          0: No visible calf slimming, opposite-direction enlargement, wrong region, or a different task.
          3: Near-identical, very weak, one-sided, or inconsistent attempt; calves remain substantially source-like.
          5: Calves are somewhat slimmer, but the reduction is weak, incomplete, non-local, or clearly inaccurate; not enough
            for a positive sample.
          7: The requested calves are clearly slimmer than the source at the actual calf contour, with one visible outcome issue.
          9: Both calf silhouettes are cleanly, naturally, and unmistakably slimmer with no material outcome error.
        rubric: Judge whether the requested calf or calves are visibly narrower and less bulky than in the source, in the
          correct direction and target area. Do not give credit for slimming produced by changing the whole leg, camera scale,
          crop, aspect ratio, leg length, or pose. A nearly identical source-like calf must not score above 4 on this facet;
          score 6 or higher only when real calf-width reduction is visible at normal viewing size.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_calf_requested_side_coverage_match:
        title: Requested side and bilateral coverage
        definition: 'Judge whether every visible requested calf is edited. For bilateral prompts, both assessable calves must
          be addressed without editing an unrequested side.

          '
        anchors:
          0: A requested calf is missed, the wrong leg/region is edited, or side coverage cannot be verified.
          3: Only a small portion or one of two clearly visible requested calves is edited, or coverage is mostly inferred
            from an unchanged source-like leg.
          5: Both sides are attempted but one side is notably incomplete, too weak, inconsistent, or non-local; visible bilateral
            narrowing is not yet convincing.
          7: All requested visible calves show clear edited coverage with a minor coverage imbalance.
          9: Every requested and assessable calf is fully, correctly, and locally covered.
        rubric: Judge whether every visible requested calf is edited. For bilateral prompts, both assessable calves must be
          addressed without editing an unrequested side. Do not count an already slim but unchanged source calf as covered.
          In a bilateral prompt, if one visible calf is near-identical to source, this facet must stay below 6.
          Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_calf_slimming_magnitude_match:
        title: Slimming magnitude
        definition: 'Judge whether the amount of narrowing matches the prompt. When no degree is specified, require a clearly
          visible but natural cosmetic reduction rather than a negligible, extreme, or globally scaled transformation.

          '
        anchors:
          0: Wrong direction, no useful narrowing, or grossly excessive deformation.
          3: The change is barely visible, near-identical to source, severely excessive, uneven, or mostly caused by global
            distortion.
          5: Direction is correct, but the amount is noticeably too weak, too strong, or partly non-local; not enough to be
            a clear successful edit.
          7: The magnitude is clearly visible and appropriate, with only a small under- or over-edit.
          9: The reduction is clearly visible, balanced, natural, and exactly appropriate.
        rubric: Judge whether the amount of narrowing matches the prompt. When no degree is specified, require a clearly visible
          but natural cosmetic reduction rather than a negligible, extreme, or globally scaled transformation. Apply this
          facet's 0-9 anchors directly. If the reduction is not obvious after direct source comparison, this facet should
          stay below 5; score 6+ only when calf width reduction is visible but imperfect. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated
          preservation, realism, or attractiveness compensate for this facet.
      female_calf_widest_zone_reduction_match:
        title: Widest-zone width reduction
        definition: 'Judge whether the broadest calf region is genuinely narrowed rather than merely shifting, blurring, or
          trimming an unrelated edge.

          '
        anchors:
          0: The widest calf zone is not reduced or becomes wider.
          3: Only a tiny, ambiguous, source-like, or misplaced part of the contour is reduced.
          5: The widest zone is reduced, but weakly, unevenly, or incompletely; the success is still uncertain.
          7: The main width is visibly and correctly reduced relative to the source, with a minor contour inconsistency.
          9: The widest zone is accurately narrowed while retaining plausible form.
        rubric: Judge whether the broadest calf region is genuinely narrowed rather than merely shifting, blurring, or trimming
          an unrelated edge. If the broadest calf zone looks nearly the same as the source, this facet must be below 5. Apply
          this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps.
          Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_calf_longitudinal_taper_match:
        title: Knee-to-ankle taper
        definition: 'Judge the full visible calf silhouette from below the knee toward the ankle. The contour should taper
          smoothly rather than becoming abrupt, straight, pinched, concave, or segmented.

          '
        anchors:
          0: The taper is anatomically impossible or severely broken.
          3: The contour is visibly pinched, stepped, tube-like, or essentially unchanged from the source.
          5: A slimmer taper exists but is weak, uncertain, or has obvious irregular transitions.
          7: A visibly slimmer taper is smooth overall with one local shape issue.
          9: The calf has a natural, continuous, and well-proportioned taper.
        rubric: Judge the full visible calf silhouette from below the knee toward the ankle. The contour should taper smoothly
          rather than becoming abrupt, straight, pinched, concave, or segmented. A naturally smooth but unchanged source-like
          taper is not high-score evidence; score 6+ only when taper change is visibly tied to calf slimming. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this
          facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate
          for this facet.
      female_calf_muscle_bulk_refinement_match:
        title: Calf bulk and muscle-shape refinement
        definition: 'Judge whether bulky convexity is reduced while preserving a plausible gastrocnemius and lower-leg volume.
          Do not reward flattening, hollowing, or bone-like thinning.

          '
        anchors:
          0: Bulk is increased or the calf structure collapses.
          3: The calf is crudely flattened, hollowed, remains bulky, or is nearly unchanged from the source.
          5: Bulk is reduced but too weak, incomplete, uncertain, or muscle form is noticeably unnatural.
          7: Muscle bulk is visibly refined naturally with a small form issue.
          9: Bulk is reduced with convincing, smooth, and anatomically plausible volume.
        rubric: Judge whether bulky convexity is reduced while preserving a plausible gastrocnemius and lower-leg volume.
          Do not reward flattening, hollowing, bone-like thinning, or unchanged naturally slim calves; score 6+ only when actual calf bulk reduction is visible. Apply this facet's 0-9
          anchors directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated
          preservation, realism, or attractiveness compensate for this facet.
      female_calf_leg_proportion_harmony_match:
        title: Calf proportion relative to the leg
        definition: 'Judge whether the edited calf remains proportionate to the visible thigh, knee, ankle, foot, and overall
          body. Do not reward an unnaturally tiny lower leg.

          '
        anchors:
          0: The calf-body proportion is severely implausible.
          3: The calf is visibly mismatched to adjacent leg proportions, or no meaningful calf reduction exists to evaluate
            as a successful proportion change.
          5: The result is slimmer but proportionally awkward, or the target change is too weak to be a positive sample.
          7: A visibly slimmer calf remains harmonious with a minor mismatch.
          9: The visible calf reduction is fully balanced with the entire visible leg and body.
        rubric: Judge whether the edited calf remains proportionate to the visible thigh, knee, ankle, foot, and overall body.
          Do not reward an unnaturally tiny lower leg, and do not score a no-op highly as harmonious slimming. Apply this facet's 0-9 anchors directly. If a task-specific failure
          affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.
      female_calf_requested_details_completeness_match:
        title: Requested details and completeness
        definition: 'Judge all remaining explicit requirements, including calf-only scope, clean blending, original leg placement,
          clothing consistency, and any stated preservation clause not already captured by a more specific facet.

          '
        anchors:
          0: Multiple explicit requirements are ignored.
          3: Only a small subset of requested details is satisfied.
          5: The main edit is present but several explicit details are missed, or the target edit is visibly too weak.
          7: Nearly all details are satisfied with one visible omission and visible calf slimming is present.
          9: Every explicit and assessable requirement is completely satisfied.
        rubric: Judge all remaining explicit requirements, including calf-only scope, clean blending, original leg placement,
          clothing consistency, and any stated preservation clause not already captured by a more specific facet. Apply this
          facet's 0-9 anchors directly. If the primary calf-slimming edit is near-identical/no-op, this facet cannot be high merely because preservation clauses are satisfied. If a task-specific failure affects this facet, apply failure_propagation caps. Do
          not let unrelated preservation, realism, or attractiveness compensate for this facet.
  Localization and Anatomical Integration:
    Calf Localization and Lower-Leg Anatomy:
      female_calf_edit_localized_to_calf_region:
        title: Calf-only localization
        definition: 'Judge whether visible shape changes are confined to the calf region and the minimum necessary local clothing
          boundary. Thighs, knees, ankles, feet, hips, and unrelated regions must not be reshaped. A no-op or nearly unchanged
          calf is not precise successful localization.

          '
        anchors:
          0: Large non-calf regions are edited or the whole leg/body is scaled.
          3: Clear spill affects multiple adjacent regions, or the actual visible edit is not in the calf.
          5: The edit is mostly localized but too weak/no-op-like, uncertain, or visibly alters one adjacent region.
          7: A visible calf edit is strongly localized with a small boundary spill.
          9: Visible changes are precisely confined to the intended calf region.
        rubric: Judge whether shape changes are confined to the calf region and the minimum necessary local clothing boundary.
          Thighs, knees, ankles, feet, hips, and unrelated regions must not be reshaped. Do not score a no-op highly just
          because nothing outside the calf changed. Apply this facet's 0-9 anchors directly. If a task-specific failure affects
          this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate
          for this facet.
      female_calf_knee_boundary_preservation:
        title: Knee boundary preservation
        definition: 'Preserve knee size, patella region, joint position, crease structure, and the transition immediately
          below the knee.

          '
        anchors:
          0: The knee is moved, resized, erased, or severely deformed.
          3: Major knee shape or crease distortion is visible.
          5: The knee is recognizable but has a clear boundary change.
          7: The knee is preserved with a minor transition issue.
          9: The knee and upper-calf boundary are unchanged and anatomically clean.
        rubric: Preserve knee size, patella region, joint position, crease structure, and the transition immediately below
          the knee. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_calf_ankle_boundary_preservation:
        title: Ankle boundary preservation
        definition: 'Preserve ankle width, malleolus landmarks, joint position, and the transition from lower calf to ankle
          and foot.

          '
        anchors:
          0: The ankle or foot connection is moved, erased, or severely deformed.
          3: Major ankle narrowing, widening, or landmark loss is visible.
          5: The ankle remains recognizable but has a clear shape change.
          7: The ankle is preserved with a minor transition issue.
          9: The ankle and lower-calf boundary remain unchanged and anatomically clean.
        rubric: Preserve ankle width, malleolus landmarks, joint position, and the transition from lower calf to ankle and
          foot. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_calf_knee_ankle_anatomical_continuity:
        title: Knee-calf-ankle anatomical continuity
        definition: 'Judge whether bones, muscle mass, soft tissue, and contour flow form one plausible lower leg between
          fixed knee and ankle joints.

          '
        anchors:
          0: The lower leg is disconnected, collapsed, duplicated, or anatomically impossible.
          3: Severe pinching, bending, asymmetry, or structural discontinuity is visible.
          5: The leg is connected but has an obvious anatomical inconsistency.
          7: Anatomy is coherent with one local weakness.
          9: The complete lower-leg structure is continuous, plausible, and fully integrated.
        rubric: Judge whether bones, muscle mass, soft tissue, and contour flow form one plausible lower leg between fixed
          knee and ankle joints. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply
          failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_calf_leg_axis_pose_alignment_consistency:
        title: Leg axis, placement, and pose consistency
        definition: 'Preserve each leg''s original axis, joint alignment, stance, crossing, bend, perspective, and position
          in the image.

          '
        anchors:
          0: Pose or leg alignment is substantially changed.
          3: Clear bending, shifting, rotation, or perspective drift occurs.
          5: Pose is mostly preserved but one alignment change is obvious.
          7: Alignment is stable with a minor local drift.
          9: Leg axes, placement, pose, and perspective are unchanged.
        rubric: Preserve each leg's original axis, joint alignment, stance, crossing, bend, perspective, and position in the
          image. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply failure_propagation
          caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_calf_clothing_occlusion_contour_integration:
        title: Clothing and occlusion integration
        definition: 'When calves are clothed or partly occluded, the new contour must respect fabric depth, seams, folds,
          hems, footwear, crossed legs, and foreground objects without penetration or floating edges.

          '
        anchors:
          0: Severe clothing breakage, penetration, or impossible occlusion occurs.
          3: Major fabric or depth-order errors are visible.
          5: The contour follows the body but has a clear clothing or occlusion defect.
          7: Integration is convincing with one small local issue.
          9: Clothing, objects, and depth ordering adapt naturally and consistently.
        rubric: When calves are clothed or partly occluded, the new contour must respect fabric depth, seams, folds, hems,
          footwear, crossed legs, and foreground objects without penetration or floating edges. Apply this facet's 0-9 anchors
          directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
  Subject Preservation:
    Body, Identity, and Scene Preservation:
      female_calf_leg_length_body_height_preservation:
        title: Leg length and body height preservation
        definition: 'Preserve knee-to-ankle distance, total leg length, body height, and vertical body proportions. Calf slimming
          must come from local width reduction only.

          '
        anchors:
          0: Leg length or body height is substantially changed.
          3: Clear vertical stretching, shortening, or rescaling is present.
          5: Mostly preserved but a visible length or proportion shift remains.
          7: Length and height are stable with a minor discrepancy.
          9: Leg length, body height, and vertical proportions are unchanged.
        rubric: Preserve knee-to-ankle distance, total leg length, body height, and vertical body proportions. Calf slimming
          must come from local width reduction only. Apply this facet's 0-9 anchors directly. If a task-specific failure affects
          this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate
          for this facet.
      female_calf_non_target_body_region_preservation:
        title: Non-target body-region preservation
        definition: 'Preserve thighs, hips, waist, torso, arms, hands, feet, and all other non-calf body shapes. Evaluate
          broad body drift rather than calf boundary precision already covered elsewhere.

          '
        anchors:
          0: Multiple non-target body regions are substantially redesigned.
          3: One major or several moderate body changes are visible.
          5: Most regions are preserved but one clear non-target shape change remains.
          7: Non-target body geometry is stable with a minor drift.
          9: All assessable non-target body regions are unchanged.
        rubric: Preserve thighs, hips, waist, torso, arms, hands, feet, and all other non-calf body shapes. Evaluate broad
          body drift rather than calf boundary precision already covered elsewhere. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      female_calf_subject_identity_non_target_scene_preservation:
        title: Subject identity and non-target scene preservation
        definition: 'Preserve the same person, face, hair, skin tone, age impression, expression, and all scene content unrelated
          to the calf edit.

          '
        anchors:
          0: A different person or substantially different scene is produced.
          3: Strong identity drift or major scene replacement is visible.
          5: The same person is recognizable but has a clear non-target change.
          7: Identity and scene are strongly preserved with a minor drift.
          9: Subject identity and all assessable non-target scene content are unchanged.
        rubric: Preserve the same person, face, hair, skin tone, age impression, expression, and all scene content unrelated
          to the calf edit. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet, apply
          failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this facet.
      female_calf_clothing_camera_composition_preservation:
        title: Clothing, camera, and composition preservation
        definition: 'Preserve clothing color, pattern, texture, seams, and folds except minimum local contour adaptation;
          also preserve camera angle, crop, framing, aspect ratio, and image resolution.

          '
        anchors:
          0: Clothing or camera composition is substantially changed.
          3: Major clothing damage, crop change, or framing drift is visible.
          5: Mostly preserved but one clear clothing or composition change remains.
          7: Preservation is strong with a minor local discrepancy.
          9: Clothing appearance, camera, composition, aspect ratio, and resolution are unchanged.
        rubric: Preserve clothing color, pattern, texture, seams, and folds except minimum local contour adaptation; also
          preserve camera angle, crop, framing, aspect ratio, and image resolution. Apply this facet's 0-9 anchors directly.
          If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
  Task Realism and Image Quality:
    Calf Rendering and Artifact Control:
      female_calf_surface_texture_realism:
        title: Skin or fabric surface realism
        definition: 'Preserve plausible skin pores, gradients, fabric weave, seams, and local detail across the edited calf
          instead of smoothing, smearing, cloning, or generating plastic surfaces.

          '
        anchors:
          0: Surface texture is destroyed or obviously synthetic.
          3: Strong smearing, waxiness, cloning, or texture mismatch is visible.
          5: Texture is partly convincing but has a clear artificial region.
          7: Texture is realistic overall with one minor inconsistency.
          9: Skin or fabric detail is fully natural and continuous.
        rubric: Preserve plausible skin pores, gradients, fabric weave, seams, and local detail across the edited calf instead
          of smoothing, smearing, cloning, or generating plastic surfaces. Apply this facet's 0-9 anchors directly. If a task-specific
          failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness
          compensate for this facet.
      female_calf_lighting_shadow_consistency:
        title: Lighting and shadow consistency
        definition: 'Preserve source illumination, shading gradients, contact shadows, cast shadows, highlights, and white
          balance after the contour change.

          '
        anchors:
          0: Lighting or shadows are physically incompatible with the source.
          3: Major missing, duplicated, or displaced shadows are visible.
          5: Lighting is broadly consistent but one clear mismatch remains.
          7: Shading and shadows are convincing with a minor issue.
          9: Lighting, shading, highlights, and shadows are fully coherent.
        rubric: Preserve source illumination, shading gradients, contact shadows, cast shadows, highlights, and white balance
          after the contour change. Apply this facet's 0-9 anchors directly. If a task-specific failure affects this facet,
          apply failure_propagation caps. Do not let unrelated preservation, realism, or attractiveness compensate for this
          facet.
      female_calf_contour_edge_blending_quality:
        title: Contour edge and blending quality
        definition: 'Judge whether edited calf boundaries are clean, sharpness-matched, naturally antialiased, and blended
          without halos, jagged edges, cutout appearance, blur bands, or abrupt texture transitions.

          '
        anchors:
          0: Boundaries are severely broken or visibly pasted.
          3: Strong halos, jagged edges, blur, or cutout artifacts are present.
          5: The contour is usable but has a clear blending defect.
          7: Edges are clean overall with one minor local artifact.
          9: All edited boundaries are seamless and match the source image quality.
        rubric: Judge whether edited calf boundaries are clean, sharpness-matched, naturally antialiased, and blended without
          halos, jagged edges, cutout appearance, blur bands, or abrupt texture transitions. Apply this facet's 0-9 anchors
          directly. If a task-specific failure affects this facet, apply failure_propagation caps. Do not let unrelated preservation,
          realism, or attractiveness compensate for this facet.
      female_calf_artifact_background_stability:
        title: Artifact and background stability
        definition: 'Check for duplicated limbs, missing anatomy, warped floors or walls, bent objects, repeated patterns,
          ghosting, holes, blur, oversharpening, and instability near either calf.

          '
        anchors:
          0: Severe generation failure or major background deformation.
          3: Multiple obvious artifacts or one major structural artifact.
          5: One clear artifact remains but the image is usable.
          7: Only a minor local artifact is visible.
          9: No visible artifact, duplication, warping, or background instability.
