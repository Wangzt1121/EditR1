aggregation:
  within_l1: weighted_arithmetic_mean_of_normalized_l3
  final: weighted_arithmetic_mean_of_l1
  formula: reward = sum_k(alpha_k * sum_i(w_ki * (score_i / 9.0)))
  training_reward_range:
  - 0.0
  - 1.0
  display_score_0_to_9: 9.0 * reward
  rounding: Use full precision internally, then round returned values to at most 3 decimal places.
taxonomy:
  Prompt Compliance:
    Operation and Spatial Design:
      requested_beard_operation_style_family_match:
        title: Requested beard operation and style family match
        definition: Judge add, replace, reshape, remove, or clean-shaven operation together with the exact requested facial-hair
          family. Distinguish mustache-only, stubble/beard shadow, goatee, circle beard, Van Dyke, anchor beard, soul patch,
          chin strap, sideburns, mutton chops, cheek beard, boxed beard, full beard, extended goatee, and clean-shaven removal
          as different families. A photorealistic substitute family is still a failure on this facet.
        anchors:
          0: the requested beard operation and style family is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested beard operation and style family is visible; the central beard operation
            or style family is essentially unmet.
          2: A small relevant attempt is present, but the requested beard operation and style family is severely incorrect
            or incomplete.
          3: The requested operation is weakly attempted, but the primary family is wrong or one defining family feature is
            missing.
          4: The result belongs to a related but clearly wrong family, such as dense stubble becoming a short beard, a goatee
            becoming a full beard, or a mustache-only request adding chin or cheek hair.
          5: The requested family is partially recognizable, but the subtype is wrong or a defining component/clean zone is
            visibly incorrect.
          6: The family is mostly correct, but one important subtype distinction remains wrong, such as connection, component
            boundary, or requested removal/addition pattern.
          7: The exact family is clearly successful, with only a minor visible subtype or local boundary mismatch.
          8: The exact requested family and operation are highly accurate, with only a tiny local imperfection.
          9: The exact requested operation and facial-hair family are fully realized with no substitute style, extra family,
            or missing defining component.
      requested_beard_edit_strength_match:
        title: Requested beard edit strength is matched
        definition: Judge whether subtle, light, clear, dense, strong, dramatic, or clean-shaven intensity is visible at the
          requested amount without becoming excessive or too weak.
        anchors:
          0: the requested beard-edit strength is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested beard-edit strength is visible; the beard change is far too weak, excessive,
            or destructive.
          2: A small relevant attempt is present, but the requested beard-edit strength is severely incorrect or incomplete.
          3: the requested beard-edit strength is weakly attempted; one or more primary requirements are missing or contradictory.
          4: the requested beard-edit strength is recognizable, but a major mismatch, omission, or excessive change remains.
          5: the requested beard-edit strength is moderately achieved, with several substantial visible problems.
          6: the requested beard-edit strength is mostly correct, but one clear and important issue remains.
          7: the requested beard-edit strength is clearly successful, with only a minor visible mismatch.
          8: the requested beard-edit strength is highly accurate and complete, with only a tiny local imperfection.
          9: The beard change has exactly the requested visibility and strength while remaining natural.
      requested_beard_region_coverage_match:
        title: Requested beard region and coverage match
        definition: 'Judge the exact hair-bearing and clean-shaven map for the requested family: upper lip, philtrum, mouth
          corners, soul patch, below-lip area, chin, cheeks, jawline, sideburns, mutton-chop zones, and neck boundary. Extra
          hair in a region that should remain clean is a family/coverage error, not a harmless addition.'
        anchors:
          0: the requested facial-hair region and coverage map is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the requested facial-hair region and coverage map is visible; most requested facial
            regions or clean zones are wrong.
          2: A small relevant attempt is present, but the requested facial-hair region and coverage map is severely incorrect
            or incomplete.
          3: the requested facial-hair region and coverage map is weakly attempted; one or more primary requirements are missing
            or contradictory.
          4: The requested coverage map is recognizable, but a major clean zone or hair-bearing region is wrong, such as cheek
            hair in a mustache/goatee request or chin hair in a mustache-only request.
          5: The coverage map is partially correct, but several visible regional boundaries, clean zones, or requested components
            are wrong.
          6: The coverage map is mostly correct, but one clear and important region or clean-zone issue remains.
          7: the requested facial-hair region and coverage map is clearly successful, with only a minor visible mismatch.
          8: the requested facial-hair region and coverage map is highly accurate and complete, with only a tiny local imperfection.
          9: Every requested hair-bearing and clean-shaven region is exact and complete.
      requested_beard_component_completeness:
        title: All requested beard components are completed
        definition: 'Judge whether all and only the explicitly requested components are present: mustache lobes, connectors,
          chin beard, goatee body, soul patch, cheek beard, jaw beard, sideburns, mutton-chop mass, stubble field, or clean-shaven
          removal. Missing a defining component or adding an unrequested defining component should lower this facet.'
        anchors:
          0: the completeness of requested beard components is absent, reversed, unrelated, or unusable.
          1: Only a negligible trace of the completeness of requested beard components is visible; one or more primary beard
            components are missing.
          2: A small relevant attempt is present, but the completeness of requested beard components is severely incorrect
            or incomplete.
          3: the completeness of requested beard components is weakly attempted; one or more primary requirements are missing
            or contradictory.
