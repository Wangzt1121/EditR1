  Subject Preservation:
    Facial Identity and Adjacent Face Preservation:
      beard_facial_identity_landmark_consistency:
        title: Facial identity and defining landmark geometry are preserved
        definition: Compare the source and edited face as the same individual, not merely as a plausible similar person. Judge
          face outline, forehead, brow position, eye shape and spacing, nose geometry, mouth placement, chin, jaw, cheek structure,
          age impression, gender presentation, characteristic asymmetries, skin tone, and stable facial texture. The beard
          may cover lower-face skin, but it must not reshape the underlying face, change the perceived person, beautify or
          age-shift the subject, or alter characteristic facial proportions.
        anchors:
          0: The edited face is effectively a different person, severely distorted, or no longer identity-consistent with
            the source.
          1: Identity correspondence is extremely weak; multiple defining facial landmarks and the overall person impression
            are replaced.
          2: Major identity drift affects several defining regions such as face outline, eyes, nose, mouth, jaw, or feature
            spacing.
          3: Substantial facial-identity drift is visible; the person remains only loosely related to the source.
          4: The same general subject is suggested, but the face gives a clear changed-person impression at normal viewing
            size.
          5: The person remains recognizable, but multiple facial landmarks, proportions, age cues, or characteristic details
            visibly drift.
          6: The same person is mostly preserved, but one clear identity-affecting geometric, texture, age, or appearance
            change remains.
          7: Identity preservation is strong, with only a minor visible drift in one facial landmark, facial proportion, skin
            tone, or characteristic detail.
          8: The face is nearly source-identical outside the allowed target change, with only a tiny local discrepancy and
            no changed-person impression.
          9: The same person's facial identity, landmark geometry, feature spacing, age impression, skin tone, facial texture,
            and characteristic details are source-identical apart from unavoidable visual occlusion caused by the requested
            beard.
