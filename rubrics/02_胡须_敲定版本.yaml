          skin tone, pores, wrinkles, all non-target facial-hair components, clothing-visible edges, background color, global
          white balance, brightness, contrast, saturation, and lighting mood. Judge these together as non-target preservation:
          the beard edit must not recolor the background, shift exposure, change contrast, smooth the face, or alter surrounding
          non-target regions.'
        anchors:
          0: Expression, mouth-jaw geometry, adjacent skin, background/color state, and non-target details are severely changed,
            replaced, or unusable.
          1: Most expression, mouth-jaw geometry, adjacent skin, background color, or global lighting is clearly inconsistent
            with the source.
          2: Several major changes substantially alter expression, mouth-jaw geometry, skin texture, background color, exposure,
            saturation, or non-target details.
          3: One major or multiple obvious changes affect expression, mouth-jaw geometry, adjacent skin, background color,
            global white balance, contrast, or non-target details.
          4: The non-target image remains recognizable but contains a clear important mismatch in expression, mouth/jaw, skin,
            background color, exposure, or contrast.
          5: Non-target preservation is only moderate, with several visible differences in facial details, background color,
            lighting, or global image tone.
          6: Most non-target details are preserved, but one clear difference remains in expression, mouth/jaw, skin, background
            color, brightness, saturation, or contrast.
          7: Non-target preservation is strong, with only a minor discrepancy in facial details or background/global color.
          8: Expression, mouth, jaw, skin, background color, white balance, and non-target regions are nearly source-identical,
            with only a tiny local discrepancy.
          9: Expression, mouth, jaw, chin, adjacent skin, background color, global white balance, contrast, lighting, and
            all non-target image details remain source-consistent.
