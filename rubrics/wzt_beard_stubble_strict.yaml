strict_preservation_notes:
- Mouth, teeth, lip contour, mouth opening, and expression changes are major non-target errors for beard editing.
- A realistic or attractive beard must not compensate for mouth deformation, invented teeth, missing teeth, white blobs, or
  changed smile shape.
- For naval anchor beard prompts, a generic full beard or boxed beard should not score high even if photorealistic.
strict_stubble_policy:
- When the prompt requests dense short stubble, the target is shallow facial hair close to skin, not a short beard, full beard,
  boxed beard, goatee, or anchor beard.
- Dense short stubble should preserve visible skin, pores, and original face outline; it must not create outward beard volume
  or a continuous opaque beard mass.
- For a stubble prompt, photorealistic full beard coverage is still semantically wrong and must receive low prompt-compliance
  scores.
