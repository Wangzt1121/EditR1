taxonomy:
  Prompt Compliance:
    Exact Beard Regime and Requested Attributes:
      beard_exact_operation_and_family:
        title: Exact requested beard operation and family
        rubric: 'First identify the requested final facial-hair regime and family before judging realism. Score 9 only when
          the requested operation and family are exact. Score 7-8 for the correct family with only a minor local deviation.
          Score 5-6 when the result is related but one important family property is wrong. Score 2-4 when facial hair is present
          but belongs to a substantially different family. Score 0-1 when the operation is absent, reversed, or unusable.


          For a dense short stubble prompt, the requested family is stubble: shallow, close-to-skin facial hair, usually without
          a sculpted beard silhouette. A short beard, full beard, boxed beard, anchor beard, goatee, chin curtain, or broad
          cheek beard is a major family mismatch and should score 0-3 even if it looks realistic. Do not reward the result
          merely because it has attractive facial hair.'
      beard_length_regime:
        title: Final facial-hair length regime
        rubric: 'Judge the visible final length over moustache, cheeks, chin, jaw, and neck. Dense short stubble must remain
          very close to the skin. It should not have combable strand body, hanging chin hair, projecting cheek hair, or a
          continuous beard body.


          Score 9 only when all major regions match the requested length regime. Score 7-8 for a tiny regional length error.
          Score 5-6 when generally close but one important region is visibly too long or short. For a dense short stubble
          prompt, a normal short beard belongs around 3-4; a full, projecting, or shaped beard belongs around 0-2. If the
          face outline becomes visibly expanded by beard volume, this facet should not exceed 4.'
      beard_density_and_skin_visibility:
        title: Density, opacity, and skin visibility
        rubric: 'Judge density independently from length. Dense short stubble means many short hairs while skin, pores, and
          underlying face texture remain visible between hairs. It must not become an opaque beard mass or dark painted mask.


          Score 9 only when density and skin visibility exactly match the prompt across major regions. Score 7-8 for a tiny
          local density issue. Score 5-6 when broadly correct but visibly too sparse, too dark, too uniform, or uneven. Opaque
          cheek coverage, full-beard darkness, continuous black beard mass, or loss of visible skin for a stubble prompt belongs
          around 0-3.'
      beard_volume_and_silhouette:
        title: Outward volume and complete beard silhouette
        rubric: 'Judge outward projection from the face and the complete facial-hair silhouette. Dense short stubble should
          add texture and darkness close to skin without changing the outer contour of the cheeks, jaw, chin, or face width.


          Score 9 only when the silhouette exactly matches the requested regime and preserves the original face outline. Score
          7-8 for a tiny local silhouette issue. Score 5-6 for mild unintended volume. For a stubble prompt, visible cheek/jaw
          expansion, rounded beard bulk, boxed-beard outline, full-beard chin mass, or any silhouette that changes the face
          shape should score 0-3.'
      beard_coverage_map:
        title: Requested facial-hair coverage map
        rubric: 'Judge which regions contain facial hair: upper lip, mouth corners, soul patch, chin, cheeks, jaw, sideburn
          connections, under-chin, and neck. Score 9 only when every requested region is present and no clearly wrong region
          is added.


          For a dense short stubble prompt, broad facial coverage may be acceptable only if it remains shallow stubble. Coverage
          becomes wrong when it turns into a shaped beard, boxed beard, heavy cheek beard, thick jaw beard, or dark full-beard
          mask. Score 5-6 for one important missing or expanded region. Score 0-4 when the result has substantial hair in
          incorrect regions or transforms stubble coverage into a different beard style.'
      beard_component_topology:
        title: Moustache, chin, cheek, jaw, and sideburn connectivity
        rubric: 'Judge whether components connect or remain separated exactly as requested. Check moustache-to-beard, soul-patch-to-chin,
          cheek-to-jaw, and sideburn continuity.


          For a dense short stubble prompt, there usually should not be a strong named-beard topology such as boxed beard,
          anchor beard, goatee, chin curtain, or full cheek-to-jaw frame unless explicitly requested. Score 9 only when the
          component layout is exactly appropriate to the requested regime. Score 5-6 for one clear topology error. Score 0-4
          when the component layout belongs to another named beard style or creates a sculpted full-beard topology instead
          of stubble.'
      beard_edges_fade_and_grooming:
        title: Cheek line, neckline, fade, evenness, and grooming
        rubric: 'Judge cheek-line height, neckline, lip clearance, sideburn fade, trimming evenness, and requested neat/rugged

          character. Score 9 only when boundaries and grooming are exact. Score 7–8 for a tiny local edge issue. Score

          5–6 for visible unevenness or one misplaced boundary. Score 0–4 for severe patchiness, incorrect neckline,

          hair crossing the lips, or grooming that changes the intended style.'
      beard_strand_scale_and_texture:
        title: Hair scale, separation, and requested texture
        rubric: 'Judge whether hairs have the scale appropriate to the requested regime. Dense short stubble should show many
          very short, close-to-skin hairs or realistic fine speckled growth, not long beard strands, blurred gray shading,
          or a full-beard texture.


          Score 9 only when strand scale, separation, texture, and regional consistency are exact. Score 7-8 for a tiny texture
          issue. Score 5-6 for mild blur, coarseness, or over-uniformity. Score 0-4 for painted shading, repeated stamps,
          malformed hairs, long beard strands, textureless smoothing, or a strand scale from another regime.'
      beard_color_and_gray_pattern:
        title: Requested beard color or preserved source color
        rubric: 'Follow an explicit beard-color request. When color is not requested, preserve the source facial-hair color

          relationship and natural gray distribution. Score 9 only when color, depth, undertone, and gray pattern are exact.

          Score 7–8 for a tiny tone difference. Score 5–6 for a visible but limited color drift. Score 0–4 for an invented

          gray/white/red beard, a major darkness shift, or beard recoloring that contradicts the prompt or source.'
  Localization and Anatomical Integration:
    Follicle Placement and Facial Fit:
      beard_localization_no_non_target_edit:
        title: Edit confined to facial-hair regions
        rubric: 'Compare source and result outside facial hair. Score 9 only when the edit is confined to requested beard
          regions

          and minimum follicle transitions. Score 7–8 for a tiny local spill. Score 5–6 for one visible but limited non-target

          change. Score 0–4 when skin, lips, nose, eyes, face shape, scalp hair, neck, clothing, or background is visibly
          edited.'
      beard_follicle_attachment:
        title: Natural follicle and skin attachment
        rubric: 'Judge roots, pores, strand emergence, and contact with skin. Score 9 only when all visible hairs are naturally
          rooted.

          Score 7–8 for a tiny weak-root region. Score 5–6 for one noticeable pasted or overly dark patch. Score 0–4 when
          hair

          floats, forms a mask, or grows from lips, teeth, nostrils, or other impossible surfaces.'
      beard_growth_flow:
        title: Anatomical growth direction and continuity
        rubric: 'Judge regional growth direction over moustache, cheeks, chin, jaw, sideburns, and neck. Score 9 only when
          flow and

          transitions are anatomically coherent. Score 7–8 for a tiny local direction issue. Score 5–6 for one clear region

          with wrong flow. Score 0–4 for broad tangled, duplicated, reversed, or disconnected growth.'
      beard_pose_balance_and_occlusion:
        title: Pose-aware balance and facial occlusion
        rubric: 'Judge near/far-side density, apparent length, boundaries, and overlap with lips, chin, jaw, and neck under
          the actual

          head pose. Score 9 only when balance and occlusion are physically correct. Score 7–8 for a tiny asymmetry. Score
          5–6

          for one obvious imbalance. Score 0–4 for severe one-sidedness or incorrect facial occlusion.'
  Subject Preservation:
    Identity, Facial Features, Color, and Non-target Content:
      beard_same_person_identity:
        title: Same-person facial identity
        rubric: 'Compare the complete source and edited face as the same individual. Score 9 only when the same-person impression,

          age impression, characteristic asymmetries, and stable identity cues are source-identical outside facial hair.

          Score 7–8 for only a tiny local identity drift. Score 5–6 when the person remains recognizable but one clear

          identity-affecting change exists. Score 0–4 when the portrait gives a changed-person impression.'
      beard_eyes_brows_nose_preserved:
        title: Eyes, eyelids, brows, nose, and nostrils preserved
        rubric: 'Compare eye shape and spacing, eyelids, gaze, eyebrows, nose bridge, nose width, and nostrils. Score 9 only
          when

          they remain source-identical. Score 7–8 for a tiny local difference. Score 5–6 for one clear visible change.

          Score 0–4 when several structures move, reshape, blur, recolor, or are regenerated.'
      beard_mouth_teeth_expression_preserved:
        title: Lips, mouth opening, teeth, and expression preserved
        rubric: 'Compare the edited mouth region directly against the source. This facet must penalize any visible change
          to mouth opening, smile shape, lip contour, lip thickness, mouth-corner position, teeth visibility, oral cavity,
          philtrum-to-upper-lip boundary, lower-lip boundary, or expression. Beard or moustache editing may occlude nearby
          skin, but it must not reshape the lips or change whether the mouth is open or closed.


          Score 9 only when the mouth, lips, teeth visibility, mouth corners, and expression are source-identical apart from
          unavoidable beard occlusion. Score 7-8 only for a tiny boundary ambiguity caused by facial hair. Score 5-6 when
          the mouth is still recognizable but lip contour, mouth corner, or teeth visibility has a visible change. Score 3-4
          when the smile, mouth opening, or lip shape changes clearly. Score 0-2 when the mouth becomes a different expression,
          teeth or mouth interior is invented or removed, white blobs or holes appear near the lips, or the beard edit visibly
          corrupts the mouth region.


          Important: do not give a high score merely because the beard looks realistic. A changed mouth is a preservation
          failure even if the requested beard is otherwise good.'
      beard_face_geometry_and_skin_preserved:
        title: Cheeks, jaw, chin, face proportions, and skin texture preserved
        rubric: 'Preserve face geometry, cheek structure, jaw outline, chin shape, skin tone, pores, wrinkles, and non-target
          skin texture. Beard editing may add facial-hair texture, but it must not reshape the face, widen the jaw, darken
          the whole lower face unnaturally, smooth skin, or change the perceived face contour.


          Score 9 only when face geometry and skin remain source-consistent apart from the requested close-to-skin facial
          hair. Score 7-8 for a tiny local boundary ambiguity. Score 5-6 for a visible but limited face or skin drift. Score
          0-4 when the cheek/jaw/chin shape, skin color, skin texture, or lower-face structure changes clearly.'
      beard_global_color_and_white_balance_preserved:
        title: Global color, complexion, exposure, and white balance preserved
        rubric: 'Compare skin tone, scalp-hair color, brows, eyes, lips, teeth, clothing, background, exposure, contrast,
          saturation,

          and overall warm/cool balance. Only an explicitly requested beard color may change. Score 9 only when all non-beard

          color relationships are source-identical. Score 7–8 for a tiny local shift. Score 5–6 for one clear drift. Score
          0–4

          for visible complexion, exposure, saturation, or white-balance change.'
      beard_other_non_target_content_preserved:
        title: Scalp hair, glasses, accessories, clothing, framing, and background preserved
        rubric: 'Compare hairstyle, glasses, ears, accessories, clothing shape and texture, crop, subject scale, camera angle,
          and

          background geometry. Score 9 only when they remain source-identical. Score 7–8 for a tiny local difference. Score

          5–6 for one clear non-target change. Score 0–4 for added/removed accessories, changed hair, warped clothing,

          reframing, or background replacement.'
  Task Realism and Image Quality:
    Strand Rendering and Artifact Control:
      beard_microstrand_and_skin_realism:
        title: Micro-strand and underlying-skin realism
        rubric: 'Judge individual hairs, pores, thickness variation, natural density variation, and visible skin at the requested

          scale. Score 9 only when fully photorealistic and sharply resolved. Score 7–8 for a tiny softness or repetition
          issue.

          Score 5–6 for visible synthetic texture. Score 0–4 for painted, plastic, heavily blurred, repeated, or textureless
          hair/skin.'
      beard_lighting_boundary_integration:
        title: Lighting, shadows, boundaries, and contact integration
        rubric: 'Judge strand highlights, root darkness, lip/chin/neck shadows, mouth boundaries, skin contact, and source
          illumination.

          Score 9 only when integration is seamless. Score 7–8 for a tiny local mismatch. Score 5–6 for one visible pasted
          or

          lighting issue. Score 0–4 for halos, leakage, wrong shadows, glowing hair, or disconnected boundaries.'
      beard_artifact_and_sharpness_control:
        title: Artifacts, blur, smoothing, and sharpness control
        rubric: 'Judge duplicated hairs, melted moustache, broken strands, halos, jagged masks, color bleeding, facial smoothing,
          resolution loss, and generated artifacts. The prompt explicitly forbids blurring or smoothing, so softness and plastic
          skin should be penalized strongly.


          Score 9 only when no meaningful artifact, blur, smoothing, or mask appearance is visible. Score 7-8 for one tiny
          local issue. Score 5-6 for one clear artifact or softness problem. Score 0-4 when artifacts, blur, smoothing, pasted-mask
          appearance, or texture loss materially affect the beard or adjacent face. Visible white blobs, missing patches,
          melted mouth/chin regions, or invented residue near lips or chin should score 0-2.'
